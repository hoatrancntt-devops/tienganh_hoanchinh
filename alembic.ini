[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
# sqlalchemy.url doc tu DATABASE_URL trong migrations/env.py, khong hardcode o day.
# File nay giu ASCII thuan: configparser doc bang encoding mac dinh cua he thong, nen
# ky tu co dau lam alembic chet ngay tren Windows (cp1252) truoc khi chay duoc lenh nao.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
