# Ba container, port 9999. Ngân sách RAM mục tiêu <=2.8GB lúc peak trên máy 8GB.
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-efw}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD chua dat trong .env}
      POSTGRES_DB: ${POSTGRES_DB:-efw}
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres -c shared_buffers=256MB -c max_connections=40
               -c effective_cache_size=768MB -c work_mem=8MB
    volumes:
      # Bind mount ra host: dữ liệu nằm NGOÀI docker, không mất khi reboot/shutdown/down.
      - ./data/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-efw} -d ${POSTGRES_DB:-efw}"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 900M
    networks: [efw]

  speech:
    build:
      context: .
      dockerfile: docker/speech.Dockerfile
    restart: unless-stopped
    environment:
      WHISPER_MODEL: ${WHISPER_MODEL:-small}
      WHISPER_COMPUTE: ${WHISPER_COMPUTE:-int8}
      WHISPER_THREADS: ${WHISPER_THREADS:-2}
      # Chốt chặn quan trọng nhất: không có nó, 5 người ghi âm cùng lúc là máy swap.
      SPEECH_MAX_CONCURRENT: ${SPEECH_MAX_CONCURRENT:-2}
      SPEECH_IDLE_UNLOAD_S: ${SPEECH_IDLE_UNLOAD_S:-600}
    volumes:
      # Bind mount ra host: model tải một lần, nằm ngoài docker.
      - ./models:/srv/models
    deploy:
      resources:
        limits:
          memory: 2G
    networks: [efw]

  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-9999}:9999"
    environment:
      APP_ENV: ${APP_ENV:-prod}
      APP_PORT: 9999
      DEBUG: ${DEBUG:-false}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY chua dat trong .env}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-efw}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-efw}
      SPEECH_SERVICE_URL: http://speech:8080
      SPEECH_ENABLED: ${SPEECH_ENABLED:-true}
      MEDIA_DIR: /app/media
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      DEFAULT_TZ: ${DEFAULT_TZ:-Asia/Ho_Chi_Minh}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      LLM_ROUTE_T1: ${LLM_ROUTE_T1:-}
      LLM_ROUTE_T2: ${LLM_ROUTE_T2:-}
      AI_GLOBAL_MONTHLY_USD: ${AI_GLOBAL_MONTHLY_USD:-20}
    volumes:
      - ./media:/app/media
      - ./backups:/app/backups
    depends_on:
      db:
        condition: service_healthy
      speech:
        condition: service_started   # app phải chạy được kể cả khi speech chết
    deploy:
      resources:
        limits:
          memory: 700M
    networks: [efw]

# Không còn named volume: dữ liệu Postgres (./data/pgdata), model (./models),
# media (./media), backup (./backups) đều là bind mount trên host -> ngoài docker,
# bền vững qua reboot/shutdown, dễ backup và nhìn thấy trực tiếp.

networks:
  efw:
    driver: bridge
