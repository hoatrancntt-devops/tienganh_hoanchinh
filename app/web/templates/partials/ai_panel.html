<button class="ai-fab" id="aiFab" aria-label="Hỏi trợ lý AI">
  <svg viewBox="0 0 24 24" width="21" height="21" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M21 11.5a8.4 8.4 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.4 8.4 0 0 1-3.8-.9L3 21l1.9-5.7a8.4 8.4 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.4 8.4 0 0 1 3.8-.9h.5a8.5 8.5 0 0 1 8 8v.5z"/></svg>
</button>
<div class="ai-panel" id="aiPanel">
  <div class="ai-head"><span style="width:7px;height:7px;border-radius:99px;background:var(--ok)"></span><b>Trợ lý tiếng Anh</b>
    <button class="icon-btn" style="margin-left:auto;width:28px;height:28px" onclick="document.getElementById('aiPanel').classList.remove('open')" aria-label="Đóng">✕</button></div>
  <div class="ai-body" id="aiBody"><div class="ai-msg bot">Chào bạn. Hỏi mình bất cứ gì về bài đang học — ngữ pháp, từ vựng, cách phát âm. Mình trả lời bằng tiếng Việt.</div></div>
  <form class="ai-foot" onsubmit="return aiAsk(event)">
    <input id="aiIn" placeholder="Sao chỗ này dùng works mà không phải work?" autocomplete="off" required>
    <button class="btn" type="submit" id="aiGo" style="padding:.6rem .8rem"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
  </form>
</div>
<script>
(function(){const f=document.getElementById('aiFab'),p=document.getElementById('aiPanel');
 f.onclick=()=>{p.classList.toggle('open');if(p.classList.contains('open'))document.getElementById('aiIn').focus();};})();
async function aiAsk(e){e.preventDefault();
  const inp=document.getElementById('aiIn'),body=document.getElementById('aiBody'),go=document.getElementById('aiGo');
  const q=inp.value.trim();if(!q)return false;inp.value='';go.disabled=true;
  const me=document.createElement('div');me.className='ai-msg me';me.textContent=q;body.appendChild(me);
  const w=document.createElement('div');w.className='ai-msg bot';w.innerHTML='<span class="spin"></span>';body.appendChild(w);body.scrollTop=body.scrollHeight;
  const payload={task:'explain',question:q};const lid=document.body.dataset.lessonId;if(lid)payload.lesson_id=lid;
  const r=await api('/api/v1/ai/ask',payload);go.disabled=false;
  w.className='ai-msg bot'+(r.data.degraded?' fb':'');w.textContent=r.ok?r.data.answer_vi:(r.data.detail||'Mình chưa trả lời được lúc này.');
  body.scrollTop=body.scrollHeight;return false;}
</script>
