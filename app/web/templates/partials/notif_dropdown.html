<div class="dd-head"><span>Thông báo</span><button class="btn btn-quiet" style="padding:.2rem .5rem;font-size:.72rem" onclick="markAllRead()">Đọc tất cả</button></div>
{% for n in items %}
<a class="notif {{ 'unread' if not n.read_at }}" href="{{ n.link or '/learn' }}">
  <div class="notif-ico">{% include "partials/notif_icon.html" %}</div>
  <div class="notif-b"><div class="notif-t">{{ n.title_vi }}</div>{% if n.body_vi %}<div class="notif-d">{{ n.body_vi }}</div>{% endif %}<div class="notif-ts" data-ts="{{ n.created_at.isoformat() }}"></div></div>
</a>
{% else %}<div class="empty">Chưa có thông báo nào.</div>{% endfor %}
<div class="dd-foot"><a href="/notifications">Xem tất cả</a></div>
<script>document.querySelectorAll('#notifPanel [data-ts]').forEach(e=>e.textContent=timeAgo(e.dataset.ts));</script>
