    tags: [it_english, core]

sentence_patterns:
  - pattern: "{action} failed: {reason}."
    meaning_vi: "{action} thất bại: {reason}."
    slots:
      action: ["Connection", "Login", "Upload"]
      reason: ["permission denied", "timed out", "file not found"]

dialogue:
  context_vi: >
    Emma chụp màn hình gửi kèm ticket. Đây là đúng thứ cô ấy nhìn thấy lúc 2 giờ sáng thứ Sáu,
    khi Northwind Portal không cho cô ấy vào. Bên dưới câu xin lỗi lịch sự là bốn dòng kỹ thuật —
    và bốn dòng đó nói thẳng chuyện gì đang xảy ra.
  turns:
    - {speaker: "", en: "Northwind Portal — Sign-in failed", vi: "Northwind Portal — Đăng nhập thất bại"}
    - {speaker: "", en: "We could not sign you in. Please try again later.", vi: "Chúng tôi không đăng nhập được cho bạn. Vui lòng thử lại sau."}
    - {speaker: "", en: "Error: Failed to read the database password. Permission denied.", vi: "Lỗi: Không đọc được mật khẩu cơ sở dữ liệu. Bị từ chối quyền."}
    - {speaker: "", en: "Hint: This is not a password problem. Please contact your IT support team.", vi: "Gợi ý: Đây không phải vấn đề mật khẩu của bạn. Vui lòng liên hệ bộ phận IT."}
    - {speaker: "", en: "Reference: INC-2291 — auth-service, line 118, 02:04", vi: "Mã tham chiếu: INC-2291 — auth-service, dòng 118, lúc 02:04"}

listening_snippet:
  id: LS-R02
  speed: 1.0
  voice: en_US_male
  context_vi: >
    2 giờ 10 sáng. Emma gọi điện và đọc to màn hình cho bạn nghe, từng chữ một, vì cô ấy không
    hiểu nó nói gì. Bạn thì hiểu.
  transcript_en: "Failed to read the database password. Permission denied. This is not a password problem — please contact your IT support team."
  transcript_vi: "Không đọc được mật khẩu cơ sở dữ liệu. Bị từ chối quyền. Đây không phải vấn đề mật khẩu — vui lòng liên hệ bộ phận IT."
  questions:
    - q_vi: "Theo thông báo, cái gì bị hỏng?"
      choices: ["Hệ thống không đọc được mật khẩu CSDL vì bị từ chối quyền", "Emma gõ sai mật khẩu", "Máy Emma hết dung lượng"]
      answer: 0
      difficulty: 3
    - q_vi: "Thông báo bảo Emma làm gì?"
      choices: ["Liên hệ bộ phận IT", "Đổi mật khẩu ngay", "Mua máy mới"]
      answer: 0
      difficulty: 3

speaking_drills: []

vietnamese_explanation:
  why_vi: >
    Thông báo lỗi tiếng Anh trông đáng sợ nhưng thật ra có cấu trúc rất đều: CÁI GÌ hỏng + LÝ DO +
    (thường) GỢI Ý sửa + VỊ TRÍ (file/dòng). Người Việt làm IT hay hoảng khi thấy khối chữ đỏ, cuộn
    qua rồi Google cả câu — trong khi câu trả lời thường nằm ngay ở dòng đầu.
  how_vi: >
    Đọc theo bốn mảnh: (1) động từ hỏng — "failed to…", "cannot…"; (2) lý do — "timed out",
    "permission denied", "not found"; (3) gợi ý — câu bắt đầu bằng "Check…", "Try…", "Hint:"; (4)
    vị trí — "at … line 42". Đọc dòng ĐẦU và dòng có "line" trước, phần stack trace để sau.
  contrast_vi: "“Permission denied” = vấn đề QUYỀN (không phải code sai) ↔ “not found” = thiếu FILE/đường dẫn. Đọc đúng lý do là nửa lời giải."

common_mistakes:
  - mistake: "Hoảng khi thấy khối chữ đỏ, không đọc dòng đầu"
    why_vi: "Nhìn nhiều chữ tưởng phức tạp."
    fix_vi: "Dòng ĐẦU thường nói đủ: cái gì hỏng + lý do. Đọc nó trước khi cuộn xuống stack trace."
    detect: {}
  - mistake: "Không phân biệt “permission denied” với lỗi code"
    why_vi: "Coi mọi lỗi đỏ là do code sai."
    fix_vi: "“permission denied” là vấn đề QUYỀN, “not found” là thiếu file, “timed out” là mạng/kết nối. Lý do chỉ đúng chỗ cần sửa."
    detect: {}
  - mistake: "Bỏ qua số dòng “line 42”"
    why_vi: "Không để ý phần đuôi."
    fix_vi: "“at file line N” chỉ thẳng chỗ lỗi. Mở đúng dòng đó thay vì đọc cả file."
    detect: {}

memory_trick_vi: >
  Đọc lỗi theo bốn ô: HỎNG GÌ (failed to…) — VÌ SAO (timed out / denied / not found) — SỬA SAO
  (Check/Try…) — Ở ĐÂU (line N). Chữ đỏ không đáng sợ; nó là một biểu mẫu điền sẵn.

mini_quiz:
  - kind: mcq
    prompt_vi: "Một máy khác báo “Failed to connect: connection timed out.” Vấn đề thuộc nhóm nào?"
    choices: ["Kết nối/mạng", "Sai cú pháp code", "Thiếu bản quyền"]
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "Màn hình của Emma có dòng “Permission denied”. Nó nghĩa là gì?"
    choices: ["Bị từ chối quyền truy cập", "File hỏng", "Hết bộ nhớ"]
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Một thông báo khác ghi “Error at server.js line 42”. Dòng đó cho biết gì?"
    choices: ["Vị trí lỗi: file server.js, dòng 42", "Có 42 lỗi", "Server chạy 42 giây"]
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Emma đang chờ máy. Bạn nên đọc phần nào của thông báo lỗi trước?"
    choices: ["Dòng đầu và dòng có “line”", "Toàn bộ stack trace", "Không đọc, Google luôn"]
    answer: 0
    difficulty: 2
  - kind: mcq_listen
    prompt_vi: "Một thông báo lỗi khác đưa ra gợi ý gì?"
    audio_text: "Check that the database server is running."
    choices: ["Kiểm tra máy chủ CSDL có chạy không", "Khởi động lại máy tính", "Đổi mật khẩu"]
    answer: 0
    difficulty: 3

