      action: ["Connection", "Login", "Upload"]
      reason: ["permission denied", "timed out", "file not found"]

dialogue:
  context_vi: "Một thông báo lỗi điển hình khi chạy chương trình (đọc từng dòng)."
  turns:
    - {speaker: A, en: "Error: Failed to connect to the database.", vi: "Lỗi: Không kết nối được tới cơ sở dữ liệu."}
    - {speaker: A, en: "Reason: Connection timed out after 30 seconds.", vi: "Nguyên nhân: Kết nối quá thời gian chờ sau 30 giây."}
    - {speaker: A, en: "Hint: Check that the database server is running and reachable.", vi: "Gợi ý: Kiểm tra máy chủ CSDL có đang chạy và truy cập được không."}
    - {speaker: A, en: "at server.js line 42", vi: "tại server.js dòng 42"}

listening_snippet:
  id: LS-R02
  speed: 1.0
  voice: en_US_male
  transcript_en: "Failed to connect to the database. The connection timed out. Check that the database server is running."
  transcript_vi: "Không kết nối được tới cơ sở dữ liệu. Kết nối quá thời gian chờ. Kiểm tra máy chủ CSDL có đang chạy không."
