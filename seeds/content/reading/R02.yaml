vocabulary:
  - term: "failed to"
    ipa: "/feɪld tuː/"
    meaning_vi: "không thể (làm gì đó)"
    chunk: "Failed to read the database password."
    tags: [it_english]
  - term: "permission denied"
    ipa: "/pərˈmɪʃən dɪˈnaɪd/"
    meaning_vi: "bị từ chối quyền"
    chunk: "Error: permission denied."
    tags: [it_english]
  - term: "not found"
    ipa: "/nɒt faʊnd/"
    meaning_vi: "không tìm thấy"
    chunk: "Secret not found."
    tags: [it_english]
  - term: "timed out"
    ipa: "/taɪmd aʊt/"
    meaning_vi: "quá thời gian chờ"
    chunk: "The sign-in request timed out."
    tags: [it_english]
  - term: "expected ... but got"
    ipa: "/ɪkˈspɛktɪd bʌt ɡɒt/"
    meaning_vi: "cần … nhưng nhận được"
