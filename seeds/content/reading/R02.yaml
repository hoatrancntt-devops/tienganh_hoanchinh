objective_vi: "Đọc một thông báo lỗi và xác định: cái gì hỏng, ở đâu, và gợi ý cách sửa."
objective_observable: "Trả lời đúng 4/5 câu hỏi đọc hiểu về nguyên nhân và hướng xử lý."

