schema_version: 1
id: R09
slug: doc-canh-bao-bao-mat
unit: U-R1
title_vi: "Đọc cảnh báo bảo mật (security advisory)"
title_en: "Reading a security advisory"
phase: reading
topic: it_english
cefr_target: b1
order_index: 9
est_minutes: 15

objective_vi: "Đọc một cảnh báo bảo mật và nắm: mức nghiêm trọng, cái gì bị ảnh hưởng, và phải làm gì gấp."
objective_observable: "Trả lời đúng 4/5 câu hỏi về mức độ và hành động cần làm."

prerequisites:
  - {lesson: R08, min_mastery: 80, kind: hard}

vocabulary:
  - term: "vulnerability"
    ipa: "/ˌvʌlnərəˈbɪlɪti/"
    meaning_vi: "lỗ hổng bảo mật"
    chunk: "An authentication bypass vulnerability was found."
    tags: [it_english]
  - term: "severity"
    ipa: "/sɪˈvɛrɪti/"
    meaning_vi: "mức nghiêm trọng"
    chunk: "Severity: critical."
    tags: [it_english]
  - term: "affected versions"
    ipa: "/əˈfɛktɪd ˈvɜːrʒənz/"
    meaning_vi: "các phiên bản bị ảnh hưởng"
    chunk: "Affected versions: 5.0.0 to 5.1.1."
    tags: [it_english]
  - term: "patch"
    ipa: "/pætʃ/"
    meaning_vi: "bản vá"
    chunk: "A patch is available in 5.1.2."
    tags: [it_english]
  - term: "as soon as possible"
    ipa: "/æz suːn æz ˈpɒsəbəl/"
    meaning_vi: "càng sớm càng tốt"
    chunk: "Upgrade as soon as possible."
    tags: [it_english]
  - term: "mitigation"
    ipa: "/ˌmɪtɪˈɡeɪʃən/"
    meaning_vi: "cách giảm thiểu (tạm thời)"
    chunk: "Mitigation: block the login endpoint."
    tags: [it_english]

sentence_patterns:
  - pattern: "Severity: {level}. Affected versions: {versions}. Update to {fix}."
    meaning_vi: "Mức: {level}. Phiên bản ảnh hưởng: {versions}. Nâng cấp lên {fix}."
    slots:
      level: [critical, high, medium]
      versions: ["2.0 to 2.4", "all versions before 3.1"]
      fix: ["version 2.5", "version 3.1"]


reading_passage:
  id: RP-R09
  kind: doc
  context_vi: >
    Advisory này về hộp thư của team chiều thứ Năm. Đọc xong, Linh quyết định deploy ngay trong đêm thay vì chờ tới thứ Hai. Quyết định đó đúng. Đây là mắt xích đầu tiên của cả sự cố — và bạn đọc lại để hiểu vì sao không ai làm sai mà mọi thứ vẫn hỏng.
  text_en: |
    Security Advisory CVE-2026-4471 — authentication bypass in AuthKit.
    Severity: Critical. An attacker can sign in as any user without a password.
    Affected versions: 5.0.0 to 5.1.1.
    A patch is available in 5.1.2.
    Action: Upgrade to 5.1.2 as soon as possible.
    Mitigation: If you cannot upgrade tonight, block external access to the login endpoint.
  text_vi: |
    Cảnh báo bảo mật CVE-2026-4471 — vượt qua xác thực trong AuthKit.
    Mức nghiêm trọng: Critical. Kẻ tấn công có thể đăng nhập vào bất kỳ tài khoản nào mà không cần mật khẩu.
    Phiên bản bị ảnh hưởng: 5.0.0 đến 5.1.1.
    Đã có bản vá ở phiên bản 5.1.2.
    Hành động: Nâng lên 5.1.2 càng sớm càng tốt.
    Giảm thiểu: Nếu chưa nâng cấp được trong đêm nay, chặn truy cập từ ngoài vào endpoint đăng nhập.
  questions:
    - q_en: "Which versions are affected?"
      choices: ["5.0.0 to 5.1.1", "5.1.2 and later", "Only 5.0.0"]
      answer: 0
      skill: scan
      difficulty: 3
    - q_en: "What can you do if you cannot upgrade tonight?"
      choices:
        - "Block external access to the login endpoint"
        - "Turn off the database"
        - "Reset every password"
      answer: 0
      skill: infer
      difficulty: 4
    - q_en: "\"Severity: Critical\" means the problem is:"
      choices: ["extremely serious", "hard to reproduce", "already fixed everywhere"]
      answer: 0
      skill: guess_word
      difficulty: 3

writing_task:
  id: WT-R09
  kind: guided_email
  prompt_vi: >
    Chuyển cảnh báo bảo mật này cho các nhóm khác: mức độ nghiêm trọng, phải làm gì, và làm gì
    nếu chưa nâng cấp kịp. Viết 4-5 câu.
  frame_vi:
    - "Mở: chào — nêu ngay mức nghiêm trọng"
    - "Thân: bản nào bị ảnh hưởng + bản vá là bản nào"
    - "Thân: phải làm gì và khi nào"
    - "Kết: phương án tạm nếu chưa kịp"
  required_chunks:
    - ["as soon as possible", "asap", "urgently", "immediately"]
    - ["upgrade", "patch"]
    - ["if you cannot", "if you can't", "in the meantime", "until then"]
  min_words: 20
  hint_vi: "Thư cảnh báo bảo mật phải nói mức nghiêm trọng ở câu đầu tiên, không để ở giữa."
  sample_en: "Hi all, this is a critical advisory. Versions 5.0.0 to 5.1.1 of AuthKit allow an attacker to sign in as any user. Please upgrade to 5.1.2 as soon as possible. If you cannot upgrade tonight, block external access to the login endpoint. Thanks, Hoa"

listening_snippet:
  id: LS-R09
  speed: 1.0
  voice: en_US_female
  context_vi: >
    Linh đọc to advisory này trong cuộc gọi ngắn chiều thứ Năm, trước khi cả team đồng ý deploy
    trong đêm. Nghe kỹ hai thứ: mức độ và phương án tạm nếu chưa vá kịp.
  transcript_en: "This is a critical vulnerability affecting AuthKit 5.0.0 through 5.1.1. Upgrade to 5.1.2 as soon as possible. If you cannot upgrade tonight, block external access to the login endpoint."
  transcript_vi: "Đây là lỗ hổng nghiêm trọng ảnh hưởng AuthKit từ 5.0.0 đến 5.1.1. Nâng lên 5.1.2 càng sớm càng tốt. Nếu chưa nâng cấp được đêm nay, chặn truy cập từ ngoài vào endpoint đăng nhập."
  questions:
    - q_vi: "Mức nghiêm trọng của CVE-2026-4471 là gì?"
      choices: ["Nghiêm trọng (critical)", "Thấp", "Không ghi"]
      answer: 0
      difficulty: 2
    - q_vi: "Nếu chưa nâng cấp kịp trong đêm thì làm gì?"
      choices: ["Chặn truy cập từ ngoài vào endpoint đăng nhập", "Không làm gì", "Gỡ hẳn AuthKit"]
      answer: 0
      difficulty: 3

speaking_drills: []

vietnamese_explanation:
  why_vi: >
    Cảnh báo bảo mật là loại tài liệu mà đọc CHẬM hoặc SAI có thể khiến hệ thống bị tấn công. Bốn
    trường phải nắm ngay: SEVERITY (gấp đến đâu), AFFECTED VERSIONS (mình có nằm trong không), ACTION
    (nâng cấp lên bản nào), MITIGATION (làm gì tạm nếu chưa vá được). Người Việt hay đọc phần mô tả
    kỹ thuật dài mà bỏ qua trường "affected versions" — thứ quyết định mình có bị ảnh hưởng hay không.
  how_vi: >
    Đọc bốn trường theo thứ tự khẩn: (1) SEVERITY = critical/high thì gấp; (2) AFFECTED VERSIONS —
    so với phiên bản bạn đang dùng, nếu nằm trong khoảng thì bạn bị ảnh hưởng; (3) ACTION — nâng lên
    bản đã vá; (4) MITIGATION — cách tạm nếu chưa nâng cấp ngay được. Bỏ phần giải thích kỹ thuật cho sau.
  contrast_vi: "Đọc mô tả lỗ hổng cho hiểu cơ chế (chậm) ↔ kiểm “affected versions” xem mình có dính, rồi làm “action”. Cái sau cứu hệ thống."

common_mistakes:
  - mistake: "Bỏ qua “Affected versions”, không kiểm phiên bản mình đang dùng"
    why_vi: "Mải đọc mô tả kỹ thuật."
    fix_vi: "Kiểm “Affected versions” TRƯỚC. Nếu bản bạn dùng nằm trong khoảng, bạn đang bị ảnh hưởng — hành động ngay."
    detect: {}
  - mistake: "Coi mọi cảnh báo đều gấp như nhau"
    why_vi: "Không đọc trường Severity."
    fix_vi: "“Critical/High” xử lý ngay; “Low/Medium” lên lịch. Severity quyết định thứ tự ưu tiên."
    detect: {}
  - mistake: "Không để ý phần “Mitigation” khi chưa vá được ngay"
    why_vi: "Nghĩ chỉ có một cách là nâng cấp."
    fix_vi: "“Mitigation” cho cách GIẢM THIỂU tạm (tắt tính năng, chặn cổng) khi chưa nâng cấp kịp. Đọc để có phương án ngay."
    detect: {}

memory_trick_vi: >
  Cảnh báo bảo mật bốn ô đọc gấp: GẤP CỠ NÀO (severity) — MÌNH CÓ DÍNH (affected versions) — VÁ SAO
  (action) — CHỐNG TẠM (mitigation). Ô thứ hai quyết định có phải hành động không — đừng bỏ.

mini_quiz:
  - kind: mcq
    prompt_vi: "Trong advisory CVE-2026-4471, trường nào cho biết hệ thống của bạn có dính hay không?"
    choices: ["Affected versions", "Severity", "Title"]
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "Advisory ghi “Severity: Critical”. Team nên làm gì?"
    choices:
      - "Nâng cấp/xử lý ngay"
      - "Để tuần sau"
      - "Bỏ qua"
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Giả sử đêm đó chưa deploy kịp. Trường nào trong advisory cho bạn cách chống tạm?"
    choices: ["Mitigation", "Severity", "Affected versions"]
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "Một thư viện khác: bạn dùng bản 2.3, advisory ghi “Affected: 2.0 to 2.4”. Bạn có bị ảnh hưởng?"
    choices: ["Có, 2.3 nằm trong khoảng", "Không", "Không thể biết"]
    answer: 0
    difficulty: 3
  - kind: mcq_listen
    prompt_vi: "Một advisory khác trong hộp thư. Nghe: nếu chưa nâng cấp được thì làm gì?"
    audio_text: "Disable the import feature as a temporary mitigation."
    choices: ["Tắt tính năng import", "Khởi động lại máy", "Đổi mật khẩu"]
    answer: 0
    difficulty: 3

