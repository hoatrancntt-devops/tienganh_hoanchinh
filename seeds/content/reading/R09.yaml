schema_version: 1
id: R09
slug: doc-canh-bao-bao-mat
unit: U-R1
title_vi: "Đọc cảnh báo bảo mật (security advisory)"
title_en: "Reading a security advisory"
phase: reading
topic: it_english
cefr_target: b1
order_index: 9
