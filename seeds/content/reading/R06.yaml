schema_version: 1
id: R06
slug: doc-log-tim-loi
unit: U-R1
title_vi: "Đọc log để tìm lỗi"
title_en: "Reading logs"
phase: reading
topic: it_english
cefr_target: b1
order_index: 6
est_minutes: 14

objective_vi: "Đọc dòng log và phân biệt mức độ (INFO/WARN/ERROR), tìm đúng dòng gây sự cố."
objective_observable: "Trả lời đúng 4/5 câu hỏi về mức log và dòng lỗi gốc."

prerequisites:
  - {lesson: R05, min_mastery: 80, kind: hard}

vocabulary:
  - term: "INFO"
    ipa: "/ˈɪnfoʊ/"
    meaning_vi: "thông tin bình thường"
    chunk: "INFO: auth-service started."
    tags: [it_english]
  - term: "WARNING"
    ipa: "/ˈwɔːrnɪŋ/"
    meaning_vi: "cảnh báo (chưa hỏng nhưng đáng ngờ)"
    chunk: "WARNING: could not refresh credentials."
    tags: [it_english]
  - term: "ERROR"
    ipa: "/ˈɛrər/"
    meaning_vi: "lỗi (đã hỏng)"
    chunk: "ERROR: access denied on the secret."
    tags: [it_english]
  - term: "timestamp"
    ipa: "/ˈtaɪmstæmp/"
    meaning_vi: "dấu thời gian"
    chunk: "Check the timestamp of the first error."
    tags: [it_english]
  - term: "stack trace"
    ipa: "/stæk treɪs/"
    meaning_vi: "vết gọi hàm khi lỗi"
    chunk: "The stack trace points to the secrets client."
    tags: [it_english]
  - term: "retry"
    ipa: "/ˈriːtraɪ/"
    meaning_vi: "thử lại"
    chunk: "Retry 3 of 5 failed."
    tags: [it_english]

sentence_patterns:
  - pattern: "{level}: {message} at {time}."
    meaning_vi: "{level}: {message} lúc {time}."
    slots:
      level: [INFO, WARNING, ERROR]
      message: ["server started", "disk space low", "failed to save file"]
      time: ["10:02", "10:05", "10:07"]


reading_passage:
  id: RP-R06
  kind: log
  context_vi: >
    Log của auth service đêm hôm đó, từ lúc deploy đến lúc Emma không vào được. Toàn bộ câu trả lời nằm gọn trong năm dòng này. Lúc 3 giờ sáng bạn đã cuộn qua nó — nhưng chưa biết dừng ở đâu. Giờ thì biết.
  text_en: |
    23:41 INFO: auth-service started. Release 4.2.0.
    01:58 WARNING: Could not refresh database credentials. Using the cached ones.
    02:03 ERROR: AccessDeniedException — not authorized to perform secretsmanager:GetSecretValue.
    02:03 ERROR: Failed to read the database password. Sign-in failed for user e.brooks.
    02:04 ERROR: Retry 3 of 3 failed. Giving up.
  text_vi: |
    23:41 INFO: auth-service khởi động. Bản 4.2.0.
    01:58 WARNING: Không làm mới được credential của CSDL. Đang dùng bản lưu tạm.
    02:03 ERROR: AccessDeniedException — không được phép thực hiện secretsmanager:GetSecretValue.
    02:03 ERROR: Không đọc được mật khẩu CSDL. Đăng nhập thất bại cho người dùng e.brooks.
    02:04 ERROR: Thử lại lần 3/3 thất bại. Dừng.
  questions:
    - q_en: "At what time did the first ERROR appear?"
      choices: ["02:03", "01:58", "23:41"]
      answer: 0
      skill: scan
      difficulty: 3
    - q_en: "What was the service not allowed to do?"
      choices: ["Read a secret value", "Start up", "Write to the database"]
      answer: 0
      skill: infer
      difficulty: 4
    - q_en: "What do these logs describe?"
      choices:
        - "A sign-in failure caused by a permission problem"
        - "A slow database query"
        - "A successful deployment"
      answer: 0
      skill: skim
      difficulty: 4

writing_task:
  id: WT-R06
  kind: guided_email
  prompt_vi: >
    Viết email tóm tắt cho nhóm những gì log cho thấy, và bước bạn sẽ làm tiếp. Viết 4-5 câu.
  frame_vi:
    - "Mở: chào"
    - "Thân: log cho thấy gì, lúc mấy giờ"
    - "Thân: bạn hiểu nguyên nhân là gì"
    - "Kết: bạn sẽ làm gì tiếp"
  required_chunks:
    - ["the logs show", "the log shows", "according to the logs", "the logs say"]
    - ["error"]
    - ["i will", "i'll"]
  min_words: 20
  hint_vi: "Trích đúng dòng log và giờ của nó. “Có lỗi gì đó” không giúp ai làm được gì."
  sample_en: "Hi team, the logs show an ERROR at 02:03: the service was not authorized to read the database secret. The warning at 01:58 says it was already using cached credentials. I will check the IAM role of the auth service now. Thanks, Hoa"

listening_snippet:
  id: LS-R06
  speed: 1.0
  voice: en_US_male
  context_vi: >
    Priya đọc lại đúng hai dòng này trong buổi bàn giao — dòng cảnh báo lúc 01:58 và dòng lỗi
    đầu tiên lúc 02:03. Hai dòng, cách nhau năm phút, và cái sau là hệ quả của cái trước.
  transcript_en: "At 1:58 a warning says it could not refresh the database credentials. At 2:03 an error says access denied: the service is not authorized to read the secret."
  transcript_vi: "Lúc 01:58 một cảnh báo nói không làm mới được credential của CSDL. Lúc 02:03 một lỗi nói bị từ chối: dịch vụ không được phép đọc secret."
  questions:
    - q_vi: "Nguyên nhân gốc của lỗi là gì?"
      choices: ["Dịch vụ không có quyền đọc secret", "Sai mật khẩu của Emma", "Mất mạng"]
      answer: 0
      difficulty: 3
    - q_vi: "Cảnh báo lúc 01:58 báo gì?"
      choices: ["Không làm mới được credential, đang dùng bản lưu tạm", "Máy chủ khởi động", "Có người đăng nhập"]
      answer: 0
      difficulty: 2

speaking_drills: []

vietnamese_explanation:
  why_vi: >
    Log là một dòng thời gian: mỗi dòng có DẤU THỜI GIAN, MỨC ĐỘ (INFO/WARNING/ERROR) và thông điệp.
    Bí quyết đọc log không phải đọc hết — mà là NHẢY tới dòng ERROR đầu tiên, rồi nhìn các WARNING
    NGAY TRƯỚC nó để hiểu vì sao. Người Việt hay đọc tuần tự từ trên xuống, mất thời gian ở đống INFO vô hại.
  how_vi: >
    Ba bước: (1) tìm "ERROR" đầu tiên theo thời gian — đó là chỗ hỏng; (2) đọc các "WARNING" ngay
    trước nó — thường là mầm mống (vd disk thấp → save fail); (3) bỏ qua "INFO" trừ khi cần mốc thời
    gian. Dòng ERROR đầu tiên quan trọng hơn các ERROR sau (chúng thường là hệ quả).
  contrast_vi: "Đọc từ dòng đầu tuần tự (chậm) ↔ nhảy tới ERROR đầu tiên rồi ngược lên WARNING (nhanh, đúng nguyên nhân)."

common_mistakes:
  - mistake: "Đọc log tuần tự từ trên xuống"
    why_vi: "Thói quen đọc văn bản."
    fix_vi: "Nhảy tới “ERROR” đầu tiên trước. Đống “INFO” phía trên đa phần vô hại."
    detect: {}
  - mistake: "Nhìn ERROR cuối cùng thay vì ERROR đầu tiên"
    why_vi: "Cuộn xuống dưới cùng vì nghĩ lỗi mới nhất là gốc."
    fix_vi: "ERROR ĐẦU TIÊN theo thời gian thường là nguyên nhân; các ERROR sau thường là hệ quả dây chuyền."
    detect: {}
  - mistake: "Bỏ qua WARNING ngay trước ERROR"
    why_vi: "Nghĩ warning không quan trọng."
    fix_vi: "WARNING ngay trước ERROR thường là mầm mống (disk thấp → save fail). Đọc nó để hiểu gốc rễ."
    detect: {}

memory_trick_vi: >
  Đọc log như điều tra hiện trường theo giờ: tìm TIẾNG NỔ đầu tiên (ERROR sớm nhất), rồi nhìn các
  DẤU HIỆU BÁO TRƯỚC (WARNING ngay trước). Đám INFO chỉ là người qua đường vô can.

mini_quiz:
  - kind: mcq
    prompt_vi: "Trong log auth-service, mức nào nghĩa là ĐÃ hỏng?"
    choices: [ERROR, INFO, WARNING]
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Log đêm đó có ba dòng ERROR. Nên đọc dòng nào trước?"
    choices: ["ERROR đầu tiên theo thời gian", "ERROR cuối cùng", "ERROR ở giữa"]
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "Trong một log khác: “WARNING: disk space low” rồi “ERROR: failed to save”. Quan hệ giữa hai dòng?"
    choices:
      - "Disk thấp là nguyên nhân của save fail"
      - "Không liên quan gì"
      - "Save fail gây ra disk thấp"
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "Mức nào chỉ là thông tin bình thường?"
    choices: [INFO, ERROR, WARNING]
    answer: 0
    difficulty: 1
  - kind: mcq_listen
    prompt_vi: "Log của một dịch vụ khác. Nghe: nguyên nhân gốc là gì?"
    audio_text: "It failed to save the file because there's no space left on the device."
    choices: ["Hết dung lượng ổ", "Sai cú pháp", "Mạng chậm"]
    answer: 0
    difficulty: 3

unlock_condition:
  mastery_threshold: 80
  mastery_weights: {read: 0.45, write: 0.25, quiz: 0.20, listen: 0.10}
  min_speaking_attempts: 0
  challenge_threshold: 85

recommended_next:
