schema_version: 1
id: R04
slug: doc-readme-huong-dan-cai-dat
unit: U-R1
title_vi: "Đọc README / hướng dẫn cài đặt"
title_en: "Reading a README / setup docs"
phase: reading
topic: it_english
cefr_target: b1
order_index: 4
est_minutes: 14

objective_vi: "Đọc README và làm theo: yêu cầu cần có, các bước cài, và lệnh cần chạy."
objective_observable: "Trả lời đúng 4/5 câu hỏi về yêu cầu (prerequisites) và thứ tự các bước."

prerequisites:
  - {lesson: R03, min_mastery: 80, kind: hard}

vocabulary:
  - term: "Prerequisites"
    ipa: "/ˌpriːˈrɛkwɪzɪts/"
    meaning_vi: "yêu cầu cần có trước"
    chunk: "Prerequisites: AWS CLI v2 and read access."
    tags: [it_english]
  - term: "Installation"
    ipa: "/ˌɪnstəˈleɪʃən/"
    meaning_vi: "cài đặt"
    chunk: "See the Installation section."
    tags: [it_english]
  - term: "run the following"
    ipa: "/rʌn ðə ˈfɒloʊɪŋ/"
    meaning_vi: "chạy lệnh sau"
    chunk: "Run the following command."
    tags: [it_english]
  - term: "make sure"
    ipa: "/meɪk ʃʊr/"
    meaning_vi: "đảm bảo rằng"
    chunk: "Make sure you are logged in."
    tags: [it_english]
  - term: "Usage"
    ipa: "/ˈjuːsɪdʒ/"
    meaning_vi: "cách sử dụng"
    chunk: "See Usage for an example."
    tags: [it_english]
  - term: "Note"
    ipa: "/noʊt/"
    meaning_vi: "lưu ý"
    chunk: "Note: this tool never changes a role."
    tags: [it_english, core]

sentence_patterns:
  - pattern: "Make sure {requirement} before you {step}."
    meaning_vi: "Đảm bảo {requirement} trước khi bạn {step}."
    slots:
      requirement: ["Docker is running", "Node 18 is installed"]
      step: ["run the install", "start the app"]


reading_passage:
  id: RP-R04
  kind: doc
  context_vi: >
    Priya gửi bạn link công cụ cô ấy dùng lúc 8 rưỡi sáng để tìm ra cái quyền bị mất. Lần sau bạn muốn tự chạy được nó, không phải chờ ai. Đây là README của công cụ đó.
  text_en: |
    # iam-check — see what a role is really allowed to do
    ## Prerequisites — You need AWS CLI v2 and read access to the account.
    ## Installation — First, clone the repo. Then run the following:
    npm install && npm link
    ## Usage — Make sure you are logged in, then run: iam-check --role portal-auth-role
    Note: this tool only reads. It never changes a role.
  text_vi: |
    # iam-check — xem một role thật sự được phép làm gì
    ## Yêu cầu — Bạn cần AWS CLI v2 và quyền đọc trên tài khoản.
    ## Cài đặt — Đầu tiên, clone repo. Rồi chạy lệnh sau:
    npm install && npm link
    ## Sử dụng — Đảm bảo bạn đã đăng nhập, rồi chạy: iam-check --role portal-auth-role
    Lưu ý: công cụ này chỉ đọc. Nó không bao giờ sửa role.
  questions:
    - q_en: "What do you need before you install the tool?"
      choices: ["AWS CLI v2 and read access", "A new IAM role", "Nothing at all"]
      answer: 0
      skill: scan
      difficulty: 3
    - q_en: "Can this tool change a role?"
      choices: ["No, it only reads", "Yes, always", "Only in production"]
      answer: 0
      skill: infer
      difficulty: 4

writing_task:
  id: WT-R04
  kind: guided_email
  prompt_vi: >
    Viết hướng dẫn ngắn cho đồng nghiệp mới: cần chuẩn bị gì, cài thế nào, chạy thế nào.
    Viết 4-5 câu, có từ nối thứ tự.
  frame_vi:
    - "Mở: chào"
    - "Thân: cần chuẩn bị gì trước"
    - "Thân: bước 1 → bước 2"
    - "Kết: lưu ý quan trọng"
  required_chunks:
    - ["first"]
    - ["then", "after that", "next"]
    - ["make sure", "note that", "please note"]
  min_words: 20
  hint_vi: "Phần “cần chuẩn bị trước” luôn đứng đầu — thiếu nó thì người ta cài tới nửa chừng mới kẹt."
  sample_en: "Hi Nam, first make sure you have AWS CLI v2 installed and read access to the account. Then clone the repo and run npm install. After that you can run the tool with the role name. Note that it only reads, so it is safe. Thanks, Hoa"

listening_snippet:
  id: LS-R04
  speed: 1.1
  voice: en_US_male
  context_vi: >
    Priya thu một tin thoại 15 giây hướng dẫn bạn, vì cô ấy sắp hết ca. Nghe một lần rồi tự làm được —
    đó là mục tiêu.
  transcript_en: "You need AWS CLI version 2 and read access to the account. First clone the repo, then run npm install. Make sure you are logged in before you run iam-check."
  transcript_vi: "Bạn cần AWS CLI phiên bản 2 và quyền đọc trên tài khoản. Đầu tiên clone repo, rồi chạy npm install. Đảm bảo bạn đã đăng nhập trước khi chạy iam-check."
  questions:
    - q_vi: "Cần có gì trước khi cài công cụ này?"
      choices: ["AWS CLI v2 và quyền đọc tài khoản", "Chỉ cần Docker", "Không cần gì"]
      answer: 0
      difficulty: 3
    - q_vi: "Phải đảm bảo gì trước khi chạy iam-check?"
      choices: ["Bạn đã đăng nhập", "Đã đổi mật khẩu", "Đã tắt máy"]
      answer: 0
      difficulty: 3

speaking_drills: []

vietnamese_explanation:
  why_vi: >
    README có cấu trúc gần như cố định: Prerequisites (cần gì trước) → Installation (cài thế nào) →
    Usage (dùng thế nào) → Note (lưu ý). Lỗi phổ biến của người mới là NHẢY thẳng vào phần lệnh, bỏ
    qua Prerequisites — rồi lệnh báo lỗi vì thiếu thứ cần có. Đọc đúng thứ tự mục là làm đúng ngay lần đầu.
  how_vi: >
    Luôn đọc "Prerequisites" TRƯỚC — thiếu thứ cần có thì mọi bước sau đều lỗi. Sau đó làm "Installation"
    theo đúng THỨ TỰ (First…, Then…). Chú ý các "Note:" — chúng thường cảnh báo cạm bẫy. Lệnh trong
    khối code chạy nguyên văn.
  contrast_vi: "Nhảy vào chạy “npm install” ngay ↔ đọc Prerequisites, cài Node trước. Cái sau chạy được lần đầu; cái trước lỗi rồi loay hoay."

common_mistakes:
  - mistake: "Bỏ qua phần Prerequisites, nhảy vào chạy lệnh"
    why_vi: "Nóng lòng chạy cho nhanh."
    fix_vi: "Đọc Prerequisites trước. Đa số lỗi cài đặt là do thiếu thứ cần có, không phải do lệnh sai."
    detect: {}
  - mistake: "Làm các bước không theo thứ tự"
    why_vi: "Không để ý “First…, Then…”."
    fix_vi: "Các bước có thứ tự: “First”, “Then”, “Finally”. Làm đúng thứ tự, đừng nhảy cóc."
    detect: {}
  - mistake: "Bỏ qua các dòng “Note:”"
    why_vi: "Nghĩ chỉ là chú thích phụ."
    fix_vi: "“Note:” thường cảnh báo cạm bẫy (cần quyền admin, lần đầu chậm…). Đọc để tránh hoảng oan."
    detect: {}

memory_trick_vi: >
  README đọc theo bốn tầng: CẦN GÌ (prerequisites) — CÀI SAO (installation, đúng thứ tự) — DÙNG SAO
  (usage) — CẠM BẪY (note). Bỏ tầng một là ngã ngay ở tầng hai.

mini_quiz:
  - kind: mcq
    prompt_vi: "Bạn mở README của iam-check. Phần nào nên đọc đầu tiên?"
    choices: ["Prerequisites", "Usage", "License"]
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Một README khác ghi “Make sure Docker is running”. Nghĩa là?"
    choices: ["Đảm bảo Docker đang chạy", "Cài lại Docker", "Xoá Docker"]
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Phần Installation ghi “First…, Then…”. Nên làm sao?"
    choices: ["Theo đúng thứ tự đó", "Làm ngược lại", "Chọn bước nào cũng được"]
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Bạn chạy iam-check nhưng máy báo “command not found”. Khả năng cao vì?"
    choices:
      - "Thiếu một prerequisite chưa cài"
      - "README viết sai"
      - "Máy tính hỏng"
    answer: 0
    difficulty: 3
  - kind: mcq_listen
    prompt_vi: "Một README khác trong repo của team. Nghe: cần cài gì trước?"
    audio_text: "You need Node 18 and Docker."
    choices: ["Node 18 và Docker", "Chỉ Python", "Không cần gì"]
    answer: 0
    difficulty: 3

unlock_condition:
  mastery_threshold: 80
  mastery_weights: {read: 0.45, write: 0.25, quiz: 0.20, listen: 0.10}
  min_speaking_attempts: 0
  challenge_threshold: 85

recommended_next:
