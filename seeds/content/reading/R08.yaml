objective_vi: "Đọc mô tả một endpoint API và nắm: phương thức, tham số bắt buộc, và ý nghĩa mã trả về."
objective_observable: "Trả lời đúng 4/5 câu hỏi về tham số required và mã trạng thái."

prerequisites:
