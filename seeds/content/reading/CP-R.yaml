reading_passage:
  id: RP-CPR
  kind: doc
  context_vi: >
    Một trang tổng hợp gom đủ năm loại tài liệu chặng này dạy: release notes, log, ticket,
    advisory và postmortem. Bài chốt — đọc và rút ra hành động.
  text_en: |
    Release 4.2.0 — Fixed: upgraded AuthKit to 5.1.2 to patch CVE-2026-4471.
    Breaking change: the auth service now uses a new IAM role.

    Log, 02:03 — ERROR: AccessDeniedException, not authorized to perform GetSecretValue.

    Ticket #4417 — Priority: high. Reproducible: every time. Three colleagues affected.

    Advisory CVE-2026-4471 — Severity: Critical. Affected versions 5.0.0 to 5.1.1.
    Patch available in 5.1.2. Upgrade as soon as possible.

    Postmortem INC-2291 — Root cause: the new role was missing GetSecretValue.
    Action items: check IAM in staging before every deploy; alert on failed backups.
  text_vi: |
    Bản 4.2.0 — Đã sửa: nâng AuthKit lên 5.1.2 để vá CVE-2026-4471.
    Thay đổi phá vỡ: dịch vụ xác thực giờ dùng vai trò IAM mới.

    Log, 02:03 — ERROR: AccessDeniedException, không có quyền thực hiện GetSecretValue.

    Ticket #4417 — Ưu tiên: cao. Tái hiện: lần nào cũng bị. Ba đồng nghiệp cùng gặp.

    Cảnh báo CVE-2026-4471 — Mức độ: Nghiêm trọng. Bản bị ảnh hưởng 5.0.0 đến 5.1.1.
    Bản vá có ở 5.1.2. Nâng cấp càng sớm càng tốt.

    Postmortem INC-2291 — Nguyên nhân gốc: vai trò mới thiếu quyền GetSecretValue.
    Việc cần làm: kiểm tra IAM trên staging trước mỗi lần triển khai; cảnh báo khi sao lưu hỏng.
  questions:
    - q_en: "Which permission was missing?"
      choices: ["GetSecretValue", "AuthKit 5.1.2", "CVE-2026-4471"]
      answer: 0
      skill: scan
      difficulty: 3
    - q_en: "The release fixed one problem and caused another. Which?"
      choices:
        - "It patched the CVE but broke the auth service's access"
        - "It broke the backup job"
        - "It made the database slow"
      answer: 0
      skill: infer
      difficulty: 5
    - q_en: "What do all five documents describe?"
      choices: ["One incident, seen from five angles", "Five separate incidents", "A planned upgrade"]
      answer: 0
      skill: skim
      difficulty: 4

writing_task:
  id: WT-CPR
  kind: guided_email
  prompt_vi: >
    Bạn vừa đọc cả năm tài liệu trên. Viết email cho quản lý tóm tắt: chuyện gì đã xảy ra,
    nguyên nhân gốc, và việc cần làm để không lặp lại. Viết 5-6 câu.
  frame_vi:
    - "Mở: chào"
    - "Thân: chuyện gì xảy ra, ảnh hưởng ai"
    - "Thân: nguyên nhân gốc"
    - "Thân: đã xử lý thế nào"
    - "Kết: việc cần làm để không lặp lại"
  required_chunks:
    - ["root cause"]
    - ["breaking change", "the new role", "the release", "the upgrade"]
    - ["action items", "next steps", "to prevent this"]
  min_words: 25
  hint_vi: "Quản lý cần ba thứ: ảnh hưởng bao nhiêu, vì sao, và bạn làm gì để không lặp lại."
  sample_en: "Hi Linh, the Portal sign-in was down for seven hours and about 200 users were affected. The root cause was the release: it patched a critical CVE but the new IAM role was missing one permission. We restored the permission and the service is back up. Action items: check IAM in staging before every deploy, and alert on failed backups. Thanks, Hoa"

listening_snippet:
  id: LS-CPR
  speed: 1.0
  voice: en_US_female
  context_vi: >
    Hồ sơ INC-2291 đóng lại. Bốn mảnh văn bản từ bốn loại tài liệu khác nhau, đọc liền một mạch —
    changelog, log, ticket, advisory. Không có bối cảnh nào thêm. Đây đúng là cách chúng đến với bạn
    trong một ca trực thật.
  transcript_en: "Breaking change: the auth service now uses a new IAM role. The log says access denied on the database secret. Steps to reproduce: open the Portal, click Sign in, sign-in fails. Severity is critical, so patch as soon as possible."
  transcript_vi: "Thay đổi phá vỡ tương thích: auth service giờ dùng IAM role mới. Log báo bị từ chối quyền trên secret của cơ sở dữ liệu. Các bước tái hiện: mở Portal, bấm Sign in, đăng nhập thất bại. Mức nghiêm trọng, nên vá càng sớm càng tốt."
  questions:
    - q_vi: "Changelog cảnh báo điều gì đã thay đổi?"
      choices: ["Auth service dùng IAM role mới", "Không có gì thay đổi", "Đổi sang máy chủ khác"]
      answer: 0
      difficulty: 3
    - q_vi: "Log báo lỗi gì?"
      choices: ["Bị từ chối quyền trên secret của CSDL", "Hết bộ nhớ", "Đăng nhập thành công"]
      answer: 0
      difficulty: 3
    - q_vi: "Mức nghiêm trọng cho biết điều gì?"
      choices: ["Cần vá càng sớm càng tốt", "Không quan trọng", "Đã tự sửa"]
      answer: 0
      difficulty: 3

speaking_drills: []

vietnamese_explanation:
  why_vi: >
    Mười bài Đọc dạy mười loại văn bản CNTT: email, thông báo lỗi, release notes, README, ticket, log,
    chat nhóm, tài liệu API, cảnh báo bảo mật, postmortem. Điểm chung của mọi loại: đừng đọc từng chữ
    từ đầu đến cuối — hãy QUÉT tìm phần hành động (việc phải làm, hạn, nguyên nhân, mức độ). Bài này
    kiểm tra bạn rút đúng thông tin hành động từ nhiều loại văn bản trộn lẫn.
  how_vi: >
    Mỗi loại có "mỏ neo" riêng: email → please/by/FYI; lỗi → failed/denied/line; release notes →
    breaking change; README → prerequisites; ticket → steps/expected/actual; log → ERROR đầu tiên;
    chat → let's go with/I'll take it; API → required + mã trả về; bảo mật → severity/affected
    versions; postmortem → root cause/action items. Nhớ mỏ neo, quét tới nó, bỏ phần còn lại.
  contrast_vi: "Đọc mọi văn bản như đọc truyện (chậm, mệt) ↔ quét đúng mỏ neo theo loại (nhanh, đúng việc). Người đi làm đọc theo cách sau."

common_mistakes:
  - mistake: "Đọc mọi văn bản tuần tự từ đầu đến cuối"
    why_vi: "Thói quen học đường: mỗi chữ đều quan trọng."
    fix_vi: "Văn bản công việc có phần thông tin và phần nền. Quét mỏ neo (please/error/breaking/root cause) trước, đọc phần còn lại chỉ khi cần."
    detect: {}
  - mistake: "Nhầm phần bối cảnh với phần hành động"
    why_vi: "“As discussed…”, mô tả dài, INFO log — trông quan trọng nhưng là nền."
    fix_vi: "Phần hành động thường có động từ mệnh lệnh hoặc nhãn (please, must, action items). Phân biệt nền và việc để không làm nhầm."
    detect: {}
  - mistake: "Trượt rồi làm lại ngay"
    why_vi: "Muốn qua nhanh."
    fix_vi: "Ôn đúng loại văn bản còn yếu một buổi rồi quay lại. Hệ thống sẽ chỉ đúng bài cần ôn."
    detect: {}

memory_trick_vi: >
  Đọc công việc = tìm MỎ NEO, không đọc cả biển. Mỗi loại văn bản có neo riêng (please, error,
  breaking change, root cause…). Quét tới neo, rút thông tin hành động, đi tiếp. Đó là cách người
  đi làm đọc — nhanh và đúng việc.

