vietnamese_explanation:
  why_vi: >
    Mười bài Đọc dạy mười loại văn bản CNTT: email, thông báo lỗi, release notes, README, ticket, log,
    chat nhóm, tài liệu API, cảnh báo bảo mật, postmortem. Điểm chung của mọi loại: đừng đọc từng chữ
    từ đầu đến cuối — hãy QUÉT tìm phần hành động (việc phải làm, hạn, nguyên nhân, mức độ). Bài này
    kiểm tra bạn rút đúng thông tin hành động từ nhiều loại văn bản trộn lẫn.
  how_vi: >
    Mỗi loại có "mỏ neo" riêng: email → please/by/FYI; lỗi → failed/denied/line; release notes →
    breaking change; README → prerequisites; ticket → steps/expected/actual; log → ERROR đầu tiên;
    chat → let's go with/I'll take it; API → required + mã trả về; bảo mật → severity/affected
    versions; postmortem → root cause/action items. Nhớ mỏ neo, quét tới nó, bỏ phần còn lại.
  contrast_vi: "Đọc mọi văn bản như đọc truyện (chậm, mệt) ↔ quét đúng mỏ neo theo loại (nhanh, đúng việc). Người đi làm đọc theo cách sau."

common_mistakes:
  - mistake: "Đọc mọi văn bản tuần tự từ đầu đến cuối"
    why_vi: "Thói quen học đường: mỗi chữ đều quan trọng."
    fix_vi: "Văn bản công việc có phần thông tin và phần nền. Quét mỏ neo (please/error/breaking/root cause) trước, đọc phần còn lại chỉ khi cần."
    detect: {}
  - mistake: "Nhầm phần bối cảnh với phần hành động"
    why_vi: "“As discussed…”, mô tả dài, INFO log — trông quan trọng nhưng là nền."
    fix_vi: "Phần hành động thường có động từ mệnh lệnh hoặc nhãn (please, must, action items). Phân biệt nền và việc để không làm nhầm."
    detect: {}
  - mistake: "Trượt rồi làm lại ngay"
    why_vi: "Muốn qua nhanh."
    fix_vi: "Ôn đúng loại văn bản còn yếu một buổi rồi quay lại. Hệ thống sẽ chỉ đúng bài cần ôn."
    detect: {}

memory_trick_vi: >
  Đọc công việc = tìm MỎ NEO, không đọc cả biển. Mỗi loại văn bản có neo riêng (please, error,
  breaking change, root cause…). Quét tới neo, rút thông tin hành động, đi tiếp. Đó là cách người
  đi làm đọc — nhanh và đúng việc.

