schema_version: 1
id: R10
slug: doc-postmortem-su-co
unit: U-R1
title_vi: "Đọc postmortem sự cố"
title_en: "Reading an incident postmortem"
phase: reading
topic: it_english
cefr_target: b1
order_index: 10
est_minutes: 15

objective_vi: "Đọc báo cáo hậu sự cố và nắm: chuyện gì xảy ra, nguyên nhân gốc, và các việc phòng ngừa."
objective_observable: "Trả lời đúng 4/5 câu hỏi về root cause và action items."

prerequisites:
  - {lesson: R09, min_mastery: 70, kind: hard}

vocabulary:
  - term: "postmortem"
    ipa: "/ˌpoʊstˈmɔːrtəm/"
    meaning_vi: "báo cáo hậu sự cố"
    chunk: "We wrote the INC-2291 postmortem."
    tags: [it_english]
  - term: "impact"
    ipa: "/ˈɪmpækt/"
    meaning_vi: "tác động, ảnh hưởng"
    chunk: "Impact: 7 hours 15 minutes of downtime."
    tags: [it_english]
  - term: "root cause"
    ipa: "/ruːt kɔːz/"
    meaning_vi: "nguyên nhân gốc"
    chunk: "The root cause was a missing permission."
    tags: [it_english]
  - term: "timeline"
    ipa: "/ˈtaɪmlaɪn/"
    meaning_vi: "diễn biến theo thời gian"
    chunk: "See the timeline of that night."
    tags: [it_english]
  - term: "action items"
    ipa: "/ˈækʃən ˈaɪtəmz/"
    meaning_vi: "việc cần làm để phòng ngừa"
    chunk: "Action items to prevent recurrence."
    tags: [it_english]
  - term: "blameless"
    ipa: "/ˈbleɪmləs/"
    meaning_vi: "không đổ lỗi cá nhân"
    chunk: "This is a blameless postmortem."
    tags: [it_english]

sentence_patterns:
  - pattern: "The root cause was {cause}. Action items: {action}."
    meaning_vi: "Nguyên nhân gốc là {cause}. Việc cần làm: {action}."
    slots:
      cause: ["a full disk", "an expired certificate", "a bad config change"]
      action: ["add disk alerts", "automate cert renewal", "add a config review step"]


reading_passage:
  id: RP-R10
  kind: doc
  context_vi: >
    Bản postmortem INC-2291, Linh gửi cả team chiều thứ Sáu. Bạn đọc từ đầu tới cuối, và tới dòng thứ ba thì nhận ra: đây là đêm của bạn. Cú deploy 23:40. Ticket của Emma. Ba giờ sáng bạn nhận ca. Sáu giờ bạn bàn giao cho Priya. Toàn bộ chuyện bạn đã sống qua, giờ nằm gọn trong bảy đoạn tiếng Anh — và bạn đọc hiểu hết, không cần dịch câu nào.
  text_en: |
    Postmortem INC-2291 — Northwind Portal sign-in outage.
    Impact: nobody could sign in for 7 hours and 15 minutes. The whole accounting team was blocked.
    Timeline: Thursday 23:40 we deployed release 4.2.0 to patch CVE-2026-4471. Friday 02:00 the first ticket came in from Emma Brooks.
    03:00 IT support started to diagnose. 06:00 the shift was handed over to Priya Nair. 08:30 she found the cause. 09:15 the portal was back.
    Root cause: release 4.2.0 changed the IAM role of the auth service. The new role did not have secretsmanager:GetSecretValue, so the service could not read the database password, and every sign-in failed.
    We also found that the backup job had been failing quietly since Tuesday. Nobody was told. This is a blameless postmortem: the deploy was right, our permission review was not.
    Action items: 1. Check IAM permissions in staging before every deploy. 2. Alert on failed backup jobs. 3. Page the on-call engineer when sign-in errors go over 10 per minute.
  text_vi: |
    Postmortem INC-2291 — Sự cố đăng nhập Northwind Portal.
    Tác động: không ai đăng nhập được suốt 7 giờ 15 phút. Cả phòng kế toán bị chặn việc.
    Diễn biến: 23:40 thứ Năm, deploy bản 4.2.0 để vá CVE-2026-4471. 02:00 thứ Sáu, ticket đầu tiên đến từ Emma Brooks.
    03:00 IT support bắt đầu chẩn đoán. 06:00 bàn giao ca cho Priya Nair. 08:30 cô ấy tìm ra nguyên nhân. 09:15 portal hoạt động lại.
    Nguyên nhân gốc: bản 4.2.0 đổi IAM role của auth service. Role mới không có quyền secretsmanager:GetSecretValue, nên dịch vụ không đọc được mật khẩu CSDL, và mọi lần đăng nhập đều thất bại.
    Chúng tôi cũng phát hiện job backup đã thất bại âm thầm từ thứ Ba. Không ai được báo. Đây là postmortem không đổ lỗi: quyết định deploy là đúng, khâu rà soát quyền của chúng tôi thì không.
    Việc cần làm: 1. Kiểm tra quyền IAM ở staging trước mỗi lần deploy. 2. Cảnh báo khi job backup thất bại. 3. Gọi kỹ sư trực khi lỗi đăng nhập vượt 10 lần mỗi phút.
  questions:
    - q_en: "How long was the outage?"
      choices: ["7 hours and 15 minutes", "2 hours", "One working day"]
      answer: 0
      skill: scan
      difficulty: 3
    - q_en: "What was the root cause?"
      choices:
        - "The new IAM role was missing a permission"
        - "The database was full"
        - "The backup job failed"
      answer: 0
      skill: infer
      difficulty: 4
    - q_en: "In this report, \"blameless\" means it looks at:"
      choices: ["the process, not at who to blame", "who made the mistake", "the cost of the outage"]
      answer: 0
      skill: guess_word
      difficulty: 4

writing_task:
  id: WT-R10
  kind: guided_email
  prompt_vi: >
    Viết phần tóm tắt của một postmortem: ảnh hưởng, nguyên nhân gốc, và việc cần làm để không
    lặp lại. Viết 4-5 câu.
  frame_vi:
    - "Mở: sự cố gì, ảnh hưởng ai, bao lâu"
    - "Thân: nguyên nhân gốc"
    - "Thân: việc cần làm"
    - "Kết: không đổ lỗi cho ai"
  required_chunks:
    - ["root cause"]
    - ["action items", "next steps", "action item"]
    - ["to prevent this", "so this does not happen", "to avoid this", "so it doesn't happen again"]
  min_words: 20
  hint_vi: "Nguyên nhân gốc là một câu về HỆ THỐNG, không phải tên một người."
  sample_en: "Hi team, the portal was down for seven hours and nobody could sign in. The root cause was a missing permission on the new IAM role after the release. Action items: check IAM in staging before every deploy, and alert on failed jobs. To prevent this, we will add a permission test. Thanks, Hoa"

listening_snippet:
  id: LS-R10
  speed: 1.0
  voice: en_US_male
  context_vi: >
    Trong cuộc họp postmortem, David đọc phần tóm tắt. Đây là lần đầu bạn nghe toàn bộ đêm hôm ấy
    được kể lại bằng tiếng Anh, gọn trong ba câu — và bạn không phải hỏi lại chữ nào.
  transcript_en: "Sign-in was down for seven hours and fifteen minutes. The root cause was a new IAM role without permission to read the database secret. Action items: check IAM permissions in staging before every deploy, and alert on failed backup jobs."
  transcript_vi: "Đăng nhập sập bảy giờ mười lăm phút. Nguyên nhân gốc là một IAM role mới không có quyền đọc secret của cơ sở dữ liệu. Việc cần làm: kiểm tra quyền IAM ở staging trước mỗi lần deploy, và cảnh báo khi job backup thất bại."
  questions:
    - q_vi: "Nguyên nhân gốc của INC-2291 là gì?"
      choices: ["IAM role mới thiếu quyền đọc secret của CSDL", "Ổ đĩa đầy", "Emma gõ sai mật khẩu"]
      answer: 0
      difficulty: 3
    - q_vi: "Một việc cần làm để phòng ngừa là gì?"
      choices: ["Kiểm tra quyền IAM ở staging trước mỗi lần deploy", "Sa thải người trực ca", "Ngừng vá lỗ hổng bảo mật"]
      answer: 0
      difficulty: 3

speaking_drills: []

vietnamese_explanation:
  why_vi: >
    Postmortem là báo cáo sau sự cố, và văn hoá kỹ thuật quốc tế nhấn mạnh nó phải "blameless" —
    không đổ lỗi cá nhân, chỉ mổ xẻ hệ thống để không tái diễn. Bốn mục cần nắm: IMPACT (thiệt hại),
    ROOT CAUSE (nguyên nhân gốc, không phải triệu chứng), TIMELINE (diễn biến), ACTION ITEMS (việc
    phòng ngừa). Người Việt hay đọc để tìm "ai gây ra" — nhưng điểm của postmortem là tìm "sửa hệ thống thế nào".
  how_vi: >
    Đọc bốn mục: (1) IMPACT — hiểu quy mô thiệt hại; (2) ROOT CAUSE — nguyên nhân GỐC (vd “disk đầy”),
    phân biệt với triệu chứng (“ghi thất bại”); (3) TIMELINE — nếu cần hiểu diễn biến; (4) ACTION ITEMS
    — đây là phần giá trị nhất, các việc để không lặp lại. Không đi tìm "lỗi của ai".
  contrast_vi: "“Lỗi tại bạn Huy” (đổ lỗi, vô ích) ↔ “Root cause: disk đầy; action: thêm cảnh báo” (sửa hệ thống, không tái diễn)."

common_mistakes:
  - mistake: "Đọc postmortem để tìm “ai có lỗi”"
    why_vi: "Thói quen quy trách nhiệm cá nhân."
    fix_vi: "Postmortem là blameless — mục đích là sửa HỆ THỐNG. Tập trung vào root cause và action items, không phải con người."
    detect: {}
  - mistake: "Nhầm triệu chứng với nguyên nhân gốc"
    why_vi: "Cái dễ thấy (ghi thất bại) tưởng là gốc."
    fix_vi: "Hỏi “vì sao” tới cùng: ghi thất bại VÌ disk đầy VÌ log không được dọn. Root cause là mắt xích sâu nhất sửa được."
    detect: {}
  - mistake: "Bỏ qua Action items"
    why_vi: "Nghĩ đọc nguyên nhân là đủ."
    fix_vi: "Action items là phần quan trọng nhất — chúng là cam kết để sự cố không lặp lại. Đọc và theo dõi chúng."
    detect: {}

memory_trick_vi: >
  Postmortem bốn mục, không đổ lỗi: THIỆT HẠI (impact) — GỐC RỄ (root cause, hỏi “vì sao” tới cùng)
  — DIỄN BIẾN (timeline) — PHÒNG NGỪA (action items). Tìm “sửa hệ thống sao”, đừng tìm “lỗi tại ai”.

mini_quiz:
  - kind: mcq
    prompt_vi: "Postmortem INC-2291 ghi “blameless”. Mục đích chính của nó là gì?"
    choices:
      - "Sửa hệ thống để không tái diễn"
      - "Tìm người để khiển trách"
      - "Ghi lại cho có"
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "Một postmortem khác viết “ghi dữ liệu thất bại vì disk đầy”. Đâu là root cause?"
    choices: ["Disk đầy", "Ghi dữ liệu thất bại", "Có người đăng nhập"]
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "Phần nào của bản INC-2291 giá trị nhất để sự cố không lặp lại?"
    choices: ["Action items", "Tiêu đề", "Timeline"]
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Dòng “Impact: 7 hours 15 minutes of downtime, the whole accounting team blocked” cho biết?"
    choices: ["Quy mô thiệt hại", "Nguyên nhân", "Người phụ trách"]
    answer: 0
    difficulty: 2
  - kind: mcq_listen
    prompt_vi: "Một postmortem cũ hơn của team. Nghe: nguyên nhân gốc là gì?"
    audio_text: "The root cause was a full database disk."
    choices: ["Ổ đĩa CSDL đầy", "Lỗi mạng", "Sai mật khẩu"]
    answer: 0
    difficulty: 3

