schema_version: 1
id: R03
slug: doc-release-notes
unit: U-R1
title_vi: "Đọc release notes / changelog"
title_en: "Reading release notes"
phase: reading
topic: it_english
cefr_target: b1
order_index: 3
est_minutes: 14

objective_vi: "Đọc ghi chú phát hành và xác định: có gì mới, có gì sửa, và có gì ảnh hưởng đến mình (breaking change)."
objective_observable: "Trả lời đúng 4/5 câu hỏi về thay đổi quan trọng và breaking change."

prerequisites:
  - {lesson: R02, min_mastery: 76, kind: hard}

vocabulary:
  - term: "Added"
    ipa: "/ˈædɪd/"
    meaning_vi: "Đã thêm (tính năng mới)"
    chunk: "Added a new IAM role for the auth service."
    tags: [it_english]
  - term: "Fixed"
    ipa: "/fɪkst/"
    meaning_vi: "Đã sửa (lỗi)"
    chunk: "Fixed CVE-2026-4471 in the auth library."
    tags: [it_english]
  - term: "Deprecated"
    ipa: "/ˈdɛprɪkeɪtɪd/"
    meaning_vi: "Sắp bỏ (còn dùng được nhưng nên thôi)"
    chunk: "Deprecated the old config file."
    tags: [it_english]
  - term: "Breaking change"
    ipa: "/ˈbreɪkɪŋ tʃeɪndʒ/"
    meaning_vi: "thay đổi phá vỡ tương thích (phải sửa theo)"
    chunk: "Breaking change: the auth service uses a new role."
    tags: [it_english]
  - term: "Removed"
    ipa: "/rɪˈmuːvd/"
    meaning_vi: "Đã gỡ bỏ"
    chunk: "Removed the old shared role."
    tags: [it_english]
  - term: "upgrade"
    ipa: "/ˈʌpɡreɪd/"
    meaning_vi: "nâng cấp"
    chunk: "Upgrade to release 4.2.0."
    tags: [it_english]

sentence_patterns:
  - pattern: "Breaking change: {change}. You must {action}."
    meaning_vi: "Thay đổi phá vỡ tương thích: {change}. Bạn phải {action}."
    slots:
      change: ["the config format changed", "the old API was removed"]
      action: ["update your config", "migrate to the new API"]


reading_passage:
  id: RP-R03
  kind: doc
  context_vi: >
    Bạn mở lại changelog của bản deploy lúc 23:40 thứ Năm — bản mà hai tiếng sau làm cả hệ thống nằm im. Dòng "Breaking change" vẫn nằm nguyên đó từ đầu. Nó đã được viết ra. Chỉ là đêm hôm ấy không ai đọc tới dòng thứ tư.
  text_en: |
    Northwind Portal — Release 4.2.0 — deployed Thursday 23:40
    Fixed: upgraded the auth library to 5.1.2 to patch CVE-2026-4471.
    Added: a new IAM role, portal-auth-role, for the auth service.
    Removed: the old shared role, portal-service-role.
    Breaking change: the auth service now uses the new role. You must check that it can still read secrets.
    Deprecated: the old config file will be removed in 4.3.
  text_vi: |
    Northwind Portal — Bản 4.2.0 — deploy lúc 23:40 thứ Năm
    Đã sửa: nâng thư viện xác thực lên 5.1.2 để vá CVE-2026-4471.
    Đã thêm: một IAM role mới tên portal-auth-role cho auth service.
    Đã gỡ: role dùng chung cũ, portal-service-role.
    Thay đổi phá vỡ tương thích: auth service giờ dùng role mới. Bạn phải kiểm tra nó còn đọc được secret hay không.
    Sắp bỏ: file cấu hình cũ sẽ bị gỡ ở bản 4.3.
  questions:
    - q_en: "Which library version fixes CVE-2026-4471?"
      choices: ["5.1.2", "4.2.0", "4.3"]
      answer: 0
      skill: scan
      difficulty: 3
    - q_en: "What must you check after this release?"
      choices:
        - "That the auth service can still read secrets"
        - "That the old config file is deleted"
        - "That the portal is faster"
      answer: 0
      skill: infer
      difficulty: 4
    - q_en: "\"Deprecated\" here means the old config file:"
      choices: ["will be removed in a later release", "is already gone", "is now required"]
      answer: 0
      skill: guess_word
      difficulty: 4

writing_task:
  id: WT-R03
  kind: guided_email
  prompt_vi: >
    Viết email báo cả nhóm về bản phát hành này: đã triển khai gì, có thay đổi phá vỡ nào,
    và họ cần kiểm tra gì. Viết 4-5 câu.
  frame_vi:
    - "Mở: chào cả nhóm"
    - "Thân: đã triển khai bản nào + có breaking change gì"
    - "Thân: người đọc cần làm gì"
    - "Kết: liên hệ ai nếu có vấn đề"
  required_chunks:
    - ["we deployed", "we have deployed", "we released", "we've released"]
    - ["breaking change", "please check", "you must check", "you need to check"]
    - ["let me know", "reach out", "contact me", "get in touch"]
  min_words: 20
  hint_vi: "Breaking change phải nằm ở đầu email, không giấu ở cuối — người đọc lướt sẽ bỏ sót."
  sample_en: "Hi team, we deployed release 4.2.0 last night to patch a critical CVE. There is one breaking change: the auth service now uses a new IAM role, so please check that your services can still read their secrets. Let me know if anything fails. Thanks, Hoa"

listening_snippet:
  id: LS-R03
  speed: 1.3
  voice: en_US_female
  context_vi: >
    Priya đọc lại changelog này qua call sáng thứ Sáu, sau khi nhận ca. Cô ấy dừng đúng ở câu thứ hai —
    và đó là lúc mọi thứ bắt đầu sáng ra.
  transcript_en: "Release 4.2.0 upgrades the auth library to patch CVE-2026-4471. Breaking change: the auth service now uses a new IAM role, so you must check that it can still read secrets."
  transcript_vi: "Bản 4.2.0 nâng thư viện xác thực để vá CVE-2026-4471. Thay đổi phá vỡ tương thích: auth service giờ dùng IAM role mới, nên bạn phải kiểm tra nó còn đọc được secret hay không."
  questions:
    - q_vi: "Điều gì bạn BẮT BUỘC phải kiểm tra sau bản này?"
      choices: ["Auth service còn đọc được secret hay không", "Không cần làm gì", "Đổi máy chủ"]
      answer: 0
      difficulty: 3
    - q_vi: "Bản 4.2.0 sửa cái gì?"
      choices: ["Vá lỗ hổng CVE-2026-4471 trong thư viện xác thực", "Thêm đăng nhập vân tay", "Không sửa gì"]
      answer: 0
      difficulty: 3

speaking_drills: []

vietnamese_explanation:
  why_vi: >
    Release notes có từ khoá cố định: Added (thêm), Fixed (sửa), Deprecated (sắp bỏ), Removed (đã gỡ),
    Breaking change (phải sửa theo). Trong tất cả, dòng quan trọng NHẤT với bạn là "Breaking change"
    — nó nghĩa là code/cấu hình hiện tại của bạn sẽ HỎNG nếu không sửa. Người Việt hay lướt qua vì
    ham đọc tính năng mới, rồi nâng cấp xong mới vỡ.
  how_vi: >
    Quét theo nhãn: tìm "Breaking change" và "Removed" TRƯỚC — đó là thứ có thể làm hỏng việc của
    bạn. "Deprecated" là cảnh báo sớm (chưa gấp nhưng nên lên kế hoạch). "Added"/"Fixed" đọc sau cùng.
  contrast_vi: "“Added dark mode” (vui nhưng không bắt buộc) ↔ “Breaking change: update your config” (không làm là hỏng). Đọc cái sau trước."

common_mistakes:
  - mistake: "Chỉ đọc phần “Added”, bỏ qua “Breaking change”"
    why_vi: "Tính năng mới hấp dẫn hơn cảnh báo."
    fix_vi: "Đọc “Breaking change” và “Removed” ĐẦU TIÊN — chúng quyết định bạn có phải sửa gì không."
    detect: {}
  - mistake: "Nhầm “Deprecated” là “đã bỏ, không dùng được”"
    why_vi: "Từ lạ, đoán nghĩa."
    fix_vi: "Deprecated = CÒN dùng được nhưng sắp bỏ. Là cảnh báo sớm để bạn lên kế hoạch chuyển, chưa phải gấp."
    detect: {}
  - mistake: "Nâng cấp ngay mà không đọc release notes"
    why_vi: "Nghĩ nâng cấp luôn an toàn."
    fix_vi: "Luôn quét “Breaking change” trước khi upgrade. Một dòng đọc trước tiết kiệm cả buổi sửa sau."
    detect: {}

memory_trick_vi: >
  Release notes đọc ngược: xem PHÁ VỠ (breaking) và ĐÃ GỠ (removed) trước — đó là mìn. SẮP BỎ
  (deprecated) là biển báo. THÊM/SỬA (added/fixed) là quà, mở sau cùng.

mini_quiz:
  - kind: mcq
    prompt_vi: "Trong changelog của bản 4.2.0, dòng nào đáng lẽ phải đọc trước khi deploy?"
    choices: ["Breaking change", "Added", "Fixed"]
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "Changelog ghi “Deprecated: the old config file”. Nghĩa là gì?"
    choices:
      - "Còn dùng được nhưng sắp bỏ, nên chuyển dần"
      - "Đã gỡ hoàn toàn, không dùng được"
      - "API mới vừa thêm"
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "Một changelog khác ghi “Removed support for Windows 7”. Nghĩa là?"
    choices: ["Không còn hỗ trợ Windows 7", "Thêm Windows 7", "Sửa lỗi Windows 7"]
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Bản kế tiếp ghi “Breaking change: config format changed”. Nên làm gì?"
    choices:
      - "Cập nhật cấu hình trước khi nâng cấp"
      - "Nâng cấp ngay, tính sau"
      - "Bỏ qua"
    answer: 0
    difficulty: 2
  - kind: mcq_listen
    prompt_vi: "Bạn bắt buộc phải làm gì trước khi nâng cấp?"
    audio_text: "You must update your config before upgrading."
    choices: ["Cập nhật cấu hình", "Xoá ứng dụng", "Đổi mật khẩu"]
    answer: 0
    difficulty: 3

unlock_condition:
  mastery_threshold: 80
  mastery_weights: {read: 0.45, write: 0.25, quiz: 0.20, listen: 0.10}
  min_speaking_attempts: 0
  challenge_threshold: 85

recommended_next:
  default: R04
