schema_version: 1
id: R07
slug: doc-luong-chat-cong-viec
unit: U-R1
title_vi: "Đọc luồng chat công việc (Slack/Teams)"
title_en: "Reading a work chat thread"
phase: reading
topic: it_english
cefr_target: b1
order_index: 7
est_minutes: 14

objective_vi: "Theo dõi một luồng chat nhóm và nắm: quyết định cuối cùng, ai làm gì, còn gì chưa chốt."
objective_observable: "Trả lời đúng 4/5 câu hỏi về quyết định và người phụ trách."

prerequisites:
  - {lesson: R06, min_mastery: 80, kind: hard}

vocabulary:
  - term: "thread"
    ipa: "/θrɛd/"
    meaning_vi: "luồng (chuỗi tin nhắn theo chủ đề)"
    chunk: "Everything is in this thread."
    tags: [it_english]
  - term: "+1"
    ipa: "/plʌs wʌn/"
    meaning_vi: "tôi đồng ý / ủng hộ"
    chunk: "+1 to option B."
    tags: [it_english]
  - term: "I'll take it"
    ipa: "/aɪl teɪk ɪt/"
    meaning_vi: "để tôi nhận việc đó"
    chunk: "I'll take it from here."
    tags: [it_english]
  - term: "let's go with"
    ipa: "/lɛts ɡoʊ wɪð/"
    meaning_vi: "chốt chọn phương án"
    chunk: "Let's go with option B."
    tags: [it_english]
  - term: "circle back"
    ipa: "/ˈsɜːrkəl bæk/"
    meaning_vi: "quay lại bàn sau"
    chunk: "Let's circle back on Monday."
    tags: [it_english]
  - term: "cc"
    ipa: "/siː siː/"
    meaning_vi: "nhắc/kéo ai đó vào (cho biết)"
    chunk: "cc @David for visibility."
    tags: [it_english]

sentence_patterns:
  - pattern: "Let's go with {choice}. {person} will {action}."
    meaning_vi: "Chốt {choice}. {person} sẽ {action}."
    slots:
      choice: ["option B", "the second plan"]
      person: ["Minh", "I"]
      action: ["take the deploy", "update the doc"]


reading_passage:
  id: RP-R07
  kind: chat
  context_vi: >
    Kênh #inc-2291, từ 4 giờ sáng đến lúc hệ thống lên lại. Bạn có mặt trong luồng này suốt hai tiếng đầu, rồi bàn giao và đi ngủ. Giờ bạn đọc lại cả luồng để viết phần diễn biến cho Linh — kể cả đoạn xảy ra khi bạn đang ngủ.
  text_en: |
    04:32 David Carter: Still down. I need an update every 30 minutes.
    05:52 You: Handing over to Priya at 06:00. Everything is in this thread.
    06:04 Priya Nair: I have it. Option A: roll back 4.2.0. Option B: check the new IAM role first.
    06:06 Linh: +1 to option B. A rollback brings the CVE back.
    06:07 Priya Nair: Agreed. Let's go with option B. I'll take it. cc @David for visibility.
    08:31 Priya Nair: Found it. The new role can't read the database secret.
    09:15 Priya Nair: Permission restored, the portal is up. Let's circle back on Monday for the postmortem.
  text_vi: |
    04:32 David Carter: Vẫn chưa lên. Tôi cần cập nhật mỗi 30 phút.
    05:52 Bạn: Bàn giao cho Priya lúc 06:00. Mọi thứ nằm trong luồng này.
    06:04 Priya Nair: Tôi nhận rồi. Phương án A: roll back bản 4.2.0. Phương án B: kiểm tra IAM role mới trước.
    06:06 Linh: +1 phương án B. Roll back là lỗ hổng CVE quay lại.
    06:07 Priya Nair: Đồng ý. Chốt phương án B. Để tôi nhận. cc @David cho biết.
    08:31 Priya Nair: Tìm ra rồi. Role mới không đọc được secret của CSDL.
    09:15 Priya Nair: Đã cấp lại quyền, portal lên rồi. Thứ Hai bàn lại để làm postmortem.
  questions:
    - q_en: "Who took over the incident at 06:00?"
      choices: ["Priya Nair", "David Carter", "Linh"]
      answer: 0
      skill: scan
      difficulty: 3
    - q_en: "Why did the team not roll back?"
      choices: ["A rollback would bring the CVE back", "It was too slow", "David said no"]
      answer: 0
      skill: infer
      difficulty: 4
    - q_en: "In this thread, \"circle back\" means:"
      choices: ["return to it later", "cancel it", "ask someone else"]
      answer: 0
      skill: guess_word
      difficulty: 4

writing_task:
  id: WT-R07
  kind: guided_email
  prompt_vi: >
    Viết tin nhắn bàn giao ca cho người trực tiếp theo: việc gì còn mở, cần theo dõi gì,
    ghi chú ở đâu. Viết 4-5 câu.
  frame_vi:
    - "Mở: chào người nhận ca"
    - "Thân: bàn giao lúc mấy giờ + việc gì còn mở"
    - "Thân: cần để mắt tới cái gì"
    - "Kết: ghi chú nằm ở đâu"
  required_chunks:
    - ["handing over", "i'm handing over", "handover", "i am handing over"]
    - ["still open", "still down", "open items", "still not fixed"]
    - ["the notes are in", "everything is in", "details are in", "notes are in"]
  min_words: 20
  hint_vi: "Bàn giao phải nói rõ cái gì CHƯA xong. Người nhận ca không cần nghe lại cái đã xong."
  sample_en: "Hi Priya, I am handing over to you at 06:00. The sign-in issue is still open and the portal is down. Please keep an eye on the error rate — it goes over ten per minute at peak. All the notes are in this thread. Thanks, Hoa"

listening_snippet:
  id: LS-R07
  speed: 1.0
  voice: en_US_female
  context_vi: >
    Bạn ngủ dậy lúc trưa và mở lại kênh. Đây là bản tóm tắt của cả đoạn xảy ra sau khi bạn bàn giao —
    ba câu, nhưng là bảy tiếng của người khác.
  transcript_en: "The team agreed to go with option B and check the new IAM role instead of rolling back. Priya said she'll take it. They'll circle back on Monday for the postmortem."
  transcript_vi: "Nhóm chốt phương án B: kiểm tra IAM role mới thay vì roll back. Priya nói cô ấy nhận việc. Thứ Hai họ bàn lại để làm postmortem."
  questions:
    - q_vi: "Nhóm chốt phương án nào?"
      choices: ["Phương án B (kiểm tra IAM role mới)", "Phương án A (roll back bản 4.2.0)", "Không chốt"]
      answer: 0
      difficulty: 3
    - q_vi: "Ai nhận việc?"
      choices: ["Priya", "Linh", "Không ai"]
      answer: 0
      difficulty: 3

speaking_drills: []

vietnamese_explanation:
  why_vi: >
    Chat nhóm dài dễ khiến bạn lạc: nhiều người nói xen kẽ, nhiều ý kiến. Nhưng điều bạn thật sự cần
    chỉ là ba thứ: QUYẾT ĐỊNH cuối (thường có "let's go with"), AI LÀM (thường có "I'll take it"),
    và CÒN GÌ TREO ("circle back"). Người Việt hay đọc từng tin một, cố hiểu hết — nên tốn thời gian
    mà vẫn không rõ chốt gì.
  how_vi: >
    Quét tìm ba tín hiệu: (1) "let's go with / agreed / decided" → quyết định cuối; (2) "I'll take
    it / assigned" → người phụ trách; (3) "circle back / TBD / still open" → việc chưa chốt. "+1"
    chỉ là biểu quyết đồng ý, "cc" là kéo người vào cho biết, không phải giao việc.
  contrast_vi: "Đọc 30 tin để hiểu ↔ quét “let's go with” + “I'll take it”. Hai câu đó là toàn bộ kết luận."

common_mistakes:
  - mistake: "Đọc từng tin nhắn, cố hiểu hết"
    why_vi: "Sợ bỏ sót nên đọc tuần tự."
    fix_vi: "Quét tín hiệu quyết định (“let's go with”) và giao việc (“I'll take it”) trước. Phần tranh luận ở giữa thường không cần."
    detect: {}
  - mistake: "Hiểu “+1” là một điểm hay một việc"
    why_vi: "Ký hiệu lạ."
    fix_vi: "“+1” = “tôi đồng ý/ủng hộ”. Nó là phiếu bầu, không phải nội dung hành động."
    detect: {}
  - mistake: "Nghĩ “cc @ai đó” là giao việc cho người đó"
    why_vi: "Không quen quy ước chat."
    fix_vi: "“cc” chỉ kéo người vào cho BIẾT (visibility). Người NHẬN việc là người nói “I'll take it”."
    detect: {}

memory_trick_vi: >
  Chat nhóm quét ba mỏ neo: CHỐT GÌ (let's go with) — AI LÀM (I'll take it) — CÒN TREO (circle back).
  “+1” là phiếu bầu, “cc” là mời xem. Ba mỏ neo cho bạn toàn bộ kết luận trong 10 giây.

mini_quiz:
  - kind: mcq
    prompt_vi: "Trong luồng #inc-2291, câu nào cho biết QUYẾT ĐỊNH cuối cùng?"
    choices: ["Let's go with option B.", "+1", "cc @Lan"]
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Priya viết “I'll take it”. Nghĩa là gì?"
    choices: ["Người đó nhận việc", "Người đó phản đối", "Người đó rời nhóm"]
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Cuối tin nhắn có “cc @David for visibility”. Nghĩa là?"
    choices:
      - "Kéo Lan vào cho biết, không giao việc"
      - "Giao việc cho Lan"
      - "Xoá Lan khỏi nhóm"
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "Priya kết luận “Let's circle back on Monday”. Nghĩa là?"
    choices: ["Thứ Hai bàn lại", "Đã xong hẳn", "Huỷ bỏ"]
    answer: 0
    difficulty: 2
  - kind: mcq_listen
    prompt_vi: "Một luồng chat khác của team. Nghe: ai nhận việc?"
    audio_text: "Minh said he'll take it."
    choices: ["Minh", "Priya", "Không ai"]
    answer: 0
    difficulty: 3

unlock_condition:
  mastery_threshold: 80
  mastery_weights: {read: 0.45, write: 0.25, quiz: 0.20, listen: 0.10}
  min_speaking_attempts: 0
