schema_version: 1
id: R01
slug: doc-email-noi-bo
unit: U-R1
title_vi: "Đọc email nội bộ — tìm việc bạn phải làm"
title_en: "Reading internal email"
phase: reading
topic: office
cefr_target: a2
order_index: 1
est_minutes: 14

objective_vi: "Đọc một email công việc và xác định được: ai phải làm gì, trước khi nào."
objective_observable: "Trả lời đúng 4/5 câu hỏi đọc hiểu về hành động và hạn chót."

prerequisites:
  - {lesson: CP-D, min_mastery: 70, kind: hard}

vocabulary:
  - term: "please note"
    ipa: "/pliːz noʊt/"
    meaning_vi: "xin lưu ý"
    chunk: "Please note the postmortem is on Friday."
    tags: [office]
  - term: "by EOD"
    ipa: "/baɪ iː oʊ diː/"
    meaning_vi: "trước cuối ngày (end of day)"
    chunk: "Please send your notes by EOD Wednesday."
    tags: [office]
  - term: "action required"
    ipa: "/ˈækʃən rɪˈkwaɪərd/"
    meaning_vi: "cần bạn làm gì đó"
    chunk: "Action required: INC-2291 postmortem."
    tags: [office]
  - term: "FYI"
    ipa: "/ɛf waɪ aɪ/"
    meaning_vi: "để bạn biết thôi (không cần làm gì)"
    chunk: "FYI, the backup job has been fixed."
    tags: [office]
  - term: "let me know"
    ipa: "/lɛt miː noʊ/"
    meaning_vi: "báo lại cho tôi"
    chunk: "Let me know if you can't make the deadline."
    tags: [office]
  - term: "as discussed"
    ipa: "/æz dɪˈskʌst/"
    meaning_vi: "như đã trao đổi"
    chunk: "As discussed on Friday, the portal was down."
    tags: [office]

sentence_patterns:
  - pattern: "Please {action} by {deadline}."
    meaning_vi: "Vui lòng {action} trước {deadline}."
    slots:
      action: ["review the doc", "send the report", "confirm your attendance"]
      deadline: ["EOD Friday", "tomorrow morning", "the end of the week"]

# Email này trước đây nằm trong `dialogue` với speaker turns và được sinh audio — nghĩa là
# học viên NGHE email thay vì đọc nó. Giờ nó là văn bản liền, không tiếng, đúng kỹ năng đọc.
reading_passage:
  id: RP-R01
  kind: email
  context_vi: >
    Sáng thứ Hai sau đêm sự cố. Bạn ngủ được bốn tiếng, mở hộp thư, và email đầu tiên là của Linh.
    Nó không dài. Nhưng trong đó có một việc của bạn và một cái hạn.
    Đọc bằng mắt, đừng đọc thành tiếng — email công việc là để quét, không phải để ngâm.
  text_en: |
    Subject: Action required — INC-2291 postmortem

    Hi team,

    As discussed on Friday, the Northwind Portal was down for 7 hours and 15 minutes.
    Please send me your notes for the timeline by EOD Wednesday.
    Please note the postmortem meeting with David is on Friday.
    FYI, the backup job has been fixed. Nobody needs to look at it.

    Let me know if you can't make the deadline.

    Thanks,
    Linh
  text_vi: |
    Tiêu đề: Cần xử lý — postmortem sự cố INC-2291

    Chào cả nhóm,

    Như đã trao đổi hôm thứ Sáu, Northwind Portal đã sập 7 giờ 15 phút.
    Vui lòng gửi tôi ghi chú của bạn cho phần diễn biến, trước cuối ngày thứ Tư.
    Xin lưu ý buổi họp postmortem với David là vào thứ Sáu.
    Để mọi người biết: job backup đã được sửa. Không ai phải đụng vào nữa.

    Nếu không kịp hạn thì báo tôi.

    Cảm ơn,
    Linh
  questions:
    - q_en: "What do you have to do?"
      choices:
        - "Send Linh your notes for the timeline"
        - "Fix the backup job"
        - "Book a meeting room for Friday"
      answer: 0
      skill: scan
      difficulty: 2
    - q_en: "When is your deadline?"
      choices: ["End of day Wednesday", "Friday", "Monday morning"]
      answer: 0
      skill: scan
      difficulty: 2
    - q_en: "Who needs to look at the backup job?"
      choices: ["Nobody", "The whole team", "You and David"]
      answer: 0
      skill: infer
      difficulty: 3
    - q_en: "In this email, \"EOD\" means:"
      choices: ["End of day", "Every other day", "End of deployment"]
      answer: 0
      skill: guess_word
      difficulty: 3

writing_task:
  id: WT-R01
  kind: guided_email
  prompt_vi: >
    Trả lời email của Linh: bạn sẽ gửi ghi chú, nhưng xin lùi hạn sang thứ Năm vì còn phải
    lấy log. Viết 2-3 câu.
  frame_vi:
    - "Mở: chào Linh"
    - "Thân: xác nhận sẽ gửi + xin lùi hạn sang thứ Năm + lý do"
    - "Kết: cảm ơn và ký tên"
  required_chunks:
    - ["i'll send", "i will send", "i can send"]
    - ["thursday"]
    - ["is that ok", "let me know", "if that works", "would that be ok"]
  min_words: 15
  hint_vi: "Xin lùi hạn thì phải nói RÕ ngày mới, không nói “a bit later”."
  sample_en: "Hi Linh, I'll send my notes, but could I have until Thursday? I still need to pull the logs. Let me know if that works. Thanks, Hoa"

listening_snippet:
  id: LS-R01
  speed: 1.0
  voice: en_US_female
  context_vi: >
    Linh gửi thêm một tin thoại ngắn ngay sau email, vì cô ấy biết bạn đọc email lúc còn ngái ngủ.
    Cô ấy nhắc lại đúng hai thứ: việc và hạn.
  transcript_en: "Please send me your notes for the timeline by EOD Wednesday. FYI, the backup job has already been fixed."
  transcript_vi: "Gửi tôi ghi chú cho phần diễn biến trước cuối ngày thứ Tư. Để bạn biết: job backup đã được sửa rồi."
  questions:
    - q_vi: "Linh yêu cầu bạn làm gì?"
      choices: ["Gửi ghi chú cho phần diễn biến sự cố", "Sửa job backup", "Không cần làm gì"]
      answer: 0
      difficulty: 3
    - q_vi: "Hạn chót là khi nào?"
      choices: ["Cuối ngày thứ Tư", "Sáng thứ Tư", "Không có hạn"]
      answer: 0
      difficulty: 3

speaking_drills: []

vietnamese_explanation:
  why_vi: >
    Email công việc tiếng Anh có một quy ước không ai dạy bạn: phần quan trọng nhất nằm ở tiêu đề
    và câu có chữ "please". Phần còn lại thường là bối cảnh. Người Việt hay đọc từ đầu tới cuối và
    cố hiểu từng chữ — mất 10 phút cho một email mà thông tin cần chỉ nằm ở một dòng.
  how_vi: >
    Quét theo ba mốc: (1) tiêu đề có "Action required" không, (2) tìm câu có "please" — đó là việc
    bạn phải làm, (3) tìm ngày/giờ gần chữ "by" — đó là hạn chót. Đọc kỹ phần còn lại chỉ khi cần.
  contrast_vi: "“FYI” = không cần làm gì ↔ “Action required” = có việc cho bạn. Nhầm hai cái này là nguồn gốc của phần lớn hiểu lầm trong email công việc."

common_mistakes:
  - mistake: "Đọc từng chữ từ đầu đến cuối và cố hiểu 100%"
    why_vi: "Thói quen học tiếng Anh ở trường: mỗi từ đều quan trọng. Nhưng email công việc có phần thông tin và phần khách sáo, bạn chỉ cần phần đầu."
    fix_vi: "Quét tìm “please”, “by”, và ngày tháng trước. Nếu ba thứ đó đủ để hành động, dừng lại."
    detect: {}
  - mistake: "Bỏ qua “FYI” và đi làm một việc không ai yêu cầu"
    why_vi: "Không biết FYI là viết tắt của “for your information” — chỉ để bạn biết."
    fix_vi: "FYI = đọc rồi bỏ qua. Nếu email chỉ có FYI mà không có “please”, bạn không cần làm gì cả."
    detect: {}
  - mistake: "Hiểu “by EOD Friday” là “trong ngày thứ Sáu bất cứ lúc nào cũng được”"
    why_vi: "“by” trong tiếng Việt thường dịch là “vào”, nghe như không bắt buộc."
    fix_vi: "“by X” nghĩa là “không muộn hơn X”. EOD Friday = trước khi hết ngày thứ Sáu."
    detect: {}

memory_trick_vi: >
  Email công việc có ba cái móc: PLEASE (việc của bạn) — BY (hạn của bạn) — FYI (không phải việc
  của bạn). Quét ba cái móc đó trước, đọc phần còn lại sau. Người bản xứ cũng đọc email theo cách này.

mini_quiz:
  - kind: mcq
    prompt_vi: "Một email khác của Linh viết “Please review your section by EOD Friday.” Bạn phải làm gì?"
    choices:
      - "Rà soát phần của mình, xong trước hết ngày thứ Sáu"
      - "Đọc email vào thứ Sáu"
      - "Không cần làm gì"
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Email của Linh viết “FYI, the server was patched last night.” Bạn phải làm gì?"
    choices: ["Vá lại máy chủ", "Không cần làm gì, chỉ để biết", "Trả lời xác nhận"]
    answer: 1
    difficulty: 2
  - kind: mcq
    prompt_vi: "“by EOD Friday” nghĩa là gì?"
    choices:
      - "Không muộn hơn hết ngày thứ Sáu"
      - "Bắt đầu từ thứ Sáu"
      - "Bất cứ lúc nào trong tuần"
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "Bạn có 30 giây trước standup để đọc email của Linh. Cách đọc hiệu quả nhất là gì?"
    choices:
      - "Đọc kỹ từng chữ từ đầu đến cuối"
      - "Quét tìm “please”, “by”, và ngày tháng trước"
      - "Đọc tiêu đề rồi bỏ qua"
    answer: 1
    difficulty: 3
  - kind: mcq
    prompt_vi: "Linh mở đầu bằng “As discussed on Friday…”. Câu đó cho bạn biết điều gì?"
    choices:
      - "Đây là phần bối cảnh, không phải việc mới"
      - "Đây là việc gấp nhất"
      - "Bạn phải họp lại vào thứ Hai"
    answer: 0
    difficulty: 3

