      - "Việc đã xong từ lâu"
      - "Chuyện ăn trưa"
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "“Keep an eye on the disk space” nghĩa là?"
    choices: ["Theo dõi dung lượng ổ đĩa", "Xoá ổ đĩa", "Thay ổ đĩa"]
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Vì sao nên cho hành động khi sự cố tái diễn?"
    choices:
      - "Để ca sau tự xử lý, không phải gọi bạn"
      - "Để bàn giao dài hơn"
      - "Không cần thiết"
    answer: 0
    difficulty: 2
  - kind: mcq_listen
    prompt_vi: "Việc gì vẫn đang mở?"
    audio_text: "The backup job is still open, keep an eye on the disk space."
    choices: ["Job sao lưu", "Cuộc họp", "Đơn hàng"]
    answer: 0
    difficulty: 3

unlock_condition:
