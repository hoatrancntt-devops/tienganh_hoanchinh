schema_version: 1
id: I07
slug: ban-giao-ca-truc
unit: U-I2
title_vi: "Bàn giao ca trực (handover)"
title_en: "Shift handover"
phase: it_english
topic: it_english
cefr_target: b1
order_index: 7
est_minutes: 15

objective_vi: "Bàn giao ca: việc gì đang mở, cái gì cần theo dõi, cái gì đã xong — ngắn gọn và đủ."
objective_observable: "Đạt ≥75 điểm giao tiếp trên 3/4 drill và nêu được việc đang mở + việc cần theo dõi."

prerequisites:
  - {lesson: I06, min_mastery: 80, kind: hard}

vocabulary:
  - term: "handing over to you"
    ipa: "/ˈhændɪŋ ˈoʊvər tuː juː/"
    meaning_vi: "bàn giao cho bạn"
    chunk: "I'm handing over to you now."
    tags: [it_english]
  - term: "still open"
    ipa: "/stɪl ˈoʊpən/"
    meaning_vi: "vẫn còn mở (chưa xong)"
    chunk: "One ticket is still open."
    tags: [it_english]
  - term: "keep an eye on"
    ipa: "/kiːp ən aɪ ɒn/"
    meaning_vi: "để mắt tới, theo dõi"
    chunk: "Keep an eye on the disk space."
    tags: [it_english]
  - term: "resolved"
    ipa: "/rɪˈzɒlvd/"
    meaning_vi: "đã xử lý xong"
    chunk: "The login issue is resolved."
    tags: [it_english]
  - term: "if it happens again"
    ipa: "/ɪf ɪt ˈhæpənz əˈɡɛn/"
    meaning_vi: "nếu tái diễn"
    chunk: "If it happens again, restart the service."
    tags: [it_english]
  - term: "the notes are in"
    ipa: "/ðə noʊts ɑr ɪn/"
    meaning_vi: "ghi chú nằm ở"
    chunk: "The notes are in the ticket."
    tags: [it_english]

sentence_patterns:
  - pattern: "{ticket} is still open. Keep an eye on {thing}."
    meaning_vi: "{ticket} vẫn đang mở. Theo dõi {thing} giúp nhé."
    slots:
      ticket: ["The backup job", "The payment ticket", "One alert"]
      thing: ["the disk space", "the error rate", "the queue"]
  - pattern: "{issue} is resolved. If it happens again, {action}."
    meaning_vi: "{issue} đã xử lý xong. Nếu tái diễn thì {action}."
    slots:
      issue: ["The login issue", "The timeout"]
      action: ["restart the service", "check the logs", "ping me"]

dialogue:
  context_vi: >
    06:00 sáng thứ Sáu. Bạn đã thức ba tiếng và vẫn chưa tìm ra nguyên nhân. Priya Nair ở Singapore
    vừa vào ca. Ba phút bàn giao này quyết định Priya bắt đầu từ đâu — nói thiếu một thứ là chị ấy
    mất một tiếng đi lại đường bạn đã đi.
  turns:
    - {speaker: You, en: "Priya, I'm handing over to you now. Two things.", vi: "Priya, mình bàn giao cho bạn đây. Có hai việc."}
    - {speaker: Priya, en: "Go ahead. I have the incident channel open in front of me.", vi: "Bạn nói đi. Mình đang mở kênh sự cố trước mặt đây."}
    - {speaker: You, en: "First, INC-2291 is still open — portal login down since two, about twenty users. I've ruled out the users' browsers.", vi: "Một, INC-2291 vẫn đang mở — đăng nhập cổng hỏng từ hai giờ, khoảng hai mươi người. Mình đã loại trừ trình duyệt người dùng."}
    - {speaker: Priya, en: "Understood. So the next places to look are the network and last night's deploy.", vi: "Mình hiểu rồi. Vậy chỗ cần xem tiếp là mạng và bản deploy tối qua."}
    - {speaker: You, en: "Exactly. Second, the backup job is still open — keep an eye on the disk space. It looked odd when I was reading the logs.", vi: "Đúng vậy. Hai, job sao lưu vẫn đang mở — để mắt tới dung lượng ổ đĩa. Lúc đọc log mình thấy nó hơi lạ."}
    - {speaker: Priya, en: "Noted. And David expects an update every thirty minutes, is that correct?", vi: "Mình ghi lại. Và David cần cập nhật mỗi ba mươi phút, đúng không?"}
    - {speaker: You, en: "Correct. Next one is due at six thirty. The notes are in the ticket.", vi: "Đúng. Lần tới là sáu giờ rưỡi. Ghi chú nằm trong ticket."}

reading_passage:
  id: RP-I07
  kind: chat
  context_vi: >
    Bàn giao ca lúc sáu giờ sáng. Để ý người bàn giao chỉ nói những thứ CHƯA xong — cái đã xong
    không cần nhắc.
  text_en: |
    I am handing over to you at 06:00. Three things.

    One: the sign-in issue is still open. The portal is down and David wants an update every 30 minutes.
    Two: keep an eye on the error rate. It goes over ten per minute at peak.
    Three: the backup alert from Tuesday is resolved, no action needed.

    If it happens again, page the platform team directly. All the notes are in this thread.
  text_vi: |
    Tôi bàn giao cho bạn lúc 06:00. Ba việc.

    Một: sự cố đăng nhập vẫn chưa xong. Portal đang sập và David muốn cập nhật mỗi 30 phút.
    Hai: để mắt tới tỉ lệ lỗi. Lúc cao điểm nó vượt mười lỗi một phút.
    Ba: cảnh báo backup từ thứ Ba đã xử lý xong, không cần làm gì.

    Nếu lặp lại thì gọi thẳng nhóm hạ tầng. Toàn bộ ghi chú nằm trong luồng này.
  questions:
    - q_en: "Which item needs no action?"
      choices: ["The backup alert from Tuesday", "The sign-in issue", "The error rate"]
      answer: 0
      skill: scan
      difficulty: 3
    - q_en: "How often does David want an update?"
      choices: ["Every 30 minutes", "Every hour", "Only when it is fixed"]
      answer: 0
      skill: scan
      difficulty: 3
    - q_en: "What should you do if the problem happens again?"
      choices: ["Page the platform team directly", "Wait for the next shift", "Restart the portal"]
      answer: 0
      skill: infer
      difficulty: 4

writing_task:
  id: WT-I07
  kind: guided_email
  prompt_vi: >
    Viết tin bàn giao ca: một sự cố chưa xong, một thứ cần theo dõi, và một việc đã xử lý xong.
    Viết 4-5 câu.
  frame_vi:
    - "Mở: bàn giao cho ai, lúc mấy giờ"
    - "Thân: việc còn mở"
    - "Thân: cần để mắt tới cái gì"
    - "Kết: ghi chú nằm ở đâu"
  required_chunks:
    - ["handing over", "i am handing over", "i'm handing over", "handover"]
    - ["still open", "still not fixed", "still down"]
    - ["keep an eye on", "watch out for", "please monitor"]
  min_words: 20
  hint_vi: "Ba mục là đủ. Bàn giao mười mục thì người nhận không nhớ mục nào."
  sample_en: "Hi Priya, I am handing over to you at 06:00. The payment issue is still open and the team wants an update every hour. Please keep an eye on the queue length — it grows fast after nine. The backup alert is resolved, no action needed. All the notes are in this thread. Thanks, Hoa"

listening_snippet:
  id: LS-I07
  speed: 1.0
  voice: en_US_male
  context_vi: >
    Priya đọc lại bản bàn giao bằng lời của chị ấy trước khi bạn đi ngủ. Cách nói của Priya là câu
    đầy đủ, chính xác — nghe kỹ xem chị ấy nhắc lại đúng mấy việc.
  transcript_en: "Let me repeat it back so we are aligned. INC-2291 is still open, login down since two, browsers already ruled out. The backup job is still open and I will keep an eye on the disk space. If the timeout happens again, I will restart the service. Get some sleep."
  transcript_vi: "Để mình nhắc lại cho khớp. INC-2291 vẫn đang mở, đăng nhập hỏng từ hai giờ, trình duyệt đã loại trừ. Job sao lưu vẫn đang mở và mình sẽ theo dõi dung lượng ổ đĩa. Nếu timeout tái diễn, mình sẽ khởi động lại dịch vụ. Bạn đi ngủ đi."
  questions:
    - q_vi: "Ngoài INC-2291, việc gì vẫn đang mở?"
      choices: ["Job sao lưu", "Lỗi đăng nhập", "Không có gì"]
      answer: 0
      difficulty: 3
    - q_vi: "Priya sẽ làm gì nếu timeout tái diễn?"
      choices: ["Khởi động lại dịch vụ", "Tắt máy chủ", "Gọi khách hàng"]
      answer: 0
      difficulty: 3

speaking_drills:
  - kind: read_aloud
    expected_text: "I'm handing over to you now. Two things."
    prompt_vi: "06:00, Priya vừa vào ca. Đọc to — báo trước số việc để chị ấy biết cần ghi mấy dòng."
    ipa: "/aɪm ˈhændɪŋ ˈoʊvər tuː juː naʊ tuː θɪŋz/"
    focus_phonemes: [h, ŋ, θ]
  - kind: read_aloud
    expected_text: "The backup job is still open. Keep an eye on the disk space."
    prompt_vi: "Việc thứ hai bạn giao cho Priya — cái bạn thấy lạ trong log lúc 5 giờ. Đọc to."
    ipa: "/ðə ˈbækʌp dʒɒb ɪz stɪl ˈoʊpən kiːp ən aɪ ɒn ðə dɪsk speɪs/"
    focus_phonemes: [dʒ, p, k]
  - kind: shadow
    expected_text: "If it happens again, just restart the service."
    prompt_vi: "Cho Priya một chỉ dẫn để chị ấy không phải gọi bạn dậy. Nghe rồi nhắc lại."
    ipa: "/ɪf ɪt ˈhæpənz əˈɡɛn dʒʌst ˈriːstɑːrt ðə ˈsɜːrvɪs/"
    focus_phonemes: [f, dʒ, s]
  - kind: respond
    prompt_en: "Before you sign off — anything else I need to know?"
    prompt_vi: "Priya hỏi trước khi bạn tắt máy. Bàn giao: một việc đang mở cần theo dõi + một việc đã loại trừ."
    accept_patterns:
      - "The backup job is still open keep an eye on {thing} the login issue is resolved"
      - "One ticket is still open watch the {thing} everything else is resolved"
      - "{issue} is resolved but keep an eye on {thing}"

vietnamese_explanation:
  why_vi: >
    Bàn giao ca kém là nguồn gốc của nhiều sự cố “mồ côi” — không ai biết cái gì đang treo. Bàn giao
    tốt gói gọn trong ba nhóm: ĐANG MỞ (chưa xong, cần tiếp), CẦN THEO DÕI (chưa hỏng nhưng đáng ngờ),
    ĐÃ XONG (đóng lại, ghi chú ở đâu). Người Việt hay bàn giao kiểu “ổn hết” rồi ca sau vỡ trận.
  how_vi: >
    Mở bằng "Handing over to you, X things" để người nghe đếm. Mỗi việc một câu: trạng thái + hành
    động cần làm. Với việc đã xong, chỉ chỗ ghi chú "notes are in the ticket". Với việc có thể tái
    diễn, cho cách xử lý "If it happens again, …".
  contrast_vi: "“Mọi thứ ổn nhé” (ca sau mù) ↔ “Backup còn mở, theo dõi disk; login đã xong, notes trong ticket” (ca sau kiểm soát được)."

common_mistakes:
  - mistake: "Bàn giao chung chung “ổn hết rồi”"
    why_vi: "Muốn về nhanh, hoặc ngại kể dài."
    fix_vi: "Nêu rõ việc đang mở và việc cần theo dõi. “Ổn hết” là câu khiến ca sau lãnh đủ khi có sự cố treo."
    detect: {}
  - mistake: "Chỉ nói việc đã xong, quên việc đang treo"
    why_vi: "Việc xong dễ kể, việc treo ngại nói vì chưa giải quyết được."
    fix_vi: "Ưu tiên kể việc ĐANG MỞ trước — đó mới là thứ ca sau cần. Việc xong chỉ cần một câu."
    detect: {}
  - mistake: "Không cho hành động cụ thể khi sự cố tái diễn"
    why_vi: "Nghĩ ca sau tự biết."
    fix_vi: "Cho một câu hành động: “If it happens again, restart the service.” Ca sau xử lý được ngay, không cần gọi bạn giữa đêm."
    detect: {}

memory_trick_vi: >
  Bàn giao ca theo ba ngăn: ĐANG MỞ (còn nóng) — THEO DÕI (đang ấm, coi chừng) — ĐÃ XONG (đã nguội,
  ghi chú ở đâu). Kể ngăn nóng trước; ngăn nguội chỉ một câu.

mini_quiz:
  - kind: mcq
    prompt_vi: "Bàn giao ca nên ưu tiên nói gì trước?"
    choices:
      - "Việc đang mở và cần theo dõi"
      - "Việc đã xong từ lâu"
      - "Chuyện ăn trưa"
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "“Keep an eye on the disk space” nghĩa là?"
    choices: ["Theo dõi dung lượng ổ đĩa", "Xoá ổ đĩa", "Thay ổ đĩa"]
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Vì sao nên cho hành động khi sự cố tái diễn?"
    choices:
      - "Để ca sau tự xử lý, không phải gọi bạn"
      - "Để bàn giao dài hơn"
      - "Không cần thiết"
    answer: 0
    difficulty: 2
  - kind: mcq_listen
    prompt_vi: "Việc gì vẫn đang mở?"
    audio_text: "The backup job is still open, keep an eye on the disk space."
    choices: ["Job sao lưu", "Cuộc họp", "Đơn hàng"]
    answer: 0
    difficulty: 3

unlock_condition:
  mastery_threshold: 80
  mastery_weights: {speak: 0.35, listen: 0.15, read: 0.15, write: 0.15, quiz: 0.20}
  min_speaking_attempts: 4
  challenge_threshold: 85

recommended_next:
