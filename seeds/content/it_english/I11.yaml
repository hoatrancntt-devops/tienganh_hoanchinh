schema_version: 1
id: I11
slug: cloud-va-trien-khai
unit: U-I3
title_vi: "Nói về cloud và triển khai (deploy)"
title_en: "Cloud & deployment"
phase: it_english
topic: it_english
cefr_target: b1
order_index: 11
est_minutes: 15

objective_vi: "Dùng đúng từ vựng cloud/deploy: server, môi trường, deploy, rollback, downtime — và báo trạng thái một lần deploy."
objective_observable: "Đạt ≥75 điểm giao tiếp trên 3/4 drill và dùng đúng ≥3 thuật ngữ deploy."

prerequisites:
  - {lesson: I10, min_mastery: 80, kind: hard}

vocabulary:
  - term: "deploy"
    ipa: "/dɪˈplɔɪ/"
    meaning_vi: "triển khai (đưa code lên chạy)"
    chunk: "We'll deploy the new version tonight."
    tags: [it_english]
  - term: "staging"
    ipa: "/ˈsteɪdʒɪŋ/"
    meaning_vi: "môi trường thử trước khi lên thật"
    chunk: "It works on staging."
    tags: [it_english]
  - term: "production"
    ipa: "/prəˈdʌkʃən/"
    meaning_vi: "môi trường thật (đang phục vụ người dùng)"
    chunk: "Don't test on production."
    tags: [it_english]
  - term: "roll back"
    ipa: "/roʊl bæk/"
    meaning_vi: "quay lại bản trước"
    chunk: "We had to roll back the release."
    tags: [it_english]
  - term: "downtime"
    ipa: "/ˈdaʊntaɪm/"
    meaning_vi: "thời gian ngừng hoạt động"
    chunk: "Expect five minutes of downtime."
    tags: [it_english]
  - term: "the build failed"
    ipa: "/ðə bɪld feɪld/"
    meaning_vi: "bản build lỗi"
    chunk: "The build failed on the last step."
    tags: [it_english]

sentence_patterns:
  - pattern: "We'll deploy to {env} {time}. Expect {downtime} of downtime."
    meaning_vi: "Bọn mình sẽ deploy lên {env} {time}. Dự kiến ngừng {downtime}."
    slots:
      env: [staging, production]
      time: [tonight, "at 10 PM", "after hours"]
      downtime: ["five minutes", "no", "a short"]
  - pattern: "If something breaks, we'll roll back to {version}."
    meaning_vi: "Nếu có gì hỏng, bọn mình sẽ quay lại {version}."
    slots:
      version: ["the previous version", "the last stable build"]

dialogue:
  context_vi: >
    08:05 sáng thứ Sáu. Mạng đã bị loại. Còn đúng một thay đổi trong hai mươi tư giờ qua: bản vá
    bảo mật deploy lúc 23:40 tối thứ Năm. Bạn và Priya lần lại từng bước của lần deploy đó — và
    câu hỏi lớn trên bàn là có nên roll back ngay hay không.
  turns:
    - {speaker: You, en: "Priya, what exactly went out at eleven forty last night?", vi: "Priya, chính xác thì tối qua lúc 23:40 mình đẩy cái gì lên?"}
    - {speaker: Priya, en: "A security patch for the authentication library. It closes CVE-2026-4471.", vi: "Một bản vá bảo mật cho thư viện xác thực. Nó vá CVE-2026-4471."}
    - {speaker: You, en: "Was it tested on staging first?", vi: "Có test trên staging trước không?"}
    - {speaker: Priya, en: "It worked on staging, and we only expected five minutes of downtime. Production is the first place it failed.", vi: "Nó chạy tốt trên staging, và tụi mình chỉ dự kiến ngừng năm phút. Production là nơi đầu tiên nó hỏng."}
    - {speaker: You, en: "Then something is different between staging and production. Should we roll back to the previous version?", vi: "Vậy có gì đó khác nhau giữa staging và production. Mình có nên quay lại bản trước không?"}
    - {speaker: Priya, en: "Not yet. Rolling back would reopen the security hole. Let me compare the two environments first.", vi: "Chưa nên. Quay lại sẽ mở lại lỗ hổng bảo mật. Để mình so sánh hai môi trường trước đã."}

reading_passage:
  id: RP-I11
  kind: announcement
  context_vi: >
    Thông báo triển khai gửi trước một ngày. Đọc để thấy thông tin nào bắt buộc phải có trong
    một thông báo deploy.
  text_en: |
    Subject: Deploy to production — Thursday 23:00

    Hi all,

    We will deploy release 4.3.0 to production on Thursday at 23:00.
    It has been running in staging for a week with no problems.
    Expected downtime is about five minutes.
    If the build fails or we see errors, we will roll back to 4.2.0 immediately.
    No action is needed from you. Please do not deploy anything else on Thursday.

    Thanks,
    Platform team
  text_vi: |
    Tiêu đề: Triển khai lên production — 23:00 thứ Năm

    Chào tất cả,

    Chúng tôi sẽ triển khai bản 4.3.0 lên production vào 23:00 thứ Năm.
    Bản này đã chạy trên staging một tuần, không có vấn đề gì.
    Thời gian gián đoạn dự kiến khoảng năm phút.
    Nếu build lỗi hoặc thấy lỗi phát sinh, chúng tôi sẽ quay về bản 4.2.0 ngay.
    Mọi người không cần làm gì. Chỉ xin đừng triển khai thứ gì khác vào thứ Năm.

    Cảm ơn,
    Nhóm hạ tầng
  questions:
    - q_en: "What happens if the build fails?"
      choices: ["They roll back to 4.2.0", "They try again on Friday", "Nothing"]
      answer: 0
      skill: scan
      difficulty: 3
    - q_en: "What must readers avoid doing on Thursday?"
      choices: ["Deploying anything else", "Using the portal", "Sending email"]
      answer: 0
      skill: infer
      difficulty: 4

writing_task:
  id: WT-I11
  kind: guided_email
  prompt_vi: >
    Viết thông báo triển khai: bản nào, khi nào, gián đoạn bao lâu, và phương án nếu hỏng.
    Viết 4-5 câu.
  frame_vi:
    - "Mở: chào — nêu ngay bản nào và khi nào"
    - "Thân: gián đoạn dự kiến bao lâu"
    - "Thân: nếu hỏng thì làm gì"
    - "Kết: người đọc cần làm gì (hoặc không cần làm gì)"
  required_chunks:
    - ["deploy", "we will deploy", "we'll deploy", "release"]
    - ["downtime", "unavailable", "will be down"]
    - ["roll back", "rollback"]
  min_words: 20
  hint_vi: "Luôn nói phương án quay lui. Người đọc yên tâm hơn nhiều khi biết bạn có đường lùi."
  sample_en: "Hi all, we will deploy release 5.0 to production on Friday at 22:00. Expected downtime is about ten minutes. If the build fails, we will roll back to the current version immediately. No action is needed from you. Thanks, Platform team"

listening_snippet:
  id: LS-I11
  speed: 1.3
  voice: en_US_female
  context_vi: >
    Priya bắt đầu so sánh staging với production và đọc to những gì chị ấy thấy. Đây là mười phút
    trước khi mọi thứ vỡ ra.
  transcript_en: "Here is what I have so far. The same patch is on both environments, so the code is not the difference. The build did not fail. Staging and production run different roles, and I am reading the production one now."
  transcript_vi: "Đây là những gì mình có tới lúc này. Cùng một bản vá trên cả hai môi trường, nên khác biệt không nằm ở code. Bản build không lỗi. Staging và production chạy hai role khác nhau, và mình đang đọc cái của production."
  questions:
    - q_vi: "Khác biệt giữa staging và production nằm ở đâu?"
      choices: ["Hai môi trường chạy role khác nhau", "Code khác nhau", "Bản build bị lỗi"]
      answer: 0
      difficulty: 3
    - q_vi: "Vì sao chưa roll back?"
      choices: ["Sẽ mở lại lỗ hổng bảo mật", "Không ai biết cách", "Không cần thiết"]
      answer: 0
      difficulty: 3

speaking_drills:
  - kind: read_aloud
    expected_text: "We deployed to production at eleven forty."
    prompt_vi: "Mốc thời gian bạn phải nói ra hàng chục lần hôm nay. Đọc to — de-PLOY nhấn sau, pro-DUC-tion nhấn giữa."
    ipa: "/wiː dɪˈplɔɪd tuː prəˈdʌkʃən æt ɪˈlɛvən ˈfɔːrti/"
    focus_phonemes: [dʒ, k, ʃ]
  - kind: read_aloud
    expected_text: "It worked on staging. We expected five minutes of downtime."
    prompt_vi: "Câu của Priya — và là chỗ nghịch lý: chạy tốt ở sân tập, hỏng ở sân đấu. Đọc to."
    ipa: "/ɪt wɜːrkt ɒn ˈsteɪdʒɪŋ wiː ɪkˈspɛktɪd faɪv ˈmɪnɪts ɒv ˈdaʊntaɪm/"
    focus_phonemes: [dʒ, t, d]
  - kind: shadow
    expected_text: "If something breaks, we'll roll back to the previous version."
    prompt_vi: "Câu hỏi lớn trên bàn lúc 8 giờ sáng. Nghe rồi nhắc lại — roll back là phương án, không phải phản xạ."
    ipa: "/ɪf ˈsʌmθɪŋ breɪks wɪl roʊl bæk tuː ðə ˈpriːviəs ˈvɜːrʒən/"
    focus_phonemes: [θ, r, s]
  - kind: respond
    prompt_en: "Walk me through last night's deploy. What went out, and what did we expect?"
    prompt_vi: "Priya hỏi lại toàn bộ lần deploy. Kể đủ: đẩy gì, test ở đâu, downtime dự kiến, phương án lùi."
    accept_patterns:
      - "We deployed a security patch to production at {time} it worked on staging about {downtime} of downtime"
      - "It worked on staging we deployed to production last night and we can roll back if we have to"
      - "We deployed to production at {time} we expected {downtime} of downtime"

vietnamese_explanation:
  why_vi: >
    “Deploy”, “rollback”, “staging”, “production” là những từ dân IT gõ mỗi ngày nhưng hay phát âm sai
    khi nói (deploy thành “đề-ploi”). Quan trọng hơn từ vựng là CẤU TRÚC báo deploy: đã test ở đâu →
    khi nào lên → downtime bao lâu → kế hoạch dự phòng. Thiếu phần dự phòng khiến sếp/khách lo.
  how_vi: >
    Bốn phần khi báo deploy: (1) đã test "tested on staging" → (2) lịch "deploy to production tonight"
    → (3) ảnh hưởng "five minutes of downtime" → (4) phương án lùi "roll back to the previous version".
    Phân biệt staging (thử) và production (thật) — nhầm hai cái này là sự cố lớn.
  contrast_vi: "“Tối nay em đẩy lên” (sếp lo) ↔ “Tested on staging, 5 min downtime, roll back ready” (sếp gật ngay)."

common_mistakes:
  - mistake: "Phát âm sai: deploy, production, staging"
    why_vi: "Đọc từ chính tả thay vì nghe mẫu."
    fix_vi: "de-PLOY (nhấn sau), pro-DUC-tion (nhấn giữa), STA-ging (/eɪ/). Nghe giọng mẫu cho từng từ."
    detect: {}
  - mistake: "Không nói downtime và kế hoạch roll back"
    why_vi: "Nghĩ deploy là chuyện kỹ thuật, không cần báo rủi ro."
    fix_vi: "Luôn nói downtime dự kiến và “we'll roll back if…”. Người nghe cần biết rủi ro và phương án lùi."
    detect: {}
  - mistake: "Nhầm/lẫn staging với production"
    why_vi: "Chưa nắm chắc khác biệt hai môi trường."
    fix_vi: "staging = sân tập (an toàn để thử); production = sân đấu thật (người dùng đang dùng). Test trên staging, cẩn trọng với production."
    detect: {}

memory_trick_vi: >
  Báo deploy như báo cất cánh: đã KIỂM TRA (staging) — giờ CẤT CÁNH (production, tối nay) — dự kiến
  RUNG LẮC bao lâu (downtime) — và có DÙ DỰ PHÒNG (roll back). Thiếu dù là hành khách hoảng.

mini_quiz:
  - kind: mcq
    prompt_vi: "Môi trường nào là “thật”, người dùng đang dùng?"
    choices: [production, staging, localhost]
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Deploy xong bản mới bị lỗi nặng. Nên làm gì?"
    choices:
      - "Roll back về bản trước"
      - "Để nguyên cho người dùng chịu"
      - "Tắt hẳn hệ thống"
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "“deploy” nhấn âm nào?"
    choices: ["de-PLOY", "DE-ploy", "nhấn đều"]
    answer: 0
    difficulty: 3
  - kind: mcq_listen
    prompt_vi: "Nếu hỏng thì làm gì?"
    audio_text: "If something breaks, we'll roll back to the previous version."
    choices: ["Quay lại bản trước", "Xoá dữ liệu", "Đổi máy chủ"]
    answer: 0
    difficulty: 3

unlock_condition:
