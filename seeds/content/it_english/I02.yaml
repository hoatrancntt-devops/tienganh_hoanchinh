schema_version: 1
id: I02
slug: nhan-ticket-helpdesk
unit: U-I1
title_vi: "Nhận và xác nhận yêu cầu người dùng (ticket)"
title_en: "Handling a helpdesk ticket"
phase: it_english
topic: it_english
cefr_target: a2
order_index: 2
est_minutes: 14

objective_vi: "Tiếp nhận yêu cầu hỗ trợ: chào, xác nhận vấn đề, hứa xử lý và đặt kỳ vọng thời gian."
objective_observable: "Đạt ≥75 điểm giao tiếp trên 3/4 drill và có bước xác nhận lại vấn đề."

prerequisites:
  - {lesson: I01, min_mastery: 76, kind: hard}

vocabulary:
  - term: "How can I help"
    ipa: "/haʊ kæn aɪ hɛlp/"
    meaning_vi: "Tôi có thể giúp gì"
    chunk: "Hi, how can I help you today?"
    tags: [it_english]
  - term: "Let me confirm"
    ipa: "/lɛt miː kənˈfɜːrm/"
    meaning_vi: "Để tôi xác nhận lại"
    chunk: "Let me confirm: you can't log in, right?"
    tags: [it_english]
  - term: "I'll look into it"
    ipa: "/aɪl lʊk ˈɪntuː ɪt/"
    meaning_vi: "Tôi sẽ xem xét việc này"
    chunk: "I'll look into it right away."
    tags: [it_english]
  - term: "ticket"
    ipa: "/ˈtɪkɪt/"
    meaning_vi: "phiếu yêu cầu hỗ trợ"
    chunk: "I've created a ticket for you."
    tags: [it_english]
  - term: "get back to you"
    ipa: "/ɡɛt bæk tuː juː/"
    meaning_vi: "phản hồi lại cho bạn"
    chunk: "I'll get back to you within an hour."
    tags: [it_english]
  - term: "in the meantime"
    ipa: "/ɪn ðə ˈmiːntaɪm/"
    meaning_vi: "trong lúc chờ"
    chunk: "In the meantime, please restart your laptop."
    tags: [it_english]

sentence_patterns:
  - pattern: "Let me confirm: {problem}, right?"
    meaning_vi: "Để tôi xác nhận: {problem}, đúng không?"
    slots:
      problem: ["you can't log in", "the printer is offline", "email won't send"]
  - pattern: "I'll look into it and get back to you {time}."
    meaning_vi: "Tôi sẽ xem và phản hồi lại cho bạn {time}."
    slots:
      time: ["within an hour", "by end of day", "this afternoon"]

dialogue:
  context_vi: >
    03:05 sáng thứ Sáu, ngay sau khi báo Linh. Bạn gọi lại cho Emma Brooks — kế toán ở Northwind,
    người mở ticket #4417 lúc 2 giờ. Emma không rành kỹ thuật và cũng đang bực. Việc của bạn lúc
    này chưa phải là sửa, mà là làm cho Emma yên tâm chờ.
  turns:
    - {speaker: You, en: "Hi Emma, this is Vertex support. I'm calling about ticket four four one seven. How can I help?", vi: "Chào chị Emma, đây là bộ phận hỗ trợ Vertex. Tôi gọi về ticket bốn bốn một bảy. Tôi có thể giúp gì ạ?"}
    - {speaker: Emma, en: "Oh, thank you for calling back. I'm sorry, I don't really know how to explain it. I type my password like always, and then it just spins.", vi: "Ồ, cảm ơn đã gọi lại. Xin lỗi, tôi không biết diễn đạt thế nào. Tôi nhập mật khẩu như mọi khi, rồi nó cứ quay quay mãi."}
    - {speaker: You, en: "Let me confirm: you type your password, the page keeps loading, and it never lets you in, right?", vi: "Để tôi xác nhận: chị nhập mật khẩu, trang cứ tải mãi, và không vào được, đúng không ạ?"}
    - {speaker: Emma, en: "Yes, exactly. And after a while the page went white.", vi: "Đúng vậy. Và một lúc sau thì trang trắng xoá."}
    - {speaker: You, en: "Thank you, that helps. I've added that to your ticket. I'll look into it and get back to you within an hour. In the meantime, please don't keep trying — it may lock your account.", vi: "Cảm ơn chị, thông tin đó rất hữu ích. Tôi đã ghi vào ticket. Tôi sẽ xem và phản hồi trong một giờ. Trong lúc chờ, chị đừng thử lại nữa — có thể bị khoá tài khoản."}
    - {speaker: Emma, en: "All right. I'll just wait then.", vi: "Được rồi. Vậy tôi chờ."}

reading_passage:
  id: RP-I02
  kind: ticket
  context_vi: >
    Một lượt tiếp nhận ticket đúng chuẩn. Để ý cách người hỗ trợ nhắc lại vấn đề để xác nhận
    trước khi hứa bất cứ điều gì.
  text_en: |
    User: My VPN stopped working this morning.
    You: Let me confirm — you cannot connect from home, is that right?
    User: Yes, exactly.
    You: I will look into it and get back to you today.
    In the meantime, please use the web portal.
    I have created ticket INC-3040 for this.
  text_vi: |
    Người dùng: VPN của tôi sáng nay không dùng được.
    Bạn: Để tôi xác nhận lại — anh không kết nối được từ nhà, đúng không ạ?
    Người dùng: Đúng rồi.
    Bạn: Tôi sẽ kiểm tra và phản hồi anh trong hôm nay.
    Trong lúc chờ, anh dùng tạm cổng web nhé.
    Tôi đã tạo ticket INC-3040 cho việc này.
  questions:
    - q_en: "What is the ticket number?"
      choices: ["INC-3040", "INC-2291", "There is no ticket"]
      answer: 0
      skill: scan
      difficulty: 2
    - q_en: "What should the user do while waiting?"
      choices: ["Use the web portal", "Restart the VPN", "Nothing"]
      answer: 0
      skill: infer
      difficulty: 3

writing_task:
  id: WT-I02
  kind: guided_email
  prompt_vi: >
    Trả lời một người dùng báo máy in không in được: xác nhận lại vấn đề, hứa kiểm tra và
    phản hồi. Viết 3-4 câu.
  frame_vi:
    - "Mở: chào"
    - "Thân: nhắc lại vấn đề để xác nhận + hứa kiểm tra"
    - "Kết: khi nào phản hồi lại"
  required_chunks:
    - ["let me confirm", "just to confirm", "to confirm", "so just to check"]
    - ["i'll look into it", "i will look into it", "i'll check", "i will check"]
    - ["get back to you"]
  min_words: 15
  hint_vi: "Nhắc lại vấn đề bằng lời của mình trước — đó là cách chắc chắn hai bên hiểu giống nhau."
  sample_en: "Hi Mr Nam, let me confirm — the printer on floor 3 does not print at all. I will look into it this morning and get back to you before lunch. Thanks, Hoa"

listening_snippet:
  id: LS-I02
  speed: 1.0
  voice: en_US_female
  context_vi: >
    Trước khi cúp máy, bạn đọc lại một lần nữa cho Emma nghe. Đây là đoạn mà người dùng quyết định
    có tin bạn hay không — nghe xem nó gồm những phần nào.
  transcript_en: "So let me confirm: you type your password, the page keeps spinning, and it never lets you in. I've added that to ticket four four one seven. I'll look into it and get back to you within an hour."
  transcript_vi: "Vậy để tôi xác nhận: chị nhập mật khẩu, trang cứ quay, và không vào được. Tôi đã ghi vào ticket bốn bốn một bảy. Tôi sẽ xem và phản hồi trong một giờ."
  questions:
    - q_vi: "Bạn làm gì trước tiên với Emma?"
      choices: ["Xác nhận lại vấn đề", "Đổ lỗi cho người dùng", "Từ chối hỗ trợ"]
      answer: 0
      difficulty: 2
    - q_vi: "Bao lâu nữa bạn sẽ phản hồi cho Emma?"
      choices: ["Trong một giờ", "Trong một ngày", "Không nói"]
      answer: 0
      difficulty: 3

speaking_drills:
  - kind: read_aloud
    expected_text: "Hi, how can I help you today?"
    prompt_vi: "Emma vừa nhấc máy lúc 3 giờ sáng. Đọc to — ấm và sẵn sàng, dù bạn đang mệt."
    ipa: "/haɪ haʊ kæn aɪ hɛlp juː təˈdeɪ/"
    focus_phonemes: [h, k]
  - kind: read_aloud
    expected_text: "Let me confirm: you can't log in, right?"
    prompt_vi: "Emma vừa mô tả vòng vo. Đọc to — nhắc lại bằng lời của bạn để chắc mình hiểu đúng."
    ipa: "/lɛt miː kənˈfɜːrm juː kænt lɒɡ ɪn raɪt/"
    focus_phonemes: [k, f, r]
  - kind: shadow
    expected_text: "I'll look into it and get back to you within an hour."
    prompt_vi: "Emma cần biết khi nào có tin. Nghe rồi nhắc lại — đặt kỳ vọng thời gian rõ ràng."
    ipa: "/aɪl lʊk ˈɪntuː ɪt ænd ɡɛt bæk tuː juː wɪˈðɪn ən ˈaʊər/"
    focus_phonemes: [l, ð, r]
  - kind: respond
    prompt_en: "I'm sorry, I don't know the words for it — I put my password in and it just spins."
    prompt_vi: "Emma vừa nói xong. Tiếp nhận: xác nhận lại bằng lời của bạn rồi hứa xử lý kèm mốc thời gian."
    accept_patterns:
      - "Let me confirm you type your password and the page keeps loading I'll look into it and get back to you within {time}"
      - "So the page keeps spinning and you can't log in I've added that to your ticket I'll get back to you {time}"
      - "Got it the page never lets you in I'll look into it"

vietnamese_explanation:
  why_vi: >
    Tiếp nhận yêu cầu tốt quyết định 80% ấn tượng của người dùng, dù bạn chưa sửa được gì. Người
    Việt làm IT hay nhảy thẳng vào kỹ thuật, quên bước XÁC NHẬN LẠI và ĐẶT KỲ VỌNG thời gian — nên
    người dùng lo lắng, gọi lại liên tục.
  how_vi: >
    Bốn bước: chào ("How can I help?") → xác nhận lại vấn đề ("Let me confirm: …, right?") → hứa
    xử lý ("I'll look into it") → đặt kỳ vọng ("get back to you within an hour") và nếu được, cho
    một việc tạm ("In the meantime…").
  contrast_vi: "“Ok I check” (người dùng mù mờ, lo lắng) ↔ “Let me confirm…, I'll get back to you within an hour” (yên tâm chờ)."

common_mistakes:
  - mistake: "Nhảy thẳng vào sửa, bỏ bước xác nhận lại"
    why_vi: "Thấy vấn đề quen nên tưởng đã hiểu, nhưng người dùng mô tả thường thiếu hoặc sai."
    fix_vi: "Luôn nhắc lại một câu: “Let me confirm: …, right?”. Bắt sai từ đầu đỡ tốn cả buổi."
    detect: {}
  - mistake: "Không đặt kỳ vọng thời gian"
    why_vi: "Nghĩ nói thời gian rồi lỡ thì mất uy tín, nên tránh."
    fix_vi: "Cho một mốc an toàn: “within an hour”, “by end of day”. Người dùng cần biết khi nào để yên tâm."
    detect: {}
  - mistake: "Dùng “Ok I check” cụt lủn"
    why_vi: "Dịch thẳng từ tiếng Việt “để tôi kiểm tra”."
    fix_vi: "Nói đủ câu: “I'll look into it and get back to you.” Nghe chuyên nghiệp và trấn an hơn."
    detect: {}

memory_trick_vi: >
  Nhận ticket như bác sĩ nhận bệnh nhân: NGHE → NHẮC LẠI cho chắc (“vậy là anh bị…”) → HẸN GIỜ trả
  kết quả. Chưa hẹn giờ là bệnh nhân còn thấp thỏm.

mini_quiz:
  - kind: mcq
    prompt_vi: "Emma vừa mô tả xong bằng lời thường. Bước tiếp theo của bạn nên là gì?"
    choices:
      - "Xác nhận lại: “Let me confirm: …, right?”"
      - "Sửa ngay không cần hỏi"
      - "Bảo họ tự tìm trên Google"
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Cách đặt kỳ vọng thời gian tốt nhất?"
    choices:
      - "I'll get back to you within an hour."
      - "Maybe later."
      - "I don't know when."
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "“In the meantime” dùng để làm gì?"
    choices:
      - "Cho người dùng một việc tạm trong lúc chờ"
      - "Kết thúc cuộc gọi"
      - "Đổ lỗi"
    answer: 0
    difficulty: 2
  - kind: mcq_listen
    prompt_vi: "Bao lâu sẽ phản hồi?"
    audio_text: "I'll get back to you within an hour."
    choices: ["Trong một giờ", "Trong một tuần", "Không nói"]
    answer: 0
    difficulty: 2

unlock_condition:
  mastery_threshold: 76
  mastery_weights: {speak: 0.35, listen: 0.15, read: 0.15, write: 0.15, quiz: 0.20}
  min_speaking_attempts: 4
  challenge_threshold: 85

recommended_next:
  default: I03
