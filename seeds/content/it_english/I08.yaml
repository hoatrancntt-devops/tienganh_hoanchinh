schema_version: 1
id: I08
slug: daily-standup
unit: U-I2
title_vi: "Báo cáo standup hằng ngày"
title_en: "Daily standup update"
phase: it_english
topic: it_english
cefr_target: b1
order_index: 8
est_minutes: 11

objective_vi: "Báo standup chuẩn ba phần: hôm qua làm gì, hôm nay làm gì, có bị chặn ở đâu không."
objective_observable: "Đạt ≥75 điểm giao tiếp trên 3/4 drill và nêu đủ ba phần standup."

prerequisites:
  - {lesson: I07, min_mastery: 75, kind: hard}

vocabulary:
  - term: "Yesterday I"
    ipa: "/ˈjɛstərdeɪ aɪ/"
    meaning_vi: "Hôm qua tôi"
    chunk: "Yesterday I finished my shift on the outage."
    tags: [it_english]
  - term: "Today I'll"
    ipa: "/təˈdeɪ aɪl/"
    meaning_vi: "Hôm nay tôi sẽ"
    chunk: "Today I'll start on the customer update."
    tags: [it_english]
  - term: "I'm blocked on"
    ipa: "/aɪm blɒkt ɒn/"
    meaning_vi: "tôi đang bị chặn ở"
    chunk: "I'm blocked on the access permissions."
    tags: [it_english]
  - term: "no blockers"
    ipa: "/noʊ ˈblɒkərz/"
    meaning_vi: "không có gì cản trở"
    chunk: "No blockers on my side."
    tags: [it_english]
  - term: "waiting on"
    ipa: "/ˈweɪtɪŋ ɒn/"
    meaning_vi: "đang chờ (ai/cái gì)"
    chunk: "I'm waiting on the design from Lan."
    tags: [it_english]
  - term: "wrapped up"
    ipa: "/ræpt ʌp/"
    meaning_vi: "hoàn tất, làm xong"
    chunk: "I wrapped up the testing."
    tags: [it_english]

sentence_patterns:
  - pattern: "Yesterday I {done}. Today I'll {plan}."
    meaning_vi: "Hôm qua tôi {done}. Hôm nay tôi sẽ {plan}."
    slots:
      done: ["finished the login page", "fixed two bugs", "wrapped up the tests"]
      plan: ["start on the API", "review the pull request", "deploy to staging"]
  - pattern: "I'm blocked on {blocker}. I'm waiting on {who}."
    meaning_vi: "Tôi đang kẹt ở {blocker}. Đang chờ {who}."
    slots:
      blocker: ["the access permissions", "the test data"]
      who: ["the DevOps team", "Lan's design", "the client's approval"]

dialogue:
  context_vi: >
    06:30 sáng thứ Sáu. Linh gọi standup sớm vì sự cố. Bạn vừa bàn giao xong, chưa ngủ chút nào,
    và hệ thống khách hàng vẫn đang sập. Cả team chờ ba mươi giây từ bạn — không phải để nghe kể
    khổ, mà để biết ai cần làm gì tiếp.
  turns:
    - {speaker: Linh, en: "Okay, your turn. Short one — I know you've been up all night.", vi: "Rồi, tới lượt em. Ngắn thôi — chị biết em thức cả đêm rồi."}
    - {speaker: You, en: "Yesterday I finished my shift on the outage and logged two issues.", vi: "Hôm qua em kết thúc ca trực trong sự cố và ghi lại hai vấn đề."}
    - {speaker: Linh, en: "Where does INC-2291 stand right now?", vi: "INC-2291 hiện đang ở đâu rồi?"}
    - {speaker: You, en: "Still down. Four and a half hours so far. No root cause yet — Priya has it now.", vi: "Vẫn sập. Đến giờ là bốn tiếng rưỡi. Chưa có nguyên nhân gốc — Priya đang cầm."}
    - {speaker: Minh, en: "Four and a half hours. The client will want a written answer for this.", vi: "Bốn tiếng rưỡi. Khách sẽ muốn có câu trả lời bằng văn bản cho vụ này."}
    - {speaker: You, en: "Today I'll start on the customer update. But I'm blocked on the access permissions — I'm waiting on the DevOps team.", vi: "Hôm nay em sẽ bắt đầu bản thông báo cho khách. Nhưng em đang kẹt ở quyền truy cập — đang chờ đội DevOps."}
    - {speaker: Linh, en: "Got it. I'll follow up with them after standup. Then go sleep.", vi: "Rõ. Sau standup chị hối họ. Rồi em đi ngủ đi."}

listening_snippet:
  id: LS-I08
  speed: 1.0
  voice: en_US_female
  context_vi: >
    Ngay sau bạn là lượt của Minh. Nghe một bản standup ba phần chuẩn, nói giữa lúc sự cố còn nóng.
  transcript_en: "Yesterday I covered the tickets nobody else could take. Today I'll pull the login logs and build the timeline. No blockers on my side, but I'm waiting on Priya before I write anything down."
  transcript_vi: "Hôm qua tôi ôm hết những ticket không ai nhận. Hôm nay tôi sẽ lấy log đăng nhập và dựng dòng thời gian. Phía tôi không vướng gì, nhưng tôi đang chờ Priya trước khi viết gì xuống."
  questions:
    - q_vi: "Hôm nay Minh sẽ làm gì?"
      choices: ["Lấy log đăng nhập và dựng dòng thời gian", "Sửa trang đăng nhập", "Nghỉ phép"]
      answer: 0
      difficulty: 3
    - q_vi: "Minh đang chờ ai?"
      choices: ["Priya", "Emma", "Không chờ ai"]
      answer: 0
      difficulty: 3

speaking_drills:
  - kind: read_aloud
    expected_text: "Yesterday I finished my shift on the outage and logged two issues."
    prompt_vi: "Ô thứ nhất của standup. Đọc to — việc đã xong, thì quá khứ, không kể khổ."
    ipa: "/ˈjɛstərdeɪ aɪ ˈfɪnɪʃt maɪ ʃɪft ɒn ðiː ˈaʊtɪdʒ ænd lɒɡd tuː ˈɪʃuːz/"
    focus_phonemes: [ʃ, dʒ, z]
  - kind: read_aloud
    expected_text: "Today I'll start on the customer update."
    prompt_vi: "Ô thứ hai. Đọc to — việc hôm nay nói ở thì tương lai, gọn một câu."
    ipa: "/təˈdeɪ aɪl stɑːrt ɒn ðə ˈkʌstəmər ˈʌpdeɪt/"
    focus_phonemes: [t, st, p]
  - kind: shadow
    expected_text: "I'm blocked on the access permissions, waiting on the DevOps team."
    prompt_vi: "Ô thứ ba — ô cả team đang chờ nghe. Nghe rồi nhắc lại, đừng giấu blocker."
    ipa: "/aɪm blɒkt ɒn ðiː ˈæksɛs pərˈmɪʃənz ˈweɪtɪŋ ɒn ðə ˈdɛvɒps tiːm/"
    focus_phonemes: [bl, k, ʃ]
  - kind: respond
    prompt_en: "Okay, your turn. Short one — I know you've been up all night."
    prompt_vi: "Linh vừa gọi tên bạn. Ba mươi giây, đủ ba phần: hôm qua, hôm nay, blocker (hoặc no blockers)."
    accept_patterns:
      - "Yesterday I {done} today I'll {plan} no blockers"
      - "Yesterday I {done} today I'll {plan} I'm blocked on {blocker}"
      - "Yesterday I wrapped up {task} today I'll start on {task} waiting on {who}"

vietnamese_explanation:
  why_vi: >
    Standup là bài kiểm tra tiếng Anh hằng ngày của dân dev — 30 giây, cả team nghe. Người Việt hay
    lỗi hai kiểu: nói lan man từng dòng code, hoặc ngại nói blocker vì sợ bị coi là chậm. Cả hai đều
    làm standup mất tác dụng: standup tồn tại để GỠ BLOCKER, không phải để khoe việc.
  how_vi: >
    Ba phần cố định: "Yesterday I…" (đã xong, quá khứ) → "Today I'll…" (kế hoạch, tương lai) →
    blocker: "I'm blocked on… / waiting on…" hoặc "No blockers". Nói ở mức TÍNH NĂNG, không phải
    dòng code. Blocker là phần quý nhất — nói ra để người khác gỡ giúp.
  contrast_vi: "“I wrote some code, fixed things” (mơ hồ) ↔ “Finished login, today API, blocked on permissions” (rõ, gỡ được)."

common_mistakes:
  - mistake: "Ngại nói blocker vì sợ bị coi là kém"
    why_vi: "Văn hoá ngại thừa nhận đang kẹt."
    fix_vi: "Blocker là lý do standup tồn tại. Nói sớm để được gỡ. Giấu blocker mới là thứ làm chậm cả team."
    detect: {}
  - mistake: "Báo cáo ở mức dòng code, quá chi tiết"
    why_vi: "Nghĩ chi tiết mới thể hiện làm nhiều."
    fix_vi: "Nói ở mức tính năng/nhiệm vụ: “finished the login page”, không phải “I wrote a for-loop…”. Cả team chỉ cần bức tranh."
    detect: {}
  - mistake: "Lẫn thì: dùng hiện tại cho việc đã xong"
    why_vi: "Chưa quen chia thì khi nói nhanh."
    fix_vi: "Hôm qua = quá khứ (“I finished”), hôm nay = tương lai (“I'll start”). Hai thì này đủ cho 90% standup."
    detect: {}

memory_trick_vi: >
  Standup ba ô: HÔM QUA (đã xong) — HÔM NAY (sẽ làm) — KẸT Ở ĐÂU (blocker). Đừng bỏ ô thứ ba — đó
  là ô cả team đang chờ nghe để giúp bạn.

mini_quiz:
  - kind: mcq
    prompt_vi: "Standup gồm ba phần nào?"
    choices:
      - "Hôm qua, hôm nay, blocker"
      - "Lương, thưởng, nghỉ phép"
      - "Code, test, deploy"
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Bạn đang kẹt vì chờ DevOps cấp quyền. Nên làm gì trong standup?"
    choices:
      - "Nói rõ blocker: “I'm blocked on…, waiting on…”"
      - "Giấu đi cho đỡ mất mặt"
      - "Nói “mọi thứ ổn”"
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "“Yesterday I ___ the login page.” (đã làm xong)"
    choices: [finished, finish, will finish]
    answer: 0
    difficulty: 2
  - kind: mcq_listen
    prompt_vi: "Người nói bị chặn ở đâu?"
    audio_text: "I'm blocked on the access permissions."
    choices: ["Quyền truy cập", "Thiết kế giao diện", "Máy in"]
    answer: 0
    difficulty: 3

unlock_condition:
  mastery_threshold: 75
  mastery_weights: {speak: 0.5, quiz: 0.3, listen: 0.2}
  min_speaking_attempts: 4
  challenge_threshold: 85

recommended_next:
  default: I09
