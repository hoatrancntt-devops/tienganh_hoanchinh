schema_version: 1
id: I03
slug: huong-dan-tung-buoc
unit: U-I1
title_vi: "Hướng dẫn người dùng khắc phục từng bước"
title_en: "Walking a user through a fix"
phase: it_english
topic: it_english
cefr_target: a2
order_index: 3
est_minutes: 14

objective_vi: "Hướng dẫn từng bước rõ ràng, chờ xác nhận sau mỗi bước, dùng ngôn ngữ người dùng hiểu."
objective_observable: "Đạt ≥75 điểm giao tiếp trên 3/4 drill và có bước chờ xác nhận."

prerequisites:
  - {lesson: I02, min_mastery: 75, kind: hard}

vocabulary:
  - term: "First"
    ipa: "/fɜːrst/"
    meaning_vi: "Đầu tiên"
    chunk: "First, close all your browser tabs."
    tags: [it_english, core]
  - term: "click on"
    ipa: "/klɪk ɒn/"
    meaning_vi: "bấm vào"
    chunk: "Click on the Settings icon."
    tags: [it_english]
  - term: "Let me know when"
    ipa: "/lɛt miː noʊ wɛn/"
    meaning_vi: "Báo tôi khi"
    chunk: "Let me know when you see the login screen."
    tags: [it_english]
  - term: "at the top right"
    ipa: "/æt ðə tɒp raɪt/"
    meaning_vi: "ở góc trên bên phải"
    chunk: "It's at the top right of the screen."
    tags: [it_english]
  - term: "Are you with me"
    ipa: "/ɑr juː wɪð miː/"
    meaning_vi: "Bạn theo kịp chứ"
    chunk: "Okay so far? Are you with me?"
    tags: [it_english]
  - term: "restart"
    ipa: "/ˈriːstɑːrt/"
    meaning_vi: "khởi động lại"
    chunk: "Now restart your computer."
    tags: [it_english]

sentence_patterns:
  - pattern: "First, {step}. Let me know when you're done."
    meaning_vi: "Đầu tiên, {step}. Báo tôi khi xong."
    slots:
      step: ["close all your tabs", "click on Settings", "restart your laptop"]
  - pattern: "Click on {item}, at the top {position}."
    meaning_vi: "Bấm vào {item}, ở góc trên bên {position}."
    slots:
      item: ["the gear icon", "your profile", "the menu"]
      position: [right, left]

dialogue:
  context_vi: >
    03:20 sáng thứ Sáu. Bạn chưa biết nguyên nhân, nên phải loại trừ những thứ ở phía Emma trước:
    xoá cache, đổi trình duyệt. Emma đang ở nhà, không rành máy tính, và mỗi bước bạn nói ra đều
    phải đủ rõ để làm một mình qua điện thoại.
  turns:
    - {speaker: You, en: "Emma, before I go further, can we try two quick things? First, click on the three dots at the top right of your browser.", vi: "Chị Emma, trước khi tôi tìm tiếp, mình thử hai việc nhanh nhé? Đầu tiên, bấm vào ba dấu chấm ở góc trên bên phải trình duyệt."}
    - {speaker: Emma, en: "The three little dots? Okay, I see a menu now.", vi: "Ba chấm nhỏ đó hả? Được, tôi thấy một menu hiện ra."}
    - {speaker: You, en: "Good. Click on Settings, then find Clear browsing data. Let me know when you're there.", vi: "Tốt ạ. Bấm vào Settings, rồi tìm “Clear browsing data”. Chị báo tôi khi tới nơi nhé."}
    - {speaker: Emma, en: "Done. It's cleared. Should I try logging in again?", vi: "Xong rồi. Đã xoá. Tôi thử đăng nhập lại nhé?"}
    - {speaker: You, en: "Yes, please try once. If it still spins, open a different browser and try there. Are you with me?", vi: "Vâng, chị thử một lần thôi. Nếu vẫn quay mãi, chị mở trình duyệt khác và thử ở đó. Chị theo kịp chứ ạ?"}
    - {speaker: Emma, en: "I tried both. Same thing — it just spins.", vi: "Tôi thử cả hai rồi. Vẫn vậy — nó cứ quay."}

reading_passage:
  id: RP-I03
  kind: doc
  context_vi: >
    Hướng dẫn từng bước cho người không rành kỹ thuật. Để ý các từ nối thứ tự — chúng là thứ
    giữ cho người nghe không bị lạc.
  text_en: |
    First, click on your name at the top right.
    Then choose Settings and open the Network tab.
    Are you with me so far?
    Turn the VPN off, wait ten seconds, and turn it on again.
    If that does not work, restart your laptop.
    Let me know when you are done.
  text_vi: |
    Đầu tiên, bấm vào tên của anh ở góc trên bên phải.
    Sau đó chọn Cài đặt và mở tab Mạng.
    Anh theo kịp em không ạ?
    Tắt VPN đi, đợi mười giây, rồi bật lại.
    Nếu vẫn không được thì khởi động lại máy.
    Xong rồi anh báo em nhé.
  questions:
    - q_en: "Where do you click first?"
      choices: ["On your name at the top right", "On the Network tab", "On the VPN button"]
      answer: 0
      skill: scan
      difficulty: 2
    - q_en: "What do you do if the VPN still fails?"
      choices: ["Restart the laptop", "Wait ten more seconds", "Call the network team"]
      answer: 0
      skill: infer
      difficulty: 3

writing_task:
  id: WT-I03
  kind: guided_email
  prompt_vi: >
    Viết hướng dẫn ngắn cho người dùng cách xoá cache trình duyệt. Viết 3-4 câu, có từ nối
    thứ tự.
  frame_vi:
    - "Mở: chào"
    - "Thân: bước 1 → bước 2 → bước 3"
    - "Kết: nhờ báo lại khi xong"
  required_chunks:
    - ["first"]
    - ["then", "after that", "next"]
    - ["let me know"]
  min_words: 15
  hint_vi: "Mỗi câu một bước. Đừng gộp hai thao tác vào một câu — người làm theo sẽ bỏ sót."
  sample_en: "Hi Mr Nam, first open your browser settings. Then click Privacy and choose Clear browsing data. After that, restart the browser. Let me know when you are done. Thanks, Hoa"

listening_snippet:
  id: LS-I03
  speed: 1.0
  voice: en_US_male
  context_vi: >
    Emma báo cả hai cách đều không ăn thua. Bạn hướng dẫn nốt một bước cuối trước khi kết luận lỗi
    không nằm ở máy của chị ấy.
  transcript_en: "Okay, one last thing. Close the browser completely, then open it again and go to the portal. Don't type anything yet — just tell me what you see. Let me know when you're there."
  transcript_vi: "Được rồi, một việc cuối. Chị đóng hẳn trình duyệt, rồi mở lại và vào cổng. Chưa nhập gì cả — chỉ nói cho tôi biết chị thấy gì. Báo tôi khi tới nơi nhé."
  questions:
    - q_vi: "Bước đầu tiên bạn bảo Emma làm là gì?"
      choices: ["Đóng hẳn trình duyệt rồi mở lại", "Khởi động lại máy", "Gọi cho sếp"]
      answer: 0
      difficulty: 3
    - q_vi: "Bạn muốn Emma làm gì sau khi mở lại trang?"
      choices: ["Báo lại xem thấy gì, chưa nhập gì", "Tự đăng nhập luôn", "Không cần báo"]
      answer: 0
      difficulty: 2

speaking_drills:
  - kind: read_aloud
    expected_text: "First, click on the three dots at the top right."
    prompt_vi: "Bước một cho Emma. Đọc to — mở đầu bằng động từ hành động và nói rõ chỗ trên màn hình."
    ipa: "/fɜːrst klɪk ɒn ðə θriː dɒts æt ðə tɒp raɪt/"
    focus_phonemes: [θ, k, t]
  - kind: read_aloud
    expected_text: "Let me know when you're done."
    prompt_vi: "Emma đang mò trên màn hình. Đọc to — chờ chị ấy xác nhận trước khi sang bước sau."
    ipa: "/lɛt miː noʊ wɛn jʊr dʌn/"
    focus_phonemes: [l, n, d]
  - kind: shadow
    expected_text: "Okay so far? Are you with me?"
    prompt_vi: "Emma im lặng vài giây. Nghe rồi nhắc lại — kiểm tra chị ấy còn theo kịp không."
    ipa: "/ˈoʊkeɪ soʊ fɑr ɑr juː wɪð miː/"
    focus_phonemes: [s, f, ð]
  - kind: respond
    prompt_en: "So what should I do now? I'm not very good with computers."
    prompt_vi: "Emma đang chờ chỉ dẫn. Cho MỘT bước đầu tiên thật rõ và bảo chị ấy báo lại khi xong."
    accept_patterns:
      - "First close the browser completely Let me know when you're done"
      - "Okay first {step} let me know when you see {result}"
      - "First {step} then tell me what you see"

vietnamese_explanation:
  why_vi: >
    Người dùng không rành sẽ hoảng nếu bạn đọc một tràng bước. Bí quyết là MỘT BƯỚC MỘT LÚC, chờ họ
    xác nhận rồi mới sang bước sau. Người Việt làm IT hay dồn 5 bước vào một câu vì với mình nó hiển
    nhiên — nhưng người kia rớt ngay bước hai.
  how_vi: >
    Mỗi bước: động từ hành động ("Click on…", "Restart…") + vị trí cụ thể ("at the top right") +
    chờ xác nhận ("Let me know when you're done", "Are you with me?"). Tránh từ chuyên môn; nói theo
    thứ họ thấy trên màn hình.
  contrast_vi: "“Vào settings xoá cache rồi restart” (dồn cục, rớt) ↔ từng bước, chờ xác nhận (theo được đến cuối)."

common_mistakes:
  - mistake: "Dồn nhiều bước vào một câu"
    why_vi: "Với mình các bước là hiển nhiên nên nói liền một mạch."
    fix_vi: "Một bước, chờ “done”, rồi bước sau. Người không rành chỉ giữ được một lệnh trong đầu mỗi lúc."
    detect: {}
  - mistake: "Dùng từ chuyên môn người dùng không hiểu"
    why_vi: "Quen nói “cache”, “DNS”, “reboot” với đồng nghiệp IT."
    fix_vi: "Nói theo cái họ thấy: “the three dots at the top right”, “the button that says Save”. Mô tả vị trí, đừng gọi tên kỹ thuật."
    detect: {}
  - mistake: "Không chờ xác nhận, cứ đọc tiếp"
    why_vi: "Muốn nhanh cho xong."
    fix_vi: "Sau mỗi bước hỏi “Are you with me?” hoặc “Let me know when you're done”. Đồng bộ với người dùng mới không lạc."
    detect: {}

memory_trick_vi: >
  Hướng dẫn như dắt người qua đường trong sương mù: mỗi lần một BƯỚC, đợi họ ĐỨNG VỮNG (“done”) rồi
  mới bước tiếp. Đọc cả lộ trình một hơi là để họ lạc ngay.

mini_quiz:
  - kind: mcq
    prompt_vi: "Emma đang ở nhà, một mình, qua điện thoại. Cách hướng dẫn tốt nhất?"
    choices:
      - "Một bước một lúc, chờ xác nhận"
      - "Đọc hết các bước một lần"
      - "Gửi link tự đọc"
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Emma không biết “cache” là gì. Bạn nên nói sao?"
    choices:
      - "Mô tả nút họ thấy: “the button that says Clear data”"
      - "Cứ nói “cache”, họ phải biết"
      - "Bỏ qua bước đó"
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Câu nào kiểm tra Emma còn theo kịp?"
    choices: ["Are you with me?", "Hurry up.", "Why so slow?"]
    answer: 0
    difficulty: 1
  - kind: mcq_listen
    prompt_vi: "Bước đầu tiên là gì?"
    audio_text: "First, click on the three dots at the top right."
    choices: ["Bấm ba dấu chấm góc trên phải", "Tắt máy", "Mở email"]
    answer: 0
    difficulty: 3

unlock_condition:
  mastery_threshold: 75
  mastery_weights: {speak: 0.35, listen: 0.15, read: 0.15, write: 0.15, quiz: 0.20}
  min_speaking_attempts: 4
  challenge_threshold: 85

recommended_next:
  default: I04
