schema_version: 1
id: I14
slug: hop-voi-nha-cung-cap
unit: U-I4
title_vi: "Họp kỹ thuật với nhà cung cấp / khách hàng"
title_en: "Technical vendor/client call"
phase: it_english
topic: it_english
cefr_target: b1
order_index: 14
est_minutes: 16

objective_vi: "Dẫn dắt một cuộc gọi kỹ thuật với bên ngoài: nêu mục tiêu, hỏi/trả lời rõ, chốt bước tiếp theo."
objective_observable: "Đạt ≥75 điểm giao tiếp trên 3/4 drill và chốt được bước tiếp theo (action item)."

prerequisites:
  - {lesson: I13, min_mastery: 80, kind: hard}
  - {lesson: O06, min_mastery: 66, kind: soft}

vocabulary:
  - term: "The goal of this call"
    ipa: "/ðə ɡoʊl ɒv ðɪs kɔːl/"
    meaning_vi: "Mục tiêu cuộc gọi này"
    chunk: "The goal of this call is to understand the permission change."
    tags: [it_english]
  - term: "on our side"
    ipa: "/ɒn ˈaʊər saɪd/"
    meaning_vi: "về phía chúng tôi"
    chunk: "On our side, everything is configured."
    tags: [it_english]
  - term: "on your side"
    ipa: "/ɒn jʊr saɪd/"
    meaning_vi: "về phía các bạn"
    chunk: "Can you check the role history on your side?"
    tags: [it_english]
  - term: "Let me share my screen"
    ipa: "/lɛt miː ʃɛr maɪ skriːn/"
    meaning_vi: "Để tôi chia sẻ màn hình"
    chunk: "Let me share my screen to show you."
    tags: [it_english]
  - term: "action item"
    ipa: "/ˈækʃən ˈaɪtəm/"
    meaning_vi: "việc cần làm (đã chốt)"
    chunk: "So the action item is on your team."
    tags: [it_english]
  - term: "follow up by email"
    ipa: "/ˈfɒloʊ ʌp baɪ ˈiːmeɪl/"
    meaning_vi: "gửi email theo sau"
    chunk: "I'll follow up by email with a summary."
    tags: [it_english]

sentence_patterns:
  - pattern: "The goal of this call is to {goal}."
    meaning_vi: "Mục tiêu cuộc gọi này là {goal}."
    slots:
      goal: ["fix the integration", "review the API errors", "plan the migration"]
  - pattern: "On our side, {status}. Can you check {thing} on your side?"
    meaning_vi: "Phía chúng tôi thì {status}. Bạn kiểm tra {thing} phía các bạn được không?"
    slots:
      status: ["everything is configured", "we see a 403 error"]
      thing: ["the API key", "the firewall rule", "the logs"]

dialogue:
  context_vi: >
    11:00 sáng thứ Sáu. Hệ thống đã ổn, nhưng còn một câu chưa ai trả lời được: vì sao bản deploy
    lại đổi IAM role? Linh giao bạn chủ trì cuộc gọi với kỹ sư của nhà cung cấp cloud. Bạn không
    đi kiện ai — bạn đi lấy một câu trả lời để viết vào postmortem.
  turns:
    - {speaker: You, en: "Thanks for joining. The goal of this call is to understand the permission change on our auth role.", vi: "Cảm ơn đã tham gia. Mục tiêu cuộc gọi này là hiểu vì sao quyền trên auth role của chúng tôi bị đổi."}
    - {speaker: Vendor, en: "Sure. What are you seeing?", vi: "Được. Bên các anh thấy gì?"}
    - {speaker: You, en: "On our side, the role lost secretsmanager GetSecretValue at eleven forty last night. Can you check the role history on your side?", vi: "Phía chúng tôi, role mất quyền secretsmanager GetSecretValue lúc 23:40 tối qua. Anh kiểm tra lịch sử role phía các anh được không?"}
    - {speaker: Vendor, en: "Let me check… I see it. Your deploy template replaced the whole policy instead of adding to it.", vi: "Để tôi xem… Tôi thấy rồi. Template deploy của các anh thay cả policy thay vì thêm vào."}
    - {speaker: You, en: "So it wasn't a change on your side at all.", vi: "Vậy hoàn toàn không phải thay đổi từ phía các anh."}
    - {speaker: Vendor, en: "No, but we don't warn you when a policy shrinks. I'll raise that internally.", vi: "Không, nhưng chúng tôi cũng không cảnh báo khi một policy bị thu hẹp. Tôi sẽ nêu việc đó nội bộ."}
    - {speaker: You, en: "Thank you. So the action item is on your team, and I'll follow up by email with a summary.", vi: "Cảm ơn anh. Vậy việc cần làm thuộc phía các anh, và tôi sẽ gửi email tóm tắt lại."}

reading_passage:
  id: RP-I14
  kind: doc
  context_vi: >
    Ghi chú mở đầu và kết thúc một cuộc họp với nhà cung cấp. Để ý: mở đầu nói rõ mục tiêu,
    kết thúc chốt việc và người chịu trách nhiệm.
  text_en: |
    Opening: The goal of this call is to agree on the migration date and who does what.
    We have 30 minutes.

    On our side, we will prepare the test data and the new IAM roles.
    On your side, we need the API keys by Friday.
    Let me share my screen so we can look at the timeline together.

    Closing: Two action items. One, Vertex sends the keys by Friday — owner is David.
    Two, we confirm the migration date on Monday — owner is Linh.
    I will follow up by email with these notes today.
  text_vi: |
    Mở đầu: Mục tiêu cuộc gọi này là thống nhất ngày chuyển đổi và phân công ai làm gì.
    Chúng ta có 30 phút.

    Về phía chúng tôi, bên tôi sẽ chuẩn bị dữ liệu thử và các vai trò IAM mới.
    Về phía các anh chị, bên tôi cần khoá API trước thứ Sáu.
    Để tôi chia sẻ màn hình cho mọi người cùng xem tiến độ.

    Kết thúc: Hai việc cần làm. Một, Vertex gửi khoá trước thứ Sáu — người phụ trách là David.
    Hai, chốt ngày chuyển đổi vào thứ Hai — người phụ trách là Linh.
    Hôm nay tôi sẽ gửi email tổng hợp các ghi chú này.
  questions:
    - q_en: "Who is responsible for sending the API keys?"
      choices: ["David", "Linh", "The whole team"]
      answer: 0
      skill: scan
      difficulty: 3
    - q_en: "Why does the speaker state the goal at the start?"
      choices:
        - "So everybody knows what must be decided in 30 minutes"
        - "To fill the time"
        - "Because the vendor asked"
      answer: 0
      skill: infer
      difficulty: 4

writing_task:
  id: WT-I14
  kind: guided_email
  prompt_vi: >
    Viết email tổng hợp sau cuộc họp với nhà cung cấp: mục tiêu cuộc họp, phần việc mỗi bên,
    và các việc cần làm kèm người phụ trách. Viết 4-5 câu.
  frame_vi:
    - "Mở: cảm ơn đã họp"
    - "Thân: nhắc lại mục tiêu và kết luận"
    - "Thân: bên nào làm gì"
    - "Kết: các việc cần làm + ai phụ trách"
  required_chunks:
    - ["on our side", "from our side"]
    - ["on your side", "from your side"]
    - ["action item", "action items", "next steps"]
  min_words: 20
  hint_vi: "Việc cần làm mà không ghi tên người phụ trách thì sẽ không ai làm."
  sample_en: "Hi David, thanks for the call. The goal was to agree the migration date and we settled on 15 August. On our side, we will prepare the test data. On your side, we need the API keys by Friday. Action items: David sends the keys, Linh confirms the date on Monday. Thanks, Hoa"

listening_snippet:
  id: LS-I14
  speed: 1.3
  voice: en_US_female
  context_vi: >
    Bạn chốt cuộc gọi. Đây là ba mươi giây quyết định cuộc họp một tiếng vừa rồi có giá trị hay
    không — nghe xem bạn tóm lại những gì.
  transcript_en: "Let me summarise before we close. On our side, the deploy template replaced the policy — that is ours to fix. On your side, you'll raise the missing warning when a policy shrinks. I'll follow up by email with a summary today."
  transcript_vi: "Để tôi tóm lại trước khi kết thúc. Phía chúng tôi, template deploy đã thay cả policy — cái đó chúng tôi tự sửa. Phía các anh, các anh sẽ nêu việc thiếu cảnh báo khi policy bị thu hẹp. Hôm nay tôi sẽ gửi email tóm tắt."
  questions:
    - q_vi: "Việc cần làm phía nhà cung cấp là gì?"
      choices: ["Nêu việc thiếu cảnh báo khi policy bị thu hẹp", "Ký hợp đồng mới", "Đổi máy chủ"]
      answer: 0
      difficulty: 3
    - q_vi: "Bạn sẽ làm gì sau cuộc gọi?"
      choices: ["Gửi email tóm tắt", "Không làm gì", "Gọi lại ngay"]
      answer: 0
      difficulty: 3

speaking_drills:
  - kind: read_aloud
    expected_text: "The goal of this call is to understand the permission change."
    prompt_vi: "Câu mở đầu — bạn là người chủ trì, không phải người ngồi nghe. Đọc to."
    ipa: "/ðə ɡoʊl ɒv ðɪs kɔːl ɪz tuː ˌʌndərˈstænd ðə pərˈmɪʃən tʃeɪndʒ/"
    focus_phonemes: [g, k, ʃ]
  - kind: read_aloud
    expected_text: "Can you check the role history on your side?"
    prompt_vi: "Đọc to. Phân biệt “on our side” / “on your side” — đây là chỗ chia việc, không phải chỗ đổ lỗi."
    ipa: "/kæn juː tʃɛk ðə roʊl ˈhɪstəri ɒn jʊr saɪd/"
    focus_phonemes: [tʃ, k, s]
  - kind: shadow
    expected_text: "I'll follow up by email with a summary."
    prompt_vi: "Câu chốt — và cũng là bài tiếp theo của bạn. Nghe rồi nhắc lại."
    ipa: "/aɪl ˈfɒloʊ ʌp baɪ ˈiːmeɪl wɪð ə ˈsʌməri/"
    focus_phonemes: [f, l, m]
  - kind: respond
    prompt_en: "Thanks for joining — what's on the agenda?"
    prompt_vi: "Nhà cung cấp vừa vào call và chờ bạn dẫn. Nêu mục tiêu, rồi chia việc bằng on our/your side."
    accept_patterns:
      - "The goal of this call is to {goal} on our side {status} can you check {thing} on your side"
      - "We're here to {goal} on our side we see {issue}"
      - "The goal is to understand {thing} I'll follow up by email after"

vietnamese_explanation:
  why_vi: >
    Gọi với bên ngoài (nhà cung cấp, khách hàng) áp lực hơn nội bộ: bạn đại diện công ty, và người
    kia không quen giọng bạn. Người Việt hay bị động — chỉ trả lời, không dẫn dắt — nên cuộc gọi
    lan man, kết thúc mà không ai rõ ai làm gì tiếp. Bí quyết: MỞ bằng mục tiêu, CHIA việc rõ, CHỐT
    bằng action item.
  how_vi: >
    Ba mốc: (1) mở "The goal of this call is to…" để định hướng; (2) chia việc bằng "on our side /
    on your side" cho rõ ai làm gì; (3) chốt "the action item is…" + "I'll follow up by email".
    Email theo sau là bảo hiểm: nếu nghe nhầm điều gì, văn bản sẽ đính chính.
  contrast_vi: "Gọi xong ai cũng mơ hồ ↔ “Goal was X, action item on your side, I'll email a summary.” Rõ ràng, có bằng chứng."

common_mistakes:
  - mistake: "Không nêu mục tiêu ở đầu cuộc gọi"
    why_vi: "Nghĩ ai cũng biết vì sao gọi."
    fix_vi: "Một câu “The goal of this call is to…” giữ cả nhóm đúng hướng, tránh lan man."
    detect: {}
  - mistake: "Không chốt action item, ai làm gì tiếp"
    why_vi: "Ngại phân việc cho bên ngoài, hoặc quên."
    fix_vi: "Cuối gọi luôn tóm: “So the action item is on your side / our side.” Không chốt là cuộc gọi vô ích."
    detect: {}
  - mistake: "Không gửi email theo sau"
    why_vi: "Nghĩ nói xong là xong."
    fix_vi: "“I'll follow up by email with a summary.” Văn bản đính chính hiểu nhầm và ghi lại cam kết."
    detect: {}

memory_trick_vi: >
  Gọi với bên ngoài theo ba mốc M-C-C: MỤC TIÊU (mở đầu) — CHIA việc (on our/your side) — CHỐT +
  email (action item). Không có ba mốc này, cuộc gọi 30 phút thành 0 kết quả.

mini_quiz:
  - kind: mcq
    prompt_vi: "Bạn chủ trì cuộc gọi với nhà cung cấp cloud. Nên bắt đầu bằng gì?"
    choices:
      - "The goal of this call is to…"
      - "Chuyện thời tiết"
      - "Im lặng đợi họ nói"
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Muốn nói lỗi thuộc phía bạn kiểm tra. Câu nào?"
    choices:
      - "Can you check the API key on your side?"
      - "It's your problem."
      - "I don't care."
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Cuộc gọi này sẽ được trích vào postmortem. Cuối gọi nên làm gì để tránh hiểu nhầm?"
    choices:
      - "Chốt action item và follow up by email"
      - "Cúp máy ngay"
      - "Nói “ok bye” là đủ"
    answer: 0
    difficulty: 2
  - kind: mcq_listen
    prompt_vi: "Người nói sẽ làm gì sau cuộc gọi?"
    audio_text: "I'll follow up by email with a summary."
    choices: ["Gửi email tóm tắt", "Xoá cuộc họp", "Gọi cho sếp"]
    answer: 0
    difficulty: 3

unlock_condition:
  mastery_threshold: 80
  mastery_weights: {speak: 0.35, listen: 0.15, read: 0.15, write: 0.15, quiz: 0.20}
  min_speaking_attempts: 4
  challenge_threshold: 85

recommended_next:
  default: I15
