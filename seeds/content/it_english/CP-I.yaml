listening_snippet:
  id: LS-CPI
  speed: 1.0
  voice: en_US_male
  context_vi: >
    16:00 chiều thứ Sáu. Cuộc gọi tổng kết với David Carter. Bảy tiếng mười lăm phút downtime,
    một khách hàng đã mất cả buổi sáng, và người ngồi trả lời hôm nay là bạn — không phải Linh.
    David mở đầu bằng ba mươi giây của ông ấy, nhanh và nuốt âm như mọi khi. Nghe cho kỹ.
  transcript_en: "Alright. Seven hours fifteen. I've read the email you sent at two. Before Monday I want three things from you: what broke, why nobody knew for seven hours, and what stops it happening again. Start with the timeline — from the deploy at eleven forty."
  transcript_vi: "Được rồi. Bảy tiếng mười lăm. Tôi đã đọc email cậu gửi lúc hai giờ. Trước thứ Hai tôi cần ba thứ từ cậu: cái gì hỏng, vì sao suốt bảy tiếng không ai biết, và cái gì ngăn nó lặp lại. Bắt đầu từ dòng thời gian — từ bản deploy lúc 23:40."
  questions:
    - q_vi: "David muốn ba thứ gì trước thứ Hai?"
      choices:
        - "Cái gì hỏng, vì sao không ai biết, cách ngăn tái diễn"
        - "Hoá đơn, hợp đồng, báo giá"
        - "Tên người chịu trách nhiệm"
      answer: 0
      difficulty: 3
    - q_vi: "David muốn bạn bắt đầu từ đâu?"
      choices: ["Dòng thời gian, từ bản deploy 23:40", "Từ ticket của Emma", "Từ cuộc gọi với nhà cung cấp"]
      answer: 0
      difficulty: 3
    - q_vi: "Tổng downtime là bao lâu?"
      choices: ["7 giờ 15 phút", "1 giờ 15 phút", "Không nói"]
      answer: 0
      difficulty: 3

speaking_drills:
  - kind: respond
    prompt_en: "Start with the timeline. What happened?"
    prompt_vi: "David vừa dứt lời. Báo sự cố đủ bốn phần: cái gì hỏng, từ khi nào, ảnh hưởng ai, đã thử gì."
    accept_patterns:
      - "The portal login was down since {time} about {number} users are affected I've tried {action}"
      - "The portal has been down since {time} {number} users affected I'd already tried {action}"
      - "The login was down since two the whole accounting team was affected I've tried restarting"
  - kind: respond
    prompt_en: "Emma's director will ask me about this. Give me the version I can tell her."
    prompt_vi: "David cần bản dành cho người không rành kỹ thuật. Giải thích đơn giản: có so sánh, có trấn an."
    accept_patterns:
      - "Basically the server got overloaded think of it as a traffic jam the good news is no data was lost"
      - "Basically the system couldn't check passwords the good news is no data was lost"
      - "Think of it as a locked door the guard lost his keys but no data was lost"
  - kind: respond
    prompt_en: "And what are you telling your team on Monday?"
    prompt_vi: "Standup thứ Hai, ngay trước buổi viết postmortem. Đủ ba phần: hôm qua, hôm nay, blocker."
    accept_patterns:
      - "Yesterday I {done} today I'll {plan} I'm blocked on {blocker}"
      - "Yesterday I {done} today I'll {plan} no blockers"
      - "Yesterday I finished the customer email today I'll write the postmortem waiting on {who}"
  - kind: shadow
    expected_text: "We'll deploy the permanent fix tonight, about five minutes of downtime, and roll back if anything breaks."
    prompt_vi: "Câu cuối bạn nói với David — và là câu khép lại chương này. Nghe rồi nhắc lại ở tốc độ thật."
    ipa: "/wɪl dɪˈplɔɪ ðə ˈpɜːrmənənt fɪks təˈnaɪt əˈbaʊt faɪv ˈmɪnɪts ɒv ˈdaʊntaɪm ænd roʊl bæk ɪf ˈɛniθɪŋ breɪks/"
    focus_phonemes: [dʒ, d, r]

vietnamese_explanation:
  why_vi: >
    Mười lăm bài CNTT dạy từng kỹ năng: báo sự cố, nhận ticket, hướng dẫn, chẩn đoán, giải thích cho
    người không rành, incident update, bàn giao, standup, code review, và từ vựng mạng/cloud/bảo mật/
    dữ liệu, rồi họp với bên ngoài và viết email. Một ngày làm thật, chúng đan vào nhau: sự cố xảy ra,
    bạn chẩn đoán, giải thích cho sếp, báo tiến độ ở standup, chốt với nhà cung cấp. Bài này kiểm tra
    bạn chuyển giữa các tình huống có mượt không.
  how_vi: >
    Làm một lượt như một ca trực. Ba phản xạ cốt lõi: BÁO SỰ CỐ đủ bốn phần (cái gì/từ khi nào/ảnh
    hưởng ai/đã thử gì), GIẢI THÍCH cho người không rành (đơn giản + so sánh + trấn an), và CHỐT VIỆC
    (action item, next update, roll back). Đừng nói hoa mỹ — nói để người kia hành động đúng.
  contrast_vi: "Xổ thuật ngữ, im lặng khi sự cố, không chốt việc ↔ báo đủ bốn phần, giải thích dễ hiểu, chốt bước tiếp. Chỉ nhóm sau khiến bạn đáng tin ở môi trường quốc tế."

common_mistakes:
  - mistake: "Báo sự cố thiếu phần “đã thử gì” hoặc “ảnh hưởng ai”"
    why_vi: "Dưới áp lực đo điểm, kể theo trình tự mình phát hiện thay vì trình tự người nghe cần."
    fix_vi: "Luôn đủ bốn phần. Người nhận dùng “ảnh hưởng ai” để xếp ưu tiên và “đã thử gì” để không lặp việc."
    detect: {}
  - mistake: "Giải thích cho người không rành bằng thuật ngữ"
    why_vi: "Càng giỏi kỹ thuật càng quên người nghe không biết server/cache/DNS."
    fix_vi: "Dùng “Basically…” + “Think of it as…” + “The good news is…”. Bỏ thuật ngữ, hoặc giải nghĩa ngay."
    detect: {}
  - mistake: "Trượt rồi làm lại ngay"
    why_vi: "Muốn qua nhanh cho xong phase."
    fix_vi: "Ôn đúng bài yếu một buổi rồi quay lại hôm sau. Hệ thống sẽ chỉ đúng bài cần ôn."
    detect: {}

memory_trick_vi: >
  Qua được bài này nghĩa là bạn làm được một ca CNTT bằng tiếng Anh: báo sự cố rõ, hỗ trợ người dùng,
  giải thích cho sếp, báo standup, chốt với đối tác. Đây là đích chính của khoá — tiếng Anh để LÀM VIỆC.

