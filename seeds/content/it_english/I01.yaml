schema_version: 1
id: I01
slug: bao-su-co-he-thong
unit: U-I1
title_vi: "Báo sự cố hệ thống — nói cho người ta hành động được"
title_en: "Reporting a system issue"
phase: it_english
topic: it_english
cefr_target: a2
order_index: 1
est_minutes: 14

objective_vi: "Mô tả một sự cố theo bốn phần: cái gì hỏng, từ khi nào, ảnh hưởng ai, đã thử gì."
objective_observable: "Đạt ≥75 điểm giao tiếp trên 3/4 drill và nêu đủ bốn phần."

prerequisites:
  - {lesson: O01, min_mastery: 76, kind: hard}

vocabulary:
  - term: "is down"
    ipa: "/ɪz daʊn/"
    meaning_vi: "đang không hoạt động"
    chunk: "The portal is down."
    tags: [it_english]
  - term: "since"
    ipa: "/sɪns/"
    meaning_vi: "từ lúc (mốc thời gian)"
    chunk: "It's been down since two this morning."
    tags: [it_english, core]
  - term: "affected"
    ipa: "/əˈfɛktɪd/"
    meaning_vi: "bị ảnh hưởng"
    chunk: "About twenty users are affected."
    tags: [it_english]
  - term: "I've tried"
    ipa: "/aɪv traɪd/"
    meaning_vi: "tôi đã thử"
    chunk: "I've tried logging in myself."
    tags: [it_english]
  - term: "the logs show"
    ipa: "/ðə lɒɡz ʃoʊ/"
    meaning_vi: "log cho thấy"
    chunk: "The logs show a timeout error."
    tags: [it_english]
  - term: "escalate"
    ipa: "/ˈɛskəleɪt/"
    meaning_vi: "chuyển lên cấp cao hơn"
    chunk: "I'll escalate this to the network team."
    tags: [it_english]

sentence_patterns:
  - pattern: "The {system} is down since {time}."
    meaning_vi: "{system} hỏng từ {time}."
    slots:
      system: [server, VPN, database]
      time: ["nine this morning", "last night", "about an hour ago"]
  - pattern: "I've tried {action}, but it didn't help."
    meaning_vi: "Tôi đã thử {action} nhưng không được."
    slots:
      action: ["restarting it", "clearing the cache", "checking the logs"]

dialogue:
  context_vi: >
    03:00 sáng thứ Sáu. Ticket #4417 của Emma Brooks vào lúc 02:00, rồi cả phòng kế toán của
    Northwind Logistics báo lỗi giống nhau. Bạn gọi Linh dậy. Đây là câu đầu tiên của bảy tiếng
    mười lăm phút tiếp theo — nói sao để Linh hành động được ngay.
  turns:
    - {speaker: You, en: "Linh, sorry to wake you. The Northwind Portal is down.", vi: "Linh ơi, xin lỗi đã gọi giữa đêm. Northwind Portal đang sập."}
    - {speaker: Linh, en: "Down since when?", vi: "Sập từ lúc nào?"}
    - {speaker: You, en: "Since two this morning. Emma Brooks opened ticket four four one seven.", vi: "Từ hai giờ sáng. Emma Brooks mở ticket bốn bốn một bảy."}
    - {speaker: Linh, en: "How many people are affected?", vi: "Bao nhiêu người bị ảnh hưởng?"}
    - {speaker: You, en: "About twenty. The whole accounting team can't log in.", vi: "Khoảng hai mươi. Cả phòng kế toán không đăng nhập được."}
    - {speaker: Linh, en: "What have you tried?", vi: "Em đã thử gì rồi?"}
    - {speaker: You, en: "I've tried logging in myself, and it fails too. The logs show a timeout error.", vi: "Em tự đăng nhập thử, cũng lỗi. Log cho thấy lỗi timeout."}
    - {speaker: Linh, en: "OK. I'll escalate this. We're calling it INC-2291.", vi: "Được. Chị sẽ đẩy lên. Mình đặt mã sự cố là INC-2291."}

reading_passage:
  id: RP-I01
  kind: ticket
  context_vi: >
    Một bản báo sự cố mẫu. Đọc để thấy thứ tự thông tin: cái gì hỏng, từ khi nào, ảnh hưởng
    bao nhiêu người, đã thử gì, và bước tiếp theo.
  text_en: |
    The payment service is down since 9:15 this morning.
    About 200 users are affected.
    I have tried restarting it twice, but it fails again after a minute.
    The logs show a database timeout.
    I will escalate this to the database team now.
  text_vi: |
    Dịch vụ thanh toán ngừng hoạt động từ 9:15 sáng nay.
    Khoảng 200 người dùng bị ảnh hưởng.
    Tôi đã thử khởi động lại hai lần, nhưng được một phút là hỏng tiếp.
    Log cho thấy cơ sở dữ liệu bị quá thời gian chờ.
    Tôi sẽ chuyển việc này lên nhóm cơ sở dữ liệu ngay.
  questions:
    - q_en: "How many users are affected?"
      choices: ["About 200", "About 20", "The report does not say"]
      answer: 0
      skill: scan
      difficulty: 2
    - q_en: "What will the writer do next?"
      choices: ["Escalate to the database team", "Restart it a third time", "Wait until tomorrow"]
      answer: 0
      skill: infer
      difficulty: 3

writing_task:
  id: WT-I01
  kind: guided_email
  prompt_vi: >
    Báo một sự cố cho cả nhóm: dịch vụ đăng nhập hỏng từ 8 giờ, bạn đã thử khởi động lại
    nhưng không được. Viết 3-4 câu.
  frame_vi:
    - "Mở: chào cả nhóm"
    - "Thân: cái gì hỏng + từ khi nào + đã thử gì"
    - "Kết: bước tiếp theo và cảm ơn"
  required_chunks:
    - ["is down", "is not working", "isn't working", "stopped working"]
    - ["i have tried", "i've tried", "i tried"]
    - ["escalate", "pass it to", "hand it to"]
  min_words: 15
  hint_vi: "Người đọc cần hành động được ngay: nói rõ cái gì hỏng, từ lúc nào, và bạn đang làm gì."
  sample_en: "Hi team, the login service is down since 8:00 this morning. I have tried restarting it twice but it fails again. I will escalate this to the platform team now. Thanks, Hoa"

listening_snippet:
  id: LS-I01
  speed: 1.0
  voice: en_US_male
  context_vi: >
    Ngay sau đó Linh đọc lại bản tóm tắt sự cố để ghi vào hệ thống. Nghe xem chị ấy tóm đúng bốn
    phần bạn vừa báo hay không.
  transcript_en: "Let me read this back. The Northwind Portal has been down since two this morning. About twenty users are affected — the whole accounting team. You've tried logging in yourself, and the logs show a timeout error."
  transcript_vi: "Để chị đọc lại. Northwind Portal sập từ hai giờ sáng nay. Khoảng hai mươi người dùng bị ảnh hưởng — cả phòng kế toán. Em đã tự thử đăng nhập, và log cho thấy lỗi timeout."
  questions:
    - q_vi: "Sự cố bắt đầu từ khi nào?"
      choices: ["Hai giờ sáng nay", "Chín giờ sáng nay", "Một tiếng trước"]
      answer: 0
      difficulty: 3
    - q_vi: "Bao nhiêu người bị ảnh hưởng?"
      choices: ["Khoảng 20", "Khoảng 200", "Không rõ"]
      answer: 0
      difficulty: 3
    - q_vi: "Log cho thấy lỗi gì?"
      choices: ["Timeout", "Sai mật khẩu", "Hết dung lượng"]
      answer: 0
      difficulty: 4

speaking_drills:
  - kind: read_aloud
    expected_text: "The portal is down since two this morning."
    prompt_vi: "Câu đầu tiên bạn nói với Linh lúc 3 giờ sáng. Đọc to — cái gì hỏng, từ khi nào."
    ipa: "/ðə ˈpɔːrtl ɪz daʊn sɪns tuː ðɪs ˈmɔːrnɪŋ/"
    focus_phonemes: [ð, s, n]
  - kind: read_aloud
    expected_text: "About twenty users are affected."
    prompt_vi: "Linh hỏi bao nhiêu người. Đọc to — a-FFEC-ted nhấn âm giữa, có thêm âm tiết ở đuôi -ed."
    ipa: "/əˈbaʊt ˈtwɛnti ˈjuːzərz ɑr əˈfɛktɪd/"
    focus_phonemes: [z, t, d]
  - kind: shadow
    expected_text: "I've tried logging in myself, but it didn't help."
    prompt_vi: "Linh hỏi bạn đã thử gì. Nghe rồi nhắc lại — tried có âm cuối /d/."
    ipa: "/aɪv traɪd ˈlɒɡɪŋ ɪn maɪˈsɛlf bʌt ɪt ˈdɪdənt hɛlp/"
    focus_phonemes: [d, t]
  - kind: shadow
    expected_text: "The logs show a timeout error."
    prompt_vi: "Bằng chứng duy nhất bạn có lúc này. Nghe rồi nhắc lại — logs có âm cuối /z/."
    ipa: "/ðə lɒɡz ʃoʊ ə ˈtaɪmaʊt ˈɛrər/"
    focus_phonemes: [z, ʃ, r]
  - kind: respond
    prompt_en: "What's the problem?"
    prompt_vi: "Linh vừa nhấc máy và hỏi đúng một câu. Báo đủ bốn phần: cái gì, từ khi nào, ảnh hưởng ai, đã thử gì."
    accept_patterns:
      - "The portal is down since {time} about {number} users are affected I've tried {action}"
      - "The {system} is down since {time} I've tried {action}"
      - "The Northwind Portal has been down since {time} and {number} users are affected"

vietnamese_explanation:
  why_vi: >
    Đây là bài mà dân IT hay chủ quan nhất: bạn ĐỌC được hết những từ này rồi. Nhưng đọc được và
    nói được là hai chuyện khác nhau — và cái bẫy thật là bạn biết từ nhưng không biết cấu trúc
    báo cáo, nên kể lể theo trình tự bạn phát hiện vấn đề, chứ không theo trình tự người nghe cần.
  how_vi: >
    Bốn phần, đúng thứ tự: CÁI GÌ hỏng → TỪ KHI NÀO → ẢNH HƯỞNG AI → ĐÃ THỬ GÌ. Người nhận tin
    dùng phần 3 để xếp ưu tiên và phần 4 để không lặp lại việc bạn đã làm.
  contrast_vi: "“The VPN has a problem” (vô dụng) ↔ “VPN down since 9am, 20 users affected, restart didn't help” (họ hành động được ngay)."

common_mistakes:
  - mistake: "Phát âm sai từ chuyên môn: “deploy” thành “đề-ploi”, “router” thành “rao-tơ”"
    why_vi: "Dân IT đọc những từ này hàng ngày trên màn hình nhưng chưa từng nghe ai đọc lên. Đọc nhiều mà nghe ít tạo ra cách phát âm tự chế."
    fix_vi: "Nghe giọng mẫu cho từng từ chuyên môn, đừng đoán từ chính tả. deploy nhấn sau, router nhấn trước."
    detect: {}
  - mistake: "“The VPN is problem.” hoặc “The VPN has problem.”"
    why_vi: "Dịch thẳng “VPN bị vấn đề”. Thiếu mạo từ và dùng sai cấu trúc."
    fix_vi: "Nói cụ thể luôn: “The VPN is down” hoặc “The VPN isn't working”. Cụ thể tốt hơn chung chung và cũng dễ nói hơn."
    detect: {}
  - mistake: "Bỏ qua phần “đã thử gì”"
    why_vi: "Sợ bị đánh giá là chưa thử đủ."
    fix_vi: "Ngược lại: nói ra những gì đã thử chứng minh bạn làm việc có phương pháp, và tiết kiệm cho người kia 10 phút."
    detect: {}

memory_trick_vi: >
  Nhớ theo bốn chữ W: WHAT hỏng — WHEN bắt đầu — WHO bị ảnh hưởng — What did you TRY.
  Người nhận tin cần đúng bốn thứ đó để quyết định gọi ai và gấp đến mức nào.

mini_quiz:
  - kind: mcq
    prompt_vi: "Bạn đang gọi Linh lúc 3 giờ sáng. Báo sự cố cần bốn phần nào?"
    choices:
      - "Cái gì hỏng, từ khi nào, ảnh hưởng ai, đã thử gì"
      - "Cái gì hỏng, lỗi của ai, sửa bao lâu, tốn bao nhiêu"
      - "Cái gì hỏng, chi tiết kỹ thuật, log đầy đủ, code liên quan"
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "Từ “deploy” nhấn âm nào?"
    choices: ["DE-ploy", "de-PLOY", "Nhấn đều"]
    answer: 1
    difficulty: 3
  - kind: mcq
    prompt_vi: "Chọn câu tự nhiên nhất"
    choices: ["The VPN has problem.", "The VPN is down.", "The VPN is problem."]
    answer: 1
    difficulty: 2
  - kind: mcq_listen
    prompt_vi: "Sự cố bắt đầu từ khi nào?"
    audio_text: "The VPN has been down since nine this morning."
    choices: ["Chín giờ sáng nay", "Chín giờ tối qua", "Không nói"]
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "Vì sao nên nói ra những gì mình đã thử?"
    choices:
      - "Để người kia không lặp lại và biết bạn làm có phương pháp"
      - "Để chứng minh mình đã cố gắng"
      - "Để kéo dài cuộc gọi"
    answer: 0
    difficulty: 3

unlock_condition:
  mastery_threshold: 76
  mastery_weights: {speak: 0.35, listen: 0.15, read: 0.15, write: 0.15, quiz: 0.20}
  min_speaking_attempts: 4
  challenge_threshold: 85

recommended_next:
  default: I02
