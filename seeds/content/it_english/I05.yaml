    answer: 0
    difficulty: 2
  - kind: mcq_listen
    prompt_vi: "Người nói so sánh sự cố với gì?"
    audio_text: "Think of it as a traffic jam."
    choices: ["Kẹt xe", "Trận bóng", "Bữa tiệc"]
    answer: 0
    difficulty: 2

