schema_version: 1
id: I05
slug: giai-thich-cho-nguoi-khong-ranh
unit: U-I1
title_vi: "Giải thích vấn đề kỹ thuật cho người không rành"
title_en: "Explaining tech to non-technical people"
phase: it_english
topic: it_english
cefr_target: b1
order_index: 5
est_minutes: 15

objective_vi: "Giải thích nguyên nhân và cách khắc phục bằng ngôn ngữ đời thường, không thuật ngữ, có so sánh dễ hiểu."
objective_observable: "Đạt ≥75 điểm giao tiếp trên 3/4 drill, tránh thuật ngữ hoặc có giải nghĩa kèm."

prerequisites:
  - {lesson: I04, min_mastery: 75, kind: hard}
  - {lesson: O04, min_mastery: 60, kind: soft}

vocabulary:
  - term: "Basically"
    ipa: "/ˈbeɪsɪkli/"
    meaning_vi: "Nói đơn giản thì"
    chunk: "Basically, the system was overloaded."
    tags: [it_english]
  - term: "think of it as"
    ipa: "/θɪŋk ɒv ɪt æz/"
    meaning_vi: "cứ hình dung nó như"
    chunk: "Think of it as a traffic jam for data."
    tags: [it_english]
  - term: "in other words"
    ipa: "/ɪn ˈʌðər wɜːrdz/"
    meaning_vi: "nói cách khác"
    chunk: "In other words, it just needs a restart."
    tags: [it_english]
  - term: "the good news is"
    ipa: "/ðə ɡʊd njuːz ɪz/"
    meaning_vi: "tin tốt là"
    chunk: "The good news is, no data was lost."
    tags: [it_english]
  - term: "to prevent this"
    ipa: "/tuː prɪˈvɛnt ðɪs/"
    meaning_vi: "để tránh lặp lại"
    chunk: "To prevent this, save your work often."
    tags: [it_english]
  - term: "does that make sense"
    ipa: "/dʌz ðæt meɪk sɛns/"
    meaning_vi: "vậy có dễ hiểu không"
    chunk: "Does that make sense so far?"
    tags: [it_english]

sentence_patterns:
  - pattern: "Basically, {plain_cause}. Think of it as {analogy}."
    meaning_vi: "Nói đơn giản, {plain_cause}. Cứ hình dung như {analogy}."
    slots:
      plain_cause: ["the system was overloaded", "the file got corrupted"]
      analogy: ["a traffic jam", "a torn page in a book"]
  - pattern: "The good news is, {reassurance}. To prevent this, {advice}."
    meaning_vi: "Tin tốt là, {reassurance}. Để tránh lặp lại, {advice}."
    slots:
      reassurance: ["no data was lost", "it's an easy fix"]
      advice: ["save your work often", "restart once a week"]

dialogue:
  context_vi: >
    04:10 sáng thứ Sáu. Emma đã chờ hơn một tiếng và bắt đầu hỏi thẳng: chuyện gì đang xảy ra với
    dữ liệu của chị ấy. Bạn chưa biết nguyên nhân gốc, nhưng vẫn phải nói được điều gì đó thật —
    bằng thứ ngôn ngữ Emma hiểu, không một từ chuyên môn nào.
  turns:
    - {speaker: Emma, en: "Can you tell me what's actually happening? Is my work gone?", vi: "Anh nói thật cho tôi biết chuyện gì đang xảy ra được không? Công việc của tôi mất rồi à?"}
    - {speaker: You, en: "No, nothing is gone. Basically, the system can't check your password right now.", vi: "Không, không mất gì cả. Nói đơn giản, hệ thống hiện không kiểm tra được mật khẩu của chị."}
    - {speaker: Emma, en: "But my password is right. I've typed it a hundred times.", vi: "Nhưng mật khẩu tôi đúng mà. Tôi gõ cả trăm lần rồi."}
    - {speaker: You, en: "It is right. Think of it as a locked door where the guard lost his own keys — your key is fine, he just can't open it. The good news is, no data was lost.", vi: "Mật khẩu chị đúng. Cứ hình dung như một cánh cửa mà người gác cổng làm mất chìa của chính anh ta — chìa của chị vẫn tốt, chỉ là anh ta không mở được. Tin tốt là không mất dữ liệu nào."}
    - {speaker: Emma, en: "Oh. So it's not me. But why is even the error so slow to appear?", vi: "Ồ. Vậy không phải lỗi tôi. Nhưng sao đến cái thông báo lỗi cũng hiện chậm vậy?"}
    - {speaker: You, en: "Because everyone in your office is retrying at the same time. Basically, the server got overloaded. Think of it as a traffic jam.", vi: "Vì cả phòng chị cùng thử lại một lúc. Nói đơn giản, máy chủ bị quá tải. Cứ hình dung như kẹt xe."}
    - {speaker: You, en: "It's not you at all. In other words, we have to fix it on our side. Does that make sense?", vi: "Hoàn toàn không phải lỗi chị. Nói cách khác, bên tôi phải sửa. Vậy có dễ hiểu không ạ?"}

reading_passage:
  id: RP-I05
  kind: email
  context_vi: >
    Thư giải thích sự cố cho một quản lý không rành kỹ thuật. Để ý: không có từ chuyên môn nào
    mà vẫn nói đủ chuyện.
  text_en: |
    Hi Ms Brooks,

    Basically, our system keeps its passwords in a locked box.
    Last night we changed the key, and the service could not open the box any more.
    In other words, the software was fine — it just lost its own key.
    The good news is that no data was lost and nobody could see your invoices.
    To prevent this, we will test the key before every release.
    Does that make sense?

    Hoa
  text_vi: |
    Chào chị Brooks,

    Nói đơn giản thì hệ thống của bên em cất mật khẩu trong một cái két khoá.
    Tối qua bọn em đổi chìa, và dịch vụ không mở được két nữa.
    Nói cách khác, phần mềm không hỏng — nó chỉ mất chìa của chính nó.
    Tin tốt là không mất dữ liệu nào và không ai xem được hoá đơn của chị.
    Để không lặp lại, bọn em sẽ kiểm tra chìa trước mỗi lần phát hành.
    Chị thấy có dễ hiểu không ạ?

    Hoa
  questions:
    - q_en: "What is the \"locked box\" in this email?"
      choices: ["Where the system keeps passwords", "The customer's computer", "The invoice folder"]
      answer: 0
      skill: infer
      difficulty: 4
    - q_en: "Was any data lost?"
      choices: ["No", "Yes, some invoices", "The email does not say"]
      answer: 0
      skill: scan
      difficulty: 3

writing_task:
  id: WT-I05
  kind: guided_email
  prompt_vi: >
    Giải thích cho một quản lý không rành kỹ thuật: server đầy ổ đĩa nên hệ thống ngừng nhận
    đơn hàng. Dùng một hình ảnh so sánh, không dùng từ chuyên môn. Viết 4-5 câu.
  frame_vi:
    - "Mở: chào"
    - "Thân: nói đơn giản chuyện gì xảy ra + một hình ảnh so sánh"
    - "Thân: tin tốt là gì"
    - "Kết: sẽ làm gì để không lặp lại + hỏi đã rõ chưa"
  required_chunks:
    - ["basically", "think of it as", "in other words", "put simply"]
    - ["the good news is", "good news"]
    - ["to prevent this", "so this does not happen", "to avoid this", "so it doesn't happen again"]
  min_words: 20
  hint_vi: "Một hình ảnh so sánh đáng giá hơn ba câu giải thích kỹ thuật. Và luôn nói tin tốt."
  sample_en: "Hi Ms Brooks, basically our server ran out of space, like a filing cabinet with no room left for new folders. That is why new orders were not saved. The good news is that no existing order was lost. To prevent this, we will add an alert at 80 percent. Does that make sense? Thanks, Hoa"

listening_snippet:
  id: LS-I05
  speed: 1.0
  voice: en_US_male
  context_vi: >
    Emma hỏi thêm một câu rất người dùng: bao giờ thì xong. Nghe cách bạn trả lời mà không hứa
    điều mình chưa biết.
  transcript_en: "I can't give you an exact time yet, and I don't want to promise something I'm not sure about. But the good news is, no data was lost, and nothing is wrong with your account. To prevent this from happening again, we'll change how the system stores its keys."
  transcript_vi: "Tôi chưa cho chị được giờ chính xác, và tôi không muốn hứa điều mình chưa chắc. Nhưng tin tốt là không mất dữ liệu nào, và tài khoản chị không có vấn đề gì. Để tránh lặp lại, bên tôi sẽ đổi cách hệ thống lưu chìa khoá."
  questions:
    - q_vi: "“Tin tốt” bạn nói với Emma là gì?"
      choices: ["Không mất dữ liệu, tài khoản chị ấy vẫn ổn", "Sẽ xong trong 5 phút", "Được nghỉ làm"]
      answer: 0
      difficulty: 2
    - q_vi: "Vì sao bạn không cho Emma một mốc giờ cụ thể?"
      choices: ["Chưa chắc nên không hứa", "Không muốn nói chuyện nữa", "Quên mất"]
      answer: 0
      difficulty: 3

speaking_drills:
  - kind: read_aloud
    expected_text: "Basically, the server got overloaded. Think of it as a traffic jam."
    prompt_vi: "Emma hỏi sao cả cái thông báo lỗi cũng chậm. Đọc to — “Basically” báo hiệu bản rút gọn dễ hiểu."
    ipa: "/ˈbeɪsɪkli ðə ˈsɜːrvər ɡɒt ˈoʊvərloʊdɪd θɪŋk ɒv ɪt æz ə ˈtræfɪk dʒæm/"
    focus_phonemes: [b, θ, dʒ]
  - kind: read_aloud
    expected_text: "The good news is, no data was lost."
    prompt_vi: "Emma sợ mất hết sổ sách. Đọc to — câu này là thứ chị ấy cần nghe trước mọi thứ khác."
    ipa: "/ðə ɡʊd njuːz ɪz noʊ ˈdeɪtə wɒz lɒst/"
    focus_phonemes: [g, n, z]
  - kind: shadow
    expected_text: "Does that make sense so far?"
    prompt_vi: "Bạn vừa giải thích xong. Nghe rồi nhắc lại — kiểm tra Emma có thật sự hiểu không."
    ipa: "/dʌz ðæt meɪk sɛns soʊ fɑr/"
    focus_phonemes: [ð, s, f]
  - kind: respond
    prompt_en: "Can you tell me what's actually happening? Is my work gone?"
    prompt_vi: "Emma đang hoảng. Giải thích đơn giản, có so sánh, và trấn an — không một từ chuyên môn nào."
    accept_patterns:
      - "Basically too many people are using it at once Think of it as a traffic jam The good news is it's temporary"
      - "Basically the server is overloaded think of it as {analogy}"
      - "It's basically overloaded the good news is we're fixing it"

vietnamese_explanation:
  why_vi: >
    Kỹ năng khó nhất của dân IT: nói cho người KHÔNG rành hiểu. Càng giỏi kỹ thuật càng dễ quên rằng
    người nghe không biết “server”, “cache”, “timeout”. Người Việt làm IT hay xổ một tràng thuật ngữ
    tiếng Anh, khiến sếp/khách gật cho qua nhưng không hiểu và mất niềm tin.
  how_vi: >
    Ba chiêu: (1) mở bằng "Basically…" rồi nói nguyên nhân bằng từ đời thường; (2) dùng so sánh
    "Think of it as…" (kẹt xe, trang sách rách); (3) trấn an "The good news is…" và chốt bằng
    "Does that make sense?". Bỏ hết thuật ngữ, hoặc nếu phải dùng thì giải nghĩa ngay.
  contrast_vi: "“The DNS resolver timed out” (khách đơ) ↔ “Basically the address book couldn't be reached — like a wrong phone number” (khách hiểu, tin tưởng)."

common_mistakes:
  - mistake: "Xổ thuật ngữ: server, cache, DNS, timeout"
    why_vi: "Với mình là từ hàng ngày nên quên người nghe không biết."
    fix_vi: "Thay bằng từ đời thường hoặc so sánh. “Think of it as…” là cây cầu tốt nhất."
    detect: {}
  - mistake: "Giải thích quá dài, đi vào chi tiết kỹ thuật"
    why_vi: "Nghĩ nói kỹ mới là chuyên nghiệp."
    fix_vi: "Người không rành cần BỨC TRANH LỚN, không cần chi tiết. Một câu nguyên nhân + một so sánh là đủ."
    detect: {}
  - mistake: "Quên trấn an, chỉ nói cái hỏng"
    why_vi: "Tập trung vào vấn đề kỹ thuật."
    fix_vi: "Luôn có “The good news is…” và hướng khắc phục. Người nghe cần biết sẽ ổn, không chỉ biết đã hỏng."
    detect: {}

memory_trick_vi: >
  Giải thích cho người không rành theo công thức B-A-G: BASICALLY (nguyên nhân đời thường) — ANALOGY
  (“think of it as…” một hình ảnh quen) — GOOD NEWS (trấn an + cách tránh). Bỏ túi ba chữ này là xong.

mini_quiz:
  - kind: mcq
    prompt_vi: "Emma hỏi vì sao cổng chậm. Mở đầu tốt nhất?"
    choices:
      - "Basically, too many people are using it at once."
      - "The load balancer's connection pool is exhausted."
      - "It's a backend concurrency issue."
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "“Think of it as a traffic jam” dùng để làm gì?"
    choices:
      - "Đưa ra so sánh dễ hiểu"
      - "Khoe kiến thức"
      - "Đổ lỗi giao thông"
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Emma sợ mất dữ liệu. Vì sao nên thêm “The good news is…”?"
    choices:
      - "Để trấn an người nghe, không chỉ báo cái hỏng"
      - "Để câu chuyện dài hơn"
      - "Không cần thiết"
    answer: 0
    difficulty: 2
  - kind: mcq_listen
    prompt_vi: "Người nói so sánh sự cố với gì?"
    audio_text: "Think of it as a traffic jam."
    choices: ["Kẹt xe", "Trận bóng", "Bữa tiệc"]
    answer: 0
    difficulty: 2

unlock_condition:
  mastery_threshold: 75
  mastery_weights: {speak: 0.35, listen: 0.15, read: 0.15, write: 0.15, quiz: 0.20}
  min_speaking_attempts: 4
  challenge_threshold: 85

recommended_next:
  default: I06
