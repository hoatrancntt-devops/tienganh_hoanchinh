schema_version: 1
id: I10
slug: mang-va-ket-noi
unit: U-I3
title_vi: "Nói về mạng và kết nối"
title_en: "Network & connectivity"
phase: it_english
topic: it_english
cefr_target: b1
order_index: 10
est_minutes: 15

objective_vi: "Dùng đúng từ vựng mạng để mô tả và chẩn đoán sự cố kết nối: mạng, IP, DNS, tường lửa, VPN."
objective_observable: "Đạt ≥75 điểm giao tiếp trên 3/4 drill và dùng đúng ≥3 thuật ngữ mạng."

prerequisites:
  - {lesson: I09, min_mastery: 80, kind: hard}

vocabulary:
  - term: "connection"
    ipa: "/kəˈnɛkʃən/"
    meaning_vi: "kết nối"
    chunk: "The connection keeps dropping."
    tags: [it_english]
  - term: "drops"
    ipa: "/drɒps/"
    meaning_vi: "rớt (mạng)"
    chunk: "The Wi-Fi drops every few minutes."
    tags: [it_english]
  - term: "can't reach"
    ipa: "/kænt riːtʃ/"
    meaning_vi: "không truy cập được tới"
    chunk: "I can't reach the server."
    tags: [it_english]
  - term: "firewall"
    ipa: "/ˈfaɪərwɔːl/"
    meaning_vi: "tường lửa"
    chunk: "The firewall is blocking port 443."
    tags: [it_english]
  - term: "DNS"
    ipa: "/diː ɛn ɛs/"
    meaning_vi: "hệ thống phân giải tên miền"
    chunk: "It looks like a DNS issue."
    tags: [it_english]
  - term: "ping"
    ipa: "/pɪŋ/"
    meaning_vi: "gửi tín hiệu kiểm tra kết nối"
    chunk: "Can you ping the gateway?"
    tags: [it_english]

sentence_patterns:
  - pattern: "I can't reach {target}. The connection {problem}."
    meaning_vi: "Tôi không truy cập được {target}. Kết nối {problem}."
    slots:
      target: ["the server", "the internal wiki", "the database"]
      problem: ["keeps dropping", "times out", "is very slow"]
  - pattern: "It looks like a {layer} issue."
    meaning_vi: "Có vẻ là vấn đề {layer}."
    slots:
      layer: [DNS, firewall, VPN, routing]

dialogue:
  context_vi: >
    07:50 sáng thứ Sáu. Trước khi đào vào cloud, phải loại trừ thứ rẻ nhất: mạng. Nếu là mạng thì
    xong trong mười phút; nếu không phải, bạn vừa cắt được một giả thuyết và biết chắc phải đi
    hướng khác. Minh mở laptop ngồi cạnh bạn.
  turns:
    - {speaker: You, en: "Minh, before we go further — could this be the network? The portal just times out.", vi: "Minh này, trước khi đi tiếp — có thể là mạng không? Cổng cứ timeout."}
    - {speaker: Minh, en: "Let's check. Can you ping the auth server?", vi: "Kiểm tra thử. Ông ping máy chủ xác thực được không?"}
    - {speaker: You, en: "Ping works. Every packet comes back.", vi: "Ping được. Gói nào cũng về."}
    - {speaker: Minh, en: "And DNS? Does the name resolve to the right address?", vi: "Còn DNS? Tên miền phân giải ra đúng địa chỉ chứ?"}
    - {speaker: You, en: "It resolves fine. And the firewall isn't blocking port four four three — I can open the login page, it just never signs anyone in.", vi: "Phân giải bình thường. Và tường lửa không chặn cổng bốn bốn ba — mình mở được trang đăng nhập, chỉ là không ai vào được."}
    - {speaker: Minh, en: "Then it's not the network. The page loads, so the problem is behind it.", vi: "Vậy không phải mạng. Trang tải được, nghĩa là vấn đề nằm phía sau nó."}

reading_passage:
  id: RP-I10
  kind: ticket
  context_vi: >
    Một lượt chẩn đoán sự cố mạng. Đọc để nhớ thứ tự kiểm tra: từ máy người dùng ra ngoài.
  text_en: |
    User: My connection drops every few minutes.
    You: Can you reach the internal wiki right now?
    User: No. The page just waits and then fails.
    You: Let me ping the server from here. It answers, so the server is fine.
    The problem is between your laptop and us.
    Please check whether your firewall was updated last night.
    If that is fine, it may be a DNS problem on your network.
  text_vi: |
    Người dùng: Kết nối của tôi cứ vài phút lại rớt.
    Bạn: Bây giờ anh vào wiki nội bộ được không ạ?
    Người dùng: Không. Trang cứ quay rồi báo lỗi.
    Bạn: Để em ping máy chủ từ đây. Nó có trả lời, nghĩa là máy chủ vẫn ổn.
    Vấn đề nằm giữa laptop của anh và bên em.
    Anh kiểm tra giúp xem tường lửa có được cập nhật tối qua không.
    Nếu tường lửa ổn thì có thể là lỗi DNS trên mạng của anh.
  questions:
    - q_en: "How does the writer know the server is fine?"
      choices: ["The ping answers", "The user said so", "The wiki opens"]
      answer: 0
      skill: infer
      difficulty: 4
    - q_en: "What should the user check first?"
      choices: ["Whether the firewall was updated", "The DNS settings", "The laptop battery"]
      answer: 0
      skill: scan
      difficulty: 3

writing_task:
  id: WT-I10
  kind: guided_email
  prompt_vi: >
    Viết thư trả lời người dùng báo mạng chập chờn: bạn đã kiểm tra gì, kết luận vấn đề nằm ở
    đâu, và họ cần kiểm tra gì. Viết 4-5 câu.
  frame_vi:
    - "Mở: chào"
    - "Thân: bạn đã kiểm tra gì và kết quả ra sao"
    - "Thân: vậy vấn đề nằm ở đâu"
    - "Kết: nhờ họ kiểm tra gì"
  required_chunks:
    - ["can't reach", "cannot reach", "could not reach", "couldn't reach"]
    - ["firewall", "dns", "network"]
    - ["could you check", "please check", "can you check"]
  min_words: 20
  hint_vi: "Nói rõ bạn đã loại trừ được cái gì — nếu không, người dùng tưởng bạn chưa làm gì cả."
  sample_en: "Hi Mr Nam, I pinged the server from our side and it answers, so the server is up. You cannot reach it, which means the problem is on the network between us. Could you check whether your firewall was updated last night? If that looks fine, we will look at DNS. Thanks, Hoa"

listening_snippet:
  id: LS-I10
  speed: 1.3
  voice: en_US_male
  context_vi: >
    Minh tóm lại kết quả kiểm tra để ghi vào ticket. Nghe cách anh ấy nói theo TẦNG — cái nào đã
    loại, cái nào còn lại.
  transcript_en: "Writing this into the ticket. Ping works, DNS resolves, and the firewall is not blocking port four four three. The page loads for everyone. So we can rule out the network completely — whatever is broken is behind the login page."
  transcript_vi: "Ghi vào ticket đây. Ping được, DNS phân giải được, và tường lửa không chặn cổng bốn bốn ba. Trang tải được với mọi người. Vậy loại hẳn được tầng mạng — cái hỏng nằm phía sau trang đăng nhập."
  questions:
    - q_vi: "Ping có hoạt động không?"
      choices: ["Có", "Không", "Không thử"]
      answer: 0
      difficulty: 3
    - q_vi: "Kết luận sau khi kiểm tra là gì?"
      choices: ["Loại được tầng mạng", "Chắc chắn do DNS", "Do đứt cáp"]
      answer: 0
      difficulty: 3

speaking_drills:
  - kind: read_aloud
    expected_text: "I can't reach the server. The connection keeps dropping."
    prompt_vi: "Giả thuyết đầu tiên bạn nêu với Minh. Đọc to — “reach” có âm /iː/ dài, “connection” nhấn âm giữa."
    ipa: "/aɪ kænt riːtʃ ðə ˈsɜːrvər ðə kəˈnɛkʃən kiːps ˈdrɒpɪŋ/"
    focus_phonemes: [tʃ, k, ʃ]
  - kind: read_aloud
    expected_text: "It looks like a DNS issue."
    prompt_vi: "Giả thuyết thứ hai — vài phút nữa nó cũng bị loại. Đọc to: DNS đọc từng chữ, dee-en-ess."
    ipa: "/ɪt lʊks laɪk ə diː ɛn ɛs ˈɪʃuː/"
    focus_phonemes: [k, s, ʃ]
  - kind: shadow
    expected_text: "The firewall is blocking port 443."
    prompt_vi: "Giả thuyết cuối cùng của tầng mạng. Nghe rồi nhắc lại — “firewall” nhấn âm đầu, số đọc four-four-three."
    ipa: "/ðə ˈfaɪərwɔːl ɪz ˈblɒkɪŋ pɔːrt fɔːr fɔːr θriː/"
    focus_phonemes: [f, w, θ]
  - kind: respond
    prompt_en: "Could this be the network? What do you want me to check?"
    prompt_vi: "Minh hỏi kiểm tra gì trước. Nói theo TẦNG: nêu triệu chứng và chỉ ra tầng cần loại trừ."
    accept_patterns:
      - "Can you ping the server if ping works it might be a DNS issue"
      - "The connection times out it looks like a firewall issue"
      - "Try checking if you can reach it it might be DNS"

vietnamese_explanation:
  why_vi: >
    Sự cố mạng là thứ dân IT gặp mỗi ngày, nhưng để nói ĐÚNG với đồng nghiệp nước ngoài cần đúng từ:
    “mạng chậm” chung chung khác hẳn “ping được nhưng DNS hỏng”. Người Việt biết khái niệm nhưng
    thường chưa nghe/nói các từ này bao giờ, nên phát âm tự chế (DNS thành “đê-nờ-ét”, port thành “po”).
  how_vi: >
    Nắm bộ từ lõi: connection (kết nối), drops/times out (rớt/timeout), can't reach (không tới được),
    firewall (tường lửa), DNS, ping. Khi chẩn đoán, nói theo TẦNG: ping được → không phải mạng vật lý;
    ping không được → mạng/định tuyến; ping được mà trang không mở → DNS hoặc firewall.
  contrast_vi: "“Mạng lỗi rồi” (vô dụng) ↔ “Ping works but the page times out — looks like DNS” (đồng nghiệp biết chỗ sửa)."

common_mistakes:
  - mistake: "Phát âm sai thuật ngữ: DNS, port, ping, firewall"
    why_vi: "Đọc trên màn hình hàng ngày nhưng chưa nghe ai đọc lên."
    fix_vi: "DNS = dee-en-ess (từng chữ); port = /pɔːrt/; ping = /pɪŋ/; firewall nhấn “FIRE”. Nghe mẫu, đừng đoán từ chữ viết."
    detect: {}
  - mistake: "Mô tả chung chung “mạng có vấn đề”"
    why_vi: "Ngại dùng thuật ngữ vì sợ sai."
    fix_vi: "Nói triệu chứng cụ thể: “times out”, “can't reach”, “ping works but…”. Cụ thể giúp khoanh vùng nhanh."
    detect: {}
  - mistake: "Nhầm “can't connect” với “can't reach”"
    why_vi: "Hai cụm gần nghĩa, dùng lẫn."
    fix_vi: "Cả hai đều ổn trong hội thoại; “can't reach the server” tự nhiên khi nói về một đích cụ thể. Miễn là có nêu đích."
    detect: {}

memory_trick_vi: >
  Chẩn đoán mạng như kiểm tra đường ống nước: PING xem nước có tới không → nếu tới mà vòi không chảy,
  vấn đề ở DNS/firewall (cái van), không phải đường ống (mạng). Nói theo tầng, đừng nói “nước hỏng”.

mini_quiz:
  - kind: mcq
    prompt_vi: "Ping được nhưng trang web không mở. Nghi ngờ gì?"
    choices:
      - "DNS hoặc firewall"
      - "Đứt cáp mạng"
      - "Hỏng màn hình"
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "“DNS” đọc thế nào?"
    choices: ["dee-en-ess (từng chữ)", "đi-nớt", "dins"]
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Cách mô tả sự cố mạng tốt nhất?"
    choices:
      - "The connection times out when I reach the server."
      - "Mạng hỏng rồi."
      - "Nó không chạy."
    answer: 0
    difficulty: 2
  - kind: mcq_listen
    prompt_vi: "Nghi ngờ vấn đề ở đâu?"
    audio_text: "It looks like a DNS issue."
    choices: ["DNS", "Chuột", "Bàn phím"]
    answer: 0
    difficulty: 3

unlock_condition:
  mastery_threshold: 80
  mastery_weights: {speak: 0.35, listen: 0.15, read: 0.15, write: 0.15, quiz: 0.20}
  min_speaking_attempts: 4
  challenge_threshold: 85

recommended_next:
  default: I11
