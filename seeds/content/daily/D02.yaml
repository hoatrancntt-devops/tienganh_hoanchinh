schema_version: 1
id: D02
slug: small-talk-cong-so
unit: U-D1
title_vi: "Small talk — 60 giây ở pantry"
title_en: "Small talk at work"
phase: daily
topic: social
cefr_target: a1
order_index: 2
est_minutes: 14

objective_vi: "Duy trì 4 lượt small talk về cuối tuần, thời tiết, cà phê mà không bị bí."
objective_observable: "Đạt ≥75 điểm giao tiếp trên 3/4 drill hội thoại mở."

prerequisites:
  - {lesson: D01, min_mastery: 75, kind: hard}

vocabulary:
  - term: "How's it going?"
    ipa: "/haʊz ɪt ˈɡoʊɪŋ/"
    meaning_vi: "Dạo này thế nào? (chào hỏi, không phải câu hỏi thật)"
    chunk: "Hey, how's it going?"
    tags: [social]
  - term: "Busy week"
    ipa: "/ˈbɪzi wiːk/"
    meaning_vi: "Tuần bận rộn"
    chunk: "Busy week, but it's fine."
    tags: [social]
  - term: "Any plans?"
    ipa: "/ˈɛni plænz/"
    meaning_vi: "Có kế hoạch gì không?"
    chunk: "Any plans for the weekend?"
    tags: [social]
  - term: "Nothing much"
    ipa: "/ˈnʌθɪŋ mʌtʃ/"
    meaning_vi: "Cũng không có gì"
    chunk: "Nothing much, just resting."
    tags: [social]
  - term: "Same here"
    ipa: "/seɪm hɪr/"
    meaning_vi: "Tôi cũng vậy"
    chunk: "Same here, I need a break."
    tags: [social]
  - term: "grab a coffee"
    ipa: "/ɡræb ə ˈkɒfi/"
    meaning_vi: "làm một ly cà phê"
    chunk: "Want to grab a coffee?"
    tags: [social, food]

sentence_patterns:
  - pattern: "Any plans for {time}?"
    meaning_vi: "{time} có kế hoạch gì không?"
    slots:
      time: ["the weekend", "tonight", "the holiday"]
  - pattern: "{answer}, {reason}."
    meaning_vi: "{answer}, {reason}."
    slots:
      answer: ["Nothing much", "Not really", "Busy week"]
      reason: ["just resting", "I have a deadline", "I need a break"]

dialogue:
  context_vi: >
    Thứ Ba, ngày thứ hai của Priya. Ba giờ chiều, bạn vào pantry lấy nước thì Priya đang đứng đợi
    máy pha cà phê. Máy chạy mất đúng sáu mươi giây. Không có việc gì để bàn, không có chỗ nào để đi —
    chỉ có hai người và một khoảng lặng bạn phải lấp.
  turns:
    - {speaker: You, en: "Hey, how's it going?", vi: "Chào chị, mọi thứ ổn không ạ?"}
    - {speaker: Priya, en: "Busy week, but it's fine. How about you?", vi: "Tuần này bận, nhưng vẫn ổn. Còn bạn?"}
    - {speaker: You, en: "Same here. Any plans for the weekend?", vi: "Em cũng vậy. Cuối tuần chị có kế hoạch gì không?"}
    - {speaker: Priya, en: "Nothing much, just resting at the hotel. And you?", vi: "Cũng không có gì, chỉ nghỉ ở khách sạn thôi. Còn bạn?"}
    - {speaker: You, en: "Same. This machine is slow. Want to grab a coffee downstairs later?", vi: "Em cũng vậy. Cái máy này chậm lắm. Lát nữa xuống dưới làm ly cà phê không chị?"}

reading_passage:
  id: RP-D02
  kind: chat
  context_vi: >
    Sáu mươi giây ở pantry. Đoạn này ngắn, nhưng nó là toàn bộ công thức small talk công sở.
  text_en: |
    Minh: Morning! How's it going?
    You: Busy week. You?
    Minh: Same here. Any plans for the weekend?
    You: Nothing much. Maybe some rest.
    Minh: Sounds good. Want to grab a coffee later?
    You: Sure, after the standup.
  text_vi: |
    Minh: Chào buổi sáng! Dạo này thế nào?
    Bạn: Tuần này bận. Còn anh?
    Minh: Tôi cũng vậy. Cuối tuần có kế hoạch gì không?
    Bạn: Không có gì nhiều. Chắc nghỉ ngơi thôi.
    Minh: Nghe hay đấy. Lát nữa đi uống cà phê không?
    Bạn: Được, sau standup nhé.
  questions:
    - q_en: "What does Minh ask about?"
      choices: ["The weekend", "The report", "The new laptop"]
      answer: 0
      skill: scan
      difficulty: 2
    - q_en: "When will they get coffee?"
      choices: ["After the standup", "At the weekend", "Tomorrow morning"]
      answer: 0
      skill: infer
      difficulty: 3

writing_task:
  id: WT-D02
  kind: reorder
  prompt_vi: "Sắp ba dòng này thành một đoạn small talk đúng thứ tự."
  ordered_lines:
    - "Morning! How's it going?"
    - "Busy week. You?"
    - "Same here."
  hint_vi: "Chào trước, trả lời và hỏi ngược lại, rồi đáp lại."
  sample_en: "Morning! How's it going? / Busy week. You? / Same here."

listening_snippet:
  id: LS-D02
  speed: 1.0
  voice: en_US_male
  context_vi: >
    Minh đi vào pantry ngay lúc đó và nói chen vào. Minh nói nhanh và nuốt chữ hơn Priya nhiều —
    cái khó ở đây là bắt được lời rủ ở cuối câu, vì nó trôi rất nhanh.
  transcript_en: "Hey, you two. Busy week, but it's fine — Friday is close. Priya, any plans for the weekend? There's a good coffee place downstairs, we can all go after lunch."
  transcript_vi: "Chào hai người. Tuần bận, nhưng ổn — sắp thứ Sáu rồi. Chị Priya, cuối tuần chị có kế hoạch gì không? Dưới nhà có quán cà phê ngon, ăn trưa xong cả nhóm đi được đấy."
  questions:
    - q_vi: "Tuần của Minh thế nào?"
      choices: ["Bận nhưng ổn", "Rất tệ", "Rảnh rỗi"]
      answer: 0
      difficulty: 2
    - q_vi: "Minh rủ cả nhóm đi đâu?"
      choices: ["Quán cà phê dưới nhà", "Về sớm", "Ra sân bay"]
      answer: 0
      difficulty: 2

speaking_drills:
  - kind: shadow
    expected_text: "Busy week, but it's fine."
    prompt_vi: "Priya vừa hỏi tuần của bạn thế nào. Nghe rồi nhắc lại — câu trả lời an toàn cho mọi tình huống."
    ipa: "/ˈbɪzi wiːk bʌt ɪts faɪn/"
    focus_phonemes: [z, k, t]
  - kind: shadow
    expected_text: "Any plans for the weekend?"
    prompt_vi: "Máy cà phê còn chạy ba mươi giây nữa. Hỏi Priya câu này — nghe rồi nhắc lại, giọng đi lên ở cuối."
    ipa: "/ˈɛni plænz fɔr ðə ˈwiːkɛnd/"
    focus_phonemes: [z, d]
  - kind: respond
    prompt_en: "Hey, how's it going?"
    prompt_vi: "Priya quay sang chào bạn ở pantry. Trả lời ngắn rồi hỏi ngược — đây không phải câu hỏi thật về sức khoẻ."
    accept_patterns:
      - "Busy week but it's fine How about you"
      - "Good thanks And you"
      - "Not bad How about you"
  - kind: respond
    prompt_en: "Any plans for the weekend?"
    prompt_vi: "Priya hỏi lại bạn. Trả lời rồi hỏi ngược."
    accept_patterns:
      - "Nothing much just resting You"
      - "Not really How about you"
      - "Nothing much And you"
  - kind: respond
    prompt_en: "Want to grab a coffee later?"
    prompt_vi: "Minh rủ cả nhóm xuống quán cà phê dưới nhà. Đồng ý hoặc từ chối lịch sự."
    accept_patterns:
      - "Sure sounds good"
      - "Yes that works"
      - "Sorry I have a call"
      - "Maybe later I'm busy"

vietnamese_explanation:
  why_vi: >
    Small talk không phải để trao đổi thông tin. Nó là nghi thức xã hội — cách người ta báo hiệu
    "tôi thấy bạn, tôi ổn với bạn". Người Việt hay mắc kẹt vì cố trả lời THẬT câu "How's it going?"
    và kể một câu chuyện dài, trong khi người hỏi chỉ chờ hai từ.
  how_vi: >
    Trả lời ngắn (3-5 từ), thêm một chi tiết nhỏ, rồi hỏi ngược. Đó là toàn bộ công thức. Nội dung
    không quan trọng — nhịp mới quan trọng. Bạn có thể nói cùng một câu mỗi ngày và không ai để ý.
  contrast_vi: "“How's it going?” là “Chào” chứ không phải “Bạn khoẻ không?”. Trả lời như đọc sách nghe rất máy móc."

common_mistakes:
  - mistake: "Trả lời “How's it going?” bằng một câu chuyện dài"
    why_vi: "Hiểu nó là câu hỏi thật. Nhưng người hỏi đang đi ngang qua và chờ hai giây."
    fix_vi: "Ba đến năm từ là đủ: “Busy week, but it's fine.” Nếu họ muốn nghe thêm, họ sẽ hỏi tiếp."
    detect: {}
  - mistake: "“I'm fine, thank you. And you?” — đúng nhưng nghe như đọc sách"
    why_vi: "Đây là câu duy nhất được dạy ở trường, nên nó là câu duy nhất bật ra."
    fix_vi: "Đổi sang “Good, thanks. You?” hoặc “Not bad. How about you?”. Ngắn hơn, tự nhiên hơn, ai cũng nói vậy."
    detect: {}
  - mistake: "Im lặng vì không nghĩ ra chuyện gì thú vị để kể"
    why_vi: "Nghĩ rằng small talk cần nội dung hay."
    fix_vi: "Không cần. “Nothing much, just resting” là câu trả lời hoàn hảo và người ta nói nó mỗi tuần."
    detect: {}

memory_trick_vi: >
  Small talk giống bắt tay: ngắn, có nhịp, và không ai nhớ nội dung. Bạn chỉ cần ba câu trả lời
  thủ sẵn cho cả năm: "Busy week, but it's fine" / "Nothing much, just resting" / "Same here".

mini_quiz:
  - kind: mcq
    prompt_vi: "Priya đi ngang bàn bạn và nói “How's it going?”. Câu nào tự nhiên nhất?"
    choices:
      - "I am fine, thank you. And you?"
      - "Busy week, but it's fine. You?"
      - "Actually, let me tell you about my week…"
    answer: 1
    difficulty: 3
  - kind: mcq
    prompt_vi: "Priya hỏi “Any plans for the weekend?” — bạn không có kế hoạch gì. Nói gì?"
    choices: ["No.", "Nothing much, just resting. You?", "I don't have plan."]
    answer: 1
    difficulty: 2
  - kind: mcq
    prompt_vi: "Mục đích thật của small talk là gì?"
    choices:
      - "Trao đổi thông tin quan trọng"
      - "Báo hiệu sự thân thiện, giữ quan hệ"
      - "Luyện ngữ pháp"
    answer: 1
    difficulty: 2
  - kind: mcq_listen
    prompt_vi: "Tuần của Priya thế nào?"
    audio_text: "Busy week, but it's fine."
    choices: ["Bận nhưng ổn", "Rảnh", "Rất tệ"]
    answer: 0
    difficulty: 2

unlock_condition:
  mastery_threshold: 75
  mastery_weights: {speak: 0.35, listen: 0.15, read: 0.15, write: 0.15, quiz: 0.20}
  min_speaking_attempts: 4
  challenge_threshold: 85

recommended_next:
  default: D03
