schema_version: 1
id: CP-D
slug: checkpoint-giao-tiep-hang-ngay
unit: U-D1
title_vi: "Checkpoint: Giao tiếp hằng ngày"
title_en: "Checkpoint: Daily Conversation"
phase: daily
topic: social
cefr_target: a1
order_index: 99
est_minutes: 16
is_checkpoint: true

objective_vi: "Xử lý được tình huống đời thường: gặp người mới, small talk, và đáp lại tự nhiên."
objective_observable: "Đạt ≥70 điểm giao tiếp trên toàn bộ bài."

prerequisites:
  - {lesson: D01, min_mastery: 73, kind: hard}
  - {lesson: D02, min_mastery: 73, kind: hard}
  - {lesson: D03, min_mastery: 73, kind: hard}
  - {lesson: D04, min_mastery: 73, kind: hard}

reading_passage:
  id: RP-CPD
  kind: chat
  context_vi: >
    Một buổi sáng gồm đủ ba tình huống đã học: chào hỏi, ăn trưa, và đi lại. Bài chốt của chặng này.
  text_en: |
    Minh: Morning! How's it going?
    You: Busy, but fine. I'm running late for the standup.
    Minh: No problem, it starts at nine fifteen.
    You: Thanks. Want to grab lunch after?
    Minh: Sure. Not the noodle place though, I'm allergic to peanuts.
    You: Got it. The rice place then.
  text_vi: |
    Minh: Chào buổi sáng! Dạo này thế nào?
    Bạn: Bận, nhưng ổn. Tôi đang trễ giờ standup.
    Minh: Không sao, chín giờ mười lăm mới bắt đầu.
    Bạn: Cảm ơn. Ăn trưa cùng không?
    Minh: Được. Nhưng đừng quán mì nhé, tôi dị ứng đậu phộng.
    Bạn: Rõ rồi. Vậy quán cơm.
  questions:
    - q_en: "What time does the standup start?"
      choices: ["Nine fifteen", "Nine fifty", "Ten fifteen"]
      answer: 0
      skill: scan
      difficulty: 2
    - q_en: "Why will they not go to the noodle place?"
      choices: ["Minh is allergic to peanuts", "It is too far", "It is closed"]
      answer: 0
      skill: infer
      difficulty: 3
    - q_en: "What is this chat mainly about?"
      choices: ["Morning small talk and lunch plans", "A broken server", "A new project"]
      answer: 0
      skill: skim
      difficulty: 2

writing_task:
  id: WT-CPD
  kind: reorder
  prompt_vi: "Sắp bốn dòng này thành một đoạn hội thoại đúng thứ tự."
  ordered_lines:
    - "Morning! How's it going?"
    - "Busy, but fine. Want to grab lunch later?"
    - "Sure. Not the noodle place though."
    - "Got it. See you at twelve."
  hint_vi: "Chào → rủ đi ăn → đặt điều kiện → chốt giờ."
  sample_en: "Morning! How's it going? / Busy, but fine. Want to grab lunch later? / Sure. Not the noodle place though. / Got it. See you at twelve."

listening_snippet:
  id: LS-CPD
  speed: 1.0
  voice: en_US_female
  context_vi: >
    Thứ Bảy, sân bay Tân Sơn Nhất. Bạn tiễn Priya ở cửa vào khu làm thủ tục. Cô ấy nói một lượt
    dài trước khi đi — cảm ơn, một lời thú nhận, giờ bay, và một lời mời. Cái khó là giữ được cả
    bốn thứ trong đầu khi không có ai nhắc lại.
  transcript_en: "Thank you for everything this week. Honestly, on Monday I was a little nervous — I didn't know anyone here. Now I have people to have lunch with. My flight is at seven, so I should go in. Come to Singapore next time, all right?"
  transcript_vi: "Cảm ơn bạn về mọi thứ tuần này. Thật ra hôm thứ Hai tôi hơi lo — tôi chẳng quen ai ở đây cả. Giờ thì tôi đã có người để đi ăn trưa cùng. Chuyến bay của tôi lúc bảy giờ, tôi phải vào trong rồi. Lần sau sang Singapore chơi nhé?"
  questions:
    - q_vi: "Hôm thứ Hai Priya cảm thấy thế nào?"
      choices: ["Hơi lo lắng", "Rất vui", "Bực mình"]
      answer: 0
      difficulty: 2
    - q_vi: "Chuyến bay của Priya lúc mấy giờ?"
      choices: ["7 giờ", "11 giờ", "5 giờ"]
      answer: 0
      difficulty: 2
    - q_vi: "Priya mời bạn điều gì?"
      choices: ["Sang Singapore chơi", "Ở lại sân bay", "Đổi vé giúp cô ấy"]
      answer: 0
      difficulty: 3

speaking_drills:
  - kind: respond
    prompt_en: "Hi, I don't think we've met. I'm Priya."
    prompt_vi: "Ở quán cà phê sân bay, Priya bảo bạn tập trước: “Sang Singapore là team tôi sẽ hỏi bạn là ai đấy. Coi như mình chưa từng gặp nhau.” Tự giới thiệu đầy đủ và hỏi ngược lại."
    accept_patterns:
      - "Nice to meet you I'm {name} I work in {department} And you"
      - "Hi I'm {name} I work in {department} How about you"
  - kind: respond
    prompt_en: "How's it going? Busy week?"
    prompt_vi: "Còn bốn mươi phút mới tới giờ Priya vào trong. Trả lời small talk ngắn rồi hỏi ngược."
    accept_patterns:
      - "Busy week but it's fine How about you"
      - "Not bad And you"
      - "Good thanks You"
  - kind: shadow
    expected_text: "Nice to meet you. I work in IT. And you?"
    prompt_vi: "Priya giới thiệu bạn qua video call với một đồng nghiệp ở Singapore. Nghe rồi nhắc lại ở tốc độ thật."
    ipa: "/naɪs tuː miːt juː aɪ wɜːrk ɪn aɪ tiː ænd juː/"
    focus_phonemes: [t, s]
  - kind: shadow
    expected_text: "Sorry, could you say that again? I didn't catch it."
    prompt_vi: "Loa sân bay át mất câu cuối của Priya. Nghe rồi nhắc lại — câu cứu mạng vẫn phải nhớ."
    ipa: "/ˈsɒri kʊd juː seɪ ðæt əˈɡɛn aɪ ˈdɪdənt kætʃ ɪt/"
    focus_phonemes: [s, d, tʃ]

vietnamese_explanation:
  why_vi: >
    Các bài Daily dạy tình huống riêng. Trong đời thật chúng nối vào nhau: bạn gặp người mới ở
    pantry, small talk hai câu, rồi trả lời tự nhiên. Bài này kiểm tra bạn chuyển giữa các tình
    huống có mượt không.
  how_vi: >
    Làm một lượt. Đừng cố nói hay — cứ nói cho người kia hiểu, và nhớ hỏi ngược lại. Hai thứ đó
    là toàn bộ tiêu chí ở phase này.
  contrast_vi: "Học thuộc từng bài ↔ dùng được khi tình huống nhảy lung tung. Chỉ cái thứ hai đếm."

common_mistakes:
  - mistake: "Nói đúng câu nhưng quên hỏi ngược lại"
    why_vi: "Khi bị áp lực đo điểm, phần “And you?” là thứ rơi rụng đầu tiên vì nó không phải nội dung chính."
    fix_vi: "Coi “And you?” là một phần của câu trả lời, không phải phần thêm. Chưa hỏi ngược là chưa nói xong."
    detect: {}
  - mistake: "Trượt rồi làm lại ngay"
    why_vi: "Muốn qua nhanh."
    fix_vi: "Ôn bài yếu một buổi rồi quay lại hôm sau. Hệ thống sẽ chỉ đúng bài cần ôn."
    detect: {}

memory_trick_vi: >
  Qua được bài này nghĩa là bạn sống sót được một ngày làm việc bình thường bằng tiếng Anh:
  chào, tán gẫu, đáp lại. Phần còn lại của khoá là chuyên môn hoá.

unlock_condition:
  mastery_threshold: 75
  mastery_weights: {speak: 0.45, listen: 0.20, read: 0.15, write: 0.20}
  min_per_skill: {speak: 62, listen: 60, read: 58, write: 55}
  min_speaking_attempts: 4
  challenge_threshold: 90
