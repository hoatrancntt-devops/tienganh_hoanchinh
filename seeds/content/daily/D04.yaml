schema_version: 1
id: D04
slug: di-lai-grab-va-chi-duong
unit: U-D3
title_vi: "Đi lại: Grab, taxi, và chỉ đường"
title_en: "Getting around"
phase: daily
topic: transport
cefr_target: a1
order_index: 4
est_minutes: 14

objective_vi: "Nói địa chỉ với tài xế, hỏi đường tới toà nhà, và báo mình đang tới muộn."
objective_observable: "Đạt ≥75 điểm giao tiếp trên 3/4 drill tình huống đi lại."

prerequisites:
  - {lesson: CP-F, min_mastery: 75, kind: hard}
  - {lesson: D01, min_mastery: 63, kind: soft}

vocabulary:
  - term: "running late"
    ipa: "/ˈrʌnɪŋ leɪt/"
    meaning_vi: "đang bị muộn"
    chunk: "Sorry, I'm running late."
    tags: [transport, office]
  - term: "on my way"
    ipa: "/ɒn maɪ weɪ/"
    meaning_vi: "đang trên đường"
    chunk: "I'm on my way, ten minutes."
    tags: [transport]
  - term: "drop me off"
    ipa: "/drɒp miː ɒf/"
    meaning_vi: "cho tôi xuống"
    chunk: "Could you drop me off at the corner?"
    tags: [transport]
  - term: "which floor"
    ipa: "/wɪtʃ flɔːr/"
    meaning_vi: "tầng mấy"
    chunk: "Which floor is the meeting on?"
    tags: [transport, office]
  - term: "the reception"
    ipa: "/ðə rɪˈsɛpʃən/"
    meaning_vi: "quầy lễ tân"
    chunk: "I'm at the reception."
    tags: [transport, office]
  - term: "traffic"
    ipa: "/ˈtræfɪk/"
    meaning_vi: "giao thông, kẹt xe"
    chunk: "The traffic is bad today."
    tags: [transport]

sentence_patterns:
  - pattern: "Sorry, I'm running late. I'll be there in {minutes} minutes."
    meaning_vi: "Xin lỗi, tôi đang bị muộn. {minutes} phút nữa tôi tới."
    slots:
      minutes: [five, ten, fifteen]
  - pattern: "Which floor is {thing} on?"
    meaning_vi: "{thing} ở tầng mấy?"
    slots:
      thing: ["the meeting", "the IT department", "your office"]

dialogue:
  context_vi: >
    Thứ Năm, 8 giờ 15 sáng. Hôm nay Priya có buổi họp ở văn phòng khách hàng, và bạn đặt Grab
    qua khách sạn đón cô ấy. Bạn đang kẹt cứng trên đường và Priya thì đang đứng đợi dưới sảnh
    khách sạn. Bạn gọi cho cô ấy.
  turns:
    - {speaker: You, en: "Sorry, I'm running late. The traffic is bad this morning.", vi: "Xin lỗi chị, em đang bị muộn. Sáng nay kẹt xe quá."}
    - {speaker: Priya, en: "That's quite all right. How long do you think?", vi: "Không sao đâu. Bạn nghĩ khoảng bao lâu nữa?"}
    - {speaker: You, en: "I'm on my way, about ten minutes. I'll ask the driver to drop us off at the corner.", vi: "Em đang trên đường, khoảng mười phút. Em sẽ nhờ tài xế cho xuống ở góc đường."}
    - {speaker: Priya, en: "Thank you. Which floor is the meeting on?", vi: "Cảm ơn bạn. Cuộc họp ở tầng mấy vậy?"}
    - {speaker: You, en: "Fifth floor. We check in at the reception first.", vi: "Tầng năm ạ. Mình khai báo ở quầy lễ tân trước đã."}

reading_passage:
  id: RP-D04
  kind: chat
  context_vi: >
    Bạn đang kẹt xe và phải báo cho Linh. Đọc để tìm lý do muộn và tầng mấy.
  text_en: |
    You: I'm running late. Bad traffic.
    Linh: No problem. Are you on your way?
    You: Yes. The driver will drop me off at the reception.
    Linh: Which floor do you need?
    You: The fourth. See you in ten minutes.
  text_vi: |
    Bạn: Tôi bị trễ. Kẹt xe quá.
    Linh: Không sao. Bạn đang trên đường rồi à?
    Bạn: Rồi. Tài xế sẽ thả tôi ở quầy lễ tân.
    Linh: Bạn cần lên tầng mấy?
    Bạn: Tầng bốn. Mười phút nữa gặp.
  questions:
    - q_en: "Why is the writer late?"
      choices: ["Bad traffic", "The driver is lost", "They woke up late"]
      answer: 0
      skill: scan
      difficulty: 1
    - q_en: "In this chat, \"drop me off\" means:"
      choices: ["let me out of the car", "give me a discount", "leave without me"]
      answer: 0
      skill: guess_word
      difficulty: 3

writing_task:
  id: WT-D04
  kind: fill_blank
  prompt_vi: "Điền hai chỗ trống khi báo mình đến muộn."
  prompt_en: "I'm running ___. I'm on my ___."
  blanks:
    - ["late"]
    - ["way"]
  hint_vi: "Hai cụm này đi liền nhau: báo muộn, rồi trấn an là đang đến."
  sample_en: "I'm running late. I'm on my way."

listening_snippet:
  id: LS-D04
  speed: 0.9
  voice: en_US_male
  context_vi: >
    Minh đã tới văn phòng khách hàng trước và gọi lại cho bạn khi bạn còn trên xe. Minh nói nhanh,
    trong tiếng ồn đường phố — cái khó là nhớ được hai chi tiết cùng lúc: xuống xe ở đâu, và lên tầng mấy.
  transcript_en: "Hey, it's Minh. I'm already at the client office. The traffic on this street is bad, so tell the driver to drop you off at the corner and walk. The meeting is on the fifth floor — check in at the reception first."
  transcript_vi: "Này, Minh đây. Anh tới văn phòng khách hàng rồi. Đường này kẹt lắm, nên bảo tài xế cho xuống ở góc đường rồi đi bộ vào. Cuộc họp ở tầng năm — khai báo ở quầy lễ tân trước nhé."
  questions:
    - q_vi: "Minh khuyên xuống xe ở đâu?"
      choices: ["Ở góc đường", "Trước cửa toà nhà", "Ở bãi giữ xe"]
      answer: 0
      difficulty: 2
    - q_vi: "Cuộc họp ở tầng mấy?"
      choices: ["Tầng năm", "Tầng ba", "Tầng mười"]
      answer: 0
      difficulty: 3

speaking_drills:
  - kind: read_aloud
    expected_text: "Sorry, I'm running late."
    prompt_vi: "Priya đang đứng đợi dưới sảnh khách sạn. Đọc to — câu này bạn sẽ dùng nhiều hơn bạn nghĩ."
    ipa: "/ˈsɒri aɪm ˈrʌnɪŋ leɪt/"
    focus_phonemes: [r, ŋ, t]
  - kind: read_aloud
    expected_text: "The traffic is bad today."
    prompt_vi: "Nói lý do cho Priya trong một câu, không dài dòng. Đọc to — TRA-ffic nhấn âm đầu."
    ipa: "/ðə ˈtræfɪk ɪz bæd təˈdeɪ/"
    focus_phonemes: [ð, k, d]
  - kind: shadow
    expected_text: "I'm on my way, about ten minutes."
    prompt_vi: "Priya hỏi còn bao lâu nữa. Nghe rồi nhắc lại — luôn kèm con số, “soon” không đủ thông tin cho người đang đứng đợi."
    ipa: "/aɪm ɒn maɪ weɪ əˈbaʊt tɛn ˈmɪnɪts/"
    focus_phonemes: [m, t, s]
  - kind: shadow
    expected_text: "Which floor is the meeting on?"
    prompt_vi: "Tới quầy lễ tân, bạn hỏi thay cho cả hai. Nghe rồi nhắc lại."
    ipa: "/wɪtʃ flɔːr ɪz ðə ˈmiːtɪŋ ɒn/"
    focus_phonemes: [tʃ, l, ŋ]
  - kind: respond
    prompt_en: "How long until you get here?"
    prompt_vi: "Priya hỏi qua điện thoại. Bạn còn khoảng 10 phút nữa. Trả lời."
    accept_patterns:
      - "I'm on my way about ten minutes"
      - "About ten minutes"
      - "Ten minutes I'm running late"

vietnamese_explanation:
  why_vi: >
    Tình huống đi lại có một đặc điểm khác mọi tình huống khác: người kia đang CHỜ bạn. Họ không
    cần lời xin lỗi dài, họ cần một con số. Người Việt hay nói "sắp tới rồi" vì ngại cam kết một
    con số cụ thể — nhưng trong môi trường công việc, "sắp tới" là thông tin vô dụng.
  how_vi: >
    Ba phần, đúng thứ tự: xin lỗi ngắn → lý do một câu → CON SỐ. "Sorry, I'm running late. Traffic.
    Ten minutes." Vậy là xong. Đừng giải thích dài về việc con đường nào tắc.
  contrast_vi: "“I'm coming soon” (vô dụng) ↔ “I'm on my way, ten minutes” (người kia biết phải làm gì với 10 phút đó)."

common_mistakes:
  - mistake: "“I will come soon.” — không có con số"
    why_vi: "Ngại cam kết vì sợ sai. Nhưng người đang chờ cần biết nên bắt đầu họp hay đợi."
    fix_vi: "Luôn kèm số, kể cả khi bạn không chắc: “about ten minutes”. Từ “about” đã cho bạn biên độ rồi."
    detect: {}
  - mistake: "“I am late.” khi vẫn đang trên đường"
    why_vi: "Dịch thẳng “Tôi muộn rồi”."
    fix_vi: "“I'm running late” nghĩa là đang bị muộn nhưng đang tới. “I'm late” nghe như bạn đã tới muộn."
    detect: {}
  - mistake: "Xin lỗi quá dài, giải thích quá chi tiết"
    why_vi: "Văn hoá Việt coi lời xin lỗi dài là thể hiện sự tôn trọng."
    fix_vi: "Trong công việc quốc tế thì ngược lại: xin lỗi ngắn + con số cụ thể mới là tôn trọng."
    detect: {}

memory_trick_vi: >
  Ba từ, đúng thứ tự: SORRY — WHY — WHEN. "Sorry, traffic, ten minutes." Người kia chỉ thật sự
  cần từ thứ ba, hai từ đầu là phép lịch sự. Đừng đảo thứ tự và đừng bỏ từ cuối.

mini_quiz:
  - kind: mcq
    prompt_vi: "Bạn kẹt xe, Priya đợi dưới sảnh, còn 10 phút nữa tới. Nhắn gì cho cô ấy?"
    choices:
      - "I will come soon."
      - "Sorry, I'm running late. On my way, about ten minutes."
      - "I am late."
    answer: 1
    difficulty: 3
  - kind: mcq
    prompt_vi: "Khác nhau giữa “I'm late” và “I'm running late”?"
    choices:
      - "Không khác gì"
      - "“running late” nghĩa là đang bị muộn nhưng đang tới"
      - "“I'm late” lịch sự hơn"
    answer: 1
    difficulty: 3
  - kind: fill_chunk
    prompt_vi: "Ở quầy lễ tân, bạn hỏi lễ tân: “___ floor is the meeting on?”"
    choices: [What, Which, Where]
    answer: 1
    difficulty: 2
  - kind: mcq_listen
    prompt_vi: "Bạn nhắn cho Priya: còn bao lâu nữa tới?"
    audio_text: "I'm on my way, about ten minutes."
    choices: ["Khoảng 10 phút", "Khoảng 1 tiếng", "Đã tới rồi"]
    answer: 0
    difficulty: 2

unlock_condition:
  mastery_threshold: 73
  mastery_weights: {speak: 0.35, listen: 0.15, read: 0.15, write: 0.15, quiz: 0.20}
  min_speaking_attempts: 4
  challenge_threshold: 85

recommended_next:
  default: CP-D
