schema_version: 1
id: D03
slug: goi-mon-an-trua
unit: U-D2
title_vi: "Gọi món và rủ đi ăn trưa"
title_en: "Ordering lunch"
phase: daily
topic: food
cefr_target: a1
order_index: 3
est_minutes: 14

objective_vi: "Gọi món, hỏi giá, nói về dị ứng, và rủ đồng nghiệp đi ăn."
objective_observable: "Đạt ≥75 điểm giao tiếp trên 3/4 drill tình huống quán ăn."

prerequisites:
  - {lesson: CP-F, min_mastery: 75, kind: hard}
  - {lesson: D01, min_mastery: 63, kind: soft}

vocabulary:
  - term: "I'll have"
    ipa: "/aɪl hæv/"
    meaning_vi: "Cho tôi (gọi món)"
    chunk: "I'll have the chicken rice, please."
    tags: [food]
  - term: "to go"
    ipa: "/tuː ɡoʊ/"
    meaning_vi: "mang đi"
    chunk: "To go, please."
    tags: [food]
  - term: "for here"
    ipa: "/fɔr hɪr/"
    meaning_vi: "ăn tại chỗ"
    chunk: "For here, thanks."
    tags: [food]
  - term: "allergic to"
    ipa: "/əˈlɜːrdʒɪk tuː/"
    meaning_vi: "dị ứng với"
    chunk: "I'm allergic to peanuts."
    tags: [food]
  - term: "the bill"
    ipa: "/ðə bɪl/"
    meaning_vi: "hoá đơn"
    chunk: "Could we have the bill, please?"
    tags: [food]
  - term: "grab lunch"
    ipa: "/ɡræb lʌntʃ/"
    meaning_vi: "đi ăn trưa"
    chunk: "Want to grab lunch?"
    tags: [food, social]

sentence_patterns:
  - pattern: "I'll have the {dish}, please."
    meaning_vi: "Cho tôi {dish} nhé."
    slots:
      dish: ["chicken rice", "beef noodles", "vegetarian option"]
  - pattern: "I'm allergic to {food}."
    meaning_vi: "Tôi bị dị ứng {food}."
    slots:
      food: [peanuts, seafood, dairy]

dialogue:
  context_vi: >
    Thứ Tư, gần mười hai giờ. Priya chưa ăn trưa ở đâu ngoài khách sạn. Bạn rủ cô ấy ra quán cơm
    cạnh công ty — quán không có thực đơn tiếng Anh, nên bạn là người phải gọi món cho cả hai.
  turns:
    - {speaker: You, en: "It's almost twelve. Want to grab lunch? There's a rice place next door.", vi: "Sắp mười hai giờ rồi. Chị đi ăn trưa không? Cạnh công ty có quán cơm."}
    - {speaker: Priya, en: "Yes, please. One thing you should know — I'm allergic to peanuts.", vi: "Có chứ. Có một điều bạn nên biết — tôi bị dị ứng đậu phộng."}
    - {speaker: You, en: "Good to know. The menu is only in Vietnamese, so I'll order for both of us.", vi: "Em biết rồi ạ. Thực đơn chỉ có tiếng Việt, để em gọi cho cả hai."}
    - {speaker: You, en: "We'll have two chicken rice, please. No spicy, and no peanuts in one of them.", vi: "Cho hai suất cơm gà nhé. Không cay, và một suất không có đậu phộng."}
    - {speaker: Server, en: "For here or to go?", vi: "Ăn tại chỗ hay mang đi ạ?"}
    - {speaker: Priya, en: "For here, thanks. And could we have the bill together?", vi: "Ăn tại chỗ, cảm ơn. Và tính chung một hoá đơn được không?"}

reading_passage:
  id: RP-D03
  kind: chat
  context_vi: >
    Rủ nhau đi ăn trưa. Trong đoạn có một thông tin quan trọng về sức khoẻ — tìm nó.
  text_en: |
    Nam: Want to grab lunch?
    You: Sure. I'll have the chicken rice.
    Nam: For here or to go?
    You: For here. But I'm allergic to peanuts.
    Nam: I'll tell them. I'll get the bill this time.
    You: Thanks! Next one is on me.
  text_vi: |
    Nam: Đi ăn trưa không?
    Bạn: Đi chứ. Tôi lấy cơm gà.
    Nam: Ăn tại chỗ hay mang đi?
    Bạn: Ăn tại chỗ. Nhưng tôi bị dị ứng đậu phộng.
    Nam: Để tôi báo họ. Lần này tôi trả tiền.
    Bạn: Cảm ơn! Lần sau tôi mời.
  questions:
    - q_en: "What can the writer not eat?"
      choices: ["Peanuts", "Chicken", "Rice"]
      answer: 0
      skill: scan
      difficulty: 2
    - q_en: "Who pays today?"
      choices: ["Nam", "The writer", "They share it"]
      answer: 0
      skill: infer
      difficulty: 3

writing_task:
  id: WT-D03
  kind: fill_blank
  prompt_vi: "Điền hai chỗ trống khi gọi món."
  prompt_en: "I'll ___ the chicken rice. I'm ___ to peanuts."
  blanks:
    - ["have"]
    - ["allergic"]
  hint_vi: "Gọi món dùng “I'll have”, không dùng “I want”. Câu sau là cảnh báo dị ứng."
  sample_en: "I'll have the chicken rice. I'm allergic to peanuts."

listening_snippet:
  id: LS-D03
  speed: 1.0
  voice: en_US_female
  context_vi: >
    Ăn xong, Priya nói với bạn ở bàn. Cô ấy nói tròn vành rõ chữ, nhưng lồng một lời dặn quan trọng
    vào giữa câu cảm ơn — nghe sót là lần sau bạn gọi món sai.
  transcript_en: "Thank you for ordering for me, that was very good. Next time lunch is on me — but please remember, no peanuts. Could we have the bill now, please?"
  transcript_vi: "Cảm ơn bạn đã gọi món giúp tôi, ngon lắm. Lần sau bữa trưa tôi mời — nhưng nhớ giúp tôi, không đậu phộng nhé. Giờ mình xin hoá đơn được không?"
  questions:
    - q_vi: "Priya nói gì về bữa ăn?"
      choices: ["Rất ngon", "Quá cay", "Không ăn được"]
      answer: 0
      difficulty: 2
    - q_vi: "Priya dặn lại điều gì cho lần sau?"
      choices: ["Không có đậu phộng", "Không có hải sản", "Gọi mang đi"]
      answer: 0
      difficulty: 3

speaking_drills:
  - kind: read_aloud
    expected_text: "I'll have the chicken rice, please."
    prompt_vi: "Chủ quán đang đứng chờ, Priya đứng sau bạn. Đọc to — “I'll have” là cách gọi món chuẩn, không phải “I want”."
    ipa: "/aɪl hæv ðə ˈtʃɪkɪn raɪs pliːz/"
    focus_phonemes: [l, s]
  - kind: read_aloud
    expected_text: "I'm allergic to peanuts."
    prompt_vi: "Câu Priya vừa dặn bạn trước khi vào quán. Nói lại cho chủ quán — a-LLER-gic nhấn âm giữa."
    ipa: "/aɪm əˈlɜːrdʒɪk tuː ˈpiːnʌts/"
    focus_phonemes: [dʒ, s, t]
  - kind: shadow
    expected_text: "Could we have the bill, please?"
    prompt_vi: "Ăn xong, Priya muốn tính chung. Nghe rồi nhắc lại."
    ipa: "/kʊd wiː hæv ðə bɪl pliːz/"
    focus_phonemes: [d, l]
  - kind: respond
    prompt_en: "Want to grab lunch?"
    prompt_vi: "Hôm sau Priya rủ lại bạn, lần này cô ấy mời. Đồng ý và xin ít phút chuẩn bị."
    accept_patterns:
      - "Sure give me five minutes"
      - "Yes sounds good"
      - "Sure I'm starving"
  - kind: respond
    prompt_en: "For here or to go?"
    prompt_vi: "Chủ quán hỏi bạn, Priya còn nửa tiếng trước cuộc họp. Trả lời: ăn tại chỗ."
    accept_patterns:
      - "For here thanks"
      - "For here please"
      - "To go please"

vietnamese_explanation:
  why_vi: >
    Gọi món là tình huống dễ vì kịch bản rất hẹp — chỉ vài câu lặp đi lặp lại. Nhưng nó là chỗ
    người mất gốc hay né nhất, vì có áp lực thời gian: người phục vụ đứng chờ, đồng nghiệp đứng
    sau. Cái khó không phải ngôn ngữ, mà là phải nói NGAY.
  how_vi: >
    Học thuộc đúng bốn câu và bạn xử lý được 90% tình huống: "I'll have the ___, please" /
    "For here" hoặc "To go" / "I'm allergic to ___" / "Could we have the bill, please?".
    Bốn câu này không đổi trong suốt sự nghiệp của bạn.
  contrast_vi: "“I want chicken rice” (đúng nghĩa nhưng cộc) ↔ “I'll have the chicken rice, please” (cách người ta thật sự nói)."

common_mistakes:
  - mistake: "“I want the chicken rice.”"
    why_vi: "Dịch thẳng từ “Tôi muốn cơm gà”. Đúng ngữ pháp, nhưng “I want” nghe như trẻ con đòi đồ."
    fix_vi: "Dùng “I'll have…” hoặc “Could I get…”. Cùng độ dài, nhưng đúng nghi thức."
    detect: {}
  - mistake: "Bỏ “please” ở cuối câu"
    why_vi: "Tiếng Việt dùng ngữ điệu và từ đệm để làm mềm, nên bạn quên rằng tiếng Anh cần một từ cụ thể."
    fix_vi: "“Please” ở cuối là bắt buộc trong mọi yêu cầu. Thiếu nó, câu nghe như ra lệnh."
    detect: {}
  - mistake: "Không dám nói về dị ứng vì sợ phiền"
    why_vi: "Ngại làm phức tạp tình huống."
    fix_vi: "Đây là chuyện an toàn, không phải chuyện lịch sự. “I'm allergic to peanuts” là hoàn toàn bình thường."
    detect: {}

memory_trick_vi: >
  Bốn câu, một bữa ăn: gọi (I'll have) → chọn chỗ (for here / to go) → cảnh báo (allergic) →
  trả tiền (the bill). Đúng theo trình tự bạn đi qua quán ăn.

mini_quiz:
  - kind: mcq
    prompt_vi: "Bạn gọi món cho cả bạn và Priya. Câu nào tự nhiên nhất?"
    choices:
      - "I want chicken rice."
      - "I'll have the chicken rice, please."
      - "Give me chicken rice."
    answer: 1
    difficulty: 2
  - kind: mcq
    prompt_vi: "Priya kẹt họp nên nhờ bạn mua giúp. Chủ quán hỏi “For here or to go?”. Nói gì?"
    choices: ["To go, please.", "For here, please.", "Yes."]
    answer: 0
    difficulty: 1
  - kind: mcq
    prompt_vi: "Đến lượt bạn — bạn dị ứng hải sản. Nói với chủ quán thế nào?"
    choices:
      - "I don't like seafood."
      - "I'm allergic to seafood."
      - "No seafood."
    answer: 1
    difficulty: 2
  - kind: mcq_listen
    prompt_vi: "Priya dị ứng với gì?"
    audio_text: "I'm allergic to peanuts."
    choices: ["Đậu phộng", "Hải sản", "Trứng"]
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "Hai người ăn xong, bạn xin hoá đơn. Câu nào lịch sự nhất?"
    choices: ["Bill!", "Could we have the bill, please?", "I want pay."]
    answer: 1
    difficulty: 2

unlock_condition:
  mastery_threshold: 73
  mastery_weights: {speak: 0.35, listen: 0.15, read: 0.15, write: 0.15, quiz: 0.20}
  min_speaking_attempts: 4
  challenge_threshold: 85

recommended_next:
  default: D04
