schema_version: 1
id: O08
slug: tin-nhan-teams-slack
unit: U-O1
title_vi: "Viết tin nhắn Teams/Slack ngắn"
title_en: "Short chat messages at work"
phase: office
topic: office
cefr_target: a2
order_index: 8
est_minutes: 14

objective_vi: "Viết tin nhắn chat công việc ngắn, rõ, đúng mực — chào, nhờ việc, báo bận, cảm ơn."
objective_observable: "Trả lời đúng 4/5 câu quiz chọn tin nhắn phù hợp và đạt ≥70 điểm nói trên drill."

prerequisites:
  - {lesson: O07, min_mastery: 76, kind: hard}

vocabulary:
  - term: "Quick question"
    ipa: "/kwɪk ˈkwɛstʃən/"
    meaning_vi: "Hỏi nhanh chút"
    chunk: "Quick question — is the server up?"
    tags: [office]
  - term: "When you get a chance"
    ipa: "/wɛn juː ɡɛt ə tʃæns/"
    meaning_vi: "Khi nào rảnh (không gấp)"
    chunk: "When you get a chance, can you review this?"
    tags: [office]
  - term: "No rush"
    ipa: "/noʊ rʌʃ/"
    meaning_vi: "Không gấp đâu"
    chunk: "No rush, just whenever."
    tags: [office]
  - term: "On it"
    ipa: "/ɒn ɪt/"
    meaning_vi: "Làm ngay đây (nhận việc)"
    chunk: "On it! Give me ten minutes."
    tags: [office]
  - term: "In a meeting"
    ipa: "/ɪn ə ˈmiːtɪŋ/"
    meaning_vi: "đang họp"
    chunk: "In a meeting, will reply after."
    tags: [office]
  - term: "Thanks a lot"
    ipa: "/θæŋks ə lɒt/"
    meaning_vi: "Cảm ơn nhiều"
    chunk: "Thanks a lot, that helps!"
    tags: [social]

sentence_patterns:
  - pattern: "Quick question — {question}?"
    meaning_vi: "Hỏi nhanh chút — {question}?"
    slots:
      question: ["is the server up", "did the deploy finish", "who has access"]
  - pattern: "When you get a chance, could you {request}? No rush."
    meaning_vi: "Khi nào rảnh, bạn {request} giúp nhé? Không gấp đâu."
    slots:
      request: ["review this PR", "check the logs", "confirm the time"]

dialogue:
  context_vi: >
    Sáng thứ Sáu. Luật tường lửa đã sửa, migration đã chạy, và bạn cần biết bản deploy đêm qua có
    trót lọt không. Priya ở Singapore, đang trong một cuộc họp khác. Cả câu hỏi lẫn câu nhờ đều
    phải gói trong một dòng — vì cô ấy sẽ đọc nó giữa hai slide.
  turns:
    - {speaker: You, en: "Quick question — did the deploy finish?", vi: "Hỏi nhanh chút — deploy xong chưa?"}
    - {speaker: Priya, en: "In a meeting, will reply after. Short answer: yes.", vi: "Đang họp, lát trả lời. Ngắn gọn: rồi."}
    - {speaker: You, en: "Thanks! When you get a chance, could you review my PR? No rush.", vi: "Cảm ơn! Khi nào rảnh review PR giúp mình nhé? Không gấp đâu."}
    - {speaker: Priya, en: "On it after this call. 👍", vi: "Xong call này mình làm ngay. 👍"}

reading_passage:
  id: RP-O08
  kind: chat
  context_vi: >
    Tin nhắn Teams ngắn. Để ý “No rush” và “When you get a chance” — hai cụm khiến lời nhờ
    không thành lời giục.
  text_en: |
    You: Quick question — where is the new logo file?
    Emma: In the shared drive, Brand folder.
    You: Thanks a lot. No rush, but can you check my draft when you get a chance?
    Emma: On it. I am in a meeting until eleven.
    You: No problem.
  text_vi: |
    Bạn: Hỏi nhanh chút — file logo mới nằm ở đâu vậy?
    Emma: Trong ổ chung, thư mục Brand.
    Bạn: Cảm ơn nhiều. Không gấp đâu, nhưng lúc nào rảnh chị xem giúp bản nháp của em nhé?
    Emma: Để chị xem. Chị đang họp tới mười một giờ.
    Bạn: Không sao ạ.
  questions:
    - q_en: "Where is the logo file?"
      choices: ["In the Brand folder on the shared drive", "In an email", "Emma has it"]
      answer: 0
      skill: scan
      difficulty: 2
    - q_en: "When can Emma look at the draft?"
      choices: ["After eleven", "Right now", "Tomorrow"]
      answer: 0
      skill: infer
      difficulty: 3

writing_task:
  id: WT-O08
  kind: guided_email
  prompt_vi: >
    Nhắn Teams cho đồng nghiệp: hỏi file báo cáo tháng trước ở đâu, và nhờ xem giúp bản nháp
    khi nào rảnh. Viết 2-3 câu.
  frame_vi:
    - "Mở: chào ngắn"
    - "Thân: hỏi nhanh + lời nhờ không gấp"
    - "Kết: cảm ơn"
  required_chunks:
    - ["quick question", "one quick question", "quick one"]
    - ["when you get a chance", "no rush", "whenever you can", "when you have time"]
    - ["thanks", "thank you"]
  min_words: 12
  hint_vi: "Tin nhắn công việc nên ngắn, nhưng vẫn phải có lời chào và lời cảm ơn."
  sample_en: "Hi Emma, quick question — where is last month's report? Also, no rush, but could you look at my draft when you get a chance? Thanks a lot!"

listening_snippet:
  id: LS-O08
  speed: 1.0
  voice: en_US_female
  context_vi: >
    Bạn chưa kịp đóng cửa sổ chat thì Linh đăng một tin lên kênh chung. Bốn dòng, đọc mất mười
    giây. Cái khó: dòng quan trọng nhất với bạn nằm ở gần cuối, và chị không gọi tên bạn ra.
  transcript_en: "Heads up, team — I'm on leave all next week. Standup still runs at eight every morning. I've asked our newest engineer to run it. Go easy on them. 👍"
  transcript_vi: "Báo cả team — tuần sau chị nghỉ phép cả tuần. Standup vẫn chạy tám giờ sáng mỗi ngày. Chị đã nhờ bạn kỹ sư mới nhất chủ trì. Nhẹ tay với bạn ấy nhé. 👍"
  questions:
    - q_vi: "Linh nhắn để báo chuyện gì?"
      choices: ["Chị nghỉ phép cả tuần sau", "Standup đổi giờ", "Dự án bị hoãn"]
      answer: 0
      difficulty: 2
    - q_vi: "Ai sẽ chủ trì standup tuần sau?"
      choices: ["Bạn", "Minh", "David"]
      answer: 0
      difficulty: 2

speaking_drills:
  - kind: read_aloud
    expected_text: "Quick question — did the deploy finish?"
    prompt_vi: "Bạn nhắn Priya hỏi bản deploy đêm qua. Đọc to — “Quick question” báo trước rằng tin này ngắn."
    ipa: "/kwɪk ˈkwɛstʃən dɪd ðə dɪˈplɔɪ ˈfɪnɪʃ/"
    focus_phonemes: [k, tʃ, ʃ]
  - kind: read_aloud
    expected_text: "When you get a chance, could you review this? No rush."
    prompt_vi: "Priya đang họp, PR của bạn thì chờ được đến chiều. Đọc to — “No rush” là cách lịch sự với thời gian người kia."
    ipa: "/wɛn juː ɡɛt ə tʃæns kʊd juː rɪˈvjuː ðɪs noʊ rʌʃ/"
    focus_phonemes: [tʃ, r, ʃ]
  - kind: shadow
    expected_text: "In a meeting, will reply after."
    prompt_vi: "Đây là câu Priya trả lời bạn từ trong phòng họp. Nghe rồi nhắc lại — báo bận một dòng vẫn hơn im lặng."
    ipa: "/ɪn ə ˈmiːtɪŋ wɪl rɪˈplaɪ ˈæftər/"
    focus_phonemes: [ŋ, l, r]
  - kind: respond
    prompt_en: "Quick question — is the server up?"
    prompt_vi: "Đến lượt bạn bị hỏi: Minh nhắn hỏi server còn sống không. Trả lời ngắn kiểu chat: có/không + một chi tiết."
    accept_patterns:
      - "Yes it's up"
      - "In a meeting will reply after short answer yes"
      - "On it let me check"

vietnamese_explanation:
  why_vi: >
    Tin nhắn công việc (Teams/Slack) có văn phong riêng: NGẮN, thẳng, nhưng vẫn lịch sự. Người Việt
    hay viết như email trang trọng (dài, "Dear…") hoặc quá cụt (chỉ một chữ). Cả hai đều lệch. Chat
    tốt là một-hai câu, có báo mức độ gấp.
  how_vi: >
    Mở đầu báo loại tin: "Quick question —" (hỏi nhanh), "When you get a chance…" (không gấp),
    "No rush" (thêm cho chắc). Bận thì báo "In a meeting, will reply after". Nhận việc thì "On it".
    Emoji 👍 dùng được và thân thiện.
  contrast_vi: "Email trang trọng “Dear Minh, I would like to…” ↔ chat “Quick question — is the server up?”. Đúng kênh, đúng văn phong."

common_mistakes:
  - mistake: "Viết chat dài như email trang trọng"
    why_vi: "Quen văn phong email, hoặc sợ cụt lủn bị coi là bất lịch sự."
    fix_vi: "Chat cần ngắn. Một-hai câu là đủ. “Dear…” trong Slack nghe kỳ lạ."
    detect: {}
  - mistake: "Nhắn quá cụt, không báo mức độ gấp"
    why_vi: "Chỉ gõ đúng nội dung, quên ngữ cảnh."
    fix_vi: "Thêm “No rush” hoặc “when you get a chance” nếu không gấp — người nhận biết cách sắp xếp."
    detect: {}
  - mistake: "Im lặng khi đang bận, để người kia chờ"
    why_vi: "Nghĩ đang bận thì thôi khỏi trả lời."
    fix_vi: "Nhắn nhanh “In a meeting, will reply after” — một dòng giúp người kia không chờ mòn mỏi."
    detect: {}

memory_trick_vi: >
  Chat công việc = tin nhắn cho bạn thân nhưng lịch sự: NGẮN, có NHÃN mức độ gấp ("no rush" /
  "quick question"), và một emoji 👍 là ổn. Đừng viết như thư gửi sếp lớn.

mini_quiz:
  - kind: mcq
    prompt_vi: "Nhắn Slack hỏi nhanh. Câu nào phù hợp nhất?"
    choices:
      - "Dear Minh, I would like to inquire whether the server is operational."
      - "Quick question — is the server up?"
      - "server?"
    answer: 1
    difficulty: 2
  - kind: mcq
    prompt_vi: "Nhờ review nhưng không gấp. Thêm gì?"
    choices: ["ASAP!!!", "When you get a chance… No rush.", "(không thêm gì)"]
    answer: 1
    difficulty: 2
  - kind: mcq
    prompt_vi: "Đang họp, có người nhắn. Nên làm gì?"
    choices:
      - "Im lặng, họp xong tính"
      - "Nhắn nhanh: “In a meeting, will reply after.”"
      - "Rời họp để trả lời"
    answer: 1
    difficulty: 2
  - kind: mcq
    prompt_vi: "Nhận việc và sẽ làm ngay. Nhắn gì?"
    choices: ["Maybe.", "On it!", "I will think about it."]
    answer: 1
    difficulty: 1
  - kind: mcq_listen
    prompt_vi: "Việc review có gấp không?"
    audio_text: "When you get a chance, could you review my PR? No rush."
    choices: ["Không gấp", "Rất gấp", "Không rõ"]
    answer: 0
    difficulty: 2

unlock_condition:
  mastery_threshold: 76
  mastery_weights: {speak: 0.35, listen: 0.15, read: 0.15, write: 0.15, quiz: 0.20}
  min_speaking_attempts: 4
  challenge_threshold: 85

recommended_next:
  default: CP-O
