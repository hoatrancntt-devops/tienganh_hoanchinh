schema_version: 1
id: O04
slug: hoi-lam-ro-yeu-cau
unit: U-O1
title_vi: "Hỏi làm rõ yêu cầu công việc"
title_en: "Clarifying a request"
phase: office
topic: office
cefr_target: a2
order_index: 4
est_minutes: 14

objective_vi: "Hỏi lại để làm rõ yêu cầu thay vì đoán mò, và xác nhận đã hiểu đúng."
objective_observable: "Đạt ≥75 điểm giao tiếp trên 3/4 drill hỏi làm rõ."

prerequisites:
  - {lesson: O03, min_mastery: 76, kind: hard}
  - {lesson: F08, min_mastery: 63, kind: soft}

vocabulary:
  - term: "Just to be clear"
    ipa: "/dʒʌst tuː biː klɪr/"
    meaning_vi: "Cho rõ ràng thì"
    chunk: "Just to be clear, you need it by Friday?"
    tags: [office]
  - term: "Do you mean"
    ipa: "/duː juː miːn/"
    meaning_vi: "Ý bạn là"
    chunk: "Do you mean the whole report or just section two?"
    tags: [office]
  - term: "by when"
    ipa: "/baɪ wɛn/"
    meaning_vi: "trước khi nào (hạn)"
    chunk: "By when do you need it?"
    tags: [office]
  - term: "So I should"
    ipa: "/soʊ aɪ ʃʊd/"
    meaning_vi: "Vậy tôi nên"
    chunk: "So I should send it to you first?"
    tags: [office]
  - term: "Got it"
    ipa: "/ɡɒt ɪt/"
    meaning_vi: "Hiểu rồi"
    chunk: "Got it, I'll start today."
    tags: [office]
  - term: "priority"
    ipa: "/praɪˈɒrɪti/"
    meaning_vi: "ưu tiên"
    chunk: "Which one is the priority?"
    tags: [office]

sentence_patterns:
  - pattern: "Just to be clear, do you mean {a} or {b}?"
    meaning_vi: "Cho rõ nhé, ý bạn là {a} hay {b}?"
    slots:
      a: ["the whole report", "today"]
      b: ["just section two", "tomorrow"]
  - pattern: "So I should {action}, right?"
    meaning_vi: "Vậy tôi nên {action}, đúng không?"
    slots:
      action: ["send it to you first", "start with the bug", "wait for approval"]

dialogue:
  context_vi: >
    Cuối standup, David giao thẳng cho bạn một việc — đúng một câu, rồi anh ta đã chuyển sang tab
    khác. "Update the report and send it out." Báo cáo nào? Cả bản hay một phần? Gửi cho ai? Bao
    giờ? Bạn có ba giây để hỏi trước khi anh ta rời call, hoặc mất cả ngày mai làm nhầm thứ.
  turns:
    - {speaker: David, en: "Can you update the report and send it out? Thanks.", vi: "Cập nhật báo cáo rồi gửi đi nhé? Cảm ơn."}
    - {speaker: You, en: "Sure. Just to be clear, do you mean the whole report or just section two?", vi: "Vâng. Cho rõ nhé, ý anh là cả báo cáo hay chỉ phần hai?"}
    - {speaker: David, en: "Just section two. And send it to me first.", vi: "Chỉ phần hai. Và gửi cho tôi trước."}
    - {speaker: You, en: "Got it. By when do you need it?", vi: "Hiểu rồi. Anh cần trước khi nào?"}
    - {speaker: David, en: "End of day tomorrow.", vi: "Cuối ngày mai."}

reading_passage:
  id: RP-O04
  kind: chat
  context_vi: >
    Một yêu cầu mơ hồ được làm rõ trong bốn lượt. Đọc để thấy hỏi lại không hề mất mặt —
    nó tiết kiệm cả ngày làm sai.
  text_en: |
    Linh: Please clean up the old records before Friday.
    You: Just to be clear — do you mean all records, or only the test ones?
    Linh: Only the test ones.
    You: Got it. And by when exactly?
    Linh: By Friday lunchtime. It is high priority.
    You: So I should finish before Friday noon. Understood.
  text_vi: |
    Linh: Bạn dọn giúp các bản ghi cũ trước thứ Sáu nhé.
    Bạn: Cho em hỏi cho rõ — chị nói tất cả bản ghi hay chỉ bản ghi thử nghiệm ạ?
    Linh: Chỉ bản ghi thử nghiệm thôi.
    Bạn: Em rõ rồi. Hạn chính xác là khi nào ạ?
    Linh: Trước trưa thứ Sáu. Việc này ưu tiên cao.
    Bạn: Vậy em phải xong trước trưa thứ Sáu. Em hiểu rồi.
  questions:
    - q_en: "Which records must be cleaned?"
      choices: ["Only the test ones", "All of them", "The new ones"]
      answer: 0
      skill: scan
      difficulty: 2
    - q_en: "What is the real deadline?"
      choices: ["Friday lunchtime", "End of Friday", "Next Monday"]
      answer: 0
      skill: infer
      difficulty: 3

writing_task:
  id: WT-O04
  kind: guided_email
  prompt_vi: >
    Quản lý nhắn “update the docs before the release”. Viết thư hỏi lại cho rõ: tài liệu nào,
    hạn khi nào. Viết 3-4 câu.
  frame_vi:
    - "Mở: chào"
    - "Thân: nhắc lại yêu cầu + hỏi rõ phạm vi + hỏi rõ hạn"
    - "Kết: cảm ơn"
  required_chunks:
    - ["just to be clear", "to be clear", "can i check", "just to check"]
    - ["do you mean", "did you mean"]
    - ["by when", "what is the deadline", "what's the deadline"]
  min_words: 15
  hint_vi: "Hỏi lại bằng cách đưa ra hai phương án cụ thể — dễ trả lời hơn câu hỏi mở."
  sample_en: "Hi Linh, just to be clear — do you mean all the docs, or only the API pages? And by when do you need them? Thanks, Hoa"

listening_snippet:
  id: LS-O04
  speed: 1.0
  voice: en_US_female
  context_vi: >
    David chưa rời call. Anh ta nói thêm một đoạn nữa, nhanh hơn nữa, trước khi tắt mic. Cái khó:
    anh ta nói "EOD" thay vì "end of day", "ping me" thay vì "message me", và câu dặn quan trọng
    nhất nằm ở cuối, lúc giọng đã trôi đi.
  transcript_en: "One more thing — section two is the priority, the rest can wait. If Linh asks, tell her I said so. And ping me if you're blocked. Don't sit on it."
  transcript_vi: "Một điều nữa — phần hai là ưu tiên, phần còn lại để sau. Nếu Linh hỏi, cứ bảo là tôi nói vậy. Và nhắn cho tôi nếu bị kẹt. Đừng ôm một mình."
  questions:
    - q_vi: "David nói phần nào là ưu tiên?"
      choices: ["Phần hai", "Cả báo cáo", "Phần một"]
      answer: 0
      difficulty: 2
    - q_vi: "David dặn bạn làm gì nếu bị kẹt?"
      choices: ["Nhắn cho anh ấy ngay", "Đợi đến standup hôm sau", "Tự xoay xở cho xong"]
      answer: 0
      difficulty: 3

speaking_drills:
  - kind: read_aloud
    expected_text: "Just to be clear, do you mean the whole report or just section two?"
    prompt_vi: "David vừa nói “update the report”. Chặn lại trước khi anh ta rời call. Đọc to — hỏi làm rõ mà không làm người kia khó chịu."
    ipa: "/dʒʌst tuː biː klɪr duː juː miːn ðə hoʊl rɪˈpɔːrt ɔr dʒʌst ˈsɛkʃən tuː/"
    focus_phonemes: [dʒ, r, s]
  - kind: read_aloud
    expected_text: "By when do you need it?"
    prompt_vi: "David nói rõ phạm vi rồi nhưng chưa nói hạn. Đọc to — luôn hỏi hạn chót nếu chưa được nói."
    ipa: "/baɪ wɛn duː juː niːd ɪt/"
    focus_phonemes: [w, n, d]
  - kind: shadow
    expected_text: "Got it. So I should send it to you first, right?"
    prompt_vi: "Trước khi David tắt mic, nhắc lại một lần cho chắc. Nghe rồi nói theo — xác nhận giúp bạn khỏi làm nhầm cả ngày mai."
    ipa: "/ɡɒt ɪt soʊ aɪ ʃʊd sɛnd ɪt tuː juː fɜːrst raɪt/"
    focus_phonemes: [t, s, ʃ]
  - kind: respond
    prompt_en: "Can you fix the login bug and deploy it?"
    prompt_vi: "David giao thêm một việc nữa, cũng cụt ngủn. Bạn chưa rõ có nên deploy ngay không. Hỏi làm rõ."
    accept_patterns:
      - "Just to be clear should I deploy right after or wait"
      - "Do you mean deploy today or tomorrow"
      - "By when do you need it"

vietnamese_explanation:
  why_vi: >
    Hỏi lại để làm rõ là dấu hiệu của người làm việc CẨN THẬN, không phải người kém. Nhưng người
    Việt thường sợ hỏi lại — sợ bị coi là chậm hiểu — nên gật đầu rồi đoán mò, và làm sai. Sửa lại
    một việc đã làm sai tốn thời gian của cả hai gấp nhiều lần một câu hỏi.
  how_vi: >
    Ba câu vàng: "Just to be clear, do you mean A or B?" (làm rõ phạm vi) → "By when do you need it?"
    (hạn chót) → "So I should…, right?" (xác nhận đã hiểu). Ba câu này khiến bạn trông chuyên nghiệp
    hơn, không phải kém hơn.
  contrast_vi: "Gật đầu rồi đoán ↔ hỏi một câu làm rõ. Cái sau tiết kiệm cả buổi làm lại."

common_mistakes:
  - mistake: "Gật đầu “OK” khi chưa rõ phạm vi hoặc hạn chót"
    why_vi: "Sợ bị đánh giá là chậm hiểu nếu hỏi lại."
    fix_vi: "Dùng “Just to be clear…” — nghe rất chuyên nghiệp. Người giao việc thường cũng chưa nói rõ, câu hỏi của bạn giúp họ."
    detect: {}
  - mistake: "Không hỏi hạn chót, tự đoán"
    why_vi: "Ngại hỏi thêm."
    fix_vi: "“By when do you need it?” — một câu ngắn tránh được việc bạn làm gấp thứ không gấp, hoặc để trễ thứ gấp."
    detect: {}
  - mistake: "“What?” hoặc “I don't understand” khi chưa rõ"
    why_vi: "Nghe hơi cộc và không cụ thể."
    fix_vi: "Hỏi cụ thể: “Do you mean A or B?”. Câu hỏi cụ thể giúp người kia trả lời nhanh."
    detect: {}

memory_trick_vi: >
  Trước khi bắt tay làm, hỏi ba chữ: CÁI GÌ (phạm vi) — KHI NÀO (hạn) — XÁC NHẬN (so I should…?).
  Ba câu hỏi này là “đo hai lần, cắt một lần” của công sở.

mini_quiz:
  - kind: mcq
    prompt_vi: "Sếp giao việc chưa rõ phạm vi. Bạn nên làm gì?"
    choices:
      - "Gật đầu rồi tự đoán"
      - "Hỏi: “Just to be clear, do you mean A or B?”"
      - "Làm hết cho chắc"
    answer: 1
    difficulty: 2
  - kind: mcq
    prompt_vi: "Chưa biết hạn chót. Hỏi thế nào?"
    choices: ["When?", "By when do you need it?", "Is it urgent for you personally?"]
    answer: 1
    difficulty: 2
  - kind: mcq
    prompt_vi: "Vì sao hỏi làm rõ lại tốt?"
    choices:
      - "Vì làm sai rồi sửa tốn thời gian gấp nhiều lần"
      - "Vì kéo dài cuộc họp"
      - "Vì để tỏ ra bận rộn"
    answer: 0
    difficulty: 2
  - kind: fill_chunk
    prompt_vi: "Xác nhận lại: “So I ___ send it to you first, right?”"
    choices: [should, will, must]
    answer: 0
    difficulty: 2

unlock_condition:
  mastery_threshold: 76
  mastery_weights: {speak: 0.35, listen: 0.15, read: 0.15, write: 0.15, quiz: 0.20}
  min_speaking_attempts: 4
  challenge_threshold: 85

recommended_next:
  default: O05
