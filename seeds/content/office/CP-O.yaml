reading_passage:
  id: RP-CPO
  kind: email
  context_vi: >
    Một email gom đủ ba thứ chặng này dạy: báo standup, báo tiến độ, và xin nghỉ. Bài chốt —
    đọc một lần rồi trả lời.
  text_en: |
    Subject: Standup notes and Friday plan

    Hi team,

    Yesterday I finished the login page. Today I will start the payment screen.
    I am blocked by the API key, so I will follow up with David after this.
    The report is about halfway done and on track for Thursday.
    I would like to take Friday off — Minh can cover for me.

    Thanks,
    Nam
  text_vi: |
    Tiêu đề: Ghi chú standup và kế hoạch thứ Sáu

    Chào cả nhóm,

    Hôm qua tôi làm xong trang đăng nhập. Hôm nay tôi bắt đầu màn hình thanh toán.
    Tôi đang bị kẹt vì khoá API, nên sau buổi này tôi sẽ hỏi David.
    Báo cáo xong khoảng một nửa và vẫn đúng tiến độ cho thứ Năm.
    Tôi muốn xin nghỉ thứ Sáu — Minh có thể trực thay tôi.

    Cảm ơn,
    Nam
  questions:
    - q_en: "What is Nam blocked by?"
      choices: ["The API key", "The report", "Minh"]
      answer: 0
      skill: scan
      difficulty: 2
    - q_en: "Who will cover for Nam on Friday?"
      choices: ["Minh", "David", "Nobody"]
      answer: 0
      skill: scan
      difficulty: 2
    - q_en: "What is this email mainly about?"
      choices: ["Nam's progress and his day off", "A system failure", "A new project plan"]
      answer: 0
      skill: skim
      difficulty: 3

writing_task:
  id: WT-CPO
  kind: guided_email
  prompt_vi: >
    Viết một email gộp: báo standup của bạn, và xin nghỉ một ngày trong tuần tới.
    Viết 4-5 câu.
  frame_vi:
    - "Mở: chào cả nhóm"
    - "Thân: hôm qua làm gì + hôm nay làm gì + có bị chặn không"
    - "Thân: xin nghỉ ngày nào + ai trực thay"
    - "Kết: cảm ơn và ký tên"
  required_chunks:
    - ["yesterday i"]
    - ["blocked by", "no blockers", "i'm blocked", "nothing is blocking"]
    - ["i'd like to take", "i would like to take", "i want to take", "can i take"]
  min_words: 20
  hint_vi: "Gộp hai việc vào một email thì phải tách đoạn rõ, đừng viết dính thành một khối."
  sample_en: "Hi team, yesterday I finished the API tests and today I will start the report. I have no blockers right now. Also, I would like to take next Wednesday off — Minh can cover for me. Thanks, Hoa"

listening_snippet:
  id: LS-CPO
  speed: 1.0
  voice: en_US_male
  context_vi: >
    Thứ Hai, 7 giờ 58. Linh nghỉ phép cả tuần, và ghế chủ trì standup là của bạn. David đã vào
    call, Priya đã vào call, Minh ngồi cạnh bạn. Bạn gọi tên Minh trước — và đây là những gì anh
    ấy nói, một hơi, không nghỉ. Cái khó: trong bốn câu này có một câu hỏi, một tin tốt, một tin
    xấu và một lời đề nghị. Bạn là người phải bắt hết và chuyển tiếp cho David.
  transcript_en: "Just to be clear, do you mean the whole report? The first half is almost done, on track for end of day. Just a heads up, I'm running a bit behind on the second half. Are you free at four to go over it?"
  transcript_vi: "Cho rõ nhé, ý anh là cả báo cáo? Nửa đầu gần xong, đúng tiến độ cuối ngày. Báo trước để anh biết, nửa sau tôi đang hơi trễ. Bốn giờ anh rảnh để rà soát không?"
  questions:
    - q_vi: "Minh làm gì ở câu đầu?"
      choices: ["Hỏi làm rõ yêu cầu", "Từ chối việc", "Xin nghỉ"]
      answer: 0
      difficulty: 2
    - q_vi: "Phần nào đang bị trễ?"
      choices: ["Nửa sau báo cáo", "Cả báo cáo", "Cuộc họp"]
      answer: 0
      difficulty: 3
    - q_vi: "Vì sao Minh nói “Just a heads up”?"
      choices: ["Để báo trễ sớm cho người kia chủ động", "Để xin lỗi", "Để kết thúc"]
      answer: 0
      difficulty: 3

speaking_drills:
  - kind: respond
    prompt_en: "Can you update the report and send it out?"
    prompt_vi: "David ném việc vào giữa standup của bạn, cụt như mọi khi. Chưa rõ phạm vi và hạn — hỏi làm rõ ngay trước khi anh ta rời call."
    accept_patterns:
      - "Just to be clear do you mean the whole report or just section two By when do you need it"
      - "Do you mean the whole report And by when"
      - "Sure just to be clear which part and by when do you need it"
  - kind: respond
    prompt_en: "How's the migration coming along?"
    prompt_vi: "Đến phần của chính bạn, và migration vẫn chưa xong. Báo tiến độ trung thực: đang ở đâu, đúng hay trễ, khi nào xong."
    accept_patterns:
      - "About halfway on track for end of day"
      - "Almost done I'll have it by {time}"
      - "Just a heads up I'm running a bit behind I'll need until {time}"
  - kind: respond
    prompt_en: "Two doesn't work for me. Can we find another time?"
    prompt_vi: "Priya cần một buổi rà soát nhưng giờ Minh đề xuất thì cô ấy bận. Bạn đang chủ trì — đề xuất giờ khác và chốt bằng lời mời họp."
    accept_patterns:
      - "Are you free at four Does that work I'll send an invite"
      - "Can we push it back to {time} I'll send an invite"
      - "How about {time} works for me I'll send an invite"
  - kind: shadow
    expected_text: "Do you have a minute? I'm stuck on the deploy step. I've already tried restarting."
    prompt_vi: "Standup tan, và lần này bạn không đợi đến thứ Năm mới nói. Nghe rồi nhắc lại ở tốc độ thật — nêu vấn đề gọn, nói đã thử gì."
    ipa: "/duː juː hæv ə ˈmɪnɪt aɪm stʌk ɒn ðə dɪˈplɔɪ stɛp aɪv ɔːlˈrɛdi traɪd riːˈstɑːrtɪŋ/"
    focus_phonemes: [t, k, d]

vietnamese_explanation:
  why_vi: >
    Tám bài Office dạy từng kỹ năng riêng: nhận việc, hỏi làm rõ, báo tiến độ, đặt lịch, xin giúp đỡ,
    nhắn tin. Trong một ngày làm thật, chúng đan vào nhau — sếp giao việc mơ hồ, bạn hỏi lại, làm được
    nửa thì kẹt phải xin giúp, rồi báo trễ và dời họp. Bài này kiểm tra bạn nối các mảnh đó có mượt không.
  how_vi: >
    Làm một lượt như một ngày làm việc. Ba phản xạ cốt lõi cần chắc: HỎI LÀM RÕ trước khi bắt tay,
    BÁO TIẾN ĐỘ trung thực (nhất là khi trễ), và XIN GIÚP ĐÚNG CÁCH (nêu vấn đề gọn + đã thử gì).
    Đừng cố nói hoa mỹ — nói rõ để người kia hành động đúng là đủ.
  contrast_vi: "Gật đại rồi đoán mò, giấu việc trễ, tự vật lộn ↔ hỏi làm rõ, báo trễ sớm, xin giúp gọn. Chỉ nhóm sau giữ được lòng tin ở công sở."

common_mistakes:
  - mistake: "Gật “OK” khi chưa rõ phạm vi hoặc hạn chót"
    why_vi: "Sợ bị coi là chậm hiểu nếu hỏi lại, nên đoán mò rồi làm sai."
    fix_vi: "Một câu “Just to be clear…” + “By when?” tiết kiệm cả buổi làm lại. Hỏi làm rõ là chuyên nghiệp, không phải kém."
    detect: {}
  - mistake: "Giấu việc trễ đến phút chót"
    why_vi: "Dưới áp lực đo điểm và thói quen sợ bị trách, phần báo trễ sớm là thứ bị bỏ đầu tiên."
    fix_vi: "Mở đầu bằng “Just a heads up…” ngay khi thấy sắp trễ. Báo sớm luôn được đánh giá cao hơn im lặng rồi lỡ hạn."
    detect: {}
  - mistake: "Trượt rồi làm lại ngay"
    why_vi: "Muốn qua nhanh cho xong phase."
    fix_vi: "Ôn đúng bài yếu một buổi rồi quay lại hôm sau. Hệ thống sẽ chỉ đúng bài cần ôn."
    detect: {}

memory_trick_vi: >
  Qua được bài này nghĩa là bạn sống sót một ngày công sở bằng tiếng Anh: nhận việc rõ ràng, báo
  tiến độ thật, xin giúp gọn, dời họp lịch sự. Phần còn lại của khoá là tiếng Anh chuyên ngành (IT).

