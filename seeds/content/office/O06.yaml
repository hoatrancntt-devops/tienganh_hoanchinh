schema_version: 1
id: O06
slug: dat-lich-hop
unit: U-O1
title_vi: "Đặt và dời lịch họp"
title_en: "Scheduling a meeting"
phase: office
topic: office
cefr_target: a2
order_index: 6
est_minutes: 14

objective_vi: "Đề xuất giờ họp, hỏi người khác có rảnh không, và dời lịch một cách lịch sự."
objective_observable: "Đạt ≥75 điểm giao tiếp trên 3/4 drill đặt lịch."

prerequisites:
  - {lesson: O05, min_mastery: 76, kind: hard}

vocabulary:
  - term: "Are you free"
    ipa: "/ɑr juː friː/"
    meaning_vi: "Bạn có rảnh không"
    chunk: "Are you free at three?"
    tags: [office]
  - term: "Does that work"
    ipa: "/dʌz ðæt wɜːrk/"
    meaning_vi: "Vậy có tiện không"
    chunk: "Thursday at two — does that work for you?"
    tags: [office]
  - term: "push it back"
    ipa: "/pʊʃ ɪt bæk/"
    meaning_vi: "dời (họp) lại muộn hơn"
    chunk: "Can we push it back to four?"
    tags: [office]
  - term: "reschedule"
    ipa: "/riːˈskɛdʒuːl/"
    meaning_vi: "đổi lịch"
    chunk: "Can we reschedule to tomorrow?"
    tags: [office]
  - term: "send an invite"
    ipa: "/sɛnd ən ɪnˈvaɪt/"
    meaning_vi: "gửi lời mời họp (lịch)"
    chunk: "I'll send an invite for Thursday."
    tags: [office]
  - term: "works for me"
    ipa: "/wɜːrks fɔr miː/"
    meaning_vi: "với tôi thì tiện"
    chunk: "Two o'clock works for me."
    tags: [office]

sentence_patterns:
  - pattern: "Are you free {time}? Does that work?"
    meaning_vi: "Bạn rảnh {time} không? Vậy có tiện không?"
    slots:
      time: ["at three", "Thursday morning", "after lunch"]
  - pattern: "Can we push it back to {time}?"
    meaning_vi: "Ta dời lại {time} được không?"
    slots:
      time: [four, tomorrow, "next week"]

dialogue:
  context_vi: >
    Migration cần một buổi rà soát có cả Priya (Singapore) lẫn David (Mỹ). Ba người, ba múi giờ —
    và lần này việc đặt lịch không còn là chọn giờ nào bạn rảnh, mà là tìm cái giờ duy nhất mà
    không ai phải thức đêm. Bạn nhắn Priya trước.
  turns:
    - {speaker: You, en: "Priya, are you free Thursday at two? I'd like to go over the migration plan.", vi: "Priya, thứ Năm hai giờ bạn rảnh không? Mình muốn rà soát kế hoạch migration."}
    - {speaker: Priya, en: "Two doesn't work for me — that's three my time. Can we push it back to four?", vi: "Hai giờ mình không tiện — bên mình là ba giờ. Dời lại bốn giờ được không?"}
    - {speaker: You, en: "Four works for me. I'll send an invite.", vi: "Bốn giờ mình tiện. Mình sẽ gửi lời mời họp."}
    - {speaker: Priya, en: "Great, thanks. See you then.", vi: "Tuyệt, cảm ơn. Hẹn gặp lúc đó."}

reading_passage:
  id: RP-O06
  kind: chat
  context_vi: >
    Chốt lịch họp trong năm lượt. Để ý cách từ chối một giờ mà vẫn đề xuất giờ khác ngay —
    đó là cách không làm bế tắc cuộc trao đổi.
  text_en: |
    Minh: Are you free at three tomorrow?
    You: I have another call then. Does four work?
    Minh: Four works for me. I will send an invite.
    You: Great. Can we push it back to Thursday if the data is late?
    Minh: Sure, we can reschedule.
  text_vi: |
    Minh: Ba giờ chiều mai bạn rảnh không?
    Bạn: Lúc đó tôi có cuộc gọi khác. Bốn giờ được không?
    Minh: Bốn giờ được. Tôi gửi lời mời họp nhé.
    Bạn: Tốt quá. Nếu dữ liệu về muộn thì dời sang thứ Năm được không?
    Minh: Được chứ, mình dời lịch cũng được.
  questions:
    - q_en: "What time did they agree on?"
      choices: ["Four", "Three", "Thursday"]
      answer: 0
      skill: scan
      difficulty: 2
    - q_en: "What might change the meeting day?"
      choices: ["Late data", "Minh's holiday", "A room problem"]
      answer: 0
      skill: infer
      difficulty: 3

writing_task:
  id: WT-O06
  kind: guided_email
  prompt_vi: >
    Đề nghị họp với David: hỏi anh ấy rảnh không, đề xuất giờ, và nói bạn sẽ gửi lời mời.
    Viết 3-4 câu.
  frame_vi:
    - "Mở: chào"
    - "Thân: hỏi rảnh không + đề xuất giờ cụ thể"
    - "Kết: sẽ gửi lời mời + cảm ơn"
  required_chunks:
    - ["are you free", "would you be free", "do you have time"]
    - ["does that work", "works for me", "would that work", "if that works", "that works for you"]
    - ["send an invite", "i'll send", "i will send"]
  min_words: 15
  hint_vi: "Luôn đề xuất một giờ cụ thể. Hỏi “khi nào anh rảnh?” thường nhận lại im lặng."
  sample_en: "Hi David, are you free at ten tomorrow to talk about the release? If that works for you, I will send an invite this afternoon. Thanks, Hoa"

listening_snippet:
  id: LS-O06
  speed: 1.0
  voice: en_US_female
  context_vi: >
    Bạn gửi lời mời 4 giờ chiều thứ Năm cho cả David. Mười phút sau anh ta trả lời — và bạn nhận
    ra mình quên mất múi giờ thứ ba. Cái khó: David nói giờ của HAI nơi trong cùng một câu, không
    dừng lại giải thích cái nào là của ai.
  transcript_en: "Four your time is one in the morning here. Can we reschedule? Move it to nine your Friday morning — that's ten at night for me, and that works. Resend the invite."
  transcript_vi: "Bốn giờ bên bạn là một giờ sáng bên tôi. Đổi lịch được không? Chuyển sang chín giờ sáng thứ Sáu bên bạn — bên tôi là mười giờ tối, giờ đó thì tiện. Gửi lại lời mời nhé."
  questions:
    - q_vi: "Vì sao David không họp được lúc 4 giờ chiều giờ Việt Nam?"
      choices: ["Vì bên anh ấy là 1 giờ sáng", "Vì anh ấy đang họp khác", "Vì anh ấy nghỉ phép"]
      answer: 0
      difficulty: 2
    - q_vi: "David đề xuất chuyển sang giờ nào (giờ Việt Nam)?"
      choices: ["9 giờ sáng thứ Sáu", "4 giờ chiều thứ Sáu", "10 giờ tối thứ Năm"]
      answer: 0
      difficulty: 3

speaking_drills:
  - kind: read_aloud
    expected_text: "Are you free Thursday at two?"
    prompt_vi: "Bạn nhắn Priya để chốt buổi rà soát migration. Đọc to — cách hỏi lịch nhẹ nhàng."
    ipa: "/ɑr juː friː ˈθɜːrzdeɪ æt tuː/"
    focus_phonemes: [r, θ, t]
  - kind: read_aloud
    expected_text: "Can we push it back to four?"
    prompt_vi: "Giờ Priya đề xuất lại lệch với bạn. Đọc to — dời họp lịch sự, không cần xin lỗi dài."
    ipa: "/kæn wiː pʊʃ ɪt bæk tuː fɔr/"
    focus_phonemes: [k, ʃ]
  - kind: shadow
    expected_text: "Four works for me. I'll send an invite."
    prompt_vi: "Priya đã chốt bốn giờ. Nghe rồi nhắc lại — chốt giờ xong là gửi lịch ngay, đừng để trôi."
    ipa: "/fɔr wɜːrks fɔr miː aɪl sɛnd ən ɪnˈvaɪt/"
    focus_phonemes: [f, k, s]
  - kind: respond
    prompt_en: "Are you free at two for a quick sync?"
    prompt_vi: "Priya rủ họp nhanh lúc hai giờ, nhưng lúc đó bạn đang trực. Đừng chỉ nói không — đề xuất giờ khác."
    accept_patterns:
      - "Two doesn't work can we push it back to {time}"
      - "Sorry I'm busy at two how about {time}"
      - "Can we do {time} instead"

vietnamese_explanation:
  why_vi: >
    Đặt lịch họp là chuỗi câu ngắn có công thức: hỏi rảnh → xác nhận tiện → gửi lời mời. Nếu bận,
    dời lịch bằng "push it back" hoặc "reschedule" — không cần xin lỗi dài dòng. Người Việt hay
    ngại nói "tôi không tiện" nên gật đại rồi lỡ họp; nói thẳng và đề xuất giờ khác thì tốt hơn.
  how_vi: >
    Ba câu: "Are you free at…?" (hỏi rảnh) → "Does that work?" (xác nhận) → "I'll send an invite"
    (gửi lịch). Cần dời thì "Can we push it back to…?". Đề xuất giờ thay thế luôn, đừng chỉ nói "không".
  contrast_vi: "“I can't” (cụt) ↔ “Two doesn't work — can we push it back to four?” (nói không kèm giải pháp)."

common_mistakes:
  - mistake: "Gật đồng ý giờ họp dù thật ra bận"
    why_vi: "Ngại từ chối. Nhưng lỡ họp còn khó xử hơn nhiều."
    fix_vi: "Nói thẳng “Two doesn't work” và đề xuất giờ khác ngay. Đó là chuyện bình thường ở công sở."
    detect: {}
  - mistake: "Từ chối cụt lủn: “No, I can't.”"
    why_vi: "Chỉ nói không, không đưa giải pháp."
    fix_vi: "Luôn kèm đề xuất thay thế: “Can we push it back to four?”. Từ chối kèm giải pháp mới là hợp tác."
    detect: {}
  - mistake: "Xin lỗi quá dài khi dời họp"
    why_vi: "Nghĩ dời họp là lỗi lớn."
    fix_vi: "Dời họp là bình thường. “Can we reschedule to tomorrow?” là đủ, không cần xin lỗi rối rít."
    detect: {}

memory_trick_vi: >
  Đặt lịch như đánh bóng bàn: HỎI RẢNH → ĐỠ (tiện/không tiện) → nếu không, ĐÁNH TRẢ một giờ khác.
  Đừng để bóng rơi bằng cách chỉ nói “no”.

mini_quiz:
  - kind: mcq
    prompt_vi: "Hỏi đồng nghiệp có rảnh họp không. Câu nào tự nhiên?"
    choices: ["You have time?", "Are you free Thursday at two?", "Meeting now?"]
    answer: 1
    difficulty: 2
  - kind: mcq
    prompt_vi: "Giờ họp đề xuất bạn bận. Nên nói gì?"
    choices:
      - "No."
      - "Two doesn't work — can we push it back to four?"
      - "(gật đồng ý dù bận)"
    answer: 1
    difficulty: 2
  - kind: fill_chunk
    prompt_vi: "Chốt giờ: “Four ___ for me.” (tiện)"
    choices: [works, work, working]
    answer: 0
    difficulty: 2
  - kind: mcq_listen
    prompt_vi: "Nếu không tiện thì dời tới mấy giờ?"
    audio_text: "We can push it back to four."
    choices: ["Bốn giờ", "Hai giờ", "Sáu giờ"]
    answer: 0
    difficulty: 3

unlock_condition:
  mastery_threshold: 76
  mastery_weights: {speak: 0.35, listen: 0.15, read: 0.15, write: 0.15, quiz: 0.20}
  min_speaking_attempts: 4
  challenge_threshold: 85

recommended_next:
  default: O07
