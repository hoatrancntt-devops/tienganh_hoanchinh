schema_version: 1
id: F01
slug: am-th-think-va-this
unit: U-F1
title_vi: "Âm /θ/ và /ð/ — hai âm tiếng Việt không có"
title_en: "The TH sounds"
phase: foundation
topic: core
cefr_target: pre_a1
order_index: 1
est_minutes: 14

objective_vi: "Phát âm được /θ/ trong think và /ð/ trong this, và phân biệt được chúng với /t/ và /d/ khi nghe."
objective_observable: "Đạt ≥80 điểm phát âm trên 3/4 câu drill có chứa /θ/ hoặc /ð/."

# Soft, không hard: người học cũ đã mở F01 rồi thì không bị khoá lại. Người mới vào
# bằng S01 sẽ đi qua bốn bài sinh tồn trước, theo recommended_next của S04.
prerequisites:
  - {lesson: S04, min_mastery: 70, kind: soft}

vocabulary:
  - term: think
    ipa: "/θɪŋk/"
    meaning_vi: "nghĩ, cho rằng"
    chunk: "I think so."
    tags: [core, verb]
  - term: thanks
    ipa: "/θæŋks/"
    meaning_vi: "cảm ơn"
    chunk: "Thanks for your help."
    tags: [social]
  - term: this
    ipa: "/ðɪs/"
    meaning_vi: "cái này, người này"
    chunk: "This is Linh."
    tags: [core]
  - term: that
    ipa: "/ðæt/"
    meaning_vi: "cái đó"
    chunk: "That works for me."
    tags: [core]
  - term: three
    ipa: "/θriː/"
    meaning_vi: "số ba"
    chunk: "The sync is at three."
    tags: [core, number]
  - term: thirty
    ipa: "/ˈθɜːrti/"
    meaning_vi: "số ba mươi"
    chunk: "Ten thirty, not ten thirteen."
    tags: [core, number]

sentence_patterns:
  - pattern: "I think {opinion}."
    meaning_vi: "Tôi nghĩ là {opinion}."
    slots:
      opinion: ["that's right", "we can do it", "it's too late"]
  - pattern: "This is {person}."
    meaning_vi: "Đây là {person}."
    slots:
      person: ["Minh", "my colleague", "our new teammate"]

dialogue:
  context_vi: "Ngày đầu của bạn ở Vertex. Minh dẫn bạn qua bàn của Linh — team lead — để giới thiệu."
  turns:
    - {speaker: Minh, en: "Linh, this is our new teammate. I think you two haven't met.", vi: "Linh, đây là đồng nghiệp mới của mình. Em nghĩ hai người chưa gặp nhau."}
    - {speaker: Linh, en: "Not yet. Nice to meet you. Thanks for coming in early today.", vi: "Chưa. Rất vui được gặp bạn. Cảm ơn bạn hôm nay đến sớm."}
    - {speaker: Minh, en: "The team sync is at three thirty, right?", vi: "Buổi họp team lúc ba giờ rưỡi đúng không?"}
    - {speaker: Linh, en: "That's right. See you there.", vi: "Đúng rồi. Gặp ở đó nhé."}

reading_passage:
  id: RP-F01
  kind: chat
  context_vi: >
    Linh nhắn tin báo đổi giờ họp. Ba mươi hay mười ba — đọc kỹ, đây đúng là chỗ dễ nhầm nhất.
  text_en: |
    Linh: The sync is at three thirty.
    You: Three thirty? Not three thirteen?
    Linh: Three thirty. This is the new time.
    You: OK, thanks. I think I can make it.
  text_vi: |
    Linh: Buổi sync lúc ba giờ ba mươi.
    Bạn: Ba giờ ba mươi? Không phải ba giờ mười ba à?
    Linh: Ba giờ ba mươi. Đây là giờ mới.
    Bạn: OK, cảm ơn. Tôi nghĩ là tôi đến kịp.
  questions:
    - q_en: "What time is the sync?"
      choices: ["Three thirty", "Three thirteen", "Three"]
      answer: 0
      skill: scan
      difficulty: 1
    - q_en: "What is this chat about?"
      choices: ["A new meeting time", "A new project", "A thank-you note"]
      answer: 0
      skill: skim
      difficulty: 2

writing_task:
  id: WT-F01
  kind: fill_blank
  prompt_vi: "Điền hai chỗ trống. Cả hai từ đều có âm /th/ vừa học."
  prompt_en: "I ___ I can make it. ___ for your help."
  blanks:
    - ["think"]
    - ["thanks", "thank you"]
  hint_vi: "Câu đầu là động từ “nghĩ”. Câu sau là lời cảm ơn."
  sample_en: "I think I can make it. Thanks for your help."

listening_snippet:
  id: LS-F01
  speed: 0.85
  voice: en_US_female
  context_vi: >
    Linh quay lại dặn bạn thêm một câu trước khi đi. Đây chính là chỗ bạn sẽ nghe nhầm nếu tai
    chưa quen: giờ họp là 3:30 hay 3:13?
  transcript_en: "One more thing — the team sync is at three thirty, not three thirteen. Minh will show you the room."
  transcript_vi: "Một điều nữa — buổi họp team lúc ba giờ ba mươi, không phải ba giờ mười ba. Minh sẽ chỉ phòng cho bạn."
  questions:
    - q_vi: "Buổi họp team lúc mấy giờ?"
      choices: ["3:13", "3:30", "3:00"]
      answer: 1
      difficulty: 3
    - q_vi: "Ai sẽ chỉ phòng họp cho bạn?"
      choices: ["Minh", "Linh", "Không ai cả"]
      answer: 0
      difficulty: 1

speaking_drills:
  - kind: read_aloud
    expected_text: "I think so."
    prompt_vi: "Linh vừa hỏi bạn một câu. Đọc to — chú ý lưỡi chạm răng ở đầu từ think."
    ipa: "/aɪ θɪŋk soʊ/"
    focus_phonemes: [θ]
  - kind: read_aloud
    expected_text: "This is Linh."
    prompt_vi: "Minh đang giới thiệu bạn với Linh. Đọc to — âm đầu của this có rung, sờ cổ họng sẽ thấy."
    ipa: "/ðɪs ɪz lɪn/"
    focus_phonemes: [ð]
  - kind: shadow
    expected_text: "Thanks for your help."
    prompt_vi: "Linh cảm ơn bạn đến sớm, bạn đáp lại. Nghe giọng mẫu rồi nhắc lại."
    ipa: "/θæŋks fɔr jʊr hɛlp/"
    focus_phonemes: [θ]
  - kind: shadow
    expected_text: "The sync is at three thirty."
    prompt_vi: "Nhắc lại giờ họp cho chắc. Nghe rồi nói theo — câu này có ba âm TH."
    ipa: "/ðə sɪŋk ɪz æt θriː ˈθɜːrti/"
    focus_phonemes: [θ, ð]
  - kind: respond
    prompt_en: "Is the sync at three thirty?"
    prompt_vi: "Minh hỏi lại bạn cho chắc: họp 3:30 phải không? Trả lời xác nhận."
    accept_patterns:
      - "Yes that's right"
      - "That's right"
      - "Yes I think so"

vietnamese_explanation:
  why_vi: >
    Tiếng Việt không có âm nào cần đặt lưỡi giữa hai hàm răng. Miệng bạn chưa từng làm động tác
    đó, nên nó tự động thay bằng âm gần nhất mà nó biết: /t/ hoặc /d/. Đây không phải lỗi lười —
    đây là cơ bắp chưa được dạy.
  how_vi: >
    Đặt đầu lưỡi chạm nhẹ mép răng trên rồi thổi hơi ra. Không cần thè lưỡi dài như trong phim.
    /θ/ (think) không rung; /ð/ (this) có rung — đặt tay lên cổ họng, thấy rung là đúng.
  contrast_vi: "think (nghĩ) ↔ sink (bồn rửa). Sai âm không phải là nói ngọng — là nói sang từ khác hẳn."

common_mistakes:
  - mistake: "Đổi /θ/ thành /t/: nói “tink” thay vì “think”"
    why_vi: "Tiếng Việt có /t/ sẵn nên miệng chọn đường quen. Người nghe sẽ hiểu là “tink” — một từ không tồn tại."
    fix_vi: "Cắn nhẹ đầu lưỡi rồi mới bắt đầu nói. Cường điệu lúc tập, thu về mức tự nhiên sau."
    detect:
      phoneme_missing: [θ]
  - mistake: "Đổi /ð/ thành /d/: nói “dis” thay vì “this”"
    why_vi: "Cùng lý do — /d/ là âm quen thuộc gần nhất mà miệng bạn biết."
    fix_vi: "Lưỡi phải chạm răng, không chạm lợi. Lúc tập, sờ thử bằng ngón tay để biết lưỡi đang ở đâu."
    detect:
      phoneme_missing: [ð]
  - mistake: "Nghe nhầm “thirty” (30) thành “thirteen” (13)"
    why_vi: "Hai từ chỉ khác nhau ở trọng âm và âm cuối, mà cả hai đều là thứ tai người Việt chưa được luyện."
    fix_vi: "THIR-ty nhấn đầu, thir-TEEN nhấn cuối. Trong công việc, hỏi lại luôn: “Three zero or one three?”"
    detect:
      phoneme_missing: [t]

memory_trick_vi: >
  Cả hai âm TH đều là "lưỡi ra chơi giữa hai hàm răng". Khác nhau chỉ ở chỗ có bật động cơ hay không:
  think là xe đẩy (không rung), this là xe máy (rung). Sờ cổ họng khi nói để kiểm tra động cơ đã bật chưa.

mini_quiz:
  - kind: mcq_listen
    prompt_vi: "Bạn nghe thấy từ nào?"
    audio_text: "think"
    choices: ["think", "sink"]
    answer: 0
    difficulty: 3
    focus_phonemes: [θ]
  - kind: mcq_listen
    prompt_vi: "Bạn nghe thấy số mấy?"
    audio_text: "The sync is at ten thirty."
    choices: ["10:13", "10:30"]
    answer: 1
    difficulty: 4
    focus_phonemes: [θ]
  - kind: fill_chunk
    prompt_vi: "Minh giới thiệu bạn với team lead: “___ is Linh.”"
    choices: ["This", "Dis", "That"]
    answer: 0
    difficulty: 1
  - kind: mcq
    prompt_vi: "Âm nào có rung thanh quản?"
    choices: ["/θ/ trong think", "/ð/ trong this", "Cả hai đều không rung"]
    answer: 1
    difficulty: 2

unlock_condition:
  mastery_threshold: 78
  mastery_weights: {speak: 0.35, listen: 0.15, read: 0.15, write: 0.15, quiz: 0.20}
  min_speaking_attempts: 4
  challenge_threshold: 85

recommended_next:
  default: F02
