objective_vi: "Dùng đúng ngữ điệu: câu hỏi yes/no lên giọng cuối, câu hỏi wh- xuống giọng cuối."
objective_observable: "Đạt ≥75 điểm nói trên 3/4 drill và chọn đúng hướng giọng 4/5 câu quiz."

