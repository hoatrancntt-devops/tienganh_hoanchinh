schema_version: 1
id: F10
slug: ngu-dieu-cau-hoi
unit: U-F3
title_vi: "Ngữ điệu câu hỏi — lên hay xuống"
title_en: "Question intonation"
phase: foundation
topic: core
cefr_target: a2
order_index: 10
est_minutes: 14

objective_vi: "Dùng đúng ngữ điệu: câu hỏi yes/no lên giọng cuối, câu hỏi wh- xuống giọng cuối."
objective_observable: "Đạt ≥75 điểm nói trên 3/4 drill và chọn đúng hướng giọng 4/5 câu quiz."

prerequisites:
  - {lesson: F09, min_mastery: 78, kind: hard}

vocabulary:
  - term: "Are you free?"
    ipa: "/ɑr juː friː ↗/"
    meaning_vi: "Bạn rảnh không? (lên giọng)"
    chunk: "Are you free? (rising)"
    tags: [office]
  - term: "What time?"
    ipa: "/wɒt taɪm ↘/"
    meaning_vi: "Mấy giờ? (xuống giọng)"
    chunk: "What time is the meeting? (falling)"
    tags: [office]
  - term: "rising tone"
    ipa: "/ˈraɪzɪŋ toʊn/"
    meaning_vi: "giọng lên"
    chunk: "Yes/no questions use a rising tone."
    tags: [core]
  - term: "falling tone"
    ipa: "/ˈfɔːlɪŋ toʊn/"
    meaning_vi: "giọng xuống"
    chunk: "Wh- questions use a falling tone."
    tags: [core]
  - term: "Did it work?"
    ipa: "/dɪd ɪt wɜːrk ↗/"
    meaning_vi: "Nó chạy được không? (lên)"
    chunk: "Did it work? (rising)"
    tags: [it_english]
  - term: "Who fixed it?"
    ipa: "/huː fɪkst ɪt ↘/"
    meaning_vi: "Ai sửa vậy? (xuống)"
    chunk: "Who fixed it? (falling)"
    tags: [it_english]

sentence_patterns:
  - pattern: "Are you {adj}? (rising)"
    meaning_vi: "Bạn có {adj} không? (lên giọng cuối)"
    slots:
      adj: [free, ready, sure]
  - pattern: "What {noun}? (falling)"
    meaning_vi: "{noun} nào/gì? (xuống giọng cuối)"
    slots:
      noun: [time, "does it do", happened]

dialogue:
  context_vi: >
    Cuối chiều thứ Sáu. David đang chờ một câu trả lời trước khi anh ta tan làm bên kia múi giờ,
    còn bạn thì phải hỏi Minh trước. Chú ý mũi tên: ↗ lên giọng, ↘ xuống giọng — nếu giọng phẳng,
    Minh sẽ tưởng bạn đang kể chứ không phải đang hỏi.
  turns:
    - {speaker: You, en: "Are you free now? (↗)", vi: "Anh rảnh không ạ? (lên giọng)"}
    - {speaker: Minh, en: "Yes. What do you need? (↘)", vi: "Rảnh. Cần gì đó? (xuống giọng)"}
    - {speaker: You, en: "Did the deploy finish? (↗) David is waiting.", vi: "Deploy xong chưa ạ? David đang đợi. (lên giọng)"}
    - {speaker: Minh, en: "Not yet. Who is handling it? (↘)", vi: "Chưa. Ai đang lo việc đó? (xuống giọng)"}

reading_passage:
  id: RP-F10
  kind: chat
  context_vi: >
    Đoạn chat toàn câu hỏi. Đọc và để ý: câu hỏi Yes/No khác câu hỏi Wh- ở chỗ nào —
    đó cũng là chỗ ngữ điệu lên hay xuống.
  text_en: |
    Minh: Are you free at four?
    You: Yes. What is the meeting about?
    Minh: The router problem. Did it work after the restart?
    You: No, it did not. Who fixed it last time?
    Minh: David did. I will ask him to join.
  text_vi: |
    Minh: Bốn giờ bạn rảnh không?
    Bạn: Rảnh. Họp về việc gì vậy?
    Minh: Vụ router. Khởi động lại rồi có chạy không?
    Bạn: Không. Lần trước ai sửa nhỉ?
    Minh: David sửa. Để tôi mời anh ấy vào họp.
  questions:
    - q_en: "Who fixed the router last time?"
      choices: ["David", "Minh", "The writer"]
      answer: 0
      skill: scan
      difficulty: 2
    - q_en: "Did the restart solve the problem?"
      choices: ["No", "Yes", "They did not try"]
      answer: 0
      skill: infer
      difficulty: 3

writing_task:
  id: WT-F10
  kind: error_correction
  prompt_vi: "Câu hỏi này sai dạng động từ. Viết lại cho đúng."
  prompt_en: "Did it worked after the restart?"
  blanks:
    - ["did it work after the restart"]
  hint_vi: "Đã có “did” rồi thì động từ theo sau về nguyên mẫu."
  sample_en: "Did it work after the restart?"

listening_snippet:
  id: LS-F10
  speed: 1.0
  voice: en_US_male
  context_vi: >
    Minh đọc lại cho bạn nghe bốn câu hỏi bạn đã hỏi trong ngày hôm nay. Bốn câu, hai kiểu giọng.
    Nghe hướng giọng ở TỪ CUỐI CÙNG — đó mới là chỗ báo cho David biết bạn đang hỏi hay đang kể.
  transcript_en: "Are you free now? Did the deploy finish? What time is the meeting? Who is handling it?"
  transcript_vi: "Giờ bạn rảnh không? Deploy xong chưa? Cuộc họp mấy giờ? Ai đang lo việc đó?"
  questions:
    - q_vi: "Câu đầu tiên “Are you free now?” — Minh lên hay xuống giọng ở cuối?"
      choices: ["Lên giọng", "Xuống giọng", "Không đổi"]
      answer: 0
      difficulty: 3
    - q_vi: "Câu “What time is the meeting?” — lên hay xuống?"
      choices: ["Xuống giọng", "Lên giọng", "Không đổi"]
      answer: 0
      difficulty: 3

speaking_drills:
  - kind: read_aloud
    expected_text: "Are you free now?"
    prompt_vi: "Bạn bắt chuyện với Minh cuối giờ. Đọc to và LÊN giọng ở cuối — đây là câu hỏi yes/no."
    ipa: "/ɑr juː friː naʊ ↗/"
    focus_phonemes: [r, f]
  - kind: read_aloud
    expected_text: "What time is the meeting?"
    prompt_vi: "Bạn hỏi Minh giờ họp đầu tuần sau. Đọc to và XUỐNG giọng ở cuối — câu hỏi wh- (what/who/when…)."
    ipa: "/wɒt taɪm ɪz ðə ˈmiːtɪŋ ↘/"
    focus_phonemes: [w, t, ŋ]
  - kind: shadow
    expected_text: "Did it work?"
    prompt_vi: "Bạn hỏi bản vá của Minh đã chạy được chưa — David đang đợi câu trả lời. Nghe rồi nhắc lại: yes/no thì lên giọng."
    ipa: "/dɪd ɪt wɜːrk ↗/"
    focus_phonemes: [d, w, k]
  - kind: respond
    prompt_en: "I finished the report."
    prompt_vi: "Minh nói đã xong báo cáo gửi David. Hỏi lại một câu yes/no (lên giọng) và một câu wh- (xuống giọng)."
    accept_patterns:
      - "Did you send it Who is it for"
      - "Is it ready What time do you need it"
      - "Are you sure When is it due"

vietnamese_explanation:
  why_vi: >
    Trong tiếng Việt, câu hỏi đánh dấu bằng TỪ (“không”, “à”, “hả”), giọng không nhất thiết đổi. Trong
    tiếng Anh, HƯỚNG GIỌNG mang nghĩa: câu hỏi yes/no lên giọng cuối, câu hỏi wh- (what/who/when/where/
    why/how) xuống giọng cuối. Người Việt hay giữ giọng phẳng — khiến câu hỏi nghe như câu kể, người
    nghe không biết bạn đang hỏi.
  how_vi: >
    Hai quy tắc: (1) Câu trả lời được bằng YES/NO → LÊN giọng cuối (“Are you free? ↗”); (2) Câu bắt
    đầu bằng WH- → XUỐNG giọng cuối (“What time? ↘”). Nghe như ngược trực giác nhưng đúng: wh- đã có
    từ hỏi rồi nên giọng đi xuống, chắc chắn.
  contrast_vi: "Giọng phẳng “Are you free.” (nghe như ra lệnh/kể) ↔ “Are you free? ↗” (rõ ràng là câu hỏi)."

common_mistakes:
  - mistake: "Giữ giọng phẳng ở câu hỏi yes/no"
    why_vi: "Tiếng Việt không đổi giọng để hỏi, dựa vào từ “không/à”."
    fix_vi: "Yes/no thì cuối câu LÊN giọng. Không lên giọng, người nghe tưởng bạn đang kể, không hỏi."
    detect: {}
  - mistake: "Lên giọng ở câu hỏi wh-"
    why_vi: "Nghĩ mọi câu hỏi đều lên giọng."
    fix_vi: "Wh- (what/who/when…) XUỐNG giọng cuối. Từ hỏi đã báo là câu hỏi rồi, giọng đi xuống nghe tự nhiên và tự tin."
    detect: {}
  - mistake: "Lên giọng giữa câu thay vì cuối câu"
    why_vi: "Chưa quen điều khiển giọng."
    fix_vi: "Giữ giọng đều, chỉ thay đổi ở TỪ CUỐI. Lên/xuống ở đúng âm cuối cùng."
    detect: {}

memory_trick_vi: >
  Hai mũi tên: YES/NO đi LÊN (↗ vì đang chờ câu trả lời mở), WH- đi XUỐNG (↘ vì đã có từ hỏi, nói
  chắc nịch). Nhớ: “free? ↗” nhưng “what time? ↘”.

mini_quiz:
  - kind: mcq
    prompt_vi: "“Did it work?” nên?"
    choices: ["Lên giọng cuối", "Xuống giọng cuối", "Giọng phẳng"]
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "“Who fixed it?” nên?"
    choices: ["Xuống giọng cuối", "Lên giọng cuối", "Giọng phẳng"]
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Câu hỏi loại nào LÊN giọng?"
    choices: ["Yes/no (Are you…? Did you…?)", "Wh- (What…? Who…?)", "Cả hai"]
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "Vì sao câu wh- xuống giọng nghe tự nhiên?"
    choices:
      - "Từ hỏi đã báo là câu hỏi, giọng đi xuống nghe chắc chắn"
      - "Vì wh- luôn ngắn"
      - "Vì cho lịch sự hơn"
    answer: 0
    difficulty: 3
  - kind: mcq_listen
    prompt_vi: "Bạn hỏi Minh “Are you free now?” — đây là loại câu hỏi gì?"
    audio_text: "Are you free now?"
    choices: ["Yes/no — lên giọng", "Wh- — xuống giọng", "Câu kể"]
    answer: 0
    difficulty: 2

