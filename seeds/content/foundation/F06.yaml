schema_version: 1
id: F06
slug: cau-loi-be-have-do
unit: U-F3
title_vi: "Ba động từ lõi: be, have, do"
title_en: "Core verbs: be, have, do"
phase: foundation
topic: core
cefr_target: a1
order_index: 6
est_minutes: 14

objective_vi: "Dùng đúng am/is/are, have/has, do/does trong câu kể và câu hỏi ở công sở."
objective_observable: "Trả lời đúng 4/5 câu quiz và đạt ≥75 điểm nói trên 3/4 drill."

prerequisites:
  - {lesson: F05, min_mastery: 73, kind: hard}

vocabulary:
  - term: "I'm"
    ipa: "/aɪm/"
    meaning_vi: "tôi là / tôi đang"
    chunk: "I'm on the call."
    tags: [core]
  - term: "he's"
    ipa: "/hiːz/"
    meaning_vi: "anh ấy là / anh ấy đang"
    chunk: "He's in a meeting."
    tags: [core]
  - term: have
    ipa: "/hæv/"
    meaning_vi: "có"
    chunk: "I have a question."
    tags: [core, verb]
  - term: has
    ipa: "/hæz/"
    meaning_vi: "có (ngôi thứ ba)"
    chunk: "She has two tickets."
    tags: [core, verb]
  - term: "don't"
    ipa: "/doʊnt/"
    meaning_vi: "không (phủ định)"
    chunk: "I don't understand."
    tags: [core]
  - term: "doesn't"
    ipa: "/ˈdʌzənt/"
    meaning_vi: "không (ngôi thứ ba)"
    chunk: "It doesn't work."
    tags: [core]

sentence_patterns:
  - pattern: "I'm {status}."
    meaning_vi: "Tôi đang {status}."
    slots:
      status: ["on a call", "in a meeting", "almost done"]
  - pattern: "Do you have {thing}?"
    meaning_vi: "Bạn có {thing} không?"
    slots:
      thing: ["a minute", "the file", "access"]

dialogue:
  context_vi: "Vẫn thứ Tư, gần cuối giờ. Bạn đang trong call với kỹ sư mạng thì Minh nhắn sang."
  turns:
    - {speaker: Minh, en: "Do you have a minute?", vi: "Bạn rảnh một phút không?"}
    - {speaker: You, en: "I'm on a call. Is it urgent?", vi: "Em đang trong call. Có gấp không anh?"}
    - {speaker: Minh, en: "A little. The VPN doesn't work on my laptop and I don't know why.", vi: "Hơi gấp. VPN không chạy trên máy mình mà mình không biết vì sao."}
    - {speaker: You, en: "The network engineer has access. He's in the server room.", vi: "Kỹ sư mạng có quyền truy cập ạ. Anh ấy đang ở phòng server."}

reading_passage:
  id: RP-F06
  kind: chat
  context_vi: >
    Nam vừa vào làm, chưa có máy. Cả đoạn chỉ dùng ba động từ lõi: be, have, do.
  text_en: |
    Nam: Hi, I'm Nam. I'm new here.
    Linh: Nice to meet you. Do you have a laptop?
    Nam: Not yet. I don't have one.
    Linh: Minh has a spare one. He's in the IT room.
    Nam: Thanks. I don't know where that is.
    Linh: I'll show you.
  text_vi: |
    Nam: Chào, tôi là Nam. Tôi mới vào làm.
    Linh: Rất vui được gặp. Bạn có laptop chưa?
    Nam: Chưa. Tôi chưa có.
    Linh: Minh có một cái dư. Anh ấy ở phòng IT.
    Nam: Cảm ơn. Tôi không biết phòng đó ở đâu.
    Linh: Để tôi dẫn bạn đi.
  questions:
    - q_en: "Does Nam have a laptop?"
      choices: ["No, not yet", "Yes, he has two", "Yes, Minh gave him one"]
      answer: 0
      skill: scan
      difficulty: 2
    - q_en: "Who will help Nam find the IT room?"
      choices: ["Linh", "Minh", "Nobody"]
      answer: 0
      skill: infer
      difficulty: 3

writing_task:
  id: WT-F06
  kind: fill_blank
  prompt_vi: "Điền hai chỗ trống bằng động từ lõi đúng dạng."
  prompt_en: "I ___ have a laptop. Minh ___ a spare one."
  blanks:
    - ["don't", "do not"]
    - ["has"]
  hint_vi: "“I” đi với don't. “Minh” là ngôi thứ ba số ít, nên dùng has chứ không phải have."
  sample_en: "I don't have a laptop. Minh has a spare one."

listening_snippet:
  id: LS-F06
  speed: 0.85
  voice: en_US_male
  context_vi: >
    Bạn tắt call rồi nhắn lại cho Minh, và Minh trả lời bằng một tin nhắn thoại. Cả đoạn chỉ
    toàn be / have / do ở dạng rút gọn — I'm, has, doesn't. Nói nhanh thì chúng dính vào nhau,
    đó là chỗ tai bạn dễ trượt nhất.
  transcript_en: "I'm on a call right now. Linh has the file, but it doesn't work on my laptop either. I'll try again after four."
  transcript_vi: "Giờ mình đang trong call. Linh có file, nhưng nó cũng không chạy trên máy mình. Sau bốn giờ mình thử lại."
  questions:
    - q_vi: "Lúc này Minh đang làm gì?"
      choices: ["Đang trong call", "Đang ăn trưa", "Đang rảnh"]
      answer: 0
      difficulty: 2
    - q_vi: "Ai đang giữ file?"
      choices: ["Minh", "Linh", "Không ai"]
      answer: 1
      difficulty: 2

speaking_drills:
  - kind: read_aloud
    expected_text: "I'm on a call."
    prompt_vi: "Minh nhắn hỏi bạn có rảnh không, mà bạn đang bận. Đọc to — I'm nói liền một hơi, không tách “I am”."
    ipa: "/aɪm ɒn ə kɔːl/"
    focus_phonemes: [m, l]
  - kind: read_aloud
    expected_text: "I don't understand."
    prompt_vi: "Kỹ sư mạng vừa nói một tràng mà bạn không theo kịp. Đọc to — đây là câu bạn sẽ dùng nhiều nhất trong 3 tháng tới."
    ipa: "/aɪ doʊnt ˌʌndərˈstænd/"
    focus_phonemes: [t, d]
  - kind: shadow
    expected_text: "She has two tickets today."
    prompt_vi: "Bạn báo lại số việc Linh đang cầm. Nghe rồi nhắc lại — has chứ không phải have."
    ipa: "/ʃiː hæz tuː ˈtɪkɪts təˈdeɪ/"
    focus_phonemes: [z, s]
  - kind: shadow
    expected_text: "It doesn't work on my laptop."
    prompt_vi: "Bạn mô tả lại lỗi của Minh cho kỹ sư mạng. Nghe rồi nhắc lại — doesn't, không phải don't."
    ipa: "/ɪt ˈdʌzənt wɜːrk ɒn maɪ ˈlæptɒp/"
    focus_phonemes: [z, t, k]
  - kind: respond
    prompt_en: "Do you have a minute?"
    prompt_vi: "Minh nhắn khi bạn đang trong call. Trả lời lịch sự nhưng thật — đừng nhận bừa."
    accept_patterns:
      - "I'm on a call"
      - "I'm in a meeting"
      - "Sorry I'm busy"
      - "Not right now sorry"

vietnamese_explanation:
  why_vi: >
    Tiếng Việt không chia động từ. "Tôi là", "anh ấy là", "họ là" — chỉ một chữ "là" cho tất cả.
    Tiếng Anh bắt bạn chọn giữa am, is, are tuỳ chủ ngữ, và giữa do/does, have/has. Khó ở chỗ
    phải chọn NGAY khi đang nói, không có thời gian nghĩ.
  how_vi: >
    Đừng học bảng chia. Học theo khối nguyên câu: "I'm on a call", "he's in a meeting",
    "it doesn't work". Bạn không ghép từ khi nói tiếng Việt — bạn lôi cả cụm ra. Tiếng Anh cũng vậy.
  contrast_vi: "I don't (tôi không) ↔ It doesn't (nó không). Chỉ ngôi thứ ba số ít mới dùng doesn't."

common_mistakes:
  - mistake: "“I am work in IT.” — thừa “am”"
    why_vi: "Nhầm giữa “I am” (tôi là) và động từ thường. Trong tiếng Việt cả hai đều bắt đầu giống nhau nên bạn thêm “am” cho chắc."
    fix_vi: "Có động từ thường rồi thì bỏ “am”: I work in IT. Chỉ dùng am/is/are khi KHÔNG có động từ khác."
    detect: {}
  - mistake: "“He don't know.” thay vì “He doesn't know.”"
    why_vi: "don't dùng nhiều hơn nên nó thành phản xạ mặc định."
    fix_vi: "Nhớ câu mốc: “It doesn't work” — bạn sẽ nói câu này nhiều lần mỗi tuần, dùng nó làm neo cho cả nhóm ngôi thứ ba."
    detect: {}
  - mistake: "Tách “I'm” thành “I am” trong hội thoại thường"
    why_vi: "Sách giáo khoa dạy dạng đầy đủ trước, nên bạn tưởng đó là dạng chuẩn."
    fix_vi: "Trong nói chuyện, người bản xứ gần như luôn dùng dạng rút gọn. “I am on a call” nghe hơi gượng."
    detect: {}

memory_trick_vi: >
  Ngôi thứ ba số ít (he, she, it) là đứa hay đòi thêm chữ S: he workS, she haS, it doeSn't.
  Nếu chủ ngữ là một người/vật đơn lẻ mà không phải bạn hay người đang nói chuyện với bạn — cho nó chữ S.

mini_quiz:
  - kind: mcq
    prompt_vi: "Chọn câu đúng"
    choices: ["I am work in IT.", "I work in IT.", "I working in IT."]
    answer: 1
    difficulty: 1
  - kind: mcq
    prompt_vi: "Chọn câu đúng"
    choices: ["It don't work.", "It doesn't work.", "It not work."]
    answer: 1
    difficulty: 2
  - kind: fill_chunk
    prompt_vi: "She ___ two tickets today."
    choices: [have, has, having]
    answer: 1
    difficulty: 2
  - kind: mcq_listen
    prompt_vi: "Bạn nghe thấy câu nào?"
    audio_text: "I'm on a call."
    choices: ["I'm on a call.", "I am a call."]
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Minh hỏi “Do you have a minute?” khi bạn đang trong call. Câu nào tự nhiên nhất?"
    choices: ["No.", "I'm on a call. Is it urgent?", "I don't have."]
    answer: 1
    difficulty: 3

unlock_condition:
  mastery_threshold: 73
  mastery_weights: {speak: 0.35, listen: 0.15, read: 0.15, write: 0.15, quiz: 0.20}
  min_speaking_attempts: 4
  challenge_threshold: 85

recommended_next:
  default: F07
