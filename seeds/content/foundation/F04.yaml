schema_version: 1
id: F04
slug: cum-phu-am-cuoi
unit: U-F2
title_vi: "Cụm phụ âm cuối — chỗ câu tiếng Anh hay gãy"
title_en: "Final consonant clusters"
phase: foundation
topic: core
cefr_target: pre_a1
order_index: 4
est_minutes: 14

objective_vi: "Nói được các cụm phụ âm cuối như /sks/, /kts/, /ndz/ mà không cắt bớt âm nào."
objective_observable: "Đạt ≥75 điểm phát âm trên 3/4 câu drill có cụm phụ âm cuối."

prerequisites:
  - {lesson: F03, min_mastery: 78, kind: hard}

vocabulary:
  - term: asks
    ipa: "/æsks/"
    meaning_vi: "hỏi (ngôi thứ ba)"
    chunk: "He asks a lot of questions."
    tags: [office, verb]
  - term: projects
    ipa: "/ˈprɒdʒɛkts/"
    meaning_vi: "các dự án"
    chunk: "I have two projects this month."
    tags: [office, noun]
  - term: sounds
    ipa: "/saʊndz/"
    meaning_vi: "nghe có vẻ"
    chunk: "That sounds good."
    tags: [social]
  - term: months
    ipa: "/mʌnθs/"
    meaning_vi: "các tháng"
    chunk: "I've been here six months."
    tags: [core, noun]
  - term: helps
    ipa: "/hɛlps/"
    meaning_vi: "giúp (ngôi thứ ba)"
    chunk: "That helps a lot."
    tags: [social, verb]
  - term: works
    ipa: "/wɜːrks/"
    meaning_vi: "hoạt động được"
    chunk: "That works for me."
    tags: [office, verb]

sentence_patterns:
  - pattern: "That sounds {adj}."
    meaning_vi: "Nghe có vẻ {adj}."
    slots:
      adj: [good, fine, difficult]
  - pattern: "I have {number} projects this {period}."
    meaning_vi: "Tôi có {number} dự án trong {period} này."
    slots:
      number: [two, three]
      period: [month, quarter]

dialogue:
  context_vi: "Ngay sau standup ngày thứ hai. Minh muốn chốt một khung giờ cố định để ngồi cùng bạn xem ticket."
  turns:
    - {speaker: Minh, en: "Can we meet at three? That works for me.", vi: "Ba giờ ngồi với nhau được không? Với mình thì ổn."}
    - {speaker: You, en: "That sounds good. Thanks, that helps.", vi: "Nghe ổn đấy ạ. Cảm ơn anh, vậy đỡ cho em."}
    - {speaker: Minh, en: "I have two projects this month, so mornings are better next week.", vi: "Tháng này mình có hai dự án, nên tuần sau buổi sáng sẽ tiện hơn."}
    - {speaker: You, en: "Understood. Mornings it is.", vi: "Em hiểu rồi. Vậy chốt buổi sáng."}

reading_passage:
  id: RP-F04
  kind: chat
  context_vi: >
    Đoạn ngắn về Nam. Để ý những từ kết thúc bằng hai ba phụ âm liền nhau — đó là chỗ câu
    tiếng Anh hay gãy khi nói.
  text_en: |
    Nam works on two projects.
    He asks his manager for help when he is stuck.
    His manager always helps him.
    The work sounds hard, but Nam likes it.
    He has been here for six months.
  text_vi: |
    Nam làm hai dự án.
    Anh ấy hỏi quản lý khi bị kẹt.
    Quản lý luôn giúp anh ấy.
    Công việc nghe có vẻ khó, nhưng Nam thích nó.
    Anh ấy ở đây được sáu tháng rồi.
  questions:
    - q_en: "How many projects does Nam work on?"
      choices: ["Two", "Six", "One"]
      answer: 0
      skill: scan
      difficulty: 1
    - q_en: "In this text, \"he is stuck\" means he:"
      choices: ["cannot go on and needs help", "is very busy", "is late for work"]
      answer: 0
      skill: guess_word
      difficulty: 3

writing_task:
  id: WT-F04
  kind: fill_blank
  prompt_vi: "Điền hai chỗ trống. Cả hai từ đều kết thúc bằng cụm phụ âm."
  prompt_en: "Nam ___ on two projects. He ___ his manager for help."
  blanks:
    - ["works"]
    - ["asks"]
  hint_vi: "Đọc to lên: /wɜːrks/ và /æsks/ — đừng nuốt chữ “s” cuối."
  sample_en: "Nam works on two projects. He asks his manager for help."

listening_snippet:
  id: LS-F04
  speed: 0.85
  voice: en_US_male
  context_vi: >
    Minh nói tiếp về lịch tuần sau. Cả đoạn này là một chuỗi cụm phụ âm cuối — works, projects,
    sounds, months. Nuốt một cụm là mất một thông tin: hai dự án hay một dự án?
  transcript_en: "OK, three o'clock today. Next week, mornings. I have two projects this month, and one of them sounds difficult — so my afternoons are gone."
  transcript_vi: "Được, hôm nay ba giờ. Tuần sau thì buổi sáng. Tháng này mình có hai dự án, và một cái nghe có vẻ khó — nên buổi chiều mình không còn thời gian."
  questions:
    - q_vi: "Minh có bao nhiêu dự án trong tháng này?"
      choices: ["Một", "Hai", "Ba"]
      answer: 1
      difficulty: 3
    - q_vi: "Minh thấy một trong hai dự án đó thế nào?"
      choices: ["Thấy dễ", "Thấy khó", "Không nói"]
      answer: 1
      difficulty: 2

speaking_drills:
  - kind: read_aloud
    expected_text: "That works for me."
    prompt_vi: "Minh hỏi ba giờ có được không. Đọc to — cụm /ks/ ở cuối works phải nghe thấy cả hai âm."
    ipa: "/ðæt wɜːrks fɔr miː/"
    focus_phonemes: [k, s]
  - kind: read_aloud
    expected_text: "That sounds good."
    prompt_vi: "Bạn đồng ý với lịch Minh đề xuất. Đọc to — cụm /ndz/ ở cuối sounds."
    ipa: "/ðæt saʊndz ɡʊd/"
    focus_phonemes: [d, z]
  - kind: shadow
    expected_text: "I have two projects this month."
    prompt_vi: "Minh giải thích vì sao tuần sau phải đổi giờ. Nghe rồi nhắc lại — hai cụm khó: /kts/ và /nθs/."
    ipa: "/aɪ hæv tuː ˈprɒdʒɛkts ðɪs mʌnθs/"
    focus_phonemes: [k, t, s, θ]
  - kind: shadow
    expected_text: "Thanks, that helps a lot."
    prompt_vi: "Bạn cảm ơn Minh vì đã chịu xếp lịch theo bạn. Nghe rồi nhắc lại — /ŋks/ và /lps/."
    ipa: "/θæŋks ðæt hɛlps ə lɒt/"
    focus_phonemes: [θ, k, s, p]
  - kind: respond
    prompt_en: "Can we meet at three?"
    prompt_vi: "Minh đề xuất ngồi lại lúc ba giờ. Đồng ý — và giữ đủ cụm phụ âm cuối để anh ấy không phải hỏi lại."
    accept_patterns:
      - "That works for me"
      - "That sounds good"
      - "Yes that works"

vietnamese_explanation:
  why_vi: >
    Một âm tiết tiếng Việt có tối đa một phụ âm cuối, và phụ âm đó không bật hơi. Tiếng Anh có
    thể xếp ba, bốn phụ âm liền nhau ở cuối từ. Miệng bạn gặp cụm đó thì làm điều hợp lý nhất
    mà nó biết: bỏ bớt. Đây là lý do "projects" thường ra thành "pro-dzét".
  how_vi: >
    Đừng cố nói cả cụm một lần. Tách ra, nói chậm từng âm, rồi ghép dần và tăng tốc:
    pro-ject — t — s → projects. Miệng cần khoảng 10 lần lặp để nhớ đường đi, không phải 1 lần.
  contrast_vi: "project (dự án) ↔ projects (các dự án). Mất /s/ là mất luôn thông tin số lượng."

common_mistakes:
  - mistake: "Cắt cụm còn một âm: “projec” thay vì “projects”"
    why_vi: "Miệng chỉ giữ được phụ âm đầu tiên của cụm rồi buông. Đây là phản xạ, không phải lựa chọn."
    fix_vi: "Tập ngược: nói phần đuôi trước (kts, kts, kts), rồi mới gắn vào đầu từ."
    detect:
      phoneme_missing: [t, s]
  - mistake: "Chèn nguyên âm vào giữa cụm: “pro-jec-tờ-sờ”"
    why_vi: "Thói quen tách âm tiết. Mỗi phụ âm bị gắn thêm một nguyên âm để thành một âm tiết hoàn chỉnh."
    fix_vi: "Nói cả cụm trong một hơi, không mở miệng ra giữa chừng. Hàm dưới hạ xuống là bạn đang chèn nguyên âm."
    detect:
      phoneme_inserted: [ə]
  - mistake: "Nói quá nhanh nên cả cụm biến thành tiếng ồn"
    why_vi: "Cố bắt chước tốc độ người bản xứ trước khi cơ bắp làm được động tác."
    fix_vi: "Chậm lại một nửa. Người bản xứ thà nghe bạn nói chậm mà rõ, còn hơn nhanh mà phải đoán."
    detect: {}

memory_trick_vi: >
  Cụm phụ âm cuối giống như xuống cầu thang: bạn phải đặt chân lên từng bậc, không nhảy ba bậc
  một lúc. projects = pro-ject + t + s, ba bậc riêng biệt, đi nhanh nhưng không bỏ bậc nào.

mini_quiz:
  - kind: mcq_listen
    prompt_vi: "Minh nói về khối lượng việc tháng này. Bạn nghe thấy từ nào?"
    audio_text: "I have two projects this month."
    choices: ["project", "projects"]
    answer: 1
    difficulty: 4
    focus_phonemes: [s]
  - kind: mcq
    prompt_vi: "Cách tập cụm /kts/ hiệu quả nhất là gì?"
    choices:
      - "Đọc cả từ thật nhanh nhiều lần"
      - "Tập riêng phần đuôi trước rồi mới ghép vào từ"
      - "Bỏ bớt âm cho dễ nói"
    answer: 1
    difficulty: 2
  - kind: fill_chunk
    prompt_vi: "Đồng ý với lịch Minh đề xuất: “That ___ for me.”"
    choices: [work, works, working]
    answer: 1
    difficulty: 2
  - kind: mcq
    prompt_vi: "Vì sao “months” khó với người Việt?"
    choices:
      - "Vì có /θ/ và cụm /nθs/ — cả hai đều không có trong tiếng Việt"
      - "Vì từ quá dài"
      - "Vì nó là số nhiều"
    answer: 0
    difficulty: 2

unlock_condition:
  mastery_threshold: 78
  mastery_weights: {speak: 0.35, listen: 0.15, read: 0.15, write: 0.15, quiz: 0.20}
  min_speaking_attempts: 4
  challenge_threshold: 85

recommended_next:
  default: F05
