objective_vi: "Nối phụ âm cuối với nguyên âm đầu của từ sau, để nói mượt và NGHE ra khi người khác nối."
objective_observable: "Đạt ≥75 điểm nói trên 3/4 drill và nhận ra cụm nối 4/5 câu quiz nghe."

