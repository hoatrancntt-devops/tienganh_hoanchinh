vocabulary:
  - term: "an email"
    ipa: "/ə ˈniːmeɪl/"
    meaning_vi: "một email (nối n→e: “a-nemail”)"
    chunk: "I got an email."
    tags: [office]
  - term: "check it"
    ipa: "/ˈtʃɛkɪt/"
    meaning_vi: "kiểm tra nó (nối k→i: “che-kit”)"
    chunk: "Let me check it."
    tags: [it_english]
  - term: "pick up"
    ipa: "/ˈpɪkʌp/"
    meaning_vi: "nhấc lên/đón (nối k→u: “pi-kup”)"
    chunk: "Pick up the phone."
    tags: [core]
  - term: "turn it off"
    ipa: "/ˈtɜːrnɪˈtɒf/"
    meaning_vi: "tắt nó đi (nối liền cả ba)"
    chunk: "Turn it off and on."
    tags: [it_english]
  - term: "log in"
    ipa: "/ˈlɒɡɪn/"
    meaning_vi: "đăng nhập (nối g→i: “lo-gin”)"
    chunk: "I can't log in."
    tags: [it_english]
  - term: "hold on"
    ipa: "/ˈhoʊldɒn/"
    meaning_vi: "chờ chút (nối d→o: “hol-don”)"
    chunk: "Hold on a second."
    tags: [core]

sentence_patterns:
  - pattern: "Let me check it."
    meaning_vi: "Để tôi kiểm tra nó. (nối “che-kit”)"
    slots: {}
  - pattern: "Turn it off and on again."
    meaning_vi: "Tắt rồi bật lại. (nối liền “tur-ni-toff”)"
    slots: {}

dialogue:
  context_vi: >
    Chiều thứ Tư. Minh mở lại bản ghi cuộc gọi sáng nay với David Carter — engineering manager
    người Mỹ phía khách hàng. Bạn nghe hai lần, vẫn không tách được một chữ nào. Minh cho nghe
    lần thứ ba và chỉ ra lý do.
  turns:
    - {speaker: Minh, en: "That's David. Same six words, one more time. What do you hear?", vi: "Đó là David. Vẫn sáu chữ đó, nghe thêm lần nữa. Bạn nghe ra gì?"}
    - {speaker: David, en: "I can't log in — hold on, let me check it.", vi: "Tôi không đăng nhập được — chờ chút, để tôi kiểm tra."}
    - {speaker: You, en: "It sounds like one long word. I got nothing.", vi: "Nghe như một từ dài. Em không bắt được gì."}
    - {speaker: Minh, en: "He isn't fast. He links. “log in” becomes “lo-gin”, “check it” becomes “che-kit”.", vi: "Anh ấy không nói nhanh. Anh ấy NỐI. “log in” thành “lo-gin”, “check it” thành “che-kit”."}

listening_snippet:
  id: LS-F11
  speed: 1.0
  voice: en_US_female
  context_vi: >
    Minh cho chạy tiếp phần sau của bản ghi. David nói ba câu liền. Bẫy nằm ở chỗ mỗi câu có một
    cụm nối: “hol-don”, “che-kit”, “tur-ni-toff”, “a-nemail”. Nếu bạn cố tách từng từ, bạn mất cả câu.
  transcript_en: "Hold on, let me check it. Try to turn it off and on again. Did you get an email from me?"
  transcript_vi: "Chờ chút, để tôi kiểm tra. Thử tắt đi bật lại. Bạn có nhận được email tôi gửi không?"
  questions:
    - q_vi: "David bảo làm gì với máy?"
      choices: ["Tắt đi rồi bật lại", "Cài lại từ đầu", "Đổi sang máy khác"]
      answer: 0
      difficulty: 3
    - q_vi: "Vì sao “check it” trong câu của David nghe như một từ?"
      choices: ["Vì phụ âm cuối nối vào nguyên âm đầu từ sau", "Vì David nói sai", "Vì đường truyền kém"]
      answer: 0
      difficulty: 3

speaking_drills:
  - kind: read_aloud
    expected_text: "Let me check it."
    prompt_vi: "Nói lại đúng câu David vừa nói. Đọc to — nối “check” với “it” thành “che-kit”, đừng tách rời."
    ipa: "/lɛt miː ˈtʃɛkɪt/"
    focus_phonemes: [tʃ, k, t]
  - kind: read_aloud
    expected_text: "Turn it off and on again."
    prompt_vi: "Câu Minh bảo bạn phải thuộc trước khi nói với khách. Đọc to — nối liền “tur-ni-toff”. Đây là cách người bản xứ luôn nói."
    ipa: "/ˈtɜːrnɪˈtɒf ænd ɒn əˈɡɛn/"
    focus_phonemes: [t, n, f]
  - kind: shadow
    expected_text: "Hold on, I can't log in."
    prompt_vi: "Nhắc lại theo bản ghi của David. Nghe rồi nói theo — “hol-don” và “lo-gin” nối liền."
    ipa: "/ˈhoʊldɒn aɪ kænt ˈlɒɡɪn/"
    focus_phonemes: [d, ɡ, n]
  - kind: respond
    prompt_en: "The app is frozen. What should I do?"
    prompt_vi: "Minh đóng vai David gọi lại cho bạn. Bảo họ tắt bật lại — nối âm cho tự nhiên."
    accept_patterns:
      - "Turn it off and on again"
      - "Hold on let me check it"
      - "Try to log in again"

vietnamese_explanation:
  why_vi: >
    Tiếng Việt tách rời từng tiếng, có khoảng nghỉ nhỏ giữa các chữ. Tiếng Anh thì DÍNH các từ lại:
    phụ âm cuối của từ này chạy sang nguyên âm đầu của từ sau. Đây là lý do lớn nhất khiến bạn “nghe
    không kịp” — không phải họ nói nhanh, mà họ NỐI. “check it” thành “che-kit”, “turn it off” thành
    “tur-ni-toff”. Học nối âm giúp bạn vừa nói mượt vừa nghe ra.
  how_vi: >
    Quy tắc chính: phụ âm cuối + nguyên âm đầu = nối liền. “log in” → “lo-gin”, “pick up” → “pi-kup”,
    “an email” → “a-nemail”. Tập nói CHẬM nhưng vẫn nối, đừng chèn khoảng nghỉ. Khi nghe, đừng cố
    tách từng từ — nghe theo cụm.
  contrast_vi: "“check … it” (tách, nghe kỳ và khó nghe lại) ↔ “che-kit” (nối, tự nhiên). Nối không phải nói ẩu — đó là cách đúng."

common_mistakes:
  - mistake: "Tách rời từng từ, chèn khoảng nghỉ"
    why_vi: "Phản xạ từ tiếng Việt đơn âm."
    fix_vi: "Nối phụ âm cuối vào nguyên âm đầu từ sau. Nói chậm vẫn nối được — mượt chứ không ẩu."
    detect: {}
  - mistake: "Nghe không ra vì cố tách từng từ"
    why_vi: "Não tìm khoảng nghỉ giữa từ mà người bản xứ không tạo."
    fix_vi: "Nghe theo CỤM, không theo từ. Quen dần với “tur-ni-toff” là một khối, không phải ba từ."
    detect: {}
  - mistake: "Thêm nguyên âm vào giữa để tách (“turn-uh-it”)"
    why_vi: "Cố phát âm rõ từng từ."
    fix_vi: "Không chèn âm phụ. Để phụ âm cuối trượt thẳng vào nguyên âm sau — đó là nối âm."
    detect: {}

memory_trick_vi: >
  Từ tiếng Anh như toa tàu: phụ âm cuối MÓC vào nguyên âm đầu toa sau, cả câu chạy liền một mạch.
  “log in” = “lo-gin”, “turn it off” = “tur-ni-toff”. Nghe không kịp thường là vì họ nối, không phải nhanh.

mini_quiz:
