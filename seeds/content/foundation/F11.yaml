  - kind: mcq
    prompt_vi: "Vì sao bạn hay “nghe không kịp” người bản xứ?"
    choices:
      - "Họ NỐI các từ, không tách rời như tiếng Việt"
      - "Họ dùng từ khó"
      - "Họ nói quá to"
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "Nối âm xảy ra khi?"
    choices:
      - "Phụ âm cuối gặp nguyên âm đầu từ sau"
      - "Hai nguyên âm cạnh nhau"
      - "Cuối câu"
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "Cách luyện nghe cụm nối tốt nhất?"
    choices: ["Nghe theo cụm, không tách từng từ", "Tra từng từ một", "Nghe thật to"]
    answer: 0
    difficulty: 2
  - kind: mcq_listen
    prompt_vi: "Người nói bảo làm gì?"
    audio_text: "Turn it off and on again."
    choices: ["Tắt đi bật lại", "Gọi kỹ thuật", "Mua máy mới"]
    answer: 0
    difficulty: 3

