    prompt_vi: "“thirteen” nhấn âm nào?"
    choices: ["Âm sau (-TEEN), kéo dài", "Âm đầu (THIR-)", "Nhấn đều"]
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "“half past ten” là mấy giờ?"
    choices: ["10:30", "10:15", "9:30"]
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Cách chắc nhất để người nghe không nhầm 30 với 13?"
    choices:
      - "Đọc thêm số rời: “thirty, three-zero”"
      - "Nói to hơn"
      - "Nói nhanh hơn"
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "“a quarter to nine” là mấy giờ?"
    choices: ["8:45", "9:15", "9:45"]
    answer: 0
    difficulty: 3
  - kind: mcq_listen
    prompt_vi: "Cuộc họp lúc mấy giờ?"
    audio_text: "The meeting is at ten thirty, half past ten."
    choices: ["10:30", "10:13", "10:00"]
    answer: 0
    difficulty: 4

