schema_version: 1
id: F17
slug: doc-chu-viet-tat
unit: U-F3
title_vi: "Đọc chữ viết tắt và thuật ngữ IT thành tiếng"
title_en: "Saying acronyms & abbreviations"
phase: foundation
topic: it_english
cefr_target: a2
order_index: 17
est_minutes: 14

objective_vi: "Đọc to đúng các viết tắt IT: loại đọc từng chữ (API, SQL, URL) và loại đọc như từ (SQL cũng có kiểu, JSON, CAPTCHA)."
objective_observable: "Đạt ≥75 điểm nói trên 3/4 drill và chọn đúng cách đọc 4/5 câu quiz."

prerequisites:
  - {lesson: F16, min_mastery: 76, kind: hard}

vocabulary:
  - term: "API /eɪ piː aɪ/"
    ipa: "/ˌeɪ piː ˈaɪ/"
    meaning_vi: "đọc từng chữ: ây-pi-ai"
    chunk: "Call the API."
    tags: [it_english]
  - term: "URL /juː ɑːr ɛl/"
    ipa: "/ˌjuː ɑːr ˈɛl/"
    meaning_vi: "đọc từng chữ: diu-a-eo"
    chunk: "Copy the URL."
    tags: [it_english]
  - term: "JSON /ˈdʒeɪsən/"
    ipa: "/ˈdʒeɪsən/"
    meaning_vi: "đọc như từ: “JAY-sơn”"
    chunk: "Return JSON."
    tags: [it_english]
  - term: "SQL /ˌɛs kjuː ˈɛl/"
    ipa: "/ˌɛs kjuː ˈɛl/"
    meaning_vi: "đọc từng chữ ét-kiu-eo (hoặc “sequel”)"
    chunk: "Write an SQL query."
    tags: [it_english]
  - term: "cache /kæʃ/"
    ipa: "/kæʃ/"
    meaning_vi: "đọc là “kash”, KHÔNG phải “ca-chê”"
    chunk: "Clear the cache."
    tags: [it_english]
  - term: "queue /kjuː/"
    ipa: "/kjuː/"
    meaning_vi: "đọc là “kiu”, chỉ nghe âm đầu"
    chunk: "The job is in the queue."
    tags: [it_english]

sentence_patterns:
  - pattern: "Call the {abbr} and check the {abbr2}."
    meaning_vi: "Gọi {abbr} và kiểm tra {abbr2}."
    slots:
      abbr: [API, URL]
      abbr2: [JSON, cache]

dialogue:
  context_vi: >
    Sáng thứ Sáu. Chiều nay bạn phải nói trước cả team, có David dự qua call. Minh bắt bạn đọc to
    các thuật ngữ trước — vì bạn nhìn chúng trên màn hình cả tuần mà chưa từng nghe chính mình
    nói chúng ra.
  turns:
    - {speaker: Minh, en: "Read this line. Out loud.", vi: "Đọc dòng này. Đọc to lên."}
    - {speaker: You, en: "Call the API and check the JSON response.", vi: "Gọi API và kiểm tra phản hồi JSON."}
    - {speaker: Minh, en: "API letter by letter — good. But JSON is one word: JAY-sən.", vi: "API đánh vần từng chữ — chuẩn. Nhưng JSON đọc liền như một từ: JAY-sơn."}
    - {speaker: You, en: "The URL returns a cache error. Run an SQL query and clear the queue.", vi: "URL trả về lỗi cache. Chạy truy vấn SQL và xoá hàng đợi."}
    - {speaker: Minh, en: "“kash”, not “ca-chê”. And queue is just “kiu”. Say those two again.", vi: "“kash”, không phải “ca-chê”. Còn queue chỉ là “kiu”. Nói lại hai từ đó đi."}

reading_passage:
  id: RP-F17
  kind: doc
  context_vi: >
    Ghi chú nội bộ cho người mới. Toàn chữ viết tắt — đọc hiểu là một chuyện, đọc thành tiếng
    cho đúng lại là chuyện khác.
  text_en: |
    The API returns JSON. If the URL is wrong, you get a 404.
    Check the cache first — old data often comes from there.
    If the queue is full, new jobs wait.
    For slow pages, look at the SQL query in the logs.
    Ask David if you are not sure.
  text_vi: |
    API trả về JSON. Nếu URL sai thì bạn nhận lỗi 404.
    Kiểm tra cache trước — dữ liệu cũ thường đến từ đó.
    Nếu hàng đợi đầy thì việc mới phải chờ.
    Trang chậm thì xem câu lệnh SQL trong log.
    Không chắc thì hỏi David.
  questions:
    - q_en: "What does the API return?"
      choices: ["JSON", "SQL", "A 404"]
      answer: 0
      skill: scan
      difficulty: 2
    - q_en: "What should you check first when you see old data?"
      choices: ["The cache", "The queue", "The URL"]
      answer: 0
      skill: infer
      difficulty: 3

writing_task:
  id: WT-F17
  kind: error_correction
  prompt_vi: "Câu này thiếu chữ “s”. Viết lại cho đúng."
  prompt_en: "The API return JSON."
  blanks:
    - ["the api returns json"]
  hint_vi: "“The API” là ngôi thứ ba số ít, nên động từ thêm “s”."
  sample_en: "The API returns JSON."

listening_snippet:
  id: LS-F17
  speed: 1.0
  voice: en_US_female
  context_vi: >
    Minh thu một câu mẫu để bạn nghe trước khi lên nói. Bẫy: trong cùng một câu có cả loại đánh vần
    từng chữ (API, URL, SQL) lẫn loại đọc liền (JSON), cộng hai từ quen mắt mà rất hay sai mồm —
    cache và queue.
  transcript_en: "Call the API and check the JSON. The URL returns a cache error. Run an SQL query and clear the queue."
  transcript_vi: "Gọi API và kiểm tra JSON. URL trả về lỗi cache. Chạy truy vấn SQL và xoá hàng đợi."
  questions:
    - q_vi: "Minh đọc “JSON” thế nào?"
      choices: ["Như một từ: JAY-sơn", "Từng chữ: J-S-O-N", "“giê-sôn”"]
      answer: 0
      difficulty: 3
    - q_vi: "Minh đọc “cache” thế nào?"
      choices: ["“kash”", "“ca-chê”", "“ca-sờ”"]
      answer: 0
      difficulty: 3

speaking_drills:
  - kind: read_aloud
    expected_text: "Call the API and check the URL."
    prompt_vi: "Dòng đầu Minh đưa bạn đọc thử. Đọc to — API = ây-pi-ai, URL = diu-a-eo. Đánh vần TỪNG CHỮ CÁI."
    ipa: "/kɔːl ðiː ˌeɪ piː ˈaɪ ænd tʃɛk ðə ˌjuː ɑːr ˈɛl/"
    focus_phonemes: [k, r, l]
  - kind: read_aloud
    expected_text: "Return JSON and clear the cache."
    prompt_vi: "Hai từ Minh vừa bắt bạn sửa. Đọc to — JSON = JAY-sơn (đọc liền như từ); cache = “kash”, không phải “ca-chê”."
    ipa: "/rɪˈtɜːrn ˈdʒeɪsən ænd klɪr ðə kæʃ/"
    focus_phonemes: [dʒ, k, ʃ]
  - kind: shadow
    expected_text: "The job is in the queue."
    prompt_vi: "Câu bạn sẽ phải nói chiều nay. Nghe rồi nhắc lại — queue = “kiu”, chỉ đọc âm đầu (bốn chữ cái sau câm)."
    ipa: "/ðə dʒɒb ɪz ɪn ðə kjuː/"
    focus_phonemes: [dʒ, k]
  - kind: respond
    prompt_en: "How do I get the data?"
    prompt_vi: "Minh đóng vai David hỏi bạn trong buổi tập. Trả lời có “API” và “JSON” — API đánh vần từng chữ, JSON đọc liền."
    accept_patterns:
      - "Call the API it returns JSON"
      - "Send a request to the API and read the JSON"
      - "Use the API the response is JSON"

vietnamese_explanation:
  why_vi: >
    Dân IT đọc các từ này hàng ngày trên màn hình nhưng ít khi nghe ai đọc lên, nên tự chế cách đọc:
    “API” thành “a-pi”, “cache” thành “ca-chê”, “queue” thành “quê-quê”. Khi họp với người nước ngoài,
    những cách đọc tự chế này khiến người nghe không hiểu — dù bạn đang nói đúng thuật ngữ.
  how_vi: >
    Hai loại viết tắt: (1) đọc TỪNG CHỮ CÁI — API (ây-pi-ai), URL (diu-a-eo), SQL (ét-kiu-eo), HTTP,
    CPU, ID; (2) đọc như MỘT TỪ — JSON (JAY-sơn), CAPTCHA, JPEG, SCADA. Và vài từ thường (không viết
    tắt) hay đọc sai: cache = “kash”, queue = “kiu”, null = “nol”, GUI = “gooey”. Nghe mẫu từng từ.
  contrast_vi: "“ca-chê” (tự chế, người nghe ngơ ngác) ↔ “kash” (đúng). “a-pi” ↔ “ây-pi-ai”. Đọc đúng thuật ngữ là tối thiểu để họp được."

common_mistakes:
  - mistake: "Đọc “cache” thành “ca-chê”"
    why_vi: "Trông giống từ tiếng Pháp/Việt hoá."
    fix_vi: "cache = “kash” (một âm tiết, như “cash”). Không có âm “chê”."
    detect: {}
  - mistake: "Đọc “queue” thành “quê-quê” hoặc đánh vần"
    why_vi: "Năm chữ cái nhưng chỉ đọc một âm."
    fix_vi: "queue = “kiu” /kjuː/. Chỉ nghe âm của chữ “q”; bốn chữ còn lại câm."
    detect: {}
  - mistake: "Đọc “JSON” từng chữ J-S-O-N"
    why_vi: "Tưởng viết tắt nào cũng đọc từng chữ."
    fix_vi: "JSON đọc như một từ: “JAY-sơn”. Ngược lại API/URL/SQL đọc từng chữ. Phải nhớ theo từng từ."
    detect: {}

memory_trick_vi: >
  Hai rổ viết tắt: rổ ĐÁNH VẦN (API, URL, SQL, HTTP, CPU — đọc từng chữ) và rổ ĐỌC LIỀN (JSON, JPEG,
  CAPTCHA — đọc như từ). Và nhớ ba “bẫy quen mắt”: cache = kash, queue = kiu, null = nol.

mini_quiz:
  - kind: mcq
    prompt_vi: "“API” đọc thế nào?"
    choices: ["Từng chữ: ây-pi-ai", "Như từ: “a-pi”", "“áp”"]
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "“cache” đọc là?"
    choices: ["“kash”", "“ca-chê”", "“ca-sơ”"]
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "“JSON” đọc thế nào?"
    choices: ["Như một từ: JAY-sơn", "Từng chữ J-S-O-N", "“giơ-son”"]
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "“queue” đọc là?"
    choices: ["“kiu” (chỉ âm chữ q)", "“quê-uê”", "đánh vần Q-U-E-U-E"]
    answer: 0
    difficulty: 3
  - kind: mcq_listen
    prompt_vi: "Từ nào được đọc như một từ (không đánh vần)?"
    audio_text: "Return JSON and clear the cache."
    choices: ["JSON (JAY-sơn)", "API", "URL"]
    answer: 0
    difficulty: 3

unlock_condition:
  mastery_threshold: 76
  mastery_weights: {speak: 0.35, listen: 0.15, read: 0.15, write: 0.15, quiz: 0.20}
  min_speaking_attempts: 4
  challenge_threshold: 85

