    tags: [it_english]
  - term: "router /ˈraʊtər/"
    ipa: "/ˈraʊtər/"
    meaning_vi: "bộ định tuyến — /r/ cong lưỡi"
    chunk: "Restart the router."
    tags: [it_english]
  - term: "online /ˈɒnlaɪn/"
    ipa: "/ˈɒnlaɪn/"
    meaning_vi: "trực tuyến — /n/ rồi /l/"
