vocabulary:
  - term: "email /ˈiːmeɪl/"
    ipa: "/ˈiːmeɪl/"
    meaning_vi: "email — âm cuối /l/ (lưỡi chạm sau răng trên)"
    chunk: "Send an email."
    tags: [office]
  - term: "call /kɔːl/"
    ipa: "/kɔːl/"
    meaning_vi: "cuộc gọi — âm cuối /l/"
    chunk: "Join the call."
    tags: [office]
  - term: "run /rʌn/"
    ipa: "/rʌn/"
    meaning_vi: "chạy — /r/ đầu, /n/ cuối"
