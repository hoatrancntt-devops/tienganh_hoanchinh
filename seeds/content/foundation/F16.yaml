      - "Bỏ qua, không cần"
      - "Chu môi tròn"
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "/r/ Anh-Mỹ khác “r” tiếng Việt thế nào?"
    choices:
