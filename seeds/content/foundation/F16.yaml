      - "Rung mạnh hơn"
      - "Giống hệt"
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "Cách tách /l/ và /n/ khi nói?"
    choices: ["Bịt mũi: /n/ nghẹt, /l/ thông", "Nói to hơn", "Không tách được"]
