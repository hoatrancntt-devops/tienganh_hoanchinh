schema_version: 1
id: F16
slug: am-l-n-r
unit: U-F2
title_vi: "Âm /l/, /n/ và /r/ — và âm cuối /l/"
title_en: "The /l/, /n/ and /r/ sounds"
phase: foundation
topic: core
cefr_target: a2
order_index: 16
est_minutes: 14

objective_vi: "Phát âm rõ /l/ và /n/ (nhất là ở cuối từ), và /r/ cong lưỡi kiểu Anh-Mỹ."
objective_observable: "Đạt ≥75 điểm nói trên 3/4 drill và nghe phân biệt đúng 4/5 câu quiz."

prerequisites:
  - {lesson: F15, min_mastery: 78, kind: hard}
  - {lesson: F02, min_mastery: 70, kind: soft}

vocabulary:
  - term: "email /ˈiːmeɪl/"
    ipa: "/ˈiːmeɪl/"
    meaning_vi: "email — âm cuối /l/ (lưỡi chạm sau răng trên)"
    chunk: "Send an email."
    tags: [office]
  - term: "call /kɔːl/"
    ipa: "/kɔːl/"
    meaning_vi: "cuộc gọi — âm cuối /l/"
    chunk: "Join the call."
    tags: [office]
  - term: "run /rʌn/"
    ipa: "/rʌn/"
    meaning_vi: "chạy — /r/ đầu, /n/ cuối"
    chunk: "Run the script."
    tags: [it_english]
  - term: "router /ˈraʊtər/"
    ipa: "/ˈraʊtər/"
    meaning_vi: "bộ định tuyến — /r/ cong lưỡi"
    chunk: "Restart the router."
    tags: [it_english]
  - term: "online /ˈɒnlaɪn/"
    ipa: "/ˈɒnlaɪn/"
    meaning_vi: "trực tuyến — /n/ rồi /l/"
    chunk: "The server is online."
    tags: [it_english]
  - term: "reload /riːˈloʊd/"
    ipa: "/riːˈloʊd/"
    meaning_vi: "tải lại — /r/ đầu, /l/ giữa"
    chunk: "Reload the page."
    tags: [it_english]

sentence_patterns:
  - pattern: "Please reload and run it again."
    meaning_vi: "Tải lại rồi chạy lại. (chú ý /r/, /l/, /n/)"
    slots: {}

dialogue:
  context_vi: >
    Chiều thứ Năm. Minh bắt bạn đọc to ba bước xử lý sự cố mà bạn vẫn quen gõ ra chat — vì ngày mai
    bạn sẽ phải NÓI mấy câu này qua call, không có chữ để người ta đọc.
  turns:
    - {speaker: Minh, en: "Read it out loud. Just the three steps.", vi: "Đọc to lên. Chỉ ba bước thôi."}
    - {speaker: You, en: "The router is offline. Please reload the page.", vi: "Router mất kết nối. Anh tải lại trang giúp em."}
    - {speaker: You, en: "I'll run the script and call you.", vi: "Em sẽ chạy script rồi gọi lại cho anh."}
    - {speaker: Minh, en: "Stop at “call”. You dropped the L — it came out “co”.", vi: "Dừng ở chữ “call”. Bạn nuốt mất âm /l/ — nghe thành “co”."}
    - {speaker: Minh, en: "Tongue behind the top teeth, hold one beat. Again: call.", vi: "Lưỡi chạm sau răng trên, giữ một nhịp. Lại nào: call."}

reading_passage:
  id: RP-F16
  kind: chat
  context_vi: >
    Router, reload, online, call — đoạn này gom đúng những từ có /l/, /n/, /r/ mà người Việt
    hay lẫn, nhất là chữ “l” ở cuối từ.
  text_en: |
    Linh: The router is offline again. Can you reload the page?
    You: I did. It still does not run.
    Linh: Let me call the network team. Are you online now?
    You: Yes, but only on mobile. I will send you an email with the error.
    Linh: Perfect. Thanks.
  text_vi: |
    Linh: Router lại mất kết nối rồi. Bạn tải lại trang giúp nhé?
    Bạn: Tôi tải rồi. Vẫn không chạy.
    Linh: Để tôi gọi nhóm mạng. Bạn có mạng chưa?
    Bạn: Có, nhưng chỉ trên điện thoại. Tôi gửi email kèm lỗi cho chị.
    Linh: Tốt quá. Cảm ơn bạn.
  questions:
    - q_en: "What is offline?"
      choices: ["The router", "The email", "The mobile phone"]
      answer: 0
      skill: scan
      difficulty: 2
    - q_en: "How is the writer connected now?"
      choices: ["On mobile", "Through the router", "Not at all"]
      answer: 0
      skill: infer
      difficulty: 3

writing_task:
  id: WT-F16
  kind: error_correction
  prompt_vi: "Câu này sai mạo từ. Viết lại cho đúng."
  prompt_en: "I will send you a email with the error."
  blanks:
    - ["i will send you an email with the error", "i'll send you an email with the error"]
  hint_vi: "“Email” bắt đầu bằng nguyên âm nên dùng “an”, không dùng “a”."
  sample_en: "I will send you an email with the error."

listening_snippet:
  id: LS-F16
  speed: 1.0
  voice: en_US_male
  context_vi: >
    Minh đọc lại đúng ba câu đó, giữ đủ âm cuối. Bẫy nằm ở đuôi từ: “offline”, “reload”, “call”,
    “run”, “online” — chỗ tai bạn hay bỏ qua và miệng bạn hay nuốt.
  transcript_en: "The router is offline. Please reload the page. I'll run the script and call you. It's online now."
  transcript_vi: "Router mất kết nối. Tải lại trang giúp. Tôi sẽ chạy script rồi gọi bạn. Giờ online lại rồi."
  questions:
    - q_vi: "Từ “call” Minh đọc kết thúc bằng âm gì?"
      choices: ["/l/ (lưỡi chạm sau răng trên)", "/n/", "Không có âm cuối"]
      answer: 0
      difficulty: 3
    - q_vi: "Bước đầu Minh bảo làm gì với trang?"
      choices: ["Tải lại (reload)", "Đóng lại", "In ra"]
      answer: 0
      difficulty: 2

speaking_drills:
  - kind: read_aloud
    expected_text: "Please reload the page."
    prompt_vi: "Bước một trong ba bước Minh bắt bạn đọc. Đọc to — /l/ ở “reload”: đầu lưỡi chạm sau răng trên. Đừng bỏ âm cuối /d/."
    ipa: "/pliːz riːˈloʊd ðə peɪdʒ/"
    focus_phonemes: [l, r, d]
  - kind: read_aloud
    expected_text: "Join the call."
    prompt_vi: "Đúng chữ Minh vừa bắt bạn dừng lại. Đọc to — âm cuối /l/ ở “call” là chỗ người Việt hay bỏ. Giữ lưỡi chạm răng trên một nhịp."
    ipa: "/dʒɔɪn ðə kɔːl/"
    focus_phonemes: [dʒ, l]
  - kind: shadow
    expected_text: "Restart the router and run it again."
    prompt_vi: "Minh đọc mẫu bước cuối. Nghe rồi nhắc lại — /r/ (router, run): cong lưỡi, không rung như “r” tiếng Việt."
    ipa: "/riːˈstɑːrt ðə ˈraʊtər ænd rʌn ɪt əˈɡɛn/"
    focus_phonemes: [r, t, n]
  - kind: respond
    prompt_en: "The page won't load. What do I do?"
    prompt_vi: "Minh đóng vai người dùng gọi tới. Bảo họ tải lại và chạy lại — giữ rõ /l/, /r/, /n/ ở cuối từ."
    accept_patterns:
      - "Please reload the page and run it again"
      - "Reload the page and call me if it fails"
      - "Restart the router and reload"

vietnamese_explanation:
  why_vi: >
    Hai vấn đề chính: (1) âm CUỐI /l/ và /n/ — người Việt hay nuốt (“email” thành “emay”, “call”
    thành “co”); (2) âm /r/ — tiếng Việt “r” khác hẳn /r/ Anh-Mỹ (cong lưỡi). Bỏ âm cuối /l/,/n/ và
    đọc /r/ kiểu Việt là hai dấu hiệu “giọng Việt” rõ nhất, và đôi khi làm sai nghĩa.
  how_vi: >
    /l/: đầu lưỡi chạm ngay sau răng cửa TRÊN, giữ một nhịp — đặc biệt ở CUỐI từ (call, email, online).
    /n/: lưỡi chạm cùng chỗ nhưng hơi ra mũi. /r/ (Anh-Mỹ): cong đầu lưỡi lên, KHÔNG rung/rung ít, môi
    hơi tròn — khác “r” rung của tiếng Việt. Cố tình kéo dài âm cuối lúc luyện.
  contrast_vi: "“email” đủ /l/ cuối ↔ “emay” (nuốt /l/). “router” /r/ cong lưỡi ↔ “r” rung kiểu Việt. Âm cuối và /r/ là hai mốc giọng."

common_mistakes:
  - mistake: "Nuốt âm cuối /l/ và /n/ (“call”→“co”, “run”→“rơ”)"
    why_vi: "Tiếng Việt ít có phụ âm cuối /l/; âm cuối hay bị bỏ."
    fix_vi: "Giữ lưỡi chạm sau răng trên ở cuối từ có /l/. Với /n/ cuối, giữ lưỡi chạm và cho hơi ra mũi. Kéo dài để tập."
    detect: {}
  - mistake: "Đọc /r/ Anh-Mỹ bằng “r” rung của tiếng Việt"
    why_vi: "Thay bằng âm quen."
    fix_vi: "/r/ Anh-Mỹ: cong đầu lưỡi lên gần vòm miệng nhưng KHÔNG chạm, không rung mạnh. Môi hơi tròn. Rất khác “r” Việt."
    detect: {}
  - mistake: "Lẫn /l/ và /n/ (“light”/“night”)"
    why_vi: "Một số vùng phát âm gần nhau."
    fix_vi: "/l/: hơi thoát hai BÊN lưỡi, không qua mũi. /n/: hơi qua MŨI. Bịt mũi thử: /n/ sẽ nghẹt, /l/ thì không."
    detect: {}

memory_trick_vi: >
  Âm cuối /l/,/n/ đừng nuốt — giữ lưỡi chạm sau răng trên thêm một nhịp (“ca-LL”, “ru-N”). Âm /r/
  Anh-Mỹ là CONG lưỡi, không rung như “r” Việt. Bịt mũi để tách /l/ (thông) và /n/ (nghẹt).

mini_quiz:
  - kind: mcq
    prompt_vi: "Âm cuối /l/ trong “call” tạo thế nào?"
    choices:
      - "Đầu lưỡi chạm sau răng trên, giữ một nhịp"
      - "Bỏ qua, không cần"
      - "Chu môi tròn"
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "/r/ Anh-Mỹ khác “r” tiếng Việt thế nào?"
    choices:
      - "Cong lưỡi, không rung mạnh"
      - "Rung mạnh hơn"
      - "Giống hệt"
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "Cách tách /l/ và /n/ khi nói?"
    choices: ["Bịt mũi: /n/ nghẹt, /l/ thông", "Nói to hơn", "Không tách được"]
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "Lỗi “giọng Việt” phổ biến nhất ở âm cuối là?"
    choices: ["Nuốt /l/, /n/ cuối từ", "Nhấn quá mạnh", "Thêm nguyên âm"]
    answer: 0
    difficulty: 2
  - kind: mcq_listen
    prompt_vi: "Người nói bảo làm gì với trang?"
    audio_text: "Please reload the page."
    choices: ["Tải lại (reload)", "Đóng lại", "In ra"]
    answer: 0
    difficulty: 2

unlock_condition:
  mastery_threshold: 78
  mastery_weights: {speak: 0.35, listen: 0.15, read: 0.15, write: 0.15, quiz: 0.20}
  min_speaking_attempts: 4
  challenge_threshold: 85

recommended_next:
  default: F17
