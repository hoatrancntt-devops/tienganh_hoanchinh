sentence_patterns:
  - pattern: "Please reload and run it again."
    meaning_vi: "Tải lại rồi chạy lại. (chú ý /r/, /l/, /n/)"
    slots: {}

dialogue:
  context_vi: "Các âm /l/ /n/ /r/ dày đặc trong câu lệnh IT."
  turns:
    - {speaker: A, en: "The router is offline. Please reload the page.", vi: "Router mất kết nối. Tải lại trang giúp. (/r/, /l/, /n/)"}
    - {speaker: B, en: "I'll run the script and call you.", vi: "Tôi sẽ chạy script rồi gọi bạn. (/r/, /n/, /l/)"}
    - {speaker: A, en: "It's online now. Send an email to confirm.", vi: "Giờ online rồi. Gửi email xác nhận. (/n/, /l/)"}

listening_snippet:
  id: LS-F16
  speed: 1.0
  voice: en_US_male
  transcript_en: "The router is offline. Please reload the page. I'll run the script and call you. It's online now."
  transcript_vi: "Router mất kết nối. Tải lại trang giúp. Tôi sẽ chạy script rồi gọi bạn. Giờ online rồi."
  questions:
    - q_vi: "Từ “call” kết thúc bằng âm gì?"
