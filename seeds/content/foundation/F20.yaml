schema_version: 1
id: F20
slug: noi-ro-tren-cuoc-goi
unit: U-F4
title_vi: "Nói rõ trên điện thoại và họp online"
title_en: "Speaking clearly on calls"
phase: foundation
topic: core
cefr_target: b1
order_index: 20
est_minutes: 15

objective_vi: "Nói rõ khi không thấy mặt: đánh vần bằng bảng chữ cái, đọc email/mã, và xử lý khi âm thanh chập chờn."
objective_observable: "Đạt ≥75 điểm nói trên 3/4 drill và chọn đúng cách xử lý 4/5 câu quiz."

prerequisites:
  - {lesson: F19, min_mastery: 78, kind: hard}
  - {lesson: F13, min_mastery: 70, kind: soft}

vocabulary:
  - term: "spell it out"
    ipa: "/spɛl ɪt aʊt/"
    meaning_vi: "đánh vần ra"
    chunk: "Let me spell it out."
    tags: [office]
  - term: "as in"
    ipa: "/æz ɪn/"
    meaning_vi: "như trong (làm rõ chữ cái)"
    chunk: "B as in Bravo."
    tags: [office]
  - term: "You're breaking up"
    ipa: "/jʊr ˈbreɪkɪŋ ʌp/"
    meaning_vi: "tiếng bạn bị ngắt quãng"
    chunk: "Sorry, you're breaking up."
    tags: [it_english]
  - term: "at /æt/"
    ipa: "/æt/"
    meaning_vi: "dấu @ trong email"
    chunk: "lan at gmail dot com"
    tags: [it_english]
  - term: "dot"
    ipa: "/dɒt/"
    meaning_vi: "dấu chấm (.)"
    chunk: "example dot com"
    tags: [it_english]
  - term: "Can you hear me?"
    ipa: "/kæn juː hɪr miː/"
    meaning_vi: "Bạn nghe tôi được không?"
    chunk: "Can you hear me now?"
    tags: [office]

sentence_patterns:
  - pattern: "It's {letter} as in {word}."
    meaning_vi: "Là chữ {letter}, như trong {word}."
    slots:
      letter: [B, M, S]
      word: [Bravo, Mike, Sierra]

dialogue:
  context_vi: >
    Ba giờ chiều thứ Sáu. Cuộc gọi đầu tiên bạn phải NÓI chứ không chỉ ngồi nghe: David cần địa chỉ
    email trong ticket để gửi lời mời họp, và ông ấy đang gõ theo lời bạn. Mạng phòng họp thì chập chờn.
  turns:
    - {speaker: David, en: "What's the address on that ticket? Quick — I'm adding it now.", vi: "Địa chỉ trong cái ticket đó là gì? Nhanh nhé — tôi đang thêm vào đây."}
    - {speaker: You, en: "It's lan dot tran at gmail dot com. Lan: L as in London, A, N.", vi: "Là lan.tran@gmail.com. Lan: L như London, A, N."}
    - {speaker: David, en: "Sorry, you're breaking up. Spell the last name.", vi: "Xin lỗi, tiếng bạn bị ngắt. Đánh vần cái họ đi."}
    - {speaker: You, en: "Sure. T as in Tango, R, A, N.", vi: "Vâng. T như Tango, R, A, N."}
    - {speaker: David, en: "Got it. Can you hear me okay? See you at four.", vi: "Rõ rồi. Bạn nghe tôi ổn chứ? Bốn giờ gặp nhé."}

reading_passage:
  id: RP-F20
  kind: chat
  context_vi: >
    Cuộc gọi với khách nước ngoài, đường truyền kém. Đọc để lấy đúng bộ câu xử lý khi người kia
    nghe không rõ.
  text_en: |
    David: Can you hear me? You're breaking up a little.
    You: Better now. Let me give you the address: it is nam dot tran at vertex dot com.
    David: Sorry, could you spell the last name?
    You: T for Tango, R, A, N — as in November for the N.
    David: Got it. And the ticket number?
    You: Four four one seven. Four, four, one, seven.
  text_vi: |
    David: Anh nghe rõ tôi không? Tiếng anh hơi bị ngắt quãng.
    Bạn: Giờ tốt hơn rồi. Để tôi đọc địa chỉ: nam chấm tran a còng vertex chấm com.
    David: Xin lỗi, anh đánh vần họ được không?
    Bạn: T như trong Tango, R, A, N — N như trong November.
    David: Rõ rồi. Còn số ticket?
    Bạn: Bốn bốn một bảy. Bốn, bốn, một, bảy.
  questions:
    - q_en: "Why does David ask the writer to spell?"
      choices: ["He could not hear the name clearly", "He cannot write", "The line is fine"]
      answer: 0
      skill: infer
      difficulty: 4
    - q_en: "How does the writer give the ticket number?"
      choices: ["Digit by digit, twice", "As one big number", "He spells it"]
      answer: 0
      skill: scan
      difficulty: 3

writing_task:
  id: WT-F20
  kind: error_correction
  prompt_vi: "Câu này sai trật tự từ. Viết lại cho đúng."
  prompt_en: "Could you spell please the last name?"
  blanks:
    - ["could you please spell the last name", "could you spell the last name please"]
  hint_vi: "“Please” đứng sau chủ ngữ hoặc cuối câu, không chen giữa động từ và tân ngữ."
  sample_en: "Could you please spell the last name?"

listening_snippet:
  id: LS-F20
  speed: 1.0
  voice: en_US_male
  context_vi: >
    David đọc ngược lại địa chỉ để đối chiếu, giữa lúc tiếng vẫn ngắt quãng. Bẫy: “dot” và “at” là
    KÝ HIỆU chứ không phải chữ có trong địa chỉ — và cái họ được đánh vần bằng bảng Tango/London.
  transcript_en: "So that's lan dot tran at gmail dot com. Sorry, you're breaking up. T as in Tango, R, A, N — right?"
  transcript_vi: "Vậy là lan.tran@gmail.com. Xin lỗi, tiếng bạn bị ngắt. T như Tango, R, A, N — đúng không?"
  questions:
    - q_vi: "“at” trong địa chỉ email là dấu gì?"
      choices: ["Dấu @", "Dấu chấm", "Dấu gạch"]
      answer: 0
      difficulty: 3
    - q_vi: "David nói “You're breaking up” nghĩa là gì?"
      choices: ["Tiếng bị ngắt quãng", "Cuộc gọi đã kết thúc", "Bạn nói sai rồi"]
      answer: 0
      difficulty: 3

speaking_drills:
  - kind: read_aloud
    expected_text: "It's lan dot tran at gmail dot com."
    prompt_vi: "David đang gõ theo lời bạn. Đọc to — “dot” = dấu chấm, “at” = @. Đọc chậm, rõ từng phần."
    ipa: "/ɪts læn dɒt træn æt ˈdʒiːmeɪl dɒt kɒm/"
    focus_phonemes: [d, t, æ]
  - kind: read_aloud
    expected_text: "T as in Tango, R, A, N."
    prompt_vi: "David bảo đánh vần lại cái họ. Đọc to — khi chữ cái dễ nhầm, dùng “X as in [từ]” để loại bỏ mơ hồ."
    ipa: "/tiː æz ɪn ˈtæŋɡoʊ ɑːr eɪ ɛn/"
    focus_phonemes: [t, ŋ, n]
  - kind: shadow
    expected_text: "Sorry, you're breaking up. Could you say that again?"
    prompt_vi: "Đến lượt bạn mất tiếng của David. Nghe rồi nhắc lại — câu cứu hộ này bạn sẽ cần lúc bốn giờ."
    ipa: "/ˈsɒri jʊr ˈbreɪkɪŋ ʌp kʊd juː seɪ ðæt əˈɡɛn/"
    focus_phonemes: [r, ŋ, k]
  - kind: respond
    prompt_en: "Sorry, I didn't catch your email. Could you repeat it?"
    prompt_vi: "David không nghe kịp và hỏi lại. Đọc lại địa chỉ, dùng “dot” và “at”, đánh vần phần dễ nhầm."
    accept_patterns:
      - "Sure it's {name} at gmail dot com {letter} as in {word}"
      - "It's {name} dot {name} at {domain} dot com"
      - "Let me spell it out {letter} as in {word}"

vietnamese_explanation:
  why_vi: >
    Qua điện thoại/họp online, bạn mất khẩu hình và tín hiệu hay kém — nên phát âm chưa chuẩn càng dễ
    bị hiểu nhầm. Ba tình huống hay gặp: đọc email/mã (dễ nhầm chữ cái), đánh vần tên, và xử lý khi
    tiếng ngắt quãng. Có vài câu và quy ước cố định giúp bạn qua trơn tru.
  how_vi: >
    (1) Email: “@”=“at”, “.”=“dot”, ví dụ “lan dot tran at gmail dot com”. (2) Đánh vần chữ dễ nhầm
    bằng “X as in [từ]”: “B as in Bravo”, “M as in Mike” (b/p, m/n, s/f hay nhầm qua điện thoại). (3)
    Tín hiệu kém: “Sorry, you're breaking up”, “Could you say that again?”, “Can you hear me?”. Đọc
    số/mã thì chậm và tách nhóm.
  contrast_vi: "“my email is lantran…” (nhanh, người kia chép sai) ↔ “lan dot tran at gmail dot com, L as in London…” (rõ, chép đúng ngay)."

common_mistakes:
  - mistake: "Đọc email/mã quá nhanh, không dùng “dot”/“at”"
    why_vi: "Nghĩ người kia tự hiểu ký hiệu."
    fix_vi: "Nói rõ “dot” cho “.”, “at” cho “@”, đọc chậm và tách nhóm. Người nghe đang GÕ theo bạn."
    detect: {}
  - mistake: "Không đánh vần chữ dễ nhầm"
    why_vi: "Nghĩ đọc chữ cái là đủ rõ."
    fix_vi: "Qua điện thoại b/p, m/n, s/f rất dễ nhầm. Dùng “B as in Bravo”, “F as in Foxtrot” để loại bỏ mơ hồ."
    detect: {}
  - mistake: "Im lặng hoặc đoán khi tiếng ngắt quãng"
    why_vi: "Ngại nói mình không nghe được."
    fix_vi: "Nói thẳng “Sorry, you're breaking up, could you repeat that?”. Đoán mò rồi ghi sai còn tệ hơn."
    detect: {}

memory_trick_vi: >
  Trên cuộc gọi, ba bộ công cụ: KÝ HIỆU (dot = chấm, at = @), ĐÁNH VẦN (“B as in Bravo” cho chữ dễ
  nhầm), và CỨU HỘ (“you're breaking up, say that again?”). Người kia đang gõ theo bạn — chậm và rõ
  quan trọng hơn nhanh.

mini_quiz:
  - kind: mcq
    prompt_vi: "Đọc email “lan.tran@gmail.com” qua điện thoại, nói thế nào?"
    choices:
      - "lan dot tran at gmail dot com"
      - "lan chấm tran a còng gmail chấm com"
      - "lan-tran-gmail-com"
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Chữ “B” dễ nhầm với “P” qua điện thoại. Làm rõ thế nào?"
    choices: ["B as in Bravo", "Nói to hơn", "Bỏ qua"]
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Tiếng người kia bị ngắt quãng. Nói gì?"
    choices:
      - "Sorry, you're breaking up. Could you repeat that?"
      - "(im lặng, đoán đại)"
      - "Cúp máy luôn"
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Vì sao nên đọc email/mã chậm và rõ?"
    choices:
      - "Người nghe đang gõ theo từng ký tự"
      - "Để kéo dài cuộc gọi"
      - "Không cần thiết"
    answer: 0
    difficulty: 2
  - kind: mcq_listen
    prompt_vi: "“at” trong email là dấu gì?"
    audio_text: "It's lan at gmail dot com."
    choices: ["Dấu @", "Dấu chấm", "Dấu gạch dưới"]
    answer: 0
    difficulty: 3

unlock_condition:
  mastery_threshold: 78
  mastery_weights: {speak: 0.35, listen: 0.15, read: 0.15, write: 0.15, quiz: 0.20}
  min_speaking_attempts: 4
  challenge_threshold: 85

recommended_next:
  default: CP-F
