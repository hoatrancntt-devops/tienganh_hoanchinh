      difficulty: 3
    - q_vi: "“ship” và “sheep” khác nhau ở đâu?"
      choices: ["Độ dài nguyên âm (/ɪ/ vs /iː/)", "Phụ âm đầu", "Trọng âm"]
      answer: 0
