      word_long: [sheep, leave]
      word_short: [ship, live]

dialogue:
  context_vi: "Luyện phân biệt hai âm qua các cặp từ (nghe kỹ độ dài)."
  turns:
    - {speaker: A, en: "Did you say leave or live?", vi: "Bạn nói “leave” (rời) hay “live” (sống)?"}
    - {speaker: B, en: "Leave — with a long ee. I'll leave at five.", vi: "“Leave” — âm “i” dài. Tôi sẽ rời lúc năm giờ."}
    - {speaker: A, en: "Got it. And can you reach the server?", vi: "Rõ. Với bạn liên hệ tới server được không?"}
    - {speaker: B, en: "No, I can't reach it — long ee, reach.", vi: "Không, tôi không tới được — âm “i” dài, “reach”."}

listening_snippet:
  id: LS-F14
  speed: 1.0
