speaking_drills:
  - kind: read_aloud
    expected_text: "It's a ship, not a sheep."
    prompt_vi: "Đọc to. “ship” ngắn gọn /ɪ/; “sheep” kéo dài /iː/. Cảm nhận độ dài khác nhau."
    ipa: "/ɪts ə ʃɪp nɒt ə ʃiːp/"
    focus_phonemes: [ʃ, ɪ, iː]
  - kind: read_aloud
    expected_text: "I'll leave at five."
    prompt_vi: "Đọc to. “leave” âm /iː/ dài — kéo dài môi cười."
    ipa: "/aɪl liːv æt faɪv/"
    focus_phonemes: [l, iː, v]
  - kind: shadow
    expected_text: "I can't reach the server."
    prompt_vi: "Nghe rồi nhắc lại. “reach” /iː/ dài, khác “rich” /ɪ/ ngắn."
    ipa: "/aɪ kænt riːtʃ ðə ˈsɜːrvər/"
    focus_phonemes: [r, iː, tʃ]
  - kind: respond
    prompt_en: "When will you leave?"
    prompt_vi: "Trả lời có dùng “leave” — giữ âm /iː/ dài, đừng rút thành “live”."
    accept_patterns:
      - "I'll leave at {time}"
      - "I leave at {time}"
      - "I'm leaving at {time}"

vietnamese_explanation:
  why_vi: >
    Tiếng Việt chỉ có một âm “i”, nên tai người Việt gộp /iː/ (dài) và /ɪ/ (ngắn) làm một. Nhưng
    trong tiếng Anh chúng là HAI âm khác nghĩa: “leave” (rời) vs “live” (sống), “reach” vs “rich”,
    “sheep” vs “ship”. Không phân biệt được khiến bạn vừa nói nhầm nghĩa vừa nghe nhầm.
  how_vi: >
    /iː/ (dài): môi kéo NGANG như đang cười, âm ngân dài — “sheep, leave, reach”. /ɪ/ (ngắn): miệng
    thả lỏng hơn, âm ngắn dứt khoát — “ship, live, rich”. Mẹo: /iː/ căng và dài, /ɪ/ lỏng và ngắn.
    Luyện theo cặp (minimal pairs) để tai quen sự khác biệt.
  contrast_vi: "“I'll leave” (rời đi, /iː/) ↔ “I live” (sống ở, /ɪ/). Cùng phụ âm, khác độ dài nguyên âm — khác hẳn nghĩa."

common_mistakes:
  - mistake: "Đọc /iː/ và /ɪ/ giống nhau"
    why_vi: "Tiếng Việt chỉ có một âm “i”."
    fix_vi: "/iː/ kéo dài, môi căng ngang (cười); /ɪ/ ngắn, miệng lỏng. Cường điệu độ dài lúc luyện để tai và miệng quen."
    detect: {}
  - mistake: "Nghe nhầm “leave” thành “live”, “reach” thành “rich”"
    why_vi: "Tai chưa tách được hai âm."
    fix_vi: "Luyện nghe theo cặp tối thiểu (minimal pairs). Chú ý ĐỘ DÀI: dài = /iː/, ngắn = /ɪ/."
    detect: {}
  - mistake: "Nghĩ chỉ cần đọc gần đúng là được"
    why_vi: "Coi nhẹ vì “nghe cũng hiểu”."
    fix_vi: "Ở nhiều cặp, sai âm là sai NGHĨA (leave/live). Với các từ này, độ dài nguyên âm là bắt buộc, không phải tuỳ chọn."
    detect: {}

memory_trick_vi: >
  /iː/ = nụ cười DÀI (sheep, leave, reach — kéo môi ngang, ngân ra); /ɪ/ = cái nháy NGẮN (ship, live,
  rich — thả lỏng, dứt nhanh). Cùng “i” nhưng một cái cười dài, một cái chớp mắt.

