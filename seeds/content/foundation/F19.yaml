    prompt_vi: "Điều gì làm một lời nhờ nghe lịch sự trong tiếng Anh?"
    choices:
      - "Cả từ mềm VÀ giọng mềm (đuôi lên nhẹ)"
      - "Chỉ cần đúng từ"
      - "Nói to và rõ"
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "Câu nào lịch sự nhất?"
    choices:
      - "Would you mind checking this, if that's okay?"
      - "Check this."
      - "You must check this now."
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Đuôi câu của một lời NHỜ nên?"
    choices: ["Lên nhẹ (như xin phép)", "Xuống mạnh", "Giữ phẳng gắt"]
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "Vì sao “SEND me the file” (nhấn mạnh) nghe cộc?"
    choices:
      - "Nhấn động từ mệnh lệnh nghe như ép buộc"
      - "Vì sai ngữ pháp"
      - "Vì quá dài"
    answer: 0
    difficulty: 3
  - kind: mcq_listen
    prompt_vi: "Giọng người nói thế nào?"
    audio_text: "Could you check this, if that's okay?"
    choices: ["Mềm, lịch sự", "Ra lệnh", "Bực bội"]
    answer: 0
    difficulty: 2

