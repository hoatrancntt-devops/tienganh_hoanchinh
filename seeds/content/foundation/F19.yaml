schema_version: 1
id: F19
slug: ngu-dieu-lich-su
unit: U-F3
title_vi: "Ngữ điệu lịch sự — cùng câu, khác thái độ"
title_en: "Polite intonation"
phase: foundation
topic: core
cefr_target: b1
order_index: 19
est_minutes: 10

objective_vi: "Dùng giọng mềm và lên nhẹ cuối câu yêu cầu, để lời nhờ vả nghe lịch sự thay vì ra lệnh."
objective_observable: "Đạt ≥75 điểm nói trên 3/4 drill và chọn đúng giọng lịch sự 4/5 câu quiz."

prerequisites:
  - {lesson: F18, min_mastery: 78, kind: hard}
  - {lesson: F10, min_mastery: 70, kind: soft}

vocabulary:
  - term: "Could you"
    ipa: "/kʊd juː/"
    meaning_vi: "Bạn có thể… (mềm hơn “can you”)"
    chunk: "Could you help me?"
    tags: [office]
  - term: "Would you mind"
    ipa: "/wʊd juː maɪnd/"
    meaning_vi: "Phiền bạn… (rất lịch sự)"
    chunk: "Would you mind checking this?"
    tags: [office]
  - term: "just"
    ipa: "/dʒʌst/"
    meaning_vi: "chỉ (làm mềm yêu cầu)"
    chunk: "Could you just wait a moment?"
    tags: [office]
  - term: "if that's okay"
    ipa: "/ɪf ðæts ˈoʊkeɪ/"
    meaning_vi: "nếu được (đuôi mềm)"
    chunk: "Tomorrow, if that's okay?"
    tags: [office]
  - term: "a bit"
    ipa: "/ə bɪt/"
    meaning_vi: "một chút (giảm nhẹ)"
    chunk: "It's a bit late."
    tags: [core]
  - term: "I was wondering"
    ipa: "/aɪ wɒz ˈwʌndərɪŋ/"
    meaning_vi: "Không biết là… (mở đầu rất lịch sự)"
    chunk: "I was wondering if you could help."
    tags: [office]

sentence_patterns:
  - pattern: "Could you {verb} this, if that's okay? (soft, rising)"
    meaning_vi: "Bạn {verb} cái này giúp, nếu được nhé? (giọng mềm, lên nhẹ)"
    slots:
      verb: [check, review, send]

dialogue:
  context_vi: >
    Chiều thứ Sáu, còn một tiếng nữa tới buổi giới thiệu. Bạn cần Minh xem lại phần bạn sắp nói,
    nhưng Minh đang bận — và hôm thứ Ba bạn nhờ bằng giọng phẳng nên nghe như đang sai việc.
    Từ giống nhau, chỉ giọng khác.
  turns:
    - {speaker: You, en: "Could you check this, if that's okay?", vi: "Anh xem giúp em cái này, nếu tiện nhé? (mềm, đuôi lên nhẹ)"}
    - {speaker: Minh, en: "Of course. When do you need it?", vi: "Được chứ. Khi nào bạn cần?"}
    - {speaker: You, en: "I was wondering if before three works?", vi: "Không biết trước ba giờ có kịp không ạ?"}
    - {speaker: Minh, en: "Before three is fine. And that “could you” sounded right this time.", vi: "Trước ba giờ ổn. Mà câu “could you” lần này nghe đúng rồi đấy."}

listening_snippet:
  id: LS-F19
  speed: 1.0
  voice: en_US_female
  context_vi: >
    Minh thu lại chính hai câu nhờ vả của bạn, đọc đúng ngữ điệu để bạn đối chiếu. Bẫy: từ ngữ
    không đổi một chữ nào — chỉ có giọng đổi. Nghe cái đuôi câu đi lên hay đi xuống.
  transcript_en: "Could you check this, if that's okay? I was wondering if before three works for you?"
  transcript_vi: "Bạn xem giúp cái này, nếu được nhé? Không biết trước ba giờ có tiện với bạn không?"
  questions:
    - q_vi: "Giọng trong bản thu thế nào?"
      choices: ["Mềm, lịch sự (nhờ vả)", "Ra lệnh, gắt", "Tức giận"]
      answer: 0
      difficulty: 3
    - q_vi: "“Could you… if that's okay?” so với “Do this now” thì?"
      choices: ["Lịch sự hơn nhiều", "Cộc hơn", "Giống nhau"]
      answer: 0
      difficulty: 2

speaking_drills:
  - kind: read_aloud
    expected_text: "Could you check this, if that's okay?"
    prompt_vi: "Bạn nhờ Minh xem lại phần giới thiệu. Đọc to, giọng MỀM, đuôi LÊN nhẹ — “if that's okay?” làm lời nhờ nhẹ đi."
    ipa: "/kʊd juː tʃɛk ðɪs ɪf ðæts ˈoʊkeɪ/"
    focus_phonemes: [k, tʃ, ð]
  - kind: read_aloud
    expected_text: "Would you mind sending it again?"
    prompt_vi: "David gửi nhầm file cũ, bạn phải xin lại. Đọc to — “Would you mind…?” là mức lịch sự cao nhất; giọng nhẹ, không nhấn mệnh lệnh."
    ipa: "/wʊd juː maɪnd ˈsɛndɪŋ ɪt əˈɡɛn/"
    focus_phonemes: [w, d, ŋ]
  - kind: shadow
    expected_text: "I was wondering if you could help."
    prompt_vi: "Cách mở lời khi bạn ngại làm phiền. Nghe rồi nhắc lại — “I was wondering…” rất lịch sự, giọng đều và ấm."
    ipa: "/aɪ wɒz ˈwʌndərɪŋ ɪf juː kʊd hɛlp/"
    focus_phonemes: [w, d, h]
  - kind: respond
    prompt_en: "I'm busy right now."
    prompt_vi: "Minh nói đang bận. Nhờ lại một cách lịch sự, giọng mềm, đuôi lên nhẹ."
    accept_patterns:
      - "Could you do it later if that's okay"
      - "Would you mind helping when you're free"
      - "I was wondering if you could look at it later"

vietnamese_explanation:
  why_vi: >
    Trong tiếng Anh, LỊCH SỰ nằm nhiều ở GIỌNG chứ không chỉ ở từ. Cùng câu “Send me the file”, nói
    giọng phẳng-mạnh nghe như ra lệnh; nói giọng mềm, đuôi lên nhẹ nghe như lời nhờ. Người Việt dịch
    đúng từ nhưng hay giữ giọng phẳng, nên vô tình nghe cộc — dù trong lòng rất lịch sự.
  how_vi: >
    Hai lớp: (1) TỪ làm mềm — “Could you…”, “Would you mind…”, “just”, “a bit”, “if that's okay”, “I
    was wondering…”; (2) GIỌNG làm mềm — hạ âm lượng một chút, đuôi câu yêu cầu LÊN nhẹ (như câu hỏi),
    không nhấn mạnh động từ mệnh lệnh. Kết hợp cả hai mới thật sự lịch sự.
  contrast_vi: "“Send me the file.” (phẳng, mạnh → ra lệnh) ↔ “Could you send me the file, if that's okay? ↗” (mềm, lên nhẹ → nhờ vả)."

common_mistakes:
  - mistake: "Dùng từ lịch sự nhưng giọng vẫn phẳng-mạnh"
    why_vi: "Nghĩ chỉ cần đúng từ là đủ lịch sự."
    fix_vi: "Giọng cũng phải mềm: hạ nhẹ âm lượng, đuôi lên nhẹ. Từ “could you” mà nói giọng ra lệnh vẫn nghe cộc."
    detect: {}
  - mistake: "Nhấn mạnh động từ mệnh lệnh (“SEND me the file”)"
    why_vi: "Nhấn để cho rõ, nhưng vô tình nghe như quát."
    fix_vi: "Đừng nhấn động từ mệnh lệnh. Giữ giọng đều, đuôi lên nhẹ. Nhấn mạnh mệnh lệnh nghe như ép buộc."
    detect: {}
  - mistake: "Giọng đi xuống mạnh ở cuối lời nhờ"
    why_vi: "Quen kết câu bằng giọng xuống."
    fix_vi: "Lời nhờ nên đuôi LÊN nhẹ (như đang hỏi ý). Giọng xuống mạnh khiến lời nhờ nghe như quyết định đã rồi."
    detect: {}

memory_trick_vi: >
  Lịch sự = TỪ mềm + GIỌNG mềm. Từ: “Could you… if that's okay?”. Giọng: nhỏ hơn một chút, đuôi LÊN
  nhẹ như xin phép. Cùng một câu, giọng quyết định bạn đang NHỜ hay đang RA LỆNH.

mini_quiz:
