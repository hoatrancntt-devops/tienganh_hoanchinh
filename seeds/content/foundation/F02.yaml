schema_version: 1
id: F02
slug: am-cuoi-s-va-z
unit: U-F2
title_vi: "Âm cuối /s/ và /z/ — thứ người Việt hay nuốt mất"
title_en: "Final S and Z"
phase: foundation
topic: core
cefr_target: pre_a1
order_index: 2
est_minutes: 14

objective_vi: "Phát âm được âm cuối /s/ và /z/ trong 6 từ thường dùng, và nghe ra khác nhau giữa work và works."
objective_observable: "Đạt ≥80 điểm phát âm trên 3/4 câu drill có âm cuối /s/ hoặc /z/."

prerequisites:
  - {lesson: F01, min_mastery: 70, kind: hard}

vocabulary:
  - term: works
    ipa: "/wɜːrks/"
    meaning_vi: "làm việc (chia ngôi thứ ba)"
    chunk: "He works in IT."
    tags: [office, verb]
  - term: uses
    ipa: "/ˈjuːzɪz/"
    meaning_vi: "sử dụng (ngôi thứ ba)"
    chunk: "She uses the VPN every day."
    tags: [it_english, verb]
  - term: tickets
    ipa: "/ˈtɪkɪts/"
    meaning_vi: "các phiếu yêu cầu hỗ trợ"
    chunk: "I have three tickets today."
    tags: [it_english, noun]
  - term: needs
    ipa: "/niːdz/"
    meaning_vi: "cần (ngôi thứ ba)"
    chunk: "The server needs a restart."
    tags: [it_english, verb]
  - term: thanks
    ipa: "/θæŋks/"
    meaning_vi: "cảm ơn"
    chunk: "Thanks, that helps."
    tags: [social]
  - term: colleagues
    ipa: "/ˈkɒliːɡz/"
    meaning_vi: "các đồng nghiệp"
    chunk: "My colleagues are in the meeting."
    tags: [office, noun]

sentence_patterns:
  - pattern: "He/She works in {department}."
    meaning_vi: "Anh/cô ấy làm ở bộ phận {department}."
    slots:
      department: [IT, HR, Sales, Accounting]
  - pattern: "The {thing} needs {action}."
    meaning_vi: "{thing} cần được {action}."
    slots:
      thing: [server, laptop, router]
      action: ["a restart", "an update", "a check"]

dialogue:
  context_vi: "Vẫn ngày đầu, đầu giờ chiều. Linh dẫn bạn sang bàn của Minh để bàn giao mấy việc nhỏ đầu tiên."
  turns:
    - {speaker: Linh, en: "This is Minh. He works in IT support, same team as you.", vi: "Đây là Minh. Anh ấy làm IT support, cùng team với bạn."}
    - {speaker: You, en: "Nice to meet you. What do you work on?", vi: "Rất vui được gặp anh. Anh làm mảng gì ạ?"}
    - {speaker: Minh, en: "I handle tickets and network issues. You get three tickets today.", vi: "Mình xử lý ticket và các vấn đề mạng. Hôm nay bạn nhận ba ticket."}
    - {speaker: You, en: "Thanks, that helps.", vi: "Cảm ơn anh, vậy là em rõ rồi."}

reading_passage:
  id: RP-F02
  kind: chat
  context_vi: >
    Một đoạn giới thiệu ngắn về Minh. Mỗi câu đều có âm /s/ hoặc /z/ ở cuối từ — đọc bằng mắt
    và để ý những chữ “s” đó.
  text_en: |
    Minh works in IT. He uses two laptops.
    He gets many tickets every day.
    His colleagues help him when he needs it.
    He always says thanks.
  text_vi: |
    Minh làm bên IT. Anh ấy dùng hai cái laptop.
    Mỗi ngày anh ấy nhận rất nhiều ticket.
    Đồng nghiệp giúp anh ấy khi anh ấy cần.
    Anh ấy luôn nói cảm ơn.
  questions:
    - q_en: "Where does Minh work?"
      choices: ["In IT", "In HR", "In accounting"]
      answer: 0
      skill: scan
      difficulty: 1
    - q_en: "What is the text about?"
      choices: ["Minh's work day", "Minh's family", "A broken laptop"]
      answer: 0
      skill: skim
      difficulty: 2

writing_task:
  id: WT-F02
  kind: fill_blank
  prompt_vi: "Điền hai chỗ trống. Nhớ chữ “s” ở cuối — thiếu nó là người nghe hiểu sai chủ ngữ."
  prompt_en: "Minh ___ in IT. He ___ two laptops."
  blanks:
    - ["works"]
    - ["uses"]
  hint_vi: "Chủ ngữ là “he”, nên động từ phải có “s” ở cuối."
  sample_en: "Minh works in IT. He uses two laptops."

listening_snippet:
  id: LS-F02
  speed: 0.85
  voice: en_US_male
  context_vi: >
    Linh đi rồi, Minh quay sang bàn giao cho bạn. Nghe kỹ đuôi từ: "ticket" hay "tickets",
    "need" hay "needs". Cả câu chỉ khác nhau ở một tiếng xì rất nhỏ — mà mất tiếng xì đó là
    bạn mất luôn con số.
  transcript_en: "So, these are yours. Three tickets today, all from the same office. The server needs a restart first. Ask me if anything looks strange."
  transcript_vi: "Vậy nhé, mấy cái này là của bạn. Hôm nay ba ticket, đều từ một văn phòng. Máy chủ cần khởi động lại trước. Có gì thấy lạ thì hỏi mình."
  questions:
    - q_vi: "Nếu thấy có gì lạ, bạn hỏi ai?"
      choices: ["Minh", "Linh", "Không hỏi ai"]
      answer: 0
      difficulty: 1
    - q_vi: "Hôm nay bạn nhận mấy ticket?"
      choices: ["Ba", "Một", "Hai"]
      answer: 0
      difficulty: 3

speaking_drills:
  - kind: read_aloud
    expected_text: "He works in IT."
    prompt_vi: "Linh vừa giới thiệu Minh với bạn. Nói lại — giữ âm /s/ ở cuối works, đừng để nó rơi mất."
    ipa: "/hiː wɜːrks ɪn aɪ tiː/"
    focus_phonemes: [s]
  - kind: read_aloud
    expected_text: "She uses the VPN."
    prompt_vi: "Một trong ba ticket là chuyện VPN của Linh. Đọc to — âm cuối ở đây là /z/, có rung."
    ipa: "/ʃiː ˈjuːzɪz ðə viː piː ɛn/"
    focus_phonemes: [z]
  - kind: shadow
    expected_text: "The server needs a restart."
    prompt_vi: "Minh dặn việc đầu tiên phải làm. Nghe rồi nhắc lại — âm cuối needs là /z/."
    ipa: "/ðə ˈsɜːrvər niːdz ə ˈriːstɑːrt/"
    focus_phonemes: [z]
  - kind: shadow
    expected_text: "I have three tickets today."
    prompt_vi: "Bạn báo lại số việc mình vừa nhận. Nghe rồi nhắc lại — cụm /ts/ cuối tickets rất dễ rơi, mà rơi là mất luôn con số."
    ipa: "/aɪ hæv θriː ˈtɪkɪts təˈdeɪ/"
    focus_phonemes: [s, t]
  - kind: respond
    prompt_en: "Where does Minh work?"
    prompt_vi: "Cuối ngày có người hỏi bạn Minh làm gì. Trả lời — nhớ âm /s/ ở works."
    accept_patterns:
      - "He works in IT"
      - "Minh works in IT"
      - "He works in the IT department"

vietnamese_explanation:
  why_vi: >
    Âm tiết tiếng Việt luôn kết thúc bằng nguyên âm hoặc một phụ âm không bật hơi. Nên khi gặp
    /s/ hay /z/ ở cuối từ, miệng bạn tự động bỏ nó đi — không phải vì bạn không biết, mà vì
    cơ bắp chưa từng phải giữ hơi lâu đến thế. Hậu quả: người nghe mất luôn thông tin về ngôi
    và số nhiều.
  how_vi: >
    Nói xong nguyên âm thì giữ nguyên vị trí lưỡi và xì hơi thêm nửa nhịp. Đừng thêm nguyên âm
    phía sau — "works" không phải "work-sờ". /s/ không rung, /z/ có rung.
  contrast_vi: "work (làm) ↔ works (anh ấy làm). Mất /s/ là người nghe mất luôn chủ ngữ của câu."

common_mistakes:
  - mistake: "Nuốt mất âm cuối: “He work in IT.”"
    why_vi: "Thói quen âm tiết tiếng Việt. Câu vẫn hiểu được nhưng nghe như trẻ con nói, và trong môi trường công việc điều đó ảnh hưởng tới cách người ta đánh giá bạn."
    fix_vi: "Kéo dài /s/ ra thật rõ khi mới tập: work-sss. Cường điệu trước, thu về mức tự nhiên sau."
    detect:
      phoneme_missing: [s, z]
  - mistake: "Thêm nguyên âm: “work-sờ in IT.”"
    why_vi: "Tiếng Việt tách âm tiết rất rõ, nên miệng tự thêm một nguyên âm để hoàn thiện âm tiết."
    fix_vi: "Dừng hơi ngay sau /s/, đừng mở miệng thêm. Thử nói work rồi giữ nguyên khẩu hình, chỉ xì hơi."
    detect:
      phoneme_inserted: [ə]
  - mistake: "Dùng /s/ cho mọi trường hợp, kể cả khi phải là /z/"
    why_vi: "Cả hai đều lạ nên bạn chọn một cái rồi dùng mãi."
    fix_vi: "Sau âm không rung (p, t, k, f) thì /s/; còn lại hầu hết là /z/. needs là /z/, works là /s/."
    detect:
      phoneme_missing: [z]

memory_trick_vi: >
  Nghĩ đến tiếng rắn xì: work-sss. Ai cũng bắt chước được tiếng rắn — miệng bạn đã biết làm /s/
  từ lâu rồi, chỉ là chưa quen đặt nó ở cuối từ. Còn /z/ là con ong: bzzz, có rung.

mini_quiz:
  - kind: mcq_listen
    prompt_vi: "Bạn nghe thấy câu nào?"
    audio_text: "He works in IT."
    choices: ["He work in IT.", "He works in IT."]
    answer: 1
    difficulty: 3
    focus_phonemes: [s]
  - kind: fill_chunk
    prompt_vi: "Một ticket là của chị bên nhân sự: “She ___ in HR.”"
    choices: [work, works, working]
    answer: 1
    difficulty: 2
  - kind: mcq
    prompt_vi: "Âm cuối của “needs” là gì?"
    choices: ["/s/ không rung", "/z/ có rung", "Không có âm cuối"]
    answer: 1
    difficulty: 2
  - kind: mcq_listen
    prompt_vi: "Minh vừa bàn giao. Bạn nhận mấy ticket?"
    audio_text: "I have three tickets today."
    choices: ["một", "ba", "không rõ"]
    answer: 1
    difficulty: 3
    focus_phonemes: [s]

unlock_condition:
  mastery_threshold: 70
  mastery_weights: {speak: 0.35, listen: 0.15, read: 0.15, write: 0.15, quiz: 0.20}
  min_speaking_attempts: 4
  challenge_threshold: 85

recommended_next:
  default: F03
