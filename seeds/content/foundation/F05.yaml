schema_version: 1
id: F05
slug: trong-am-tu
unit: U-F3
title_vi: "Trọng âm từ — nói đúng âm nhưng vẫn không ai hiểu"
title_en: "Word stress"
phase: foundation
topic: core
cefr_target: a1
order_index: 5
est_minutes: 14

objective_vi: "Đặt đúng trọng âm cho 8 từ công việc thường dùng, và nghe ra trọng âm khi người khác nói."
objective_observable: "Đạt ≥75 điểm phát âm trên 3/4 câu drill và trả lời đúng 3/4 câu quiz trọng âm."

prerequisites:
  - {lesson: F04, min_mastery: 70, kind: hard}
  - {lesson: F01, min_mastery: 60, kind: soft}

vocabulary:
  - term: deploy
    ipa: "/dɪˈplɔɪ/"
    meaning_vi: "triển khai (nhấn âm sau)"
    chunk: "We deploy on Fridays."
    tags: [it_english, verb]
  - term: deployment
    ipa: "/dɪˈplɔɪmənt/"
    meaning_vi: "việc triển khai (nhấn âm giữa)"
    chunk: "The deployment failed."
    tags: [it_english, noun]
  - term: router
    ipa: "/ˈraʊtər/"
    meaning_vi: "bộ định tuyến (nhấn âm đầu)"
    chunk: "The router is down."
    tags: [it_english, noun]
  - term: report
    ipa: "/rɪˈpɔːrt/"
    meaning_vi: "báo cáo (nhấn âm sau)"
    chunk: "I sent the report."
    tags: [office, noun]
  - term: manager
    ipa: "/ˈmænɪdʒər/"
    meaning_vi: "quản lý (nhấn âm đầu)"
    chunk: "I asked my manager."
    tags: [office, noun]
  - term: engineer
    ipa: "/ˌɛndʒɪˈnɪr/"
    meaning_vi: "kỹ sư (nhấn âm cuối)"
    chunk: "She's a network engineer."
    tags: [it_english, noun]

sentence_patterns:
  - pattern: "The {thing} is {state}."
    meaning_vi: "{thing} đang {state}."
    slots:
      thing: [router, server, deployment]
      state: [down, ready, running]
  - pattern: "Are you available {time}?"
    meaning_vi: "Bạn có rảnh {time} không?"
    slots:
      time: ["at three", "tomorrow morning", "this afternoon"]

dialogue:
  context_vi: >
    Thứ Tư. Router phòng họp hỏng từ sáng, mà tối nay có đợt triển khai. Linh gọi bạn lại hỏi
    tình hình — và đây là lần đầu mấy từ chuyên môn này ra khỏi miệng bạn, chứ không phải chỉ
    nằm trên màn hình.
  turns:
    - {speaker: Linh, en: "Are you available at three?", vi: "Ba giờ bạn rảnh không?"}
    - {speaker: You, en: "Yes. Is it about the deployment?", vi: "Dạ rảnh. Có phải về đợt triển khai không ạ?"}
    - {speaker: Linh, en: "Right. We deploy tonight and the router is still down.", vi: "Đúng. Tối nay triển khai mà router vẫn đang hỏng."}
    - {speaker: You, en: "I'll ask the network engineer.", vi: "Em sẽ hỏi kỹ sư mạng."}

reading_passage:
  id: RP-F05
  kind: email
  context_vi: >
    Email thông báo triển khai tối nay. Đọc lướt tìm hai thứ: mấy giờ, và ai nhận báo cáo.
  text_en: |
    Subject: Deployment tonight

    Hi team,

    The deployment starts at nine tonight.
    Our network engineer will restart the router first.
    After that, I will send a short report to the manager.
    Please do not deploy anything else today.

    Thanks,
    Linh
  text_vi: |
    Tiêu đề: Triển khai tối nay

    Chào cả nhóm,

    Việc triển khai bắt đầu lúc chín giờ tối.
    Kỹ sư mạng của mình sẽ khởi động lại router trước.
    Sau đó tôi sẽ gửi một báo cáo ngắn cho quản lý.
    Hôm nay đừng triển khai thêm thứ gì khác.

    Cảm ơn,
    Linh
  questions:
    - q_en: "What time does the deployment start?"
      choices: ["Nine tonight", "Nine in the morning", "After the report"]
      answer: 0
      skill: scan
      difficulty: 2
    - q_en: "Who gets the report?"
      choices: ["The manager", "The network engineer", "The whole team"]
      answer: 0
      skill: infer
      difficulty: 3

writing_task:
  id: WT-F05
  kind: reorder
  prompt_vi: "Sắp ba dòng này thành một email đúng thứ tự."
  ordered_lines:
    - "Hi team,"
    - "The deployment starts at nine tonight."
    - "Thanks, Linh"
  hint_vi: "Email tiếng Anh luôn có ba phần: chào, nội dung, ký tên."
  sample_en: "Hi team, / The deployment starts at nine tonight. / Thanks, Linh"

listening_snippet:
  id: LS-F05
  speed: 0.85
  voice: en_US_female
  context_vi: >
    Ba giờ chiều, Linh cập nhật cho bạn. Bốn từ trong đoạn này chỉ khác nhau ở chỗ nhấn:
    ROU-ter, de-PLOY-ment, MA-na-ger, en-gi-NEER. Nghe xem trọng âm rơi ở đâu — đó là thứ
    giúp bạn nhận ra từ trước cả khi nghe hết từ.
  transcript_en: "The deployment failed because the router is down. I told my manager already, and the network engineer is on his way."
  transcript_vi: "Đợt triển khai thất bại vì router đang hỏng. Tôi đã báo quản lý rồi, và kỹ sư mạng đang trên đường tới."
  questions:
    - q_vi: "Vì sao đợt triển khai thất bại?"
      choices: ["Router hỏng", "Server hỏng", "Không đủ người"]
      answer: 0
      difficulty: 3
    - q_vi: "Linh đã báo cho ai?"
      choices: ["Quản lý", "Khách hàng", "Chưa báo ai"]
      answer: 0
      difficulty: 2

speaking_drills:
  - kind: read_aloud
    expected_text: "The router is down."
    prompt_vi: "Bạn báo tình hình cho Linh. Đọc to — ROU-ter nhấn âm đầu; nhấn sai chỗ này Linh sẽ không nhận ra từ."
    ipa: "/ðə ˈraʊtər ɪz daʊn/"
    focus_phonemes: [r]
  - kind: read_aloud
    expected_text: "The deployment failed."
    prompt_vi: "Tin xấu lúc ba giờ chiều. Đọc to — de-PLOY-ment nhấn âm giữa."
    ipa: "/ðə dɪˈplɔɪmənt feɪld/"
    focus_phonemes: [d]
  - kind: shadow
    expected_text: "I sent the report to my manager."
    prompt_vi: "Bạn nói lại việc mình đã làm sau khi router hỏng. Nghe rồi nhắc lại — MA-na-ger nhấn âm đầu."
    ipa: "/aɪ sɛnt ðə rɪˈpɔːrt tuː maɪ ˈmænɪdʒər/"
    focus_phonemes: [t, dʒ]
  - kind: shadow
    expected_text: "She is a network engineer."
    prompt_vi: "Bạn nói với Linh người bạn sẽ nhờ. Nghe rồi nhắc lại — NET-work nhấn đầu, en-gi-NEER nhấn cuối."
    ipa: "/ʃiː ɪz ə ˈnɛtwɜːrk ˌɛndʒɪˈnɪr/"
    focus_phonemes: [n, r]
  - kind: respond
    prompt_en: "Why did the deployment fail?"
    prompt_vi: "Linh hỏi vì sao đợt triển khai hỏng. Giải thích — cả câu treo vào một từ, nên nhấn ROU-ter cho đúng."
    accept_patterns:
      - "Because the router is down"
      - "The router is down"
      - "Because the router failed"

vietnamese_explanation:
  why_vi: >
    Tiếng Việt là ngôn ngữ thanh điệu: mỗi âm tiết có dấu riêng và mọi âm tiết đều nặng như nhau.
    Tiếng Anh thì ngược lại — một âm tiết được nhấn mạnh, còn lại bị nuốt gần hết. Người bản xứ
    nhận diện từ CHỦ YẾU qua trọng âm. Nói đúng hết các âm nhưng nhấn sai chỗ, họ vẫn không hiểu.
  how_vi: >
    Âm được nhấn thì to hơn, dài hơn, và cao hơn — cả ba cùng lúc. Âm không nhấn thì gọn lại,
    nguyên âm thường biến thành /ə/ mờ nhạt. Khi tra từ điển, nhìn dấu ˈ đứng trước âm tiết được nhấn.
  contrast_vi: "ˈROU-ter — nếu bạn nhấn thành rou-TER, người nghe không nhận ra từ."

common_mistakes:
  - mistake: "Nhấn đều mọi âm tiết: “ROU-TER”, “DE-PLOY-MENT”"
    why_vi: "Thói quen tiếng Việt: mỗi âm tiết là một đơn vị đầy đủ, có dấu riêng, không có âm nào bị nuốt."
    fix_vi: "Cố tình nói NHỎ các âm không nhấn, gần như lướt qua. Cảm giác sẽ rất sai với tai người Việt — đó là dấu hiệu bạn đang làm đúng."
    detect: {}
  - mistake: "Nhấn sai chỗ ở từ IT: “de-PLOY-ment” thành “DE-ploy-ment”"
    why_vi: "Đọc quá nhiều mà nghe quá ít. Dân IT thấy chữ này hàng ngày nhưng chưa từng nghe ai đọc nó."
    fix_vi: "Nghe giọng mẫu trước khi đoán. Với từ chuyên môn, đây là lỗi phổ biến nhất."
    detect: {}
  - mistake: "Nhấn sai giữa danh từ và động từ cùng gốc"
    why_vi: "Tiếng Anh đổi trọng âm để đổi từ loại, tiếng Việt không có cơ chế đó."
    fix_vi: "Nhớ một cặp làm mốc: “I recORD” (động từ) ↔ “a RECord” (danh từ)."
    detect: {}

memory_trick_vi: >
  Nghĩ trọng âm như nhịp trống: mỗi từ có đúng một cú đánh mạnh, còn lại là gõ nhẹ. Vỗ tay theo
  khi tập — vỗ mạnh ở âm nhấn. Vỗ tay ép miệng bạn làm đúng nhanh hơn là cố nhớ bằng đầu.

mini_quiz:
  - kind: mcq
    prompt_vi: "Từ “router” nhấn âm nào?"
    choices: ["ROU-ter (âm đầu)", "rou-TER (âm sau)", "Nhấn đều"]
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "Từ “deployment” nhấn âm nào?"
    choices: ["DE-ploy-ment", "de-PLOY-ment", "de-ploy-MENT"]
    answer: 1
    difficulty: 3
  - kind: mcq_listen
    prompt_vi: "Nghe Linh nói và cho biết từ nào được nhấn mạnh nhất?"
    audio_text: "The router is down."
    choices: ["router", "is", "down"]
    answer: 0
    difficulty: 4
  - kind: mcq
    prompt_vi: "Vì sao nhấn sai trọng âm nghiêm trọng hơn phát âm sai một âm?"
    choices:
      - "Vì người bản xứ nhận diện từ chủ yếu qua trọng âm"
      - "Vì trọng âm quyết định nghĩa của câu"
      - "Vì nó làm câu dài hơn"
    answer: 0
    difficulty: 3

unlock_condition:
  mastery_threshold: 73
  mastery_weights: {speak: 0.35, listen: 0.15, read: 0.15, write: 0.15, quiz: 0.20}
  min_speaking_attempts: 4
  challenge_threshold: 85

recommended_next:
  default: F06
