schema_version: 1
id: F09
slug: trong-am-tu-dai
unit: U-F3
title_vi: "Trọng âm từ nhiều âm tiết"
title_en: "Word stress in longer words"
phase: foundation
topic: core
cefr_target: a2
order_index: 9
est_minutes: 14

objective_vi: "Đặt trọng âm đúng ở các từ dài hay dùng trong công việc, để người nghe hiểu ngay."
objective_observable: "Đạt ≥75 điểm nói trên 3/4 drill và chọn đúng vị trí trọng âm 4/5 câu quiz."

prerequisites:
  - {lesson: F08, min_mastery: 73, kind: hard}
  - {lesson: F03, min_mastery: 60, kind: soft}

vocabulary:
  - term: "deVELopment"
    ipa: "/dɪˈvɛləpmənt/"
    meaning_vi: "sự phát triển (nhấn âm 2)"
    chunk: "The development is on track."
    tags: [it_english]
  - term: "conFIGuration"
    ipa: "/kənˌfɪɡjəˈreɪʃən/"
    meaning_vi: "cấu hình (nhấn RA)"
    chunk: "Check the configuration."
    tags: [it_english]
  - term: "PROBlem"
    ipa: "/ˈprɒbləm/"
    meaning_vi: "vấn đề (nhấn âm đầu)"
    chunk: "We have a problem."
    tags: [core]
  - term: "aVAILable"
    ipa: "/əˈveɪləbəl/"
    meaning_vi: "có sẵn (nhấn âm 2)"
    chunk: "The report is available."
    tags: [office]
  - term: "reSPONsible"
    ipa: "/rɪˈspɒnsəbəl/"
    meaning_vi: "chịu trách nhiệm (nhấn âm 2)"
    chunk: "Who is responsible for this?"
    tags: [office]
  - term: "TEMporary"
    ipa: "/ˈtɛmpərɛri/"
    meaning_vi: "tạm thời (nhấn âm đầu)"
    chunk: "It's a temporary fix."
    tags: [it_english]

sentence_patterns:
  - pattern: "The {word} is ready."
    meaning_vi: "{word} đã sẵn sàng."
    slots:
      word: [development, configuration, report]

dialogue:
  context_vi: >
    Ngay sau cuộc gọi với David. Linh kéo ghế lại hỏi bạn tóm tắt tình hình — và bây giờ bạn
    phải nói ra miệng mấy từ dài mà lâu nay bạn chỉ đọc bằng mắt trên Jira.
  turns:
    - {speaker: Linh, en: "Is the development on track?", vi: "Phần phát triển có đúng tiến độ không?"}
    - {speaker: You, en: "Yes, but the configuration has a problem.", vi: "Có ạ, nhưng cấu hình đang có vấn đề."}
    - {speaker: Linh, en: "Who's responsible for it?", vi: "Ai chịu trách nhiệm việc đó?"}
    - {speaker: You, en: "Minh. He made a temporary fix; a full one is available tomorrow.", vi: "Minh ạ. Anh ấy vá tạm; bản đầy đủ có vào ngày mai."}

reading_passage:
  id: RP-F09
  kind: email
  context_vi: >
    Email báo một thay đổi tạm thời. Toàn bộ từ khó trong bài đều là từ nhiều âm tiết —
    đọc bằng mắt trước, rồi thử đọc to xem trọng âm rơi đúng chỗ chưa.
  text_en: |
    Subject: Temporary configuration change

    Hi team,

    We found a problem in the payment service this morning.
    The development team is responsible for the fix.
    For now we have made a temporary configuration change.
    David is available all day if you have questions.
    The permanent fix goes out on Friday.

    Thanks,
    Linh
  text_vi: |
    Tiêu đề: Thay đổi cấu hình tạm thời

    Chào cả nhóm,

    Sáng nay chúng tôi phát hiện một lỗi ở dịch vụ thanh toán.
    Nhóm phát triển chịu trách nhiệm sửa.
    Trước mắt chúng tôi đã đổi cấu hình tạm thời.
    David có mặt cả ngày nếu mọi người có thắc mắc.
    Bản sửa chính thức sẽ ra vào thứ Sáu.

    Cảm ơn,
    Linh
  questions:
    - q_en: "Who is responsible for the fix?"
      choices: ["The development team", "David", "The payment service"]
      answer: 0
      skill: scan
      difficulty: 2
    - q_en: "Is the current change permanent?"
      choices: ["No, it is temporary", "Yes", "The email does not say"]
      answer: 0
      skill: infer
      difficulty: 3

writing_task:
  id: WT-F09
  kind: error_correction
  prompt_vi: "Câu này sai giới từ. Viết lại cho đúng."
  prompt_en: "Who is responsible of the fix?"
  blanks:
    - ["who is responsible for the fix"]
  hint_vi: "“Responsible” luôn đi với “for”, không đi với “of”."
  sample_en: "Who is responsible for the fix?"

listening_snippet:
  id: LS-F09
  speed: 1.0
  voice: en_US_female
  context_vi: >
    Linh đọc lại nguyên văn phần tóm tắt của bạn trước khi gửi cho David. Nghe kỹ đỉnh nhấn của
    từng từ dài — deVELopment, configuRAtion, TEMporary, aVAILable. Nếu bạn nhấn khác Linh, đó
    chính là chỗ David sẽ không hiểu.
  transcript_en: "So: the development is on track, but the configuration has a problem. It's a temporary fix for now, and a full one is available tomorrow. I'll send that to David."
  transcript_vi: "Vậy nhé: phần phát triển đúng tiến độ, nhưng cấu hình có vấn đề. Hiện tại là bản vá tạm, và bản đầy đủ có vào ngày mai. Tôi sẽ gửi cho David."
  questions:
    - q_vi: "Trong bản tóm tắt Linh gửi David, cái gì đang có vấn đề?"
      choices: ["Cấu hình (configuration)", "Phát triển (development)", "Báo cáo"]
      answer: 0
      difficulty: 3
    - q_vi: "Bản vá hiện tại là loại nào?"
      choices: ["Tạm thời", "Đầy đủ", "Chưa có bản nào"]
      answer: 0
      difficulty: 3

speaking_drills:
  - kind: read_aloud
    expected_text: "The development is on track."
    prompt_vi: "Linh hỏi tiến độ, bạn trả lời. Đọc to — deVELopment nhấn âm thứ hai, không nhấn âm đầu."
    ipa: "/ðə dɪˈvɛləpmənt ɪz ɒn træk/"
    focus_phonemes: [d, v, t]
  - kind: read_aloud
    expected_text: "Check the configuration."
    prompt_vi: "Bạn chỉ cho Linh chỗ đang hỏng. Đọc to — configuRAtion, trọng âm rơi vào “RA” gần cuối."
    ipa: "/tʃɛk ðə kənˌfɪɡjəˈreɪʃən/"
    focus_phonemes: [k, ʃ, r]
  - kind: shadow
    expected_text: "Who is responsible for this?"
    prompt_vi: "Linh hỏi ai đang lo phần cấu hình. Nghe rồi nhắc lại — reSPONsible nhấn âm hai."
    ipa: "/huː ɪz rɪˈspɒnsəbəl fɔr ðɪs/"
    focus_phonemes: [r, s, b]
  - kind: respond
    prompt_en: "What's the status of the project?"
    prompt_vi: "Linh cần một câu tóm tắt để gửi cho David. Trả lời có “development” và “configuration” — đặt trọng âm đúng, vì David sẽ nghe câu này chứ không đọc."
    accept_patterns:
      - "The development is on track but the configuration has a problem"
      - "Development is fine configuration needs work"
      - "It's a temporary fix a full one is available tomorrow"

vietnamese_explanation:
  why_vi: >
    Tiếng Việt là ngôn ngữ đơn âm — mỗi tiếng một trọng lượng đều nhau. Tiếng Anh thì một từ dài chỉ
    có MỘT âm được nhấn mạnh, phần còn lại nhẹ đi. Đặt sai trọng âm là lý do số một khiến người bản
    xứ “không hiểu” dù bạn đọc đúng từng chữ cái. “deVELopment” nhấn sai thành “DEvelopment” nghe lạ tai ngay.
  how_vi: >
    Với từ dài, học trọng âm CÙNG LÚC với từ, đừng học riêng. Quy tắc mềm: nhiều danh từ -tion/-sion
    nhấn ngay trước đuôi (configuRAtion, informAtion); nhiều từ -ible/-able/-ity nhấn xa đuôi
    (reSPONsible, aVAILable). Nhưng cách chắc nhất: nghe mẫu và lặp lại, đánh dấu âm nhấn.
  contrast_vi: "Đọc đều từng âm như tiếng Việt ↔ nhấn MỘT âm, nhẹ phần còn lại. Chỉ cái sau người bản xứ nghe ra."

common_mistakes:
  - mistake: "Đọc đều mọi âm tiết như tiếng Việt"
    why_vi: "Tiếng Việt mỗi tiếng nặng bằng nhau, nên phản xạ là đọc đều."
    fix_vi: "Chọn MỘT âm để nhấn to và dài hơn, các âm còn lại đọc nhẹ và nhanh. Sự chênh lệch đó chính là “giọng Anh”."
    detect: {}
  - mistake: "Nhấn sai âm ở từ chuyên môn: DEvelopment, conFIGuration"
    why_vi: "Đoán trọng âm từ chính tả."
    fix_vi: "deVELopment (âm 2), configuRAtion (âm RA). Nghe mẫu cho từng từ dài hay dùng, đừng đoán."
    detect: {}
  - mistake: "Nhấn tất cả các âm để cho “rõ”"
    why_vi: "Nghĩ nhấn nhiều là rõ hơn."
    fix_vi: "Nhấn nhiều âm khiến từ mất nhịp và khó hiểu hơn. Một từ chỉ một đỉnh nhấn."
    detect: {}

memory_trick_vi: >
  Mỗi từ dài là một quả núi: chỉ một ĐỈNH (âm nhấn), còn lại là sườn thoải. Đọc đều là san phẳng núi
  — người nghe mất mốc để nhận ra từ. Tìm đỉnh, nhấn nó, thả phần còn lại.

mini_quiz:
  - kind: mcq
    prompt_vi: "“development” nhấn âm nào?"
    choices: ["de-VEL-op-ment (âm 2)", "DE-vel-op-ment (âm 1)", "de-vel-OP-ment (âm 3)"]
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "“configuration” nhấn âm nào?"
    choices: ["con-fig-u-RA-tion", "CON-fig-u-ra-tion", "con-FIG-u-ra-tion"]
    answer: 0
    difficulty: 3
  - kind: mcq
    prompt_vi: "Vì sao đặt sai trọng âm gây khó hiểu?"
    choices:
      - "Người nghe mất mốc để nhận ra từ"
      - "Vì sai ngữ pháp"
      - "Vì thiếu từ vựng"
    answer: 0
    difficulty: 2
  - kind: mcq
    prompt_vi: "“responsible” nhấn ở đâu?"
    choices: ["re-SPON-si-ble", "RE-spon-si-ble", "re-spon-SI-ble"]
    answer: 0
    difficulty: 3
  - kind: mcq_listen
    prompt_vi: "Trong câu Linh gửi David, cái gì có vấn đề?"
    audio_text: "The configuration has a problem."
    choices: ["Cấu hình", "Phát triển", "Mạng"]
    answer: 0
    difficulty: 3

unlock_condition:
  mastery_threshold: 76
  mastery_weights: {speak: 0.35, listen: 0.15, read: 0.15, write: 0.15, quiz: 0.20}
  min_speaking_attempts: 4
  challenge_threshold: 85

recommended_next:
  default: F10
